<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Condition Review — Backstage</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="sidebar.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="backstage.css">
<style>
  /* === CONDITION REVIEW — local layout only === */
  .header { position:sticky;top:0;z-index:200;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:52px;padding:0 24px;display:flex;align-items:center;justify-content:space-between }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header h1 { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; color: var(--accent); margin: 0; }
  .header h1 span { color: var(--text-3); font-weight: 400; }
  .header-stats { display: flex; gap: 18px; font-size: 13px; color: var(--text-3); }
  .header-stats strong { color: var(--accent); font-weight: 600; }

  /* Filter bar */
  .filter-bar { display:flex; gap:12px; padding:16px 24px; border-bottom:1px solid var(--border); flex-wrap:wrap; align-items:center; }
  .filter-bar select, .filter-bar label { font-family:var(--sans); font-size:13px; }
  .filter-bar select { padding:7px 10px; background:var(--bg-page); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); outline:none; cursor:pointer; }
  .filter-bar select:hover { border-color:var(--border-hover); }
  .filter-toggle { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-3); cursor:pointer; }
  .filter-toggle input { accent-color:var(--accent); }
  .search-input { padding:7px 12px; background:var(--bg-page); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-family:var(--sans); font-size:13px; outline:none; min-width:260px; transition:border-color .12s; }
  .search-input:hover { border-color:var(--border-hover); }
  .search-input:focus { border-color:var(--accent); }
  .search-input::placeholder { color:var(--text-4); }

  /* Custom button-based dropdowns (Tesla-friendly; replaces native <select>) */
  .chip-btn { padding: 7px 12px; background: var(--bg-page); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: var(--sans); font-size: 13px; cursor: pointer; min-width: 140px; text-align: left; display: inline-flex; align-items: center; justify-content: space-between; gap: 8px; }
  .chip-btn:hover { border-color: var(--border-hover); }
  .chip-btn::after { content: ''; display: inline-block; width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 4px solid currentColor; opacity: .55; flex-shrink: 0; }
  .chip-wrap { position: relative; display: inline-block; }
  .chip-drop { display: none; position: absolute; top: 100%; left: 0; margin-top: 4px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 4px 12px rgba(0,0,0,.1); z-index: 999; min-width: 200px; max-height: 320px; overflow-y: auto; padding: 4px 0; }
  .chip-drop.open { display: block; }
  .chip-drop button { display: block; width: 100%; text-align: left; padding: 7px 12px; border: none; background: none; font-family: inherit; font-size: 13px; color: var(--text); cursor: pointer; }
  .chip-drop button:hover { background: var(--bg-alt); }
  .chip-drop button.selected { background: var(--accent-dim); color: var(--accent); font-weight: 600; }

  /* Card grid */
  .card-grid { padding:24px; display:grid; grid-template-columns:1fr; gap:20px; }

  /* Property card */
  .prop-card { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; }
  .prop-card:hover { border-color:var(--border-hover); }

  .card-top { display:grid; grid-template-columns:auto 1fr; gap:0; }

  /* Photo strip */
  .photo-strip { display:grid; grid-template-columns:repeat(4, 1fr); gap:4px; padding:12px; width:520px; background:var(--bg-page); align-content:start; }
  .photo-strip img { width:100%; aspect-ratio:4/3; object-fit:cover; border-radius:var(--radius-sm); cursor:pointer; }
  .photo-strip img:hover { opacity:.85; }

  /* Card details */
  .card-details { padding:16px 20px; display:flex; flex-direction:column; gap:10px; }
  .card-addr { font-size:15px; font-weight:600; color:var(--text); letter-spacing:-0.2px; }
  .card-meta { font-size:13px; color:var(--text-3); display:flex; gap:16px; flex-wrap:wrap; }
  .card-meta strong { color:var(--text-2); }

  .card-remarks { font-size:12.5px; color:var(--text-3); line-height:1.5; max-height:60px; overflow-y:auto; padding:8px 10px; background:var(--bg-page); border-radius:var(--radius-sm); border:1px solid var(--border); }

  .card-reasoning { font-size:13px; color:var(--text-2); font-style:italic; padding:6px 0; }

  /* Score row */
  .score-row { display:flex; align-items:center; gap:14px; padding:12px 20px; border-top:1px solid var(--border); background:var(--bg-page); }
  .score-label { font-size:13px; color:var(--text-3); }
  .score-label strong { color:var(--text); font-weight:600; }
  .confidence-tag { font-size:11px; font-weight:600; padding:3px 8px; border-radius:10px; text-transform:uppercase; letter-spacing:.5px; }
  .confidence-tag.high { background:var(--green-bg); color:var(--green); }
  .confidence-tag.medium { background:var(--amber-bg); color:var(--amber); }
  .confidence-tag.low { background:var(--red-bg); color:var(--red); }

  .tier-buttons { display:flex; gap:4px; margin-left:auto; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
  .tier-btn { padding:0 10px; height:32px; border:1.5px solid var(--border); border-radius:var(--radius-sm); background:var(--bg); font-family:var(--sans); font-size:12.5px; font-weight:500; color:var(--text-3); cursor:pointer; transition:all .12s; white-space:nowrap; }
  .tier-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
  .tier-btn.active { border-color:var(--accent); background:var(--accent); color:#fff; }
  .tier-btn.overridden { border-color:var(--blue); background:var(--blue); color:#fff; }
  .subtier-badge{ margin-left:8px; padding:2px 8px; border-radius:var(--radius-sm); background:var(--accent-dim); color:var(--accent); font-family:var(--mono); font-size:12px; font-weight:600; }
  .subtier-buttons{ display:flex; gap:3px; margin-left:6px; }
  .subtier-btn{ width:26px; height:26px; border:1.5px solid var(--border); border-radius:var(--radius-sm); background:var(--bg); font-family:var(--sans); font-size:12px; font-weight:600; color:var(--text-3); cursor:pointer; }
  .subtier-btn:hover{ border-color:var(--accent); color:var(--accent); }
  .subtier-btn.active{ border-color:var(--accent); background:var(--accent); color:#fff; }
  .tier-divider { width:1px; height:24px; background:var(--border); margin:0 4px; }
  .reviewed-btn { padding:0 10px; height:32px; border:1.5px solid var(--green); border-radius:var(--radius-sm); background:var(--bg); font-family:inherit; font-size:12.5px; font-weight:600; color:var(--green); cursor:pointer; transition:all .12s; display:inline-flex; align-items:center; gap:4px; }
  .reviewed-btn:hover { background:var(--green-bg); }
  .reviewed-btn:disabled { opacity:.4; cursor:default; border-color:var(--border); color:var(--text-4); background:var(--bg); }

  .overridden-badge { font-size:11px; font-weight:600; padding:3px 8px; border-radius:10px; background:var(--blue-bg); color:var(--blue); text-transform:uppercase; letter-spacing:.5px; }

  /* Pagination */
  .pagination { display:flex; justify-content:center; gap:8px; padding:20px 24px; }
  .page-btn { padding:8px 14px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--bg); font-family:var(--sans); font-size:13px; color:var(--text-3); cursor:pointer; }
  .page-btn:hover { border-color:var(--border-hover); color:var(--text); }
  .page-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  .page-btn:disabled { opacity:.4; cursor:default; }

  /* Empty state */
  .empty-state { text-align:center; padding:60px 24px; color:var(--text-4); font-size:14px; }

  /* Photo lightbox — grid gallery (matches mls-deals.html pattern) */
  .lb-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);overflow-y:auto}
  .lb-overlay.open{display:block}
  .lb-close{position:fixed;top:16px;right:20px;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:24px;cursor:pointer;z-index:10001;padding:4px 12px;line-height:1;border-radius:6px;backdrop-filter:blur(4px)}
  .lb-close:hover{background:rgba(255,255,255,.2)}
  .lb-addr{color:#fff;font-size:14px;font-weight:600;text-align:center;padding:16px 60px 12px;position:sticky;top:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);z-index:10000}
  .lb-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:4px 4px 40px;max-width:1200px;margin:0 auto}
  .lb-grid img{width:100%;display:block;cursor:pointer;border-radius:2px}
  .lb-grid img.lb-full{position:fixed;inset:0;max-width:95vw;max-height:95vh;margin:auto;z-index:10002;border-radius:6px;object-fit:contain;cursor:zoom-out}

  /* === BACKSTAGE SHELL === */
  html, body { height: 100vh; overflow: hidden; }

  .app-shell { display:flex; height:100vh; }

  .bs-sidebar { width:230px; background:var(--bg); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; transition:width .2s; }
  .bs-sidebar.collapsed { width:56px; }
  .bs-sidebar.collapsed .side-brand span, .bs-sidebar.collapsed .side-section-label, .bs-sidebar.collapsed .side-label, .bs-sidebar.collapsed .side-user-name, .bs-sidebar.collapsed .lock-btn { display:none; }
  .bs-sidebar.collapsed .side-brand { justify-content:center; padding:20px 0 18px; }
  .bs-sidebar.collapsed .side-item { justify-content:center; padding:10px 0; margin:0 8px 1px; }
  .bs-sidebar.collapsed .side-section { padding:12px 0 0; }
  .bs-sidebar.collapsed .side-footer { justify-content:center; padding:16px 0; }
  .bs-sidebar.collapsed .side-user { justify-content:center; }

  .side-brand { padding:20px 20px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .side-mark { width:26px; height:26px; border-radius:7px; background:var(--text); display:grid; place-items:center; font-weight:700; font-size:11px; color:#fff; }
  .side-brand span { font-size:14px; font-weight:600; color:var(--text); }
  .side-section { padding:6px 10px 0; }
  .side-section-label { font-size:9px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--text-4); padding:0 8px; margin-bottom:2px; }
  .side-item { display:flex; align-items:center; gap:8px; padding:3px 8px; border-radius:var(--radius); cursor:pointer; transition:all .12s; margin-bottom:0; text-decoration:none; line-height:1.3; }
  .side-item:hover { background:var(--bg-page); text-decoration:none; }
  .side-item.active { background:var(--bg-alt); }
  .side-item.active .side-icon svg { stroke:var(--text); }
  .side-item.active .side-label { color:var(--text); font-weight:600; }
  .side-icon { width:18px; height:18px; display:grid; place-items:center; }
  .side-icon svg { width:16px; height:16px; stroke:var(--text-4); stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .side-label { font-size:13px; font-weight:500; color:var(--text-3); }
  .side-item.disabled { opacity:.35; pointer-events:none; }
  .side-footer { margin-top:auto; padding:16px 20px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .side-user { display:flex; align-items:center; gap:9px; }
  .side-avatar { width:26px; height:26px; border-radius:50%; background:var(--bg-alt); display:grid; place-items:center; font-size:11px; font-weight:600; color:var(--text-3); }
  .side-user-name { font-size:13px; font-weight:500; color:var(--text-3); }
  .lock-btn { background:none; border:none; cursor:pointer; padding:4px; color:var(--text-4); }
  .lock-btn:hover { color:var(--text); }
  .collapse-btn { background:none; border:none; cursor:pointer; padding:6px 12px; color:var(--text-4); font-size:14px; }
  .collapse-btn:hover { color:var(--text); }

  .main-content { flex:1; overflow-y:auto; min-width:0; }
</style>
</head>
<body>

<!-- APP SHELL -->
<div class="app-shell">

<!-- Sidebar (rendered by sidebar.js) -->
<div class="bs-sidebar" id="bsSidebar"></div>

<!-- Main content -->
<div class="main-content">

<div class="header">
  <div class="header-left">
    <h1>Condition QA <span id="headerCount"></span></h1>
  </div>
  <div class="header-stats">
    <span><strong id="statTotal">0</strong> scored</span>
    <span><strong id="statOverridden">0</strong> overridden</span>
    <span style="color:var(--red)"><strong id="statLow">0</strong> low confidence</span>
  </div>
</div>

<div class="filter-bar">
  <input type="text" class="search-input" id="fSearch" placeholder="Search MLS# or address…" oninput="setSearchFilter(this.value)" autocomplete="off">
  <div class="chip-wrap" id="fCity-wrap">
    <button class="chip-btn" id="fCity-btn" onclick="event.stopPropagation();toggleChipDrop('fCity-drop')"><span id="fCity-label">All Cities</span></button>
    <div class="chip-drop" id="fCity-drop"></div>
  </div>
  <div class="chip-wrap" id="fTier-wrap">
    <button class="chip-btn" id="fTier-btn" onclick="event.stopPropagation();toggleChipDrop('fTier-drop')"><span id="fTier-label">All Conditions</span></button>
    <div class="chip-drop" id="fTier-drop">
      <button onclick="setTierFilter('')" class="selected">All Conditions</button>
      <button onclick="setTierFilter('1')">Distressed</button>
      <button onclick="setTierFilter('2')">Dated (livable)</button>
      <button onclick="setTierFilter('3')">Modern (owner)</button>
      <button onclick="setTierFilter('4')">Lived-in flip-quality</button>
      <button onclick="setTierFilter('5')">Half-flip</button>
      <button onclick="setTierFilter('5A')" style="padding-left:26px">└ T5-A · both updated</button>
      <button onclick="setTierFilter('5B')" style="padding-left:26px">└ T5-B · half-flip</button>
      <button onclick="setTierFilter('5C')" style="padding-left:26px">└ T5-C · opportunity</button>
      <button onclick="setTierFilter('5U')" style="padding-left:26px">└ T5-unclassified</button>
      <button onclick="setTierFilter('6')">Full flip</button>
    </div>
  </div>
  <div class="chip-wrap" id="fConfidence-wrap">
    <button class="chip-btn" id="fConfidence-btn" onclick="event.stopPropagation();toggleChipDrop('fConfidence-drop')"><span id="fConfidence-label">All Confidence</span></button>
    <div class="chip-drop" id="fConfidence-drop">
      <button onclick="setConfidenceFilter('')" class="selected">All Confidence</button>
      <button onclick="setConfidenceFilter('low')">Low</button>
      <button onclick="setConfidenceFilter('medium')">Medium</button>
      <button onclick="setConfidenceFilter('high')">High</button>
    </div>
  </div>
  <div class="chip-wrap" id="fWindow-wrap">
    <button class="chip-btn" id="fWindow-btn" onclick="event.stopPropagation();toggleChipDrop('fWindow-drop')"><span id="fWindow-label">All Time</span></button>
    <div class="chip-drop" id="fWindow-drop">
      <button onclick="setWindowFilter('')" class="selected">All Time</button>
      <button onclick="setWindowFilter('12')">Last 12 months</button>
      <button onclick="setWindowFilter('18')">Last 18 months</button>
      <button onclick="setWindowFilter('24')">Last 24 months</button>
    </div>
  </div>
  <label class="filter-toggle">
    <input type="checkbox" id="fUnreviewed" onchange="resetAndLoad()">
    Unreviewed only
  </label>
</div>

<div id="cardContainer" class="card-grid"></div>
<div id="pagination" class="pagination"></div>

</div><!-- /main-content -->
</div><!-- /app-shell -->

<!-- Photo lightbox — grid gallery (all photos at once; click to zoom) -->
<div class="lb-overlay" id="photoLightbox">
  <button class="lb-close" onclick="closeLightbox()" title="Close (Esc)">&#10005;</button>
  <div class="lb-addr" id="lbAddr"></div>
  <div class="lb-grid" id="lbGrid"></div>
</div>

<script>
const SUPABASE_URL='https://pwrnywsojomrygsiezzi.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3cm55d3Nvam9tcnlnc2llenppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzE1OTMsImV4cCI6MjA4OTgwNzU5M30.tGewn18t-6dN_bMXjC-Z820zFYvL1VUu3BDhfW1ZoNk';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
window.sb=sb;  // expose for auth.js

const TIER_LABELS={1:'Distressed',2:'Dated (livable)',3:'Modern (owner)',4:'Lived-in flip-quality',5:'Half-flip',6:'Full flip'};
const SUBTIER={2:{l:'A',t:'Kitchen + bath both updated (nicest)'},1:{l:'B',t:'One of kitchen/bath updated (half-flip)'},0:{l:'C',t:'Both original — flip opportunity'}};
const PHOTO_BASE='https://photos.dottyhomes.com';
const PAGE_SIZE=20;
let currentPage=0;
let totalCount=0;

// Filter state (replaces native <select> .value reads — Tesla-friendly).
let filters={city:'',tier:'',confidence:'',search:'',window:'',subtier:''};
let searchDebounce=null;

// ========== INIT ==========
async function init(){
  await populateCityDropdown();
  await updateStats();
  await loadCards();
}

async function populateCityDropdown(){
  const{data}=await sb.from('properties').select('city').not('condition_tier','is',null).not('city','is',null);
  if(!data)return;
  const cities=[...new Set(data.map(r=>r.city))].filter(Boolean).sort();
  const drop=document.getElementById('fCity-drop');
  // Always-first "All Cities" option, marked selected by default.
  // JSON.stringify produces "Cerritos" — the inner " terminates an onclick="..."
  // attribute early, breaking the click. esc() doesn't encode " (textContent only
  // escapes & < >), so we explicitly &quot;-encode the rendered call string. Browser
  // decodes back to setCityFilter("Cerritos") when reading the attribute.
  const attrSafe=s=>s.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  let html=`<button onclick="setCityFilter(&quot;&quot;)" class="selected">All Cities</button>`;
  html+=cities.map(c=>`<button onclick="${attrSafe('setCityFilter('+JSON.stringify(c)+')')}">${esc(c)}</button>`).join('');
  drop.innerHTML=html;
}

// ========== FILTER DROPDOWN HELPERS ==========
function toggleChipDrop(dropId){
  const drop=document.getElementById(dropId);
  if(!drop)return;
  const wasOpen=drop.classList.contains('open');
  // Close all chip-drops first so only one is open at a time.
  document.querySelectorAll('.chip-drop').forEach(d=>d.classList.remove('open'));
  if(!wasOpen) drop.classList.add('open');
}

function setCityFilter(value){
  filters.city=value;
  document.getElementById('fCity-label').textContent=value||'All Cities';
  const drop=document.getElementById('fCity-drop');
  drop.querySelectorAll('button').forEach(b=>b.classList.remove('selected'));
  // Mark the clicked button (the one whose onclick matches this value) selected.
  drop.querySelectorAll('button').forEach(b=>{
    const oc=b.getAttribute('onclick')||'';
    if(oc===`setCityFilter(${JSON.stringify(value)})`) b.classList.add('selected');
  });
  drop.classList.remove('open');
  resetAndLoad();
}

function setTierFilter(value){
  const SUB={'5A':'2','5B':'1','5C':'0','5U':'null'};
  if(value in SUB){ filters.tier='5'; filters.subtier=SUB[value]; }
  else { filters.tier=value; filters.subtier=''; }
  const labels={'':'All Conditions','1':'Distressed','2':'Dated (livable)','3':'Modern (owner)','4':'Lived-in flip-quality','5':'Half-flip','6':'Full flip','5A':'T5-A · both updated','5B':'T5-B · half-flip','5C':'T5-C · opportunity','5U':'T5-unclassified'};
  document.getElementById('fTier-label').textContent=labels[value]||'All Conditions';
  const drop=document.getElementById('fTier-drop');
  drop.querySelectorAll('button').forEach(b=>b.classList.remove('selected'));
  drop.querySelectorAll('button').forEach(b=>{
    const oc=b.getAttribute('onclick')||'';
    if(oc===`setTierFilter('${value}')`) b.classList.add('selected');
  });
  drop.classList.remove('open');
  resetAndLoad();
}

function setSearchFilter(value){
  filters.search=(value||'').trim();
  if(searchDebounce) clearTimeout(searchDebounce);
  searchDebounce=setTimeout(()=>{resetAndLoad();},250);
}

function setWindowFilter(value){
  filters.window=value;
  const labels={'':'All Time','12':'Last 12 months','18':'Last 18 months','24':'Last 24 months'};
  document.getElementById('fWindow-label').textContent=labels[value]||'All Time';
  const drop=document.getElementById('fWindow-drop');
  drop.querySelectorAll('button').forEach(b=>b.classList.remove('selected'));
  drop.querySelectorAll('button').forEach(b=>{
    const oc=b.getAttribute('onclick')||'';
    if(oc===`setWindowFilter('${value}')`) b.classList.add('selected');
  });
  drop.classList.remove('open');
  resetAndLoad();
}

function setConfidenceFilter(value){
  filters.confidence=value;
  const labels={'':'All Confidence',low:'Low',medium:'Medium',high:'High'};
  document.getElementById('fConfidence-label').textContent=labels[value]||'All Confidence';
  const drop=document.getElementById('fConfidence-drop');
  drop.querySelectorAll('button').forEach(b=>b.classList.remove('selected'));
  drop.querySelectorAll('button').forEach(b=>{
    const oc=b.getAttribute('onclick')||'';
    if(oc===`setConfidenceFilter('${value}')`) b.classList.add('selected');
  });
  drop.classList.remove('open');
  resetAndLoad();
}

// Outside-click + Escape close any open chip-drop.
document.addEventListener('click',e=>{
  document.querySelectorAll('.chip-wrap').forEach(wrap=>{
    if(!wrap.contains(e.target)){
      const drop=wrap.querySelector('.chip-drop');
      if(drop) drop.classList.remove('open');
    }
  });
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    document.querySelectorAll('.chip-drop').forEach(d=>d.classList.remove('open'));
  }
});

async function updateStats(){
  const{count:total}=await sb.from('properties').select('*',{count:'exact',head:true}).not('condition_tier','is',null);
  const{count:overridden}=await sb.from('properties').select('*',{count:'exact',head:true}).eq('condition_overridden',true);
  const{count:low}=await sb.from('properties').select('*',{count:'exact',head:true}).eq('condition_confidence','low');
  document.getElementById('statTotal').textContent=total||0;
  document.getElementById('statOverridden').textContent=overridden||0;
  document.getElementById('statLow').textContent=low||0;
}

// ========== LOAD CARDS ==========
function resetAndLoad(){currentPage=0;loadCards();}

async function loadCards(){
  let query=sb.from('properties')
    .select('id,mls,address,city,sqft,beds,baths,sale_price,list_price,remarks,photo_count,condition_tier,condition_confidence,condition_reasoning,condition_sample_photos,condition_overridden,value_driver_rooms_updated',{count:'exact'})
    .not('condition_tier','is',null)
    .order('condition_scored_at',{ascending:false});

  // Filters (filter state lives in the module-level `filters` object)
  const city=filters.city;
  const tier=filters.tier;
  const conf=filters.confidence;
  const unreviewed=document.getElementById('fUnreviewed').checked;

  if(city) query=query.eq('city',city);
  if(tier) query=query.eq('condition_tier',parseInt(tier));
  if(filters.subtier==='null') query=query.is('value_driver_rooms_updated',null);
  else if(filters.subtier!=='') query=query.eq('value_driver_rooms_updated',parseInt(filters.subtier));
  if(conf) query=query.eq('condition_confidence',conf);
  if(unreviewed) query=query.or('condition_overridden.is.null,condition_overridden.eq.false');
  if(filters.search){
    // Strip commas/quotes/parens — PostgREST .or() splits on commas and
    // treats quotes/parens as syntax, so unsanitized input would break the filter.
    const s=filters.search.replace(/[",()]/g,'');
    if(s) query=query.or(`mls.ilike.%${s}%,address.ilike.%${s}%`);
  }
  if(filters.window){
    // Filter by sold_date within the window. Active rows (sold_date null)
    // are excluded when a window is active; "All Time" leaves them in.
    const days={'12':365,'18':548,'24':730}[filters.window];
    if(days){
      const cutoff=new Date(Date.now()-days*86400*1000).toISOString().slice(0,10);
      query=query.gte('sold_date',cutoff);
    }
  }

  // Pagination
  const from=currentPage*PAGE_SIZE;
  query=query.range(from,from+PAGE_SIZE-1);

  const{data,count}=await query;
  totalCount=count||0;

  document.getElementById('headerCount').textContent=`(${totalCount})`;

  const container=document.getElementById('cardContainer');
  if(!data||data.length===0){
    container.innerHTML='<div class="empty-state">No scored properties match your filters.</div>';
    document.getElementById('pagination').innerHTML='';
    return;
  }

  container.innerHTML=data.map(renderCard).join('');
  renderPagination();
}

function renderCard(p){
  // Show 4 preview thumbnails (photos 1, 5, 10, 15) on the card.
  // Clicking any of them opens the lightbox at that photo's position
  // with full-gallery navigation across all photo_count photos.
  // Falls back gracefully when photo_count < 15.
  const totalPhotos=p.photo_count||0;
  const previewNums=[1,5,10,15].filter(n=>n<=totalPhotos);
  const price=p.sale_price||p.list_price;
  const priceStr=price?'$'+Number(price).toLocaleString():'—';
  const tierLabel=TIER_LABELS[p.condition_tier]||'—';
  const isOverridden=p.condition_overridden===true;

  // Escape single quotes for inline onclick. esc() only handles & < > for textContent;
  // an apostrophe in addr (e.g. "O'Connor St") would terminate the onclick string early.
  const addrSafe=(p.address||'').replace(/'/g,"\\'");
  const photoHtml=previewNums.length>0
    ? previewNums.map(n=>{
        const url=`${PHOTO_BASE}/${p.mls}/${p.mls}_${String(n).padStart(2,'0')}.jpg`;
        return `<img src="${esc(url)}" loading="lazy" onerror="this.style.display='none'" onclick="openLightbox('${esc(p.mls)}', ${totalPhotos}, '${addrSafe}')" title="Photo ${n} of ${totalPhotos} — click to open gallery">`;
      }).join('')
    : `<div style="padding:20px;color:var(--text-4);font-size:13px">No photos available (photo_count=${totalPhotos})</div>`;

  const tierBtns=[1,2,3,4,5,6].map(t=>{
    const cls=t===p.condition_tier?(isOverridden?'tier-btn overridden':'tier-btn active'):'tier-btn';
    return `<button class="${cls}" onclick="overrideTier('${p.id}',${t},this)">${esc(TIER_LABELS[t])}</button>`;
  }).join('');
  // Confirm-as-reviewed button — calls overrideTier with the current tier so
  // condition_overridden flips to true without changing the tier number.
  // Disabled if already overridden (no point clicking again).
  const reviewedBtn = `<span class="tier-divider"></span><button class="reviewed-btn" ${isOverridden?'disabled title="Already reviewed"':`onclick="overrideTier('${p.id}',${p.condition_tier},event.currentTarget.parentElement.querySelectorAll('.tier-btn')[${p.condition_tier-1}])" title="Confirm AI tier (mark reviewed)"`}>✓ Reviewed</button>`;

  const subHtml = p.condition_tier===5 ? (function(){
    const cur=p.value_driver_rooms_updated;
    const lbl = (cur in SUBTIER) ? 'T5-'+SUBTIER[cur].l : 'T5-?';
    const btns=[2,1,0].map(v=>`<button class="subtier-btn${v===cur?' active':''}" title="${esc(SUBTIER[v].t)}" onclick="setSubtier('${p.id}',${v},this)">${SUBTIER[v].l}</button>`).join('');
    return `<span class="subtier-badge" title="T5 sub-tier: A nicest → C opportunity">${lbl}</span><div class="subtier-buttons">${btns}</div>`;
  })() : '';

  return `
    <div class="prop-card" data-id="${p.id}">
      <div class="card-top">
        <div class="photo-strip">${photoHtml}</div>
        <div class="card-details">
          <div class="card-addr">${esc(p.address||'—')}</div>
          <div class="card-meta">
            <span><strong>${esc(p.city||'—')}</strong></span>
            <span>${p.sqft?p.sqft.toLocaleString()+' sqft':'—'}</span>
            <span>${p.beds||'—'}bd / ${p.baths||'—'}ba</span>
            <span>${priceStr}</span>
            <span style="font-family:var(--mono);font-size:12px;color:var(--text-4)">${esc(p.mls||'—')}</span>
          </div>
          ${p.remarks?`<div class="card-remarks">${esc(p.remarks)}</div>`:''}
          ${p.condition_reasoning?`<div class="card-reasoning">"${esc(p.condition_reasoning)}"</div>`:''}
        </div>
      </div>
      <div class="score-row">
        <span class="score-label"><strong>${esc(tierLabel)}</strong></span>
        <span class="confidence-tag ${p.condition_confidence||''}">${p.condition_confidence||'—'}</span>
        ${isOverridden?'<span class="overridden-badge">Reviewed</span>':''}
        <div class="tier-buttons">${tierBtns}${reviewedBtn}</div>${subHtml}
      </div>
    </div>`;
}

// ========== OVERRIDE ==========
async function overrideTier(id,newTier,btnEl){
  const{error}=await sb.from('properties').update({
    condition_tier:newTier,
    condition_overridden:true
  }).eq('id',id);

  if(error){
    console.error('Override failed:',error);
    return;
  }

  // Update UI in place
  const card=btnEl.closest('.prop-card');
  const btns=card.querySelectorAll('.tier-btn');
  btns.forEach(b=>{b.className='tier-btn';});
  btnEl.className='tier-btn overridden';

  // Update score label
  const label=card.querySelector('.score-label');
  label.innerHTML=`<strong>${TIER_LABELS[newTier]}</strong>`;

  // Add reviewed badge if not present
  const scoreRow=card.querySelector('.score-row');
  if(!scoreRow.querySelector('.overridden-badge')){
    const badge=document.createElement('span');
    badge.className='overridden-badge';
    badge.textContent='Reviewed';
    scoreRow.querySelector('.confidence-tag').after(badge);
  }

  // Disable the ✓ Reviewed button so it doesn't look clickable post-action
  const reviewedBtn=card.querySelector('.reviewed-btn');
  if(reviewedBtn){
    reviewedBtn.disabled=true;
    reviewedBtn.title='Already reviewed';
  }

  await updateStats();
}

async function setSubtier(id,val,btn){
  const{error}=await sb.from('properties').update({value_driver_rooms_updated:val}).eq('id',id);
  if(error){console.error('Subtier failed:',error);return;}
  const card=btn.closest('.prop-card');
  card.querySelectorAll('.subtier-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const badge=card.querySelector('.subtier-badge');
  if(badge) badge.textContent='T5-'+({2:'A',1:'B',0:'C'}[val]);
}

// ========== PAGINATION ==========
function renderPagination(){
  const totalPages=Math.ceil(totalCount/PAGE_SIZE);
  if(totalPages<=1){document.getElementById('pagination').innerHTML='';return;}

  let html='';
  html+=`<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===0?'disabled':''}>Prev</button>`;

  for(let i=0;i<totalPages;i++){
    if(totalPages>7&&Math.abs(i-currentPage)>2&&i!==0&&i!==totalPages-1){
      if(i===1||i===totalPages-2)html+=`<span style="color:var(--text-4);padding:8px 4px">...</span>`;
      continue;
    }
    html+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i+1}</button>`;
  }

  html+=`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=totalPages-1?'disabled':''}>Next</button>`;
  document.getElementById('pagination').innerHTML=html;
}

function goPage(n){
  const totalPages=Math.ceil(totalCount/PAGE_SIZE);
  if(n<0||n>=totalPages)return;
  currentPage=n;
  loadCards();
  document.querySelector('.main-content').scrollTo(0,0);
}

// ========== LIGHTBOX (grid gallery — all photos at once, click to zoom) ==========
// State only tracks the current MLS so concurrent open-clicks during photo
// rendering don't intermix grids from different listings.
let lbMls=null;

function openLightbox(mls, photoCount, addr){
  lbMls=mls;
  const myMls=mls;
  const addrEl=document.getElementById('lbAddr');
  const grid=document.getElementById('lbGrid');
  grid.innerHTML='';
  document.getElementById('photoLightbox').classList.add('open');

  addrEl.textContent=photoCount>0
    ? `${addr||mls} (${photoCount}${photoCount===1?' photo':' photos'})`
    : (addr||mls);

  if(!photoCount || photoCount < 1) return;

  // Render all photos up to photo_count. R2 files are {mls}/{mls}_NN.jpg
  // zero-padded; gracefully hide any that 404.
  for(let n=1; n<=photoCount; n++){
    if(lbMls!==myMls) return;  // bailed out — user reopened on a different listing
    const url=`${PHOTO_BASE}/${mls}/${mls}_${String(n).padStart(2,'0')}.jpg`;
    const el=document.createElement('img');
    el.src=url;
    el.loading='lazy';
    el.onerror=function(){this.style.display='none';};
    el.onclick=function(){
      if(this.classList.contains('lb-full')){this.classList.remove('lb-full');}
      else{
        document.querySelectorAll('.lb-grid img.lb-full').forEach(x=>x.classList.remove('lb-full'));
        this.classList.add('lb-full');
      }
    };
    grid.appendChild(el);
  }
}

function closeLightbox(){
  document.getElementById('photoLightbox').classList.remove('open');
  document.getElementById('lbGrid').innerHTML='';
  lbMls=null;
}

document.addEventListener('keydown',e=>{
  if(!document.getElementById('photoLightbox').classList.contains('open')) return;
  if(e.key==='Escape'){
    const full=document.querySelector('.lb-grid img.lb-full');
    if(full) full.classList.remove('lb-full');
    else closeLightbox();
  }
});

// ========== UTIL ==========
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}

// ========== BOOT — gate on auth, then init ==========
(async()=>{
  await window.authGate();
  if(!window.CURRENT_USER_ROLE) return;  // authGate redirected; abort
  window.renderSidebar('condition');
  init();
})();

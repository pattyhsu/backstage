<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar — Backstage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="backstage.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="sidebar.js"></script>
<style>
/* === CALENDAR v2 — Brief BV urgency-sorted timeline === */

body { overflow:hidden; height:100vh; background:#FAFAF7; }

.app-shell { display:flex; height:100vh; }
.bs-sidebar { width:230px; background:var(--bg); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; transition:width .2s; }
.bs-sidebar.collapsed { width:56px; }
.bs-sidebar.collapsed .side-brand span, .bs-sidebar.collapsed .side-section-label, .bs-sidebar.collapsed .side-label, .bs-sidebar.collapsed .side-user-name, .bs-sidebar.collapsed .lock-btn { display:none; }
.bs-sidebar.collapsed .side-brand { justify-content:center; padding:20px 0 18px; }
.bs-sidebar.collapsed .side-item { justify-content:center; padding:10px 0; margin:0 8px 1px; }
.bs-sidebar.collapsed .side-section { padding:12px 0 0; }
.bs-sidebar.collapsed .side-footer { justify-content:center; padding:16px 0; }
.bs-sidebar.collapsed .side-user { justify-content:center; }
.side-brand { padding:20px 20px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.side-mark { width:26px; height:26px; border-radius:7px; background:var(--text); display:grid; place-items:center; font-weight:700; font-size:11px; color:#fff; }
.side-brand span { font-size:14px; font-weight:600; color:var(--text); }
.side-section { padding:6px 10px 0; }
.side-section-label { font-size:9px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--text-4); padding:0 8px; margin-bottom:2px; }
.side-item { display:flex; align-items:center; gap:8px; padding:3px 8px; border-radius:var(--radius); cursor:pointer; transition:all .12s; margin-bottom:0; text-decoration:none; line-height:1.3; }
.side-item:hover { background:var(--bg-page); text-decoration:none; }
.side-item.active { background:var(--bg-alt); }
.side-item.active .side-icon svg { stroke:var(--text); }
.side-item.active .side-label { color:var(--text); font-weight:600; }
.side-icon { width:18px; height:18px; display:grid; place-items:center; }
.side-icon svg { width:16px; height:16px; stroke:var(--text-4); stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.side-label { font-size:13px; font-weight:500; color:var(--text-3); }
.side-item.disabled { opacity:.35; pointer-events:none; }
.side-footer { margin-top:auto; padding:16px 20px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.side-user { display:flex; align-items:center; gap:9px; }
.side-avatar { width:26px; height:26px; border-radius:50%; background:var(--bg-alt); display:grid; place-items:center; font-size:11px; font-weight:600; color:var(--text-3); }
.side-user-name { font-size:13px; font-weight:500; color:var(--text-3); }
.lock-btn { background:none; border:none; cursor:pointer; padding:4px; color:var(--text-4); }
.lock-btn:hover { color:var(--text); }
.collapse-btn { background:none; border:none; cursor:pointer; padding:6px 12px; color:var(--text-4); font-size:14px; }
.collapse-btn:hover { color:var(--text); }
.main-content { flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden; }
.scroll-wrap { flex:1; overflow-y:auto; }
.page { max-width:1200px; margin:0 auto; padding:22px 28px 60px; }

/* Sticky header */
/* Match pipeline.html .pipe-hdr — flat sticky header, no card chrome.
   Page-bg + blur so content scrolling underneath doesn't bleed through. */
.head { background:rgba(250,250,247,.92); backdrop-filter:blur(20px); padding:14px 0 10px; margin:0 0 14px; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50; }
.head-row { display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
.head-title { font-size:14px; font-weight:700; letter-spacing:-.3px; color:var(--accent); }
.head-sub { font-size:11px; color:var(--text-3); font-family:var(--mono); margin-left:6px; font-weight:400; }

.quick-add { display:flex; align-items:center; gap:8px; margin-left:auto; }
.quick-add input[type=text] { flex:1; min-width:240px; padding:6px 10px; border:1px solid var(--border); border-radius:4px; font:13px var(--sans); color:var(--text-2); }
.quick-add input[type=date] { padding:6px 8px; border:1px solid var(--border); border-radius:4px; font:13px var(--sans); color:var(--text-2); }
.quick-add select { padding:6px 8px; border:1px solid var(--border); border-radius:4px; font:13px var(--sans); color:var(--text-2); background:#fff; }
.quick-add button { padding:6px 12px; background:var(--accent); border:1px solid var(--accent); color:#fff; font:13px var(--sans); font-weight:600; border-radius:4px; cursor:pointer; }

.chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
.chip { padding:4px 11px; background:#fff; border:1px solid var(--border); color:var(--text-3); font-size:12px; font-weight:600; border-radius:12px; cursor:pointer; user-select:none; }
.chip:hover { border-color:var(--border-hover); color:var(--text-2); }
.chip.on { background:var(--accent); border-color:var(--accent); color:#fff; }
.chip-tally { font-family:var(--mono); font-size:10px; margin-left:4px; opacity:.85; }

/* Buckets */
.bucket { background:#fff; border:1px solid var(--border); border-radius:8px; padding:14px 18px; margin-bottom:12px; }
.bucket.overdue { background:rgba(192,57,43,.06); }
.bucket.today   { background:rgba(156,124,60,.08); }
.bucket.done { opacity:.75; }
.b-head { display:flex; align-items:baseline; gap:12px; margin-bottom:8px; }
.b-title { font-size:11px; font-weight:700; color:var(--text); text-transform:uppercase; letter-spacing:.08em; }
.b-title.overdue-t { color:var(--red); }
.b-title.today-t { color:var(--accent); }
.b-count { font-family:var(--mono); font-size:11px; color:var(--text-4); font-weight:600; }
.b-empty { font-size:12px; color:var(--text-4); font-style:italic; padding:8px 0; }

/* Task rows */
.task { display:grid; grid-template-columns:4px 18px 50px 200px 1fr auto; gap:10px; align-items:center; padding:6px 0; border-bottom:1px dashed var(--border); }
.task:last-child { border-bottom:none; }
.task:hover { background:rgba(0,0,0,.02); }
.task .stripe { width:4px; height:22px; border-radius:2px; align-self:center; }
.task .date { font-family:var(--mono); font-size:12px; color:var(--text-4); white-space:nowrap; cursor:pointer; padding:1px 3px; border-radius:3px; }
.task .date:hover { background:var(--accent-dim); }
.task .date.editing { padding:0; }
.task .date input { font:inherit; border:1px solid var(--accent); border-radius:3px; padding:1px 4px; outline:none; }
.task .addr { font-size:12px; color:var(--text-3); font-weight:600; white-space:nowrap; cursor:pointer; text-decoration:none; }
.task a.addr:hover { color:var(--accent); text-decoration:underline; }
.task .text { font-size:13px; color:var(--text-2); }
.task .meta { font-family:var(--mono); font-size:11px; color:var(--text-4); white-space:nowrap; }
.task .meta.overdue { color:var(--red); font-weight:700; }
.task .meta.today { color:var(--accent); font-weight:700; }
.task.done .text, .task.done .addr { text-decoration:line-through; color:var(--text-4); }
.task input[type=checkbox] { margin:0 4px 0 0; cursor:pointer; }

/* Deal stripe colors */
.stripe-0 { background:#2873A8; }
.stripe-1 { background:#9C7C3C; }
.stripe-2 { background:#2D8A4E; }
.stripe-3 { background:#B8651A; }
.stripe-4 { background:#C0392B; }
.stripe-5 { background:#6B4D8E; }
.stripe-6 { background:#3498DB; }
.stripe-7 { background:#16A085; }
.stripe-recurring { background:var(--text-4); }

/* Phase mini-pill */
.ph { display:inline-block; font-size:9px; font-weight:700; padding:1px 5px; border-radius:6px; letter-spacing:.2px; margin-left:6px; text-transform:uppercase; }
.ph-pursuing { background:var(--accent-dim); color:var(--accent); }
.ph-in_escrow { background:var(--amber-bg); color:var(--amber); }
.ph-under_construction { background:#E5F2FA; color:#2873A8; }
.ph-selling { background:var(--green-bg); color:var(--green); }
.ph-listed { background:var(--green-bg); color:var(--green); }

/* Day sub-header */
.day-sub { display:flex; align-items:baseline; gap:8px; padding:8px 0 4px; font-size:11px; color:var(--text-4); font-weight:600; text-transform:uppercase; letter-spacing:.06em; border-top:1px solid var(--border); margin-top:4px; }
.day-sub:first-child { border-top:none; margin-top:0; padding-top:0; }
.day-sub.today { color:var(--accent); }
.day-sub.weekend { color:var(--text-3); }
.day-sub .day-num { font-family:var(--mono); font-size:14px; font-weight:700; color:var(--text); }
.day-sub.today .day-num { color:var(--accent); }
.day-sub.weekend .day-num { color:var(--text-3); }

/* Per-deal section */
.per-deal { margin-top:20px; }
.pd-head { font-size:11px; font-weight:700; color:var(--text-4); text-transform:uppercase; letter-spacing:.08em; margin-bottom:10px; display:flex; justify-content:space-between; align-items:baseline; }
.pd-row { background:#fff; border:1px solid var(--border); border-radius:6px; padding:8px 12px; margin-bottom:6px; display:grid; grid-template-columns:4px 1fr auto; gap:10px; align-items:center; cursor:pointer; transition:background .12s, border-color .12s; }
.pd-row:hover { border-color:var(--border-hover); }
.pd-row.active { background:var(--accent-dim); border-color:var(--accent); }
.pd-row.active .pd-caret { color:var(--accent); transform:rotate(90deg); }
.pd-caret { transition:transform .12s, color .12s; }
.pd-clear { font-size:11px; color:var(--accent); cursor:pointer; display:none; }
.pd-clear.on { display:inline; }
.hidden-by-filter { display:none !important; }
.bucket.empty-by-filter { display:none !important; }
.pd-stripe { width:4px; height:36px; border-radius:2px; }
.pd-body { display:flex; flex-direction:column; gap:2px; min-width:0; }
.pd-name { font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pd-name .phase-sub { font-size:11px; color:var(--text-4); font-weight:400; }
.pd-counts { font-family:var(--mono); font-size:11px; color:var(--text-3); display:flex; gap:8px; }
.pd-counts .od { color:var(--red); font-weight:700; }
.pd-counts .up { color:var(--text-4); }
.pd-caret { color:var(--text-4); font-size:11px; }

/* Mini calendar */
.mini-cal { background:#fff; border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin-bottom:14px; }
.mini-cal-head { font-size:11px; font-weight:700; color:var(--text-4); text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; }
.mini-cal-grid { display:grid; grid-template-columns:repeat(7, 1fr); gap:2px; }
.mini-cal-dow { font-size:10px; color:var(--text-4); font-weight:600; text-align:center; padding:2px 0; text-transform:uppercase; }
.mini-cal-day { aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:11px; color:var(--text-3); border-radius:4px; cursor:pointer; position:relative; }
.mini-cal-day:hover { background:rgba(0,0,0,.04); }
.mini-cal-day.other { color:var(--text-4); opacity:.35; cursor:default; }
.mini-cal-day.today { background:var(--accent); color:#fff; font-weight:700; }
.mini-cal-day .dots { display:flex; gap:1px; position:absolute; bottom:3px; }
.mini-cal-day .dots .dot { width:4px; height:4px; border-radius:50%; }
.mini-cal-day.has-overdue { color:var(--red); font-weight:700; }
.mini-cal-day.active { background:var(--accent); color:#fff; font-weight:700; box-shadow:0 0 0 2px var(--accent-hover); }
.mini-cal-day.active.has-overdue { color:#fff; }
.mini-cal-day.active .dots .dot { background:#fff !important; }

.split { display:grid; grid-template-columns:260px 1fr; gap:18px; align-items:start; }
/* Left column (mini-cal + by-deal sidebar) sticks below the page header
   so it stays visible while the timeline column scrolls. */
.split > .left-col { position:sticky; top:110px; align-self:start; max-height:calc(100vh - 130px); overflow-y:auto; }
</style>
</head>
<body>

<div class="app-shell">
<div class="bs-sidebar" id="bsSidebar"></div>
<div class="main-content">
<div class="scroll-wrap">
<div class="page" id="page">
  <div style="padding:60px 0;text-align:center;color:var(--text-4)">Loading...</div>
</div>
</div>
</div>
</div>

<script>
// ============================================================
// SUPABASE
// ============================================================
const SUPABASE_URL='https://pwrnywsojomrygsiezzi.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3cm55d3Nvam9tcnlnc2llenppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzE1OTMsImV4cCI6MjA4OTgwNzU5M30.tGewn18t-6dN_bMXjC-Z820zFYvL1VUu3BDhfW1ZoNk';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
window.sb=sb;

// ============================================================
// HELPERS
// ============================================================
function phaseLabel(p){
  return ({pursuing:'Pursuing',in_escrow:'In Escrow',under_construction:'Under Construction',selling:'Selling',listed:'Selling',sold:'Sold',archived:'Archived',lost:'Lost'})[p] || p || '—';
}
function phaseShort(p){
  return ({pursuing:'pursuing',in_escrow:'in escrow',under_construction:'under constr',selling:'selling',listed:'selling'})[p] || p || '';
}
function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c]);}
function todayStr(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function parseDate(iso){
  if(!iso)return null;
  const d=new Date((typeof iso==='string' && iso.length===10)?iso+'T00:00:00':iso);
  return isFinite(d.getTime())?d:null;
}
function daysBetween(a, b){
  const da=parseDate(a), db=parseDate(b);
  if(!da || !db)return null;
  return Math.round((db-da)/86400000);
}
function fmtMD(iso){
  const d=parseDate(iso);
  if(!d)return '';
  return (d.getMonth()+1)+'/'+d.getDate();
}
function dealKeyHash(id){
  if(!id)return 0;
  let h=0;
  for(let i=0;i<id.length;i++)h=((h<<5)-h)+id.charCodeAt(i)|0;
  return Math.abs(h)%8;
}
function stripeColor(idx){
  return ['#2873A8','#9C7C3C','#2D8A4E','#B8651A','#C0392B','#6B4D8E','#3498DB','#16A085'][idx%8];
}

// ============================================================
// STATE
// ============================================================
let allTasks=[];
let dealsById={};
let propsByMls={};
let filter={type:null, key:null};
let showCompleted=false;

// ============================================================
// LOAD
// ============================================================
async function loadCalendar(){
  const {data:deals, error:dErr}=await sb.from('deals')
    .select('id, phase, buy_side_mls, relist_mls, list_date, escrow_start_date, target_close_date, construction_start_date, created_at')
    .not('phase','in','(sold,archived)');
  if(dErr){renderError(dErr.message);return;}
  const dealRows=deals||[];

  const allMls=new Set();
  for(const d of dealRows){
    if(d.buy_side_mls)allMls.add(d.buy_side_mls);
    if(d.relist_mls)allMls.add(d.relist_mls);
  }
  propsByMls={};
  if(allMls.size){
    const {data:props}=await sb.from('properties')
      .select('mls, address, city')
      .in('mls', Array.from(allMls));
    for(const p of (props||[])){propsByMls[p.mls]=p;}
  }

  dealsById={};
  for(const d of dealRows){
    const primaryMls=(d.phase==='selling'||d.phase==='listed')&&d.relist_mls?d.relist_mls:(d.buy_side_mls||d.relist_mls);
    const p=primaryMls?propsByMls[primaryMls]:null;
    const addr=p?p.address:'(no address)';
    const addrShort=addr?addr.split(',')[0].trim():'(no address)';
    let daysInPhase=null;
    if(d.phase==='in_escrow' && d.escrow_start_date)daysInPhase=daysBetween(d.escrow_start_date, todayStr());
    else if(d.phase==='under_construction' && d.construction_start_date)daysInPhase=daysBetween(d.construction_start_date, todayStr());
    else if((d.phase==='selling'||d.phase==='listed') && d.list_date)daysInPhase=daysBetween(d.list_date, todayStr());
    else if(d.created_at)daysInPhase=daysBetween(d.created_at, todayStr());
    dealsById[d.id]={
      phase: d.phase, addrShort, fullAddr: addr, primaryMls,
      overdueCount: 0, upcomingCount: 0, daysInPhase,
    };
  }

  // Milestones for active deals.
  const dealIds=dealRows.map(d=>d.id);
  let milestones=[];
  if(dealIds.length){
    const {data:ms}=await sb.from('deal_milestones')
      .select('id, deal_id, milestone_key, display_name, due_date, completed, completed_at')
      .in('deal_id', dealIds);
    milestones=ms||[];
  }
  // Cross-deal / recurring (deal_id=NULL).
  try{
    const {data:rec}=await sb.from('deal_milestones')
      .select('id, deal_id, milestone_key, display_name, due_date, completed, completed_at')
      .is('deal_id', null);
    if(rec)milestones.push(...rec);
  }catch(e){}

  const today=todayStr();
  allTasks=[];
  for(const m of milestones){
    const dealMeta=m.deal_id?dealsById[m.deal_id]:null;
    const phase=dealMeta?dealMeta.phase:null;
    allTasks.push({
      id: m.id, deal_id: m.deal_id, due_date: m.due_date,
      display_name: m.display_name||m.milestone_key,
      completed: !!m.completed, phase,
      addrShort: dealMeta?dealMeta.addrShort:null,
      isRecurring: m.deal_id===null,
    });
    if(!m.completed && dealMeta){
      if(m.due_date && m.due_date < today)dealMeta.overdueCount++;
      else dealMeta.upcomingCount++;
    }
  }

  renderPage();
}

function renderError(msg){
  document.getElementById('page').innerHTML=`<div style="padding:40px 0;text-align:center;color:var(--red)">Failed to load calendar: ${escapeHtml(msg)}</div>`;
}

// ============================================================
// RENDER
// ============================================================
function bucketize(){
  const today=todayStr();
  const buckets={overdue:[], today:[], week:[], later:[]};
  for(const t of allTasks){
    if(t.completed && !showCompleted)continue;
    if(!t.due_date){buckets.later.push(t);continue;}
    const diff=daysBetween(today, t.due_date);
    if(diff==null)continue;
    if(diff<0)buckets.overdue.push(t);
    else if(diff===0)buckets.today.push(t);
    else if(diff<=7)buckets.week.push(t);
    else if(diff<=30)buckets.later.push(t);
  }
  buckets.overdue.sort((a,b)=>(a.due_date||'').localeCompare(b.due_date||''));
  buckets.today.sort((a,b)=>(a.addrShort||'').localeCompare(b.addrShort||''));
  buckets.week.sort((a,b)=>(a.due_date||'').localeCompare(b.due_date||''));
  buckets.later.sort((a,b)=>(a.due_date||'').localeCompare(b.due_date||''));
  return buckets;
}

function renderPage(){
  const buckets=bucketize();
  const overdueCount=buckets.overdue.length;
  const todayCount=buckets.today.length;
  const weekCount=buckets.week.length;
  const totalActive=overdueCount+todayCount+weekCount+buckets.later.length;

  const dealOptions=Object.entries(dealsById)
    .filter(([id,m])=>m.addrShort)
    .map(([id,m])=>`<option value="${escapeHtml(id)}">${escapeHtml(m.addrShort)}</option>`)
    .join('');

  const phaseCounts={pursuing:0, in_escrow:0, under_construction:0, selling:0};
  for(const t of allTasks){
    if(t.completed && !showCompleted)continue;
    const ph=t.phase==='listed'?'selling':t.phase;
    if(phaseCounts[ph]!=null)phaseCounts[ph]++;
  }

  const headHtml=`
    <div class="head">
      <div class="head-row">
        <div>
          <span class="head-title">Calendar</span>
          <span class="head-sub">${overdueCount} overdue · ${todayCount} today · ${weekCount} this week · ${totalActive} total active</span>
        </div>
        <div class="quick-add">
          <input type="text" id="qaText" placeholder="+ Quick add task (e.g. 'Cabinet install')">
          <select id="qaDeal">
            <option value="">— pick deal —</option>
            ${dealOptions}
          </select>
          <input type="date" id="qaDate" value="${plus2(todayStr())}">
          <button id="qaBtn">Add</button>
        </div>
      </div>
      <div class="chips" id="chips">
        <span class="chip ${!filter.type?'on':''}" data-filter="all">All <span class="chip-tally">${totalActive}</span></span>
        <span class="chip ${filter.type==='bucket'&&filter.key==='overdue'?'on':''}" data-filter="bucket" data-key="overdue">Overdue <span class="chip-tally">${overdueCount}</span></span>
        <span class="chip ${filter.type==='bucket'&&filter.key==='today'?'on':''}" data-filter="bucket" data-key="today">Today <span class="chip-tally">${todayCount}</span></span>
        <span class="chip ${filter.type==='bucket'&&filter.key==='week'?'on':''}" data-filter="bucket" data-key="week">This week <span class="chip-tally">${weekCount}</span></span>
        <span class="chip ${filter.type==='phase'&&filter.key==='pursuing'?'on':''}" data-filter="phase" data-key="pursuing">Pursuing <span class="chip-tally">${phaseCounts.pursuing}</span></span>
        <span class="chip ${filter.type==='phase'&&filter.key==='in_escrow'?'on':''}" data-filter="phase" data-key="in_escrow">In Escrow <span class="chip-tally">${phaseCounts.in_escrow}</span></span>
        <span class="chip ${filter.type==='phase'&&filter.key==='under_construction'?'on':''}" data-filter="phase" data-key="under_construction">Under Construction <span class="chip-tally">${phaseCounts.under_construction}</span></span>
        <span class="chip ${filter.type==='phase'&&filter.key==='selling'?'on':''}" data-filter="phase" data-key="selling">Selling <span class="chip-tally">${phaseCounts.selling}</span></span>
        <span class="chip ${showCompleted?'on':''}" id="chipShowCompleted" style="margin-left:auto">Show completed</span>
      </div>
    </div>
  `;

  const miniCalHtml=renderMiniCal();
  const perDealHtml=renderPerDealSidebar();
  const overdueHtml=renderBucket('overdue', 'Overdue', buckets.overdue, true);
  const todayHtml=renderBucket('today', `Today · ${dayLabel(todayStr())}`, buckets.today, true);
  const weekHtml=renderWeekBucket(buckets.week);
  const laterHtml=renderBucket('later', 'Later · 7-30 days out', buckets.later.slice(0,5), false, buckets.later.length>5?`...${buckets.later.length-5} more later this month`:null);

  const html=`
    ${headHtml}
    <div class="split">
      <div class="left-col">${miniCalHtml}${perDealHtml}</div>
      <div>${overdueHtml}${todayHtml}${weekHtml}${laterHtml}</div>
    </div>
  `;
  document.getElementById('page').innerHTML=html;
  wireFilters();
  wireQuickAdd();
  wireTaskClicks();
  applyFilter();
}

function plus2(iso){
  const d=parseDate(iso);
  if(!d)return iso;
  d.setDate(d.getDate()+2);
  return d.toISOString().slice(0,10);
}
function dayLabel(iso){
  const d=parseDate(iso);
  if(!d)return '';
  const dows=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return dows[d.getDay()]+' '+(d.getMonth()+1)+'/'+d.getDate();
}
function dowLabel(iso){
  const d=parseDate(iso);
  if(!d)return '';
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
}
function isWeekend(iso){
  const d=parseDate(iso);
  if(!d)return false;
  const dow=d.getDay();
  return dow===0 || dow===6;
}

function renderBucket(key, title, tasks, prominent, overflow){
  if(tasks.length===0 && key!=='overdue' && key!=='today')return '';
  const titleCls=prominent?(key==='overdue'?'overdue-t':(key==='today'?'today-t':'')):'';
  return `
    <div class="bucket ${key}" data-bucket-key="${key}">
      <div class="b-head"><span class="b-title ${titleCls}">${escapeHtml(title)}</span><span class="b-count">${tasks.length} item${tasks.length===1?'':'s'}</span></div>
      ${tasks.length?tasks.map(renderTask).join(''):'<div class="b-empty">Nothing here.</div>'}
      ${overflow?`<div style="text-align:center;padding:6px 0;font-size:11px;color:var(--text-4);font-style:italic">${escapeHtml(overflow)}</div>`:''}
    </div>
  `;
}

function renderWeekBucket(tasks){
  if(!tasks.length)return '';
  const start=parseDate(todayStr());
  start.setDate(start.getDate()+1);
  const end=parseDate(todayStr());
  end.setDate(end.getDate()+7);
  const labelStr=(start.getMonth()+1)+'/'+start.getDate()+'-'+(end.getMonth()+1)+'/'+end.getDate();
  const byDay={};
  for(const t of tasks){
    if(!byDay[t.due_date])byDay[t.due_date]=[];
    byDay[t.due_date].push(t);
  }
  const days=Object.keys(byDay).sort();
  let inner='';
  for(const dayIso of days){
    const dowCls=isWeekend(dayIso)?'weekend':(dayIso===todayStr()?'today':'');
    inner+=`<div class="day-sub ${dowCls}"><span class="day-num">${dowLabel(dayIso)}</span> ${fmtMD(dayIso)}</div>`;
    for(const t of byDay[dayIso])inner+=renderTask(t);
  }
  return `
    <div class="bucket week" data-bucket-key="week">
      <div class="b-head"><span class="b-title">This week · ${escapeHtml(labelStr)}</span><span class="b-count">${tasks.length} item${tasks.length===1?'':'s'}</span></div>
      ${inner}
    </div>
  `;
}

function renderTask(t){
  const stripeCls=t.isRecurring?'stripe-recurring':('stripe-'+dealKeyHash(t.deal_id));
  const today=todayStr();
  const diff=t.due_date?daysBetween(today, t.due_date):null;
  let metaCls='', metaText='';
  if(diff!=null){
    if(diff<0){metaCls='overdue';metaText=Math.abs(diff)+'d overdue';}
    else if(diff===0){metaCls='today';metaText='today';}
    else metaText='in '+diff+'d';
  }
  const phaseCls=t.phase?('ph-'+(t.phase==='listed'?'selling':t.phase)):'';
  const phaseLbl=t.phase?phaseShort(t.phase):'';
  const addrHtml=t.isRecurring
    ? `<div class="addr">— recurring</div>`
    : (t.deal_id
        ? `<a class="addr" href="project-detail.html?deal=${encodeURIComponent(t.deal_id)}">${escapeHtml(t.addrShort||'(no addr)')}${phaseLbl?`<span class="ph ${phaseCls}">${escapeHtml(phaseLbl)}</span>`:''}</a>`
        : `<div class="addr">—</div>`);
  const doneCls=t.completed?' done':'';
  return `
    <div class="task${doneCls}" data-task-id="${escapeHtml(t.id)}" data-deal-id="${escapeHtml(t.deal_id||'')}" data-phase="${escapeHtml(t.phase||'')}" data-date="${escapeHtml(t.due_date||'')}">
      <div class="stripe ${stripeCls}"></div>
      <input type="checkbox" data-cb-id="${escapeHtml(t.id)}" ${t.completed?'checked':''}>
      <div class="date" data-date-id="${escapeHtml(t.id)}">${escapeHtml(fmtMD(t.due_date))}</div>
      ${addrHtml}
      <div class="text">${escapeHtml(t.display_name)}</div>
      <div class="meta ${metaCls}">${escapeHtml(metaText)}</div>
    </div>
  `;
}

function renderMiniCal(){
  const todayD=new Date();
  const year=todayD.getFullYear();
  const month=todayD.getMonth();
  const monthName=['January','February','March','April','May','June','July','August','September','October','November','December'][month];
  const firstOfMonth=new Date(year, month, 1);
  const firstDow=firstOfMonth.getDay();
  const daysInMonth=new Date(year, month+1, 0).getDate();
  const prevMonthDays=new Date(year, month, 0).getDate();

  const taskByDate={};
  const overdueDates=new Set();
  for(const t of allTasks){
    if(!t.due_date)continue;
    if(t.completed && !showCompleted)continue;
    if(!taskByDate[t.due_date])taskByDate[t.due_date]=[];
    taskByDate[t.due_date].push(t);
    if(t.due_date < todayStr())overdueDates.add(t.due_date);
  }

  let cells='';
  for(let i=firstDow-1; i>=0; i--){
    cells+=`<div class="mini-cal-day other">${prevMonthDays-i}</div>`;
  }
  for(let d=1; d<=daysInMonth; d++){
    const iso=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const cls=[];
    if(iso===todayStr())cls.push('today');
    if(overdueDates.has(iso))cls.push('has-overdue');
    const tasks=taskByDate[iso]||[];
    let dotsHtml='';
    if(tasks.length){
      const dealIds=[...new Set(tasks.map(t=>t.deal_id).filter(Boolean))].slice(0,3);
      dotsHtml='<div class="dots">'+dealIds.map(id=>`<div class="dot" style="background:${stripeColor(dealKeyHash(id))}"></div>`).join('')+'</div>';
    }
    cells+=`<div class="mini-cal-day ${cls.join(' ')}" data-mini-date="${iso}">${d}${dotsHtml}</div>`;
  }
  const totalCells=firstDow+daysInMonth;
  const trailing=(7-(totalCells%7))%7;
  for(let i=1; i<=trailing; i++){
    cells+=`<div class="mini-cal-day other">${i}</div>`;
  }
  return `
    <div class="mini-cal">
      <div class="mini-cal-head">${monthName} ${year}</div>
      <div class="mini-cal-grid">
        <div class="mini-cal-dow">S</div><div class="mini-cal-dow">M</div><div class="mini-cal-dow">T</div><div class="mini-cal-dow">W</div><div class="mini-cal-dow">T</div><div class="mini-cal-dow">F</div><div class="mini-cal-dow">S</div>
        ${cells}
      </div>
    </div>
  `;
}

function renderPerDealSidebar(){
  const entries=Object.entries(dealsById)
    .filter(([id,m])=>m.addrShort && m.phase!=='lost')
    .sort((a,b)=>(b[1].overdueCount-a[1].overdueCount)||(b[1].upcomingCount-a[1].upcomingCount));
  if(!entries.length){
    return `<div class="per-deal"><div class="pd-head">By deal · click to filter</div><div style="font-size:12px;color:var(--text-4);font-style:italic">No active deals.</div></div>`;
  }
  let rows='';
  for(const [id, m] of entries){
    const phaseLbl=phaseLabel(m.phase);
    const sub=phaseLbl+(m.daysInPhase!=null?` · ${Math.abs(m.daysInPhase)}d`:'');
    const counts=[];
    if(m.overdueCount)counts.push(`<span class="od">${m.overdueCount} overdue</span>`);
    if(m.upcomingCount)counts.push(`<span class="up">${m.upcomingCount} upcoming</span>`);
    rows+=`<div class="pd-row" data-pd-deal="${escapeHtml(id)}">
      <div class="pd-stripe stripe-${dealKeyHash(id)}"></div>
      <div class="pd-body">
        <div class="pd-name">${escapeHtml(m.addrShort)} <span class="phase-sub">· ${escapeHtml(sub)}</span></div>
        <div class="pd-counts">${counts.join('')}</div>
      </div>
      <div class="pd-caret">▸</div>
    </div>`;
  }
  return `
    <div class="per-deal">
      <div class="pd-head">By deal · click to filter <a class="pd-clear" id="pdClear" href="#">× Clear filter</a></div>
      ${rows}
    </div>
  `;
}

// ============================================================
// WIRING
// ============================================================
function wireFilters(){
  document.querySelectorAll('.chip[data-filter]').forEach(c=>{
    c.addEventListener('click', ()=>{
      if(c.dataset.filter==='all'){setFilter(null,null);return;}
      const wasActive=filter.type===c.dataset.filter && filter.key===c.dataset.key;
      setFilter(wasActive?null:c.dataset.filter, wasActive?null:c.dataset.key);
    });
  });
  document.querySelectorAll('.pd-row[data-pd-deal]').forEach(r=>{
    r.addEventListener('click', ()=>{
      const k=r.dataset.pdDeal;
      const wasActive=filter.type==='deal' && filter.key===k;
      setFilter(wasActive?null:'deal', wasActive?null:k);
    });
  });
  document.querySelectorAll('.mini-cal-day[data-mini-date]').forEach(d=>{
    d.addEventListener('click', ()=>{
      const k=d.dataset.miniDate;
      const wasActive=filter.type==='date' && filter.key===k;
      setFilter(wasActive?null:'date', wasActive?null:k);
    });
  });
  const clearLink=document.getElementById('pdClear');
  if(clearLink){
    clearLink.addEventListener('click', (e)=>{e.preventDefault();setFilter(null,null);});
  }
  const showCb=document.getElementById('chipShowCompleted');
  if(showCb){
    showCb.addEventListener('click', ()=>{showCompleted=!showCompleted;renderPage();});
  }
}
function setFilter(type, key){
  filter={type, key};
  applyFilter();
}
function applyFilter(){
  document.querySelectorAll('.task').forEach(t=>{
    t.classList.toggle('hidden-by-filter', !taskMatches(t));
  });
  document.querySelectorAll('.bucket').forEach(b=>{
    const anyVisible=b.querySelectorAll('.task:not(.hidden-by-filter)').length > 0;
    b.classList.toggle('empty-by-filter', !anyVisible);
  });
  document.querySelectorAll('.day-sub').forEach(d=>{
    let next=d.nextElementSibling;
    let anyVisible=false;
    while(next && !next.classList.contains('day-sub')){
      if(next.classList.contains('task') && !next.classList.contains('hidden-by-filter')){anyVisible=true;break;}
      next=next.nextElementSibling;
    }
    d.classList.toggle('hidden-by-filter', !anyVisible);
  });
  document.querySelectorAll('.pd-row').forEach(r=>r.classList.toggle('active', filter.type==='deal' && r.dataset.pdDeal===filter.key));
  document.querySelectorAll('.mini-cal-day').forEach(d=>d.classList.toggle('active', filter.type==='date' && d.dataset.miniDate===filter.key));
  const clr=document.getElementById('pdClear');
  if(clr)clr.classList.toggle('on', !!filter.type);
  document.querySelectorAll('.chip[data-filter]').forEach(c=>{
    let on=false;
    if(c.dataset.filter==='all')on=!filter.type;
    else if(c.dataset.filter===filter.type && c.dataset.key===filter.key)on=true;
    c.classList.toggle('on', on);
  });
}
function taskMatches(taskEl){
  if(!filter.type)return true;
  if(filter.type==='deal')return taskEl.dataset.dealId===filter.key;
  if(filter.type==='date')return taskEl.dataset.date===filter.key;
  if(filter.type==='phase'){
    const ph=taskEl.dataset.phase==='listed'?'selling':taskEl.dataset.phase;
    return ph===filter.key;
  }
  if(filter.type==='bucket'){
    const bucket=taskEl.closest('.bucket');
    return bucket && bucket.dataset.bucketKey===filter.key;
  }
  return true;
}

function wireQuickAdd(){
  const btn=document.getElementById('qaBtn');
  if(!btn)return;
  btn.addEventListener('click', async ()=>{
    const text=document.getElementById('qaText').value.trim();
    const dealId=document.getElementById('qaDeal').value||null;
    const date=document.getElementById('qaDate').value;
    if(!text){alert('Task text required.');return;}
    if(!date){alert('Due date required.');return;}
    if(!dealId){
      // D24: deal_id=NULL is the v1 recurring/cross-deal path. Attempt the
      // insert — if the table NOT NULL constraint rejects, prompt the user
      // to pick a deal. The deal_milestones table from M027 has deal_id
      // NOT NULL, so v1 of BV ships with a soft warning rather than table
      // surgery.
      alert('Cross-deal tasks (deal_id=NULL) deferred to BV-2 — pick a deal for v1.');
      return;
    }
    const key='custom_'+Date.now();
    const {error}=await sb.from('deal_milestones').insert({
      deal_id: dealId, template_id: null,
      milestone_key: key, display_name: text, due_date: date,
    });
    if(error){alert('Add failed: '+error.message);return;}
    document.getElementById('qaText').value='';
    await loadCalendar();
  });
}

function wireTaskClicks(){
  document.querySelectorAll('input[type=checkbox][data-cb-id]').forEach(cb=>{
    cb.addEventListener('change', async ()=>{
      const id=cb.dataset.cbId;
      const completed=cb.checked;
      const {error}=await sb.from('deal_milestones').update({
        completed,
        completed_at:completed?new Date().toISOString():null,
        updated_at:new Date().toISOString(),
      }).eq('id', id);
      if(error){alert('Save failed: '+error.message);cb.checked=!completed;return;}
      await loadCalendar();
    });
  });
  document.querySelectorAll('.date[data-date-id]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      const id=el.dataset.dateId;
      const task=allTasks.find(t=>t.id===id);
      if(!task)return;
      _beginDateEdit(el, task);
    });
  });
}
function _beginDateEdit(el, task){
  if(el.classList.contains('editing'))return;
  el.classList.add('editing');
  const input=document.createElement('input');
  input.type='date';
  input.value=task.due_date||'';
  el.innerHTML='';
  el.appendChild(input);
  input.focus();
  let committed=false;
  input.addEventListener('keydown', async (e)=>{
    if(e.key==='Enter'){e.preventDefault();committed=true;await _commitDateEdit(task.id, input.value);}
    else if(e.key==='Escape'){committed=true;renderPage();}
  });
  input.addEventListener('blur', async ()=>{
    if(committed)return;
    committed=true;
    await _commitDateEdit(task.id, input.value);
  });
}
async function _commitDateEdit(id, val){
  const newVal=(val||'').trim()||null;
  if(!newVal){renderPage();return;}
  const {error}=await sb.from('deal_milestones').update({
    due_date: newVal, updated_at: new Date().toISOString(),
  }).eq('id', id);
  if(error){alert('Save failed: '+error.message);renderPage();return;}
  await loadCalendar();
}

// ============================================================
// INIT
// ============================================================
(async()=>{
  await window.authGate();
  if(!window.CURRENT_USER_ROLE)return;
  window.renderSidebar('calendar');
  await loadCalendar();
})();
</script>

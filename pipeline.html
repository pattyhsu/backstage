<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline — Backstage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="backstage.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* === PIPELINE — local layout only === */
/* Shared shell + sidebar tokens come from backstage.css. */

body { overflow:hidden; height:100vh; }

/* Backstage shell — same skeleton mls-deals.html uses. */
.app-shell { display:flex; height:100vh; }
.bs-sidebar { width:230px; background:var(--bg); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; transition:width .2s; }
.bs-sidebar.collapsed { width:56px; }
.bs-sidebar.collapsed .side-brand span, .bs-sidebar.collapsed .side-section-label, .bs-sidebar.collapsed .side-label, .bs-sidebar.collapsed .side-user-name, .bs-sidebar.collapsed .lock-btn { display:none; }
.bs-sidebar.collapsed .side-brand { justify-content:center; padding:20px 0 18px; }
.bs-sidebar.collapsed .side-item { justify-content:center; padding:10px 0; margin:0 8px 1px; }
.bs-sidebar.collapsed .side-section { padding:12px 0 0; }
.bs-sidebar.collapsed .side-footer { justify-content:center; padding:16px 0; }
.bs-sidebar.collapsed .side-user { justify-content:center; }
.side-brand { padding:20px 20px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.side-mark { width:26px; height:26px; border-radius:7px; background:var(--text); display:grid; place-items:center; font-weight:700; font-size:11px; color:#fff; }
.side-brand span { font-size:14px; font-weight:600; color:var(--text); }
.side-section { padding:6px 10px 0; }
.side-section-label { font-size:9px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--text-4); padding:0 8px; margin-bottom:2px; }
.side-item { display:flex; align-items:center; gap:8px; padding:3px 8px; border-radius:var(--radius); cursor:pointer; transition:all .12s; margin-bottom:0; text-decoration:none; line-height:1.3; }
.side-item:hover { background:var(--bg-page); text-decoration:none; }
.side-item.active { background:var(--bg-alt); }
.side-item.active .side-icon svg { stroke:var(--text); }
.side-item.active .side-label { color:var(--text); font-weight:600; }
.side-icon { width:18px; height:18px; display:grid; place-items:center; }
.side-icon svg { width:16px; height:16px; stroke:var(--text-4); stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.side-label { font-size:13px; font-weight:500; color:var(--text-3); }
.side-item.disabled { opacity:.35; pointer-events:none; }
.side-footer { margin-top:auto; padding:16px 20px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.side-user { display:flex; align-items:center; gap:9px; }
.side-avatar { width:26px; height:26px; border-radius:50%; background:var(--bg-alt); display:grid; place-items:center; font-size:11px; font-weight:600; color:var(--text-3); }
.side-user-name { font-size:13px; font-weight:500; color:var(--text-3); }
.lock-btn { background:none; border:none; cursor:pointer; padding:4px; color:var(--text-4); }
.lock-btn:hover { color:var(--text); }
.collapse-btn { background:none; border:none; cursor:pointer; padding:6px 12px; color:var(--text-4); font-size:14px; }
.collapse-btn:hover { color:var(--text); }
.main-content { flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden; }

/* Header bar */
.pipe-hdr { padding:14px 24px 10px; border-bottom:1px solid var(--border); background:rgba(255,255,255,.92); backdrop-filter:blur(20px); display:flex; align-items:baseline; justify-content:space-between; gap:16px; }
.pipe-hdr h1 { font-size:14px; font-weight:700; letter-spacing:-.3px; color:var(--accent); margin:0; }
.pipe-hdr h1 span { color:var(--text-3); font-weight:400; margin-left:6px; }
.pipe-hdr .totals { font-size:11px; color:var(--text-3); font-family:var(--mono); }

/* Kanban board */
.board { flex:1; display:flex; gap:10px; padding:14px 14px 20px; overflow-x:auto; overflow-y:hidden; align-items:stretch; }
.col { flex:1 1 0; min-width:220px; display:flex; flex-direction:column; background:var(--bg-alt); border:1px solid var(--border); border-radius:8px; min-height:0; }
.col-hdr { padding:10px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:8px; }
.col-hdr .name { font-size:11px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; color:var(--text-2); }
.col-hdr .cnt { font-size:11px; font-weight:700; color:var(--text-3); font-family:var(--mono); padding:1px 7px; border-radius:9px; background:var(--bg); border:1px solid var(--border); }
/* Phase-tinted kanban columns — soft full-height background tint matching the phase pill color. */
.col.col-pursuing            { background:rgba(156,124,60,.07); }
.col.col-pursuing .col-hdr .name { color:var(--accent); }
.col.col-in_escrow           { background:rgba(184,101,26,.07); }
.col.col-in_escrow .col-hdr .name { color:var(--amber); }
.col.col-under_construction  { background:rgba(40,115,168,.07); }
.col.col-under_construction .col-hdr .name { color:#2873A8; }
.col.col-selling             { background:rgba(45,138,78,.07); }
.col.col-selling .col-hdr .name { color:var(--green); }
.col-body { flex:1; padding:8px; overflow-y:auto; min-height:0; display:flex; flex-direction:column; gap:6px; }
.col-empty { font-size:11px; color:var(--text-4); text-align:center; padding:18px 8px; font-style:italic; }

/* Card */
.card { display:block; padding:11px 13px; background:var(--bg); border:1px solid var(--border); border-radius:6px; text-decoration:none; color:inherit; transition:all .1s; }
.card:hover { border-color:var(--border-hover); transform:translateY(-1px); box-shadow:0 2px 6px rgba(0,0,0,.04); text-decoration:none; }
/* 2×2 grid: text column (left) + right-aligned numbers column (right). */
.card-row { display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
.card-row.bot { margin-top:4px; }
.card .addr { flex:1; min-width:0; font-size:13px; font-weight:600; color:var(--text); line-height:1.3; }
.card .addr .city { font-weight:400; color:var(--text-3); }
.card .price { font-size:13px; font-weight:600; color:var(--accent); white-space:nowrap; }
.card .sub { font-size:11px; color:var(--text-3); }
.card .age { font-size:11px; color:var(--text-4); white-space:nowrap; }

/* Rehab budget mini-bar — Under Construction cards only (Brief MH Phase 3).
   The one phase where rehab spend is live and steerable. Color by variance. */
.card-bar { margin-top:9px; padding-top:8px; border-top:1px solid var(--border); }
.card-bar-cap { display:flex; justify-content:space-between; align-items:baseline; font-size:10px; margin-bottom:5px; gap:8px; }
.card-bar-cap .cb-lbl { font-weight:600; color:var(--text-3); letter-spacing:.02em; }
.card-bar-cap .cb-num { color:var(--text-4); white-space:nowrap; }
.card-bar-track { height:5px; border-radius:3px; background:var(--bg-inset); overflow:hidden; }
.card-bar-fill { height:100%; border-radius:3px; }
.card-bar-fill.under   { background:var(--green); }
.card-bar-fill.ontrack { background:var(--blue); }
.card-bar-fill.warn    { background:var(--amber); }
.card-bar-fill.over    { background:var(--red); }

/* Mobile / narrow viewport — stack columns vertically. */
@media (max-width: 900px) {
  .board { flex-direction:column; overflow-x:hidden; overflow-y:auto; }
  .col { min-width:0; max-height:none; }
  .col-body { max-height:280px; }
}

.empty-state { text-align:center; padding:60px 24px; color:var(--text-4); font-size:13px; }
</style>
</head>
<body>

<div class="app-shell">

<!-- Sidebar (rendered by sidebar.js) -->
<div class="bs-sidebar" id="bsSidebar"></div>

<!-- Main content -->
<div class="main-content">

<div class="pipe-hdr">
  <h1>Pipeline <span id="pipe-summary"></span></h1>
  <div class="totals" id="pipe-totals"></div>
</div>

<div id="board" class="board">
  <div class="empty-state">Loading...</div>
</div>

</div><!-- /main-content -->
</div><!-- /app-shell -->

<script>
// ========== SUPABASE CLIENT ==========
const SUPABASE_URL='https://pwrnywsojomrygsiezzi.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3cm55d3Nvam9tcnlnc2llenppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzE1OTMsImV4cCI6MjA4OTgwNzU5M30.tGewn18t-6dN_bMXjC-Z820zFYvL1VUu3BDhfW1ZoNk';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
window.sb=sb;

// ========== PHASE CONFIG ==========
// Brief BK: kanban shows 4 active phases. 'sold' + 'archived' are real
// deal phases but excluded from the board (filtered out by the query).
// Brief BV / D2 renamed 'listed' → 'selling'.
const PHASES=['pursuing','in_escrow','under_construction','selling'];
function phaseLabel(s){
  if(s==null)return '—';
  return ({pursuing:'Pursuing',in_escrow:'In Escrow',under_construction:'Under Construction',selling:'Selling',listed:'Selling',lost:'Lost'})[s]||s;
}

// ========== HELPERS ==========
function FK(n){if(n==null||!isFinite(n))return '';if(n>=1e6)return '$'+(n/1e6).toFixed(2).replace(/\.?0+$/,'')+'M';if(n>=1e3)return '$'+Math.round(n/1e3)+'K';return '$'+n;}
// DB stores city in ALL CAPS; CSS text-transform:capitalize can't lowercase it,
// so title-case here (DIAMOND BAR -> Diamond Bar).
function titleCase(s){return String(s||'').toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());}
// Time in current phase, always in days (today / 1d / 35d).
function ageInDays(iso){
  if(!iso)return '';
  const t=new Date(iso).getTime();if(!isFinite(t))return '';
  const days=Math.floor((Date.now()-t)/86400000);
  return days<=0?'today':days+'d';
}
function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c]);}

// ========== DATA LOAD ==========
async function loadPipeline(){
  // Fetch all in-flight deals (exclude sold + archived).
  const {data:deals, error:dErr}=await sb.from('deals')
    .select('id, phase, buy_side_mls, relist_mls, list_price, escrow_start_date, target_close_date, created_at')
    .not('phase','in','(sold,archived,lost)')
    .order('created_at');
  if(dErr){console.error('[pipeline] deals load failed',dErr);renderError(dErr.message);return;}

  const dealRows=deals||[];

  // Batch-fetch all linked properties in ONE query. For each deal, prefer
  // the relist_mls row when phase='listed' (carries the new listing's
  // address/price/photos); else fall back to buy_side_mls.
  const allMls=new Set();
  for(const d of dealRows){
    if(d.buy_side_mls)allMls.add(d.buy_side_mls);
    if(d.relist_mls)allMls.add(d.relist_mls);
  }
  const propsByMls={};
  if(allMls.size){
    const {data:props, error:pErr}=await sb.from('properties')
      .select('mls, address, city, list_price, sale_price, sqft, beds, baths')
      .in('mls', Array.from(allMls));
    if(pErr){console.warn('[pipeline] properties load failed (non-fatal)',pErr);}
    for(const r of (props||[])){propsByMls[r.mls]=r;}
  }

  // Days-in-phase: batch-fetch phase history for all deals, take latest
  // transition where to_phase = current phase.
  const dealIds=dealRows.map(d=>d.id);
  const latestByDeal={};
  if(dealIds.length){
    const {data:hist, error:hErr}=await sb.from('deals_phase_history')
      .select('deal_id, to_phase, transitioned_at')
      .in('deal_id', dealIds)
      .order('transitioned_at',{ascending:false});
    if(hErr){console.warn('[pipeline] history load failed (non-fatal)',hErr);}
    for(const h of (hist||[])){
      // Only first-seen (i.e. latest) row per (deal_id, to_phase).
      const k=h.deal_id+'|'+h.to_phase;
      if(!latestByDeal[k])latestByDeal[k]=h;
    }
  }

  // Brief MH Phase 3 — per-deal rehab budget vs actual for the Under
  // Construction card mini-bar. v_deal_cost_breakdown is owner-only RLS;
  // a non-owner viewer gets an empty set (or error) and simply sees no
  // badge — degrade gracefully, never block the board.
  const costByDeal={};
  try{
    const {data:cb, error:cbErr}=await sb.from('v_deal_cost_breakdown')
      .select('deal_id, rehab_budget, rehab_actual');
    if(cbErr){console.warn('[pipeline] v_deal_cost_breakdown unavailable (non-fatal)',cbErr);}
    for(const r of (cb||[])){costByDeal[r.deal_id]=r;}
  }catch(e){console.warn('[pipeline] cost-breakdown fetch threw (non-fatal)',e);}

  renderBoard(dealRows, propsByMls, latestByDeal, costByDeal);
}

// Brief MH Phase 3 — rehab mini-bar for one Under Construction card.
// Reads rehab_actual + rehab_budget from v_deal_cost_breakdown. Graceful:
// no row, or no/zero budget -> spent-only caption (or omit when nothing
// spent either). Color by variance.
function rehabBarHtml(cost){
  if(!cost)return '';
  const actual=cost.rehab_actual||0;
  const budget=cost.rehab_budget;
  const hasBudget=budget!=null&&budget>0;
  if(!hasBudget){
    // No rehab budget set — show spent-only, or omit entirely if $0 spent.
    if(actual<=0)return '';
    return `<div class="card-bar">
      <div class="card-bar-cap"><span class="cb-lbl">Rehab spent</span><span class="cb-num">${FK(actual)} · no budget</span></div>
      <div class="card-bar-track"><div class="card-bar-fill ontrack" style="width:100%"></div></div>
    </div>`;
  }
  const ratio=actual/budget;
  const pct=Math.round(ratio*100);
  const width=Math.min(Math.max(ratio,0),1)*100;
  // green <0 (under, n/a here) · blue <80% · amber 80-100% · red >100%
  let cls='ontrack';
  if(ratio>1)cls='over';
  else if(ratio>=0.8)cls='warn';
  else cls='ontrack';
  return `<div class="card-bar">
    <div class="card-bar-cap"><span class="cb-lbl">Rehab budget</span><span class="cb-num">${FK(actual)} / ${FK(budget)} · ${pct}%</span></div>
    <div class="card-bar-track"><div class="card-bar-fill ${cls}" style="width:${width}%"></div></div>
  </div>`;
}

function renderBoard(deals, propsByMls, latestByDeal, costByDeal){
  costByDeal=costByDeal||{};
  const byPhase={};
  for(const s of PHASES)byPhase[s]=[];
  for(const d of deals){
    if(byPhase[d.phase])byPhase[d.phase].push(d);
  }

  let html='';
  for(const phase of PHASES){
    const rows=byPhase[phase]||[];
    html+=`<div class="col col-${phase}">
      <div class="col-hdr"><span class="name">${escapeHtml(phaseLabel(phase))}</span><span class="cnt">${rows.length}</span></div>
      <div class="col-body">`;
    if(!rows.length){
      html+=`<div class="col-empty">No deals in this phase</div>`;
    } else {
      for(const d of rows){
        // Pick the primary properties row for header rendering. Selling
        // deals: prefer relist_mls (the new MLS#); else buy_side_mls.
        let primaryMls=null;
        if(phase==='selling' && d.relist_mls && propsByMls[d.relist_mls])primaryMls=d.relist_mls;
        else if(d.buy_side_mls && propsByMls[d.buy_side_mls])primaryMls=d.buy_side_mls;
        else if(d.relist_mls && propsByMls[d.relist_mls])primaryMls=d.relist_mls;
        const p=primaryMls?propsByMls[primaryMls]:null;

        const latest=latestByDeal[d.id+'|'+phase];
        // Age (days in phase) shown everywhere except Pursuing.
        const age=(phase==='pursuing')?'':(latest?ageInDays(latest.transitioned_at):ageInDays(d.created_at));

        // Price: prefer the deal's list_price (canonical), else fall back
        // to the linked property row. May be NULL for OFFMKT- deals.
        const priceVal=(d.list_price!=null)?d.list_price:(p?(p.list_price||p.sale_price):null);
        const priceStr=priceVal?FK(priceVal):'';

        const bb=p?[
          (p.beds!=null&&p.beds!==0)?p.beds:null,
          (p.baths!=null&&p.baths!==0)?p.baths:null,
        ].filter(v=>v!=null).join('/'):'';
        const sub=p?[bb||null, p.sqft?`${p.sqft.toLocaleString()} sf`:null].filter(Boolean).join(' · '):'';

        const addrText=p?(p.address?titleCase(p.address):'(no address)'):'(no linked properties row)';
        const cityText=p?titleCase(p.city||''):'';
        const href='project-detail.html?deal='+encodeURIComponent(d.id);

        // Brief MH Phase 3 — rehab spent/budget mini-bar, Under Construction
        // cards only. The card stays a plain <a> link to project-detail.
        const rehabBar=(phase==='under_construction')?rehabBarHtml(costByDeal[d.id]):'';

        html+=`<a class="card" href="${href}">
          <div class="card-row">
            <span class="addr">${escapeHtml(addrText)}${cityText?`<span class="city">, ${escapeHtml(cityText)}</span>`:''}</span>
            <span class="price">${priceStr}</span>
          </div>
          <div class="card-row bot">
            <span class="sub">${escapeHtml(sub)}</span>
            <span class="age">${age?'in phase '+age:''}</span>
          </div>
          ${rehabBar}
        </a>`;
      }
    }
    html+='</div></div>';
  }
  document.getElementById('board').innerHTML=html;

  const total=deals.length;
  document.getElementById('pipe-summary').textContent=total?`(${total} deal${total===1?'':'s'} in pipeline)`:'(empty)';
  const summaryParts=PHASES.map(s=>`${phaseLabel(s)}: ${(byPhase[s]||[]).length}`);
  document.getElementById('pipe-totals').textContent=summaryParts.join(' · ');
}

function renderError(msg){
  document.getElementById('board').innerHTML=`<div class="empty-state">Failed to load pipeline: ${escapeHtml(msg)}</div>`;
}

// ========== INIT ==========
(async()=>{
  await window.authGate();
  if(!window.CURRENT_USER_ROLE)return;  // authGate redirected; abort
  window.renderSidebar('pipeline');
  await loadPipeline();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Detail — Backstage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="backstage.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="sidebar.js"></script>
<style>
/* === PROJECT DETAIL — local layout only === */

body { overflow:hidden; height:100vh; }

/* Backstage shell */
.app-shell { display:flex; height:100vh; }
.bs-sidebar { width:230px; background:var(--bg); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; transition:width .2s; }
.bs-sidebar.collapsed { width:56px; }
.bs-sidebar.collapsed .side-brand span, .bs-sidebar.collapsed .side-section-label, .bs-sidebar.collapsed .side-label, .bs-sidebar.collapsed .side-user-name, .bs-sidebar.collapsed .lock-btn { display:none; }
.bs-sidebar.collapsed .side-brand { justify-content:center; padding:20px 0 18px; }
.bs-sidebar.collapsed .side-item { justify-content:center; padding:10px 0; margin:0 8px 1px; }
.bs-sidebar.collapsed .side-section { padding:12px 0 0; }
.bs-sidebar.collapsed .side-footer { justify-content:center; padding:16px 0; }
.bs-sidebar.collapsed .side-user { justify-content:center; }
.side-brand { padding:20px 20px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.side-mark { width:26px; height:26px; border-radius:7px; background:var(--text); display:grid; place-items:center; font-weight:700; font-size:11px; color:#fff; }
.side-brand span { font-size:14px; font-weight:600; color:var(--text); }
.side-section { padding:6px 10px 0; }
.side-section-label { font-size:9px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--text-4); padding:0 8px; margin-bottom:2px; }
.side-item { display:flex; align-items:center; gap:8px; padding:3px 8px; border-radius:var(--radius); cursor:pointer; transition:all .12s; margin-bottom:0; text-decoration:none; line-height:1.3; }
.side-item:hover { background:var(--bg-page); text-decoration:none; }
.side-item.active { background:var(--bg-alt); }
.side-item.active .side-icon svg { stroke:var(--text); }
.side-item.active .side-label { color:var(--text); font-weight:600; }
.side-icon { width:18px; height:18px; display:grid; place-items:center; }
.side-icon svg { width:16px; height:16px; stroke:var(--text-4); stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.side-label { font-size:13px; font-weight:500; color:var(--text-3); }
.side-item.disabled { opacity:.35; pointer-events:none; }
.side-footer { margin-top:auto; padding:16px 20px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.side-user { display:flex; align-items:center; gap:9px; }
.side-avatar { width:26px; height:26px; border-radius:50%; background:var(--bg-alt); display:grid; place-items:center; font-size:11px; font-weight:600; color:var(--text-3); }
.side-user-name { font-size:13px; font-weight:500; color:var(--text-3); }
.lock-btn { background:none; border:none; cursor:pointer; padding:4px; color:var(--text-4); }
.lock-btn:hover { color:var(--text); }
.collapse-btn { background:none; border:none; cursor:pointer; padding:6px 12px; color:var(--text-4); font-size:14px; }
.collapse-btn:hover { color:var(--text); }
.main-content { flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden; }

/* Layout */
.scroll-wrap { flex:1; overflow-y:auto; }
.container { max-width:880px; margin:0 auto; padding:18px 24px 80px; }

/* Top bar (back button) */
.topbar { display:flex; align-items:center; gap:10px; padding:14px 24px; border-bottom:1px solid var(--border); background:rgba(255,255,255,.92); backdrop-filter:blur(20px); position:sticky; top:0; z-index:10; }
.back-btn { background:none; border:1px solid var(--border); border-radius:5px; padding:4px 10px; cursor:pointer; font-size:12px; font-family:inherit; color:var(--text-3); text-decoration:none; }
.back-btn:hover { color:var(--text); border-color:var(--border-hover); text-decoration:none; }

/* === BP — INLINE ACQUISITION DATA SECTION ===
   Replaces the old .header-block (h1 + sub + financials). Compact 13-14px
   density modeled on mls-deals.html's detail pane. The old header-block
   styles below are kept dormant (no longer referenced by renderPage) so
   that legacy `<h1>` references in any other code path don't crash. */

/* Acq card — outer flex row (photo + body stack). */
.acq-card { display:flex; gap:14px; align-items:flex-start; padding:6px 0 16px; border-bottom:1px solid var(--border); }
.acq-body { flex:1; min-width:0; }

/* Photo thumb 96x72. */
.acq-thumb { width:96px; height:72px; flex-shrink:0; border-radius:6px; object-fit:cover; cursor:pointer; background:var(--bg-alt); display:block; }
.acq-thumb-empty { background:linear-gradient(135deg,#e2e1dd 0%,#b0afa8 100%); display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--text-4); text-align:center; line-height:1.2; cursor:default; }

/* Address line — 14px bold, phase pill pushed right. */
.acq-head { display:flex; align-items:center; justify-content:space-between; gap:12px; }
.acq-addr { font-size:14px; font-weight:700; color:var(--text); }
.stage-pill { display:inline-block; font-size:11px; font-weight:700; padding:3px 10px; border-radius:10px; background:var(--accent-dim); color:var(--accent); letter-spacing:.3px; flex-shrink:0; }
.stage-pill.empty { background:var(--bg-alt); color:var(--text-4); }

/* Sub-line — 13px dot-separated facts. */
.acq-sub { font-size:13px; color:var(--text-3); margin:4px 0 0; }

/* Schools row — 12px chip + name pairs. */
.acq-schools { margin-top:6px; font-size:12px; color:var(--text-2); display:flex; gap:16px; flex-wrap:wrap; }
.acq-schools .school-chip { padding:2px 6px; border-radius:3px; font-family:var(--mono); font-size:11px; font-weight:600; margin-right:4px; }

/* Agent line — 13px single line + DE pill + view link. */
.acq-agent { margin-top:6px; font-size:13px; color:var(--text-2); display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.acq-agent .lbl { color:var(--text-4); margin-right:4px; font-size:12px; }
.de-pill { background:var(--purple-bg); color:var(--purple); padding:2px 7px; border-radius:4px; font-size:11px; font-weight:600; }
.acq-link { color:var(--accent); font-size:12px; text-decoration:none; }
.acq-link:hover { text-decoration:underline; }

/* Underwriting bar — focal point. Accent-tinted card. */
.uw-bar { margin-top:12px; padding:12px 16px; background:var(--accent-dim); border:1px solid var(--accent-dim2); border-radius:6px; display:flex; align-items:center; gap:22px; flex-wrap:wrap; }
.uw-stat { display:flex; flex-direction:column; }
.uw-label { font-size:10px; color:var(--text-4); font-weight:600; letter-spacing:.06em; text-transform:uppercase; margin-bottom:2px; }
.uw-value { font-size:15px; font-weight:700; color:var(--text); padding:1px 3px; border-radius:3px; transition:background 0.1s; position:relative; }
.uw-value[data-stat] { cursor:text; }
.uw-value[data-stat]:hover { background:rgba(156,124,60,0.12); }
.uw-value[data-stat]:focus { outline:none; background:rgba(156,124,60,0.18); }
.uw-value.editing { background:var(--bg); padding:0; }
.uw-value input { width:80px; font:inherit; border:1px solid var(--accent); border-radius:3px; padding:1px 4px; outline:none; background:var(--bg); color:var(--text); }
.uw-value-large { font-size:17px; }
.uw-lock { font-size:10px; color:var(--text-4); margin-left:4px; }
.uw-sep { color:var(--border-strong); font-size:14px; }
.uw-error { display:inline-block; margin-left:6px; font-size:11px; color:var(--red); animation:fadeOut 3s forwards; }
/* × clear button — hover-revealed, top-right of populated value cells. */
.uw-clear { position:absolute; top:-6px; right:-8px; font-size:11px; line-height:1; color:var(--text-4); cursor:pointer; opacity:0; transition:opacity 0.1s, color 0.1s; padding:2px 3px; user-select:none; }
.uw-value:hover .uw-clear { opacity:1; }
.uw-clear:hover { color:var(--red); }
.uw-value.editing .uw-clear { display:none; }
@keyframes fadeOut { 0%, 70% { opacity:1; } 100% { opacity:0; } }
.profit-pos { color:var(--green); }
.profit-neg { color:var(--red); }

/* Slim lightbox — single photo, click outside or ESC to close. */
.acq-lb-overlay { display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,.92); align-items:center; justify-content:center; padding:32px; }
.acq-lb-overlay.open { display:flex; }
.acq-lb-close { position:fixed; top:16px; right:20px; background:rgba(0,0,0,.5); border:none; color:#fff; font-size:24px; cursor:pointer; z-index:10001; padding:4px 12px; line-height:1; border-radius:6px; backdrop-filter:blur(4px); }
.acq-lb-close:hover { background:rgba(255,255,255,.2); }
.acq-lb-addr { position:fixed; top:18px; left:50%; transform:translateX(-50%); color:#fff; font-size:14px; font-weight:600; padding:0 60px; max-width:80%; text-align:center; }
.acq-lb-img { max-width:95vw; max-height:88vh; object-fit:contain; border-radius:6px; cursor:pointer; }

/* Section blocks */
.section { margin-top:22px; padding-top:14px; border-top:1px solid var(--border); }
.section h2 { font-size:10px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--text-4); margin:0 0 10px; }
.section.stub .stub-msg { font-size:12px; color:var(--text-4); font-style:italic; padding:8px 0; }

/* Stage transition form */
.move-form { display:flex; flex-direction:column; gap:8px; max-width:480px; }
.move-row { display:flex; align-items:center; gap:8px; }
.move-row label { font-size:11px; color:var(--text-3); width:74px; flex-shrink:0; font-weight:600; }
.move-form select, .move-form textarea { font-family:inherit; font-size:13px; padding:6px 10px; border:1px solid var(--border); border-radius:5px; background:var(--bg); color:var(--text); outline:none; }
.move-form select { flex:1; }
.move-form textarea { width:100%; min-height:54px; resize:vertical; }
.move-btn { align-self:flex-start; padding:6px 18px; border-radius:5px; border:1px solid var(--accent); background:var(--accent); color:#fff; font-size:12px; font-weight:600; font-family:inherit; cursor:pointer; }
.move-btn:hover { filter:brightness(1.05); }
.move-btn:disabled { opacity:.55; cursor:not-allowed; }
.move-msg { font-size:11px; min-height:14px; }
.move-msg.ok { color:var(--green); }
.move-msg.err { color:var(--red); }

/* History list */
.history { list-style:none; padding:0; margin:0; }
.history li { padding:10px 0; border-bottom:1px solid var(--border); }
.history li:last-child { border-bottom:none; }
.history .when { font-size:11px; color:var(--text-4); font-family:var(--mono); }
.history .who { font-size:11px; color:var(--text-3); margin-left:6px; }
.history .arrow { font-size:13px; color:var(--text); margin-top:2px; }
.history .arrow .from { color:var(--text-3); }
.history .arrow .to { color:var(--accent); font-weight:600; }
.history .note { font-size:12px; color:var(--text-3); margin-top:4px; padding-left:10px; border-left:2px solid var(--border); font-style:italic; }
.empty-history { font-size:12px; color:var(--text-4); font-style:italic; }

/* Read-only section grids (Construction / Listing) */
.kv-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:14px 24px; padding:6px 0 4px; }
.kv-grid .kv label { display:block; font-size:10px; font-weight:700; color:var(--text-4); text-transform:uppercase; letter-spacing:.4px; margin-bottom:3px; }
.kv-grid .kv .val { font-size:13px; font-weight:600; color:var(--text); }
.kv-grid .kv .val.dim { color:var(--text-3); font-weight:500; }

/* Milestones mini-list */
.ms-mini { list-style:none; padding:0; margin:0; }
.ms-mini li { display:flex; align-items:center; gap:10px; padding:6px 0; border-bottom:1px solid var(--border); font-size:13px; }
.ms-mini li:last-child { border-bottom:none; }
.ms-mini .ms-due { font-family:var(--mono); font-size:11px; color:var(--text-3); width:64px; flex-shrink:0; }
.ms-mini .ms-name { flex:1; }
.ms-mini li.done { opacity:.55; }
.ms-mini li.done .ms-name { text-decoration:line-through; color:var(--text-3); }
.ms-mini .ms-status { font-size:10px; font-weight:700; padding:1px 7px; border-radius:8px; letter-spacing:.4px; text-transform:uppercase; }
.ms-mini .ms-status.done { background:var(--green-bg); color:var(--green); }
.ms-mini .ms-status.open { background:var(--bg-alt); color:var(--text-3); }
.ms-mini .ms-status.overdue { background:var(--red-bg); color:var(--red); }

/* === MG — Loan section (project-detail.html) ===
   Inline-edit table mirroring BQ underwriting bar pattern: click cell → input
   swap → save-on-blur / Enter → re-render. Compact 13px rows. */
.loan-tbl { width:100%; border-collapse:collapse; font-size:13px; }
.loan-tbl thead th { text-align:left; font-size:10px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; color:var(--text-4); padding:6px 10px; border-bottom:1px solid var(--border); }
.loan-tbl tbody td { padding:8px 10px; border-bottom:1px solid var(--border); color:var(--text); vertical-align:middle; }
.loan-tbl tbody tr:last-child td { border-bottom:none; }
.loan-tbl .loan-cell { cursor:text; padding:2px 4px; border-radius:3px; transition:background 0.1s; display:inline-block; min-width:30px; }
.loan-tbl .loan-cell:hover { background:rgba(156,124,60,0.10); }
.loan-tbl .loan-cell.editing { background:var(--bg); padding:0; }
.loan-tbl .loan-cell input,
.loan-tbl .loan-cell select { font:inherit; border:1px solid var(--accent); border-radius:3px; padding:2px 6px; outline:none; background:var(--bg); color:var(--text); width:100px; }
.loan-tbl .loan-cell select { width:auto; min-width:120px; }
.loan-tbl .loan-status-pending { color:var(--amber); font-weight:600; }
.loan-tbl .loan-status-funded { color:var(--green); font-weight:600; }
.loan-tbl .loan-status-extended { color:var(--blue); font-weight:600; }
.loan-tbl .loan-status-paid_off { color:var(--text-3); font-weight:600; }
.loan-tbl .loan-status-cancelled { color:var(--text-4); font-weight:500; text-decoration:line-through; }
.loan-tbl .loan-del { background:none; border:1px solid var(--border); color:var(--text-4); font-size:11px; padding:3px 8px; border-radius:4px; cursor:pointer; font-family:inherit; }
.loan-tbl .loan-del:hover { color:var(--red); border-color:var(--red); }
.loan-tbl .loan-error { color:var(--red); font-size:11px; margin-left:6px; }
.loan-empty { font-size:13px; color:var(--text-4); font-style:italic; padding:10px 0; }
.loan-add-btn { background:none; border:1px dashed var(--border); color:var(--text-3); font-size:12px; font-weight:600; padding:6px 14px; border-radius:5px; cursor:pointer; font-family:inherit; margin-top:8px; }
.loan-add-btn:hover { color:var(--accent); border-color:var(--accent); }
.loan-add-form { margin-top:10px; padding:12px; background:var(--bg-alt); border:1px solid var(--border); border-radius:6px; display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; }
.loan-add-form .laf-field { display:flex; flex-direction:column; gap:3px; }
.loan-add-form .laf-field label { font-size:10px; color:var(--text-4); text-transform:uppercase; font-weight:700; letter-spacing:.4px; }
.loan-add-form .laf-field input,
.loan-add-form .laf-field select { font-family:inherit; font-size:13px; padding:5px 8px; border:1px solid var(--border); border-radius:4px; background:var(--bg); color:var(--text); outline:none; }
.loan-add-form .laf-actions { display:flex; gap:6px; }
.loan-add-form .laf-msg { font-size:11px; color:var(--red); flex-basis:100%; }

/* === MG — Loan modal (fires after in_escrow transition with no loan) === */
.loan-modal-overlay { display:none; position:fixed; inset:0; z-index:9998; background:rgba(0,0,0,.4); align-items:center; justify-content:center; padding:24px; }
.loan-modal-overlay.open { display:flex; }
.loan-modal { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:20px 22px; max-width:420px; width:100%; box-shadow:0 8px 32px rgba(0,0,0,.18); }
.loan-modal h3 { font-size:13px; font-weight:700; margin:0 0 4px; color:var(--accent); letter-spacing:-.2px; }
.loan-modal .lm-sub { font-size:11px; color:var(--text-4); margin:0 0 14px; }
.loan-modal .lm-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.loan-modal .lm-row label { font-size:11px; color:var(--text-3); width:62px; flex-shrink:0; font-weight:600; text-transform:uppercase; letter-spacing:.3px; }
.loan-modal .lm-row input,
.loan-modal .lm-row select { flex:1; font-family:inherit; font-size:13px; padding:6px 10px; border:1px solid var(--border); border-radius:5px; background:var(--bg); color:var(--text); outline:none; }
.loan-modal .lm-row input:focus,
.loan-modal .lm-row select:focus { border-color:var(--accent); }
.loan-modal .lm-loan-preview { font-size:12px; color:var(--text-3); padding:6px 0 4px; font-family:var(--mono); }
.loan-modal .lm-loan-preview strong { color:var(--text); font-weight:700; }
.loan-modal .lm-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:14px; }
.loan-modal .lm-btn { padding:6px 16px; border-radius:5px; font-size:12px; font-weight:600; font-family:inherit; cursor:pointer; }
.loan-modal .lm-btn-primary { background:var(--accent); color:#fff; border:1px solid var(--accent); }
.loan-modal .lm-btn-primary:hover { filter:brightness(1.05); }
.loan-modal .lm-btn-primary:disabled { opacity:.55; cursor:not-allowed; }
.loan-modal .lm-btn-secondary { background:var(--bg); color:var(--text-3); border:1px solid var(--border); }
.loan-modal .lm-btn-secondary:hover { color:var(--text); border-color:var(--border-hover); }
.loan-modal .lm-msg { font-size:11px; min-height:14px; color:var(--red); margin-top:6px; }

</style>
</head>
<body>

<div class="app-shell">

<div class="bs-sidebar" id="bsSidebar"></div>

<div class="main-content">

<div class="topbar">
  <a class="back-btn" href="pipeline.html">← Pipeline</a>
  <span style="font-size:11px;color:var(--text-4)" id="topbar-mls"></span>
</div>

<div class="scroll-wrap">
<div class="container" id="container">
  <div style="padding:60px 0;text-align:center;color:var(--text-4)">Loading...</div>
</div>
</div>

</div><!-- /main-content -->
</div><!-- /app-shell -->

<!-- BP slim lightbox (single photo). Click backdrop or press ESC to close. -->
<div class="acq-lb-overlay" id="acqLightbox" onclick="if(event.target===this)closeAcqLightbox()">
  <button class="acq-lb-close" onclick="closeAcqLightbox()" aria-label="Close lightbox">✕</button>
  <div class="acq-lb-addr" id="acqLightboxAddr"></div>
  <img class="acq-lb-img" id="acqLightboxImg" alt="" onclick="closeAcqLightbox()">
</div>

<!-- MG — Loan modal (fires after in_escrow transition with no existing loan). -->
<div class="loan-modal-overlay" id="loanModal" onclick="if(event.target===this)closeLoanModal()">
  <div class="loan-modal">
    <h3>Add acquisition loan</h3>
    <p class="lm-sub">Deal moved to In Escrow — attach the lender + LTC so capital position reflects realistic equity. Skip if not yet locked.</p>
    <div class="lm-row">
      <label for="lmLender">Lender</label>
      <select id="lmLender" onchange="onLmLenderChange()"></select>
    </div>
    <div class="lm-row">
      <label for="lmLtc">LTC %</label>
      <input type="number" id="lmLtc" min="0" max="100" step="0.1" value="90" oninput="onLmLtcChange()" />
    </div>
    <div class="lm-loan-preview" id="lmLoanPreview">Loan: <strong>—</strong></div>
    <div class="lm-row">
      <label for="lmRate">Rate %</label>
      <input type="number" id="lmRate" min="0" max="100" step="0.01" />
    </div>
    <div class="lm-row">
      <label for="lmTerm">Term (mo)</label>
      <input type="number" id="lmTerm" min="1" step="1" value="12" />
    </div>
    <div class="lm-msg" id="lmMsg"></div>
    <div class="lm-actions">
      <button class="lm-btn lm-btn-secondary" onclick="closeLoanModal()">Defer</button>
      <button class="lm-btn lm-btn-primary" id="lmSaveBtn" onclick="saveLoanFromModal()">Save loan</button>
    </div>
  </div>
</div>

<script>
// ========== SUPABASE CLIENT ==========
const SUPABASE_URL='https://pwrnywsojomrygsiezzi.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3cm55d3Nvam9tcnlnc2llenppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzE1OTMsImV4cCI6MjA4OTgwNzU5M30.tGewn18t-6dN_bMXjC-Z820zFYvL1VUu3BDhfW1ZoNk';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
window.sb=sb;

// ========== PHASE CONFIG ==========
// Brief BK: 5 phases on the move dropdown. 'sold' is auto-only (daily_pipeline
// sets it when it detects the relist closed) so the UI never offers it.
const PHASES=['pursuing','in_escrow','under_construction','listed','archived','lost'];
function phaseLabel(s){
  if(s==null)return 'Unknown';
  return ({pursuing:'Pursuing',in_escrow:'In Escrow',under_construction:'Under Construction',listed:'Listed',sold:'Sold',archived:'Archived',lost:'Lost'})[s]||s;
}

// Construction scope-tier label (read-only; editor inputs ship in BN).
function scopeTierLabel(t){
  if(t==null)return '—';
  return ({1:'1 Cosmetic',2:'2 Medium',3:'3 Heavy'})[t]||String(t);
}

// ========== HELPERS ==========
function FK(n){if(n==null||!isFinite(n))return '—';if(n>=1e6)return '$'+(n/1e6).toFixed(2).replace(/\.?0+$/,'')+'M';if(n>=1e3)return '$'+Math.round(n/1e3)+'K';return '$'+n;}
function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c]);}
function relTime(iso){
  if(!iso)return '';
  const t=new Date(iso).getTime();if(!isFinite(t))return '';
  const days=Math.floor((Date.now()-t)/86400000);
  if(days<=0)return 'today';
  if(days===1)return '1 day ago';
  if(days<14)return days+' days ago';
  if(days<60)return Math.floor(days/7)+' weeks ago';
  return Math.floor(days/30)+' months ago';
}
function fmtDate(iso){
  if(!iso)return '';
  const d=new Date(iso);
  if(!isFinite(d.getTime()))return '';
  return d.toISOString().slice(0,10);
}
function fmtMD(iso){
  if(!iso)return '—';
  const d=new Date(iso+(iso.length===10?'T00:00:00':''));
  if(!isFinite(d.getTime()))return '—';
  return (d.getMonth()+1)+'/'+d.getDate();
}
function userShort(uuid){
  if(!uuid)return 'unknown';
  return uuid.slice(0,8);
}
function todayStr(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

  return {
    dealId:(params.get('deal')||'').trim(),

let propertiesByMls={};      // mls -> properties row (for header rendering)
let phaseHistory=[];         // rows from deals_phase_history
let dealMilestones=[];       // rows from deal_milestones
let saving=false;

// MG — loan state. Loaded in loadProject(); refreshed by loadDealLoans()
// after any modal/inline-edit save so the Loan section + modal trigger

let dealLoans=[];            // rows from deal_loans (this deal only)

// BQ inline-edit state — last-rendered underwriting bar context. Stashed
// here so the inline-edit handlers can recompute profit + re-render the
// bar without a full loadProject().
let uwCtx=null;              // {arvRow, gradeRow, deCount, activeMls, financingClosing}

// BQ — pure profit calc. Same constants as the BP renderPage block
// (financing+closing falls back to 3% of the buy price when the
// deal_scores estimates are missing).
function recomputeProfit({offer, arv, construction, financingClosing}){
  if(offer==null || arv==null || construction==null)return {dollar:null, pct:null, fc:null};
  let fc=financingClosing;
  if(fc==null)fc=offer*0.03;
  const dollar=arv - offer - construction - fc;
  const pct=arv>0?(dollar/arv*100):null;
  return {dollar, pct, fc};
}

// Pick the "primary" properties row to render in the header. For listed
// deals, prefer the relist_mls (the new MLS# carrying the listing photos
// + price). Otherwise fall back to buy_side_mls.
function primaryProperty(){
  if(!currentDeal)return null;
  if(currentDeal.phase==='listed' && currentDeal.relist_mls && propertiesByMls[currentDeal.relist_mls]){
    return propertiesByMls[currentDeal.relist_mls];
  }
  if(currentDeal.buy_side_mls && propertiesByMls[currentDeal.buy_side_mls]){
    return propertiesByMls[currentDeal.buy_side_mls];
  }
  if(currentDeal.relist_mls && propertiesByMls[currentDeal.relist_mls]){
    return propertiesByMls[currentDeal.relist_mls];
  }
  return null;
}

// ========== LOAD ==========
async function loadProject(){
  const {dealId, mls}=getQueryParams();
  const topBarMls=document.getElementById('topbar-mls');

  if(!dealId && !mls){
    document.getElementById('container').innerHTML=`<div style="padding:40px 0;text-align:center;color:var(--text-4)">No <code>?deal=&lt;uuid&gt;</code> or <code>?mls=&lt;mls&gt;</code> query param. Open this page from the Pipeline kanban or an MLS Deals listing.</div>`;
    return;
  }

  // 1. Load the deal row.
  let dealRow=null, dealErr=null;
  if(dealId){
    const {data, error}=await sb.from('deals').select('*').eq('id', dealId).maybeSingle();
    dealRow=data; dealErr=error;
  } else {
    // Backward-compat fallback: ?mls=<mls>. Match buy_side_mls OR relist_mls.
    const escMls=mls.replace(/'/g,"''"); // PostgREST or-string is comma-delimited; commas/parens in mls are unlikely but escape single-quotes for safety.
    const {data, error}=await sb.from('deals')
      .select('*')
      .or(`buy_side_mls.eq.${escMls},relist_mls.eq.${escMls}`)
      .limit(1);
    if(error){dealErr=error;}
    else if(data && data.length){dealRow=data[0];}
    else {
      // No matching deal — bounce back to mls-deals.html.
      document.getElementById('container').innerHTML=`<div style="padding:40px 0;text-align:center;color:var(--text-4)">No deal found for MLS# ${escapeHtml(mls)}. <a href="mls-deals.html" style="color:var(--accent)">Back to MLS Deals →</a></div>`;
      return;
    }
  }
  if(dealErr){
    console.error('[project-detail] deal load failed', dealErr);
    document.getElementById('container').innerHTML=`<div style="padding:40px 0;text-align:center;color:var(--red)">Failed to load deal: ${escapeHtml(dealErr.message)}</div>`;
    return;
  }
  if(!dealRow){
    document.getElementById('container').innerHTML=`<div style="padding:40px 0;text-align:center;color:var(--text-4)">No deal found for the supplied id/mls.</div>`;
    return;
  }
  currentDeal=dealRow;

  if(topBarMls){
    const labels=[];
    if(dealRow.buy_side_mls)labels.push('Buy: '+dealRow.buy_side_mls);
    if(dealRow.relist_mls)labels.push('Relist: '+dealRow.relist_mls);
    topBarMls.textContent=labels.join(' · ');
  }

  // 2. Load the linked properties rows (may be one or two). Pull every field
  // BP's inline acquisition-data section needs (schools + ratings, agent +
  // broker, double_ended, photo_count, lot_size, pool, change_type) plus the
  // existing fields used by the read-only Construction / Listing sections.
  const mlsList=[dealRow.buy_side_mls, dealRow.relist_mls].filter(Boolean);
  propertiesByMls={};
  if(mlsList.length){
    const {data:props, error:pErr}=await sb.from('properties')
      .select('id, mls, address, city, zip, beds, baths, sqft, lot_size, pool, year_built, list_price, sale_price, sold_date, locked_arv, locked_construction, elementary_school, middle_school, high_school, elementary_rating, middle_rating, high_rating, agent_name, agent_email, agent_broker, double_ended, photo_count, change_type')
      .in('mls', mlsList);
    if(pErr){
      console.warn('[project-detail] properties load failed (non-fatal)', pErr);
    } else {
      for(const r of (props||[])){
        propertiesByMls[r.mls]=r;
      }
    }
  }

  // 3. ARV + deal-score lookups (best-effort; prefer primary mls).
  // arv_estimates carries `headline_arv` + `confidence` (the v7 estimator's
  // unified output column; the older `arv` / `confidence_label` columns the
  // pre-BP renderPage tried to read don't exist on the table).
  // deal_scores carries `rehab_estimate`, `financing_estimate`, `closing_estimate`
  // as top-level columns (also mirrored in breakdown_json for the v1 detail panel).
  const primary=primaryProperty();
  let arvRow=null, gradeRow=null, deCount=0;
  if(primary){
    try {
      const {data:arvData}=await sb.from('arv_estimates').select('headline_arv,confidence,confidence_score').eq('mls',primary.mls).order('computed_at',{ascending:false}).limit(1);
      arvRow=(arvData&&arvData[0])||null;
    } catch(e){ /* ignore */ }
    try {
      const {data:gData}=await sb.from('deal_scores').select('grade,spread,spread_pct,rehab_estimate,financing_estimate,closing_estimate,arv_used,target_buy,status').eq('mls',primary.mls).order('computed_at',{ascending:false}).limit(1);
      gradeRow=(gData&&gData[0])||null;
    } catch(e){ /* ignore */ }
    // DE count for the agent on the active mls. Mirrors mls-deals.html's
    // fetchAgentDeCounts() but for a single agent. Email-primary, name-fallback.
    deCount=await fetchAgentDeCount(primary.agent_email, primary.agent_name);
  }

  // 4. Phase history.
  const {data:hist, error:hErr}=await sb.from('deals_phase_history')
    .select('id, deal_id, from_phase, to_phase, transitioned_at, transitioned_by, note')
    .eq('deal_id', dealRow.id)
    .order('transitioned_at', {ascending:false});
  if(hErr){
    console.error('[project-detail] history load failed', hErr);
    phaseHistory=[];
  } else {
    phaseHistory=hist||[];
  }

  // 5. Deal milestones (read-only mini-list).
  const {data:ms, error:msErr}=await sb.from('deal_milestones')
    .select('id, deal_id, milestone_key, display_name, due_date, completed, completed_at, notes')
    .eq('deal_id', dealRow.id)
    .order('due_date', {ascending:true});
  if(msErr){
    console.warn('[project-detail] milestones load failed (non-fatal)', msErr);
    dealMilestones=[];
  } else {
    dealMilestones=ms||[];
  }

  // 6. MG — deal_loans (this deal) + capital_sources (active HML/private).
  // Owner-only RLS on deal_loans means non-owners get zero rows + no error.
  // Loan section gracefully shows empty state in that case.
  await loadDealLoans();
  await loadCapitalSources();

  renderPage(arvRow, gradeRow, deCount);
}

// MG — fetch this deal's loans only (called by loadProject + after every
// modal/inline-edit save). Cheap query; isolated from the full loadProject
// round-trip so re-renders feel snappy.
async function loadDealLoans(){
  if(!currentDeal){dealLoans=[];return;}
  const {data, error}=await sb.from('deal_loans')
    .select('id, deal_id, capital_source_id, loan_purpose, status, loan_amount, rate_apr, term_months, origination_date, funded_date, maturity_date, payoff_date, payoff_amount, notes, created_at')
    .eq('deal_id', currentDeal.id)
    .order('created_at', {ascending:true});
  if(error){
    console.warn('[project-detail] deal_loans load failed (non-fatal):', error.message);
    dealLoans=[];
    return;
  }
  dealLoans=data||[];
}

// MG — fetch HML + private capital sources for the dropdown. Excludes
// HELOCs / shareholder cash (those use Money's Path X/Y in a future brief).
async function loadCapitalSources(){
  const {data, error}=await sb.from('capital_sources')
    .select('id, name, source_type, default_rate_apr, active')
    .in('source_type', ['hard_money','private'])
    .eq('active', true)
    .order('name');
  if(error){
    console.warn('[project-detail] capital_sources load failed (non-fatal):', error.message);
    capitalSources=[];
    return;
  }
  capitalSources=data||[];
}

// ========== AGENT DE COUNT ==========
// Mirrors mls-deals.html's fetchAgentDeCounts() but scoped to a single agent.
// Email-primary, name-fallback. Counts past `properties` rows where this
// agent was the listing agent on a double_ended sale since 2023-01-01.
async function fetchAgentDeCount(email, name){
  const em=(email||'').trim().toLowerCase();
  const nm=(name||'').trim().toLowerCase();
  if(!em && !nm)return 0;
  try{
    if(em){
      const {data,error}=await sb.from('properties').select('mls',{count:'exact',head:false}).eq('double_ended',true).gte('sold_date','2023-01-01').eq('agent_email',em);
      if(error)return 0;
      return (data||[]).length;
    }
    const {data,error}=await sb.from('properties').select('mls',{count:'exact',head:false}).eq('double_ended',true).gte('sold_date','2023-01-01').eq('agent_name',name);
    if(error)return 0;
    return (data||[]).length;
  }catch(e){return 0;}
}

// ========== ACQ CARD HELPERS ==========
const PHOTO_BASE='https://photos.dottyhomes.com';
function getThumbUrl(mls){return `${PHOTO_BASE}/${mls}/${mls}_01.jpg`;}

// Phase pill color tier (background-bg + text-fg pair). Mirrors the conventions
// used elsewhere in Backstage (in mls-deals' detail badges, listings tags).
function stagePillStyle(phase){
  if(phase==='in_escrow')      return 'background:var(--amber-bg);color:var(--amber)';
  if(phase==='under_construction')return 'background:var(--blue-bg);color:var(--blue)';
  if(phase==='listed')          return 'background:var(--green-bg);color:var(--green)';
  if(phase==='sold')            return 'background:var(--bg-alt);color:var(--text-3)';
  if(phase==='archived'||phase==='lost')return 'background:var(--bg-alt);color:var(--text-4)';
  // pursuing + fallback → gold accent (matches mockup default)
  return 'background:var(--accent-dim);color:var(--accent)';
}

// School chip color tier (mls-deals' .sh / .sm / .sl pattern, ported as inline
// styles to keep the project-detail stylesheet self-contained).
function schoolChipStyle(rating){
  const r=Number(rating||0);
  if(r>=7)return 'background:var(--green-bg);color:var(--green)';
  if(r>=5)return 'background:var(--amber-bg);color:var(--amber)';
  return 'background:var(--red-bg);color:var(--red)';
}

// Shorten "<X> Elementary School" → "<X> ES" (and MS / HS for middle / high).
// Saves horizontal space in the schools row while keeping the proper noun.
function shortenSchool(name){
  if(!name)return '';
  return String(name)
    .replace(/\s+Elementary\s+School\s*$/i, ' ES')
    .replace(/\s+Middle\s+School\s*$/i, ' MS')
    .replace(/\s+High\s+School\s*$/i, ' HS');
}

// Slim, single-photo lightbox (R2 photo at index 01). v1 doesn't need the
// multi-photo gallery from mls-deals — that lightbox is tangled with the
// listings/compCache lookup, and porting it would require importing more
// state than this page should carry.
function openAcqLightbox(mls,addr){
  const overlay=document.getElementById('acqLightbox');
  if(!overlay)return;
  const imgEl=document.getElementById('acqLightboxImg');
  const addrEl=document.getElementById('acqLightboxAddr');
  if(addrEl)addrEl.textContent=addr||'';
  if(imgEl){imgEl.src=getThumbUrl(mls);}
  overlay.classList.add('open');
  document.addEventListener('keydown',acqLbKey);
}
function closeAcqLightbox(){
  const overlay=document.getElementById('acqLightbox');
  if(overlay)overlay.classList.remove('open');
  document.removeEventListener('keydown',acqLbKey);
}
function acqLbKey(e){if(e.key==='Escape')closeAcqLightbox();}

// ========== RENDER ==========
function renderPage(arvRow,gradeRow,deCount){
  const d=currentDeal;
  const role=window.CURRENT_USER_ROLE;
  const phase=d.phase;
  const phaseLbl=phaseLabel(phase);
  const p=primaryProperty();
  const isOffMkt=p && typeof p.mls==='string' && p.mls.startsWith('OFFMKT-');

  // === ACQ CARD INPUTS ===

  // Active MLS for the deep-link target (the resolved primary). The header
  // sub-line still lists BOTH MLS#s for audit-trail visibility.
  const activeMls=p?p.mls:(d.relist_mls||d.buy_side_mls);

  // Address / city / zip composed for the bold address line.
  const addrLine=p
    ?`${p.address||'(no address)'}, ${(p.city||'').toUpperCase()}${p.zip?' '+p.zip:''}`
    :'(no linked properties row)';

  // MLS label line. When both exist: "Buy MLS# X · Relist MLS# Y".
  // Otherwise just one MLS#.
  const mlsLabels=[];
  if(d.buy_side_mls && d.relist_mls){
    mlsLabels.push('Buy MLS# '+d.buy_side_mls);
    mlsLabels.push('Relist MLS# '+d.relist_mls);
  } else if(d.buy_side_mls){
    mlsLabels.push('MLS# '+d.buy_side_mls);
  } else if(d.relist_mls){
    mlsLabels.push('MLS# '+d.relist_mls);
  }

  // Sub-line: bd/ba · sqft · Lot N sf · Pool Yes/No · MLS#(s).
  // For OFFMKT- rows: "<mls> · beds/baths/sqft TBD <em>(off-market — fill via off-market.html when BM ships)</em>"
  let subHtml='';
  if(isOffMkt){
    subHtml=`${escapeHtml(p.mls)} · beds/baths/sqft TBD <span style="color:var(--text-4); font-style:italic">(off-market — fill via off-market.html when BM ships)</span>`;
  } else {
    const subParts=[];
    if(p){
      if(p.beds!=null && p.beds!==0)subParts.push(p.beds+'bd/'+(p.baths||0)+'ba');
      if(p.sqft)subParts.push(p.sqft.toLocaleString()+' sf');
      if(p.lot_size)subParts.push('Lot '+Number(p.lot_size).toLocaleString()+' sf');
      if(p.pool)subParts.push('Pool '+p.pool);
    }
    if(mlsLabels.length)subParts.push(mlsLabels.join(' · '));
    subHtml=subParts.map(escapeHtml).join(' · ');
  }

  // Schools row (skipped for OFFMKT-).
  let schoolsHtml='';
  if(p && !isOffMkt){
    const chips=[];
    if(p.elementary_school || p.elementary_rating!=null){
      chips.push(`<span><span class="school-chip" style="${schoolChipStyle(p.elementary_rating)}">E ${p.elementary_rating!=null?p.elementary_rating:'—'}</span>${escapeHtml(shortenSchool(p.elementary_school)||'')}</span>`);
    }
    if((p.middle_school||p.middle_rating!=null) && p.middle_school!==p.elementary_school){
      chips.push(`<span><span class="school-chip" style="${schoolChipStyle(p.middle_rating)}">M ${p.middle_rating!=null?p.middle_rating:'—'}</span>${escapeHtml(shortenSchool(p.middle_school)||'')}</span>`);
    }
    if(p.high_school || p.high_rating!=null){
      chips.push(`<span><span class="school-chip" style="${schoolChipStyle(p.high_rating)}">H ${p.high_rating!=null?p.high_rating:'—'}</span>${escapeHtml(shortenSchool(p.high_school)||'')}</span>`);
    }
    if(chips.length)schoolsHtml=`<div class="acq-schools">${chips.join('')}</div>`;
  }

  // Agent row (skipped for OFFMKT-).
  let agentHtml='';
  if(p && !isOffMkt){
    const agentBits=[];
    if(p.agent_name){
      const brokerSuffix=p.agent_broker?` (${escapeHtml(p.agent_broker)})`:'';
      agentBits.push(`<span><span class="lbl">Agent</span>${escapeHtml(p.agent_name)}${brokerSuffix}</span>`);
    } else {
      agentBits.push(`<span style="color:var(--text-4);font-style:italic">No agent on file</span>`);
    }
    if(deCount && deCount>0){
      agentBits.push(`<span class="de-pill" title="Listing agent has ${deCount} double-end deal${deCount===1?'':'s'} since 2023">🔁 DE×${deCount}</span>`);
    }
    // "View full listing →" deep-link uses the active mls.
    const linkMls=activeMls||'';
    agentBits.push(`<a href="mls-deals.html?mls=${encodeURIComponent(linkMls)}" class="acq-link" style="margin-left:auto">View full listing →</a>`);
    agentHtml=`<div class="acq-agent">${agentBits.join('')}</div>`;
  }

  // === UNDERWRITING BAR ===

  // Phase-aware buy-price label + value.
  const buyIsOffer=(phase==='pursuing'||phase==='lost');
  const buyLabel=buyIsOffer?'Offer at':'Bought at';
  const buyVal=buyIsOffer?d.offer_price:d.purchase_price;

  // ARV: locked > arv_estimates.headline_arv.
  const arvLocked=p && p.locked_arv!=null;
  const arvVal=arvLocked?p.locked_arv:(arvRow && arvRow.headline_arv!=null?arvRow.headline_arv:null);

  // Construction: locked > deal_scores.rehab_estimate.
  const constrLocked=p && p.locked_construction!=null;
  const constrVal=constrLocked?p.locked_construction:(gradeRow && gradeRow.rehab_estimate!=null?gradeRow.rehab_estimate:null);

  // Profit: ARV - (buy + construction + financing + closing).
  // Use deal_scores' financing_estimate + closing_estimate when present;
  // otherwise approximate financing+closing as 3% of the buy price (matches
  // the rehab-estimator's combined-cost convention in the v1 detail panel
  // on mls-deals — see breakdown_json keys financing / purchase_close /
  // sale_close which sum to roughly 3% of list). Calc lives in
  // recomputeProfit() so BQ inline-edit can call it on every keystroke.
  let dealScoresFC=null;
  if(gradeRow){
    const fin=gradeRow.financing_estimate;
    const cls=gradeRow.closing_estimate;
    if(fin!=null && cls!=null)dealScoresFC=fin+cls;
  }
  const _pp=recomputeProfit({offer:buyVal, arv:arvVal, construction:constrVal, financingClosing:dealScoresFC});
  const profit=_pp.dollar;
  const profitPct=_pp.pct;

  // BQ — stash context so inline-edit handlers can re-render the bar.
  // buyStat: 'offer' or 'bought' depending on phase.
  const buyStat=buyIsOffer?'offer':'bought';
  uwCtx={arvRow, gradeRow, deCount, activeMls, dealScoresFC, buyStat};

  function fmtUw(v,locked,statKey){
    const attrs=statKey?` tabindex="0" data-stat="${statKey}"`:'';
    if(v==null)return `<div class="uw-value" style="color:var(--text-4)"${attrs}>— not set</div>`;
    const clearBtn=statKey?`<span class="uw-clear" data-clear-stat="${statKey}" title="Clear value">×</span>`:'';
    return `<div class="uw-value"${attrs}>${FK(v)}${locked?'<span class="uw-lock">🔒</span>':''}${clearBtn}</div>`;
  }
  function profitHtml(){
    if(profit==null)return `<div class="uw-value" id="uwProfit" style="color:var(--text-4)">— pending</div>`;
    const cls=profit>=0?'profit-pos':'profit-neg';
    const sign=profit>=0?'+':'-';
    const dollars=FK(Math.abs(profit));
    const pct=profitPct!=null?` <span style="font-size:13px;font-weight:600">(${(profitPct>=0?'+':'')}${profitPct.toFixed(1)}%)</span>`:'';
    return `<div class="uw-value uw-value-large ${cls}" id="uwProfit">${sign}${dollars}${pct}</div>`;
  }

  // === PHOTO THUMB ===
  let thumbHtml;
  if(isOffMkt){
    thumbHtml=`<div class="acq-thumb acq-thumb-empty">no<br>photos</div>`;
  } else if(p && p.photo_count>0){
    const safeAddr=(addrLine||'').replace(/"/g,'&quot;');
    thumbHtml=`<img class="acq-thumb" src="${getThumbUrl(activeMls||p.mls)}" alt="" onerror="this.outerHTML='&lt;div class=&quot;acq-thumb acq-thumb-empty&quot;&gt;no&lt;br&gt;photos&lt;/div&gt;'" onclick="openAcqLightbox('${escapeHtml(activeMls||p.mls)}','${safeAddr}')" title="Click to expand">`;
  } else {
    thumbHtml=`<div class="acq-thumb acq-thumb-empty">no<br>photos</div>`;
  }

  // === COMPOSE ACQ CARD ===
  const acqCardHtml=`
    <div class="acq-card">

// ========== BQ INLINE-EDIT (underwriting bar) ==========
//
// Each .uw-value[data-stat] is click/keyboard-activatable. Click swaps
// the rendered text with a number input pre-filled in K-units. Enter or
// blur → save (stat-routed update to deals.offer_price /
// deals.purchase_price / properties.locked_arv /
// properties.locked_construction). Escape → cancel. Empty save → silent
// revert (no NULL writes; explicit clear UI is out of scope per brief).
// On every keystroke, profit recomputes live using the in-progress
// input value combined with the other stats' last-saved values.

function _dollarsForInput(v){return v==null?'':String(Math.round(v));}
function _currentStatValue(stat){
  const d=currentDeal;
  const p=primaryProperty();
  if(stat==='offer')       return d.offer_price;
  if(stat==='bought')      return d.purchase_price;
  if(stat==='arv')         return p?p.locked_arv:null;
  if(stat==='construction')return p?p.locked_construction:null;
  return null;
}
function _showInlineError(el, msg){
  // Strip any existing error first.
  const prev=el.querySelector('.uw-error');
  if(prev)prev.remove();
  const e=document.createElement('span');
  e.className='uw-error';
  e.textContent=msg;
  el.appendChild(e);
  setTimeout(()=>{ if(e.parentNode)e.remove(); }, 3100);
}

const STAT_LABELS={offer:'Offer at', bought:'Bought at', arv:'ARV', construction:'Construction'};

function wireUwEdits(){
  const els=document.querySelectorAll('.uw-value[data-stat]');
  els.forEach(el=>{
    el.addEventListener('click', (e)=>{
      // × clear button intercepts before _beginEdit fires.
      if(e.target && e.target.classList && e.target.classList.contains('uw-clear')){
        e.stopPropagation();
        const stat=e.target.dataset.clearStat;
        _clearStat(stat, el);
        return;
      }
      _beginEdit(el);
    });
    el.addEventListener('keydown', (e)=>{
      if(e.key==='Enter'||e.key===' '){ e.preventDefault(); _beginEdit(el); }
    });
  });
}

async function _clearStat(stat, el){
  const cur=_currentStatValue(stat);
  if(cur==null)return; // already empty — defensive
  const label=STAT_LABELS[stat]||stat;
  if(!confirm('Clear '+FK(cur)+' for '+label+'?'))return;
  const ok=await saveUwValue(stat, null, el);
  if(!ok)return;
  await reloadDealAndProperty();
  rerenderUwBar();
}

function _beginEdit(el){
  if(el.classList.contains('editing'))return;
  const stat=el.dataset.stat;
  const cur=_currentStatValue(stat);
  el.classList.add('editing');
  const input=document.createElement('input');
  input.type='number';
  input.min='0';
  input.step='1';
  input.value=_dollarsForInput(cur);
  el.innerHTML='';
  el.appendChild(input);
  input.focus();
  input.select();

  let committed=false;
  let cancelled=false;

  // Live profit recompute as Patty types.
  input.addEventListener('input', ()=>_liveProfitPreview(stat, input.value));
  input.addEventListener('keydown', async (e)=>{
    if(e.key==='Enter'){ e.preventDefault(); committed=true; await _commitEdit(el, stat, input.value); }
    else if(e.key==='Escape'){ e.preventDefault(); cancelled=true; _cancelEdit(el); }
  });
  input.addEventListener('blur', async ()=>{
    if(committed||cancelled)return;
    committed=true;
    await _commitEdit(el, stat, input.value);
  });
}

function _cancelEdit(el){
  el.classList.remove('editing');
  rerenderUwBar();
}

async function _commitEdit(el, stat, raw){
  const trimmed=(raw==null?'':String(raw).trim());
  // Empty → silent revert per brief.
  if(trimmed===''){ _cancelEdit(el); return; }
  const dollars=Number(trimmed);
  if(!isFinite(dollars)){ _showInlineError(el, 'invalid number'); setTimeout(()=>_cancelEdit(el), 100); return; }
  if(dollars<0){ _showInlineError(el, 'must be ≥ 0'); setTimeout(()=>_cancelEdit(el), 100); return; }
  if(dollars>50000000){ _showInlineError(el, 'value out of range (>$50M)'); setTimeout(()=>_cancelEdit(el), 100); return; }

  const ok=await saveUwValue(stat, dollars, el);
  if(!ok)return; // saveUwValue handles its own error display + leaves input open
  // Success — re-render the bar with fresh state.
  el.classList.remove('editing');
  await reloadDealAndProperty();
  rerenderUwBar();
}

async function saveUwValue(stat, dollarValue, el){
  const nowIso=new Date().toISOString();
  const activeMls=uwCtx?uwCtx.activeMls:null;
  let result;
  if(stat==='offer'){
    result=await sb.from('deals').update({offer_price:dollarValue, updated_at:nowIso}).eq('id', currentDeal.id);
  } else if(stat==='bought'){
    result=await sb.from('deals').update({purchase_price:dollarValue, updated_at:nowIso}).eq('id', currentDeal.id);
  } else if(stat==='arv'){
    if(!activeMls){ _showInlineError(el, 'no MLS# resolved'); return false; }
    result=await sb.from('properties').update({locked_arv:dollarValue, updated_at:nowIso}).eq('mls', activeMls);
  } else if(stat==='construction'){
    if(!activeMls){ _showInlineError(el, 'no MLS# resolved'); return false; }
    result=await sb.from('properties').update({locked_construction:dollarValue, updated_at:nowIso}).eq('mls', activeMls);
  } else {
    _showInlineError(el, 'unknown stat'); return false;
  }
  if(result && result.error){
    console.error('[BQ saveUwValue] failed', stat, result.error);
    _showInlineError(el, result.error.message||'save failed');
    return false;
  }
  return true;
}

// Refetch deal + active properties row so the bar re-renders against DB.
async function reloadDealAndProperty(){
  if(!currentDeal)return;
  const {data:dRow}=await sb.from('deals').select('*').eq('id', currentDeal.id).maybeSingle();
  if(dRow)currentDeal=dRow;
  const activeMls=uwCtx?uwCtx.activeMls:null;
  if(activeMls){
    const {data:pRow}=await sb.from('properties')
      .select('id, mls, address, city, zip, beds, baths, sqft, lot_size, pool, year_built, list_price, sale_price, sold_date, locked_arv, locked_construction, elementary_school, middle_school, high_school, elementary_rating, middle_rating, high_rating, agent_name, agent_email, agent_broker, double_ended, photo_count, change_type')
      .eq('mls', activeMls).maybeSingle();
    if(pRow)propertiesByMls[activeMls]=pRow;
  }
}

// Re-render only the underwriting bar in place. Calls renderPage() which
// rebuilds the full container — fine here because the page state
// (currentDeal, propertiesByMls, phaseHistory, dealMilestones, uwCtx)

function rerenderUwBar(){

  renderPage(uwCtx.arvRow, uwCtx.gradeRow, uwCtx.deCount);
}

// Live profit preview. Reads the in-progress input value for `editingStat`,
// pulls the other stats from currentDeal/primaryProperty(), recomputes,
// and writes into #uwProfit.
function _liveProfitPreview(editingStat, rawDollars){
  const trimmed=(rawDollars==null?'':String(rawDollars).trim());
  const dNum=trimmed===''?null:Number(trimmed);
  const inProgressDollars=(dNum!=null && isFinite(dNum) && dNum>=0)?dNum:null;

  const d=currentDeal;
  const p=primaryProperty();
  const buyIsOffer=(d.phase==='pursuing'||d.phase==='lost');
  let offer=buyIsOffer?d.offer_price:d.purchase_price;
  let arv=p?p.locked_arv:null;
  let construction=p?p.locked_construction:null;

  // ARV / construction fall back to auto sources when no lock is set
  // (matches renderPage). Only the deal_scores rehab_estimate +
  // arv_estimates headline_arv are reasonable defaults; pull from uwCtx.
  if(arv==null && uwCtx && uwCtx.arvRow && uwCtx.arvRow.headline_arv!=null)arv=uwCtx.arvRow.headline_arv;
  if(construction==null && uwCtx && uwCtx.gradeRow && uwCtx.gradeRow.rehab_estimate!=null)construction=uwCtx.gradeRow.rehab_estimate;

  if(editingStat==='offer'||editingStat==='bought')offer=inProgressDollars;
  else if(editingStat==='arv')arv=inProgressDollars;
  else if(editingStat==='construction')construction=inProgressDollars;

  const fc=uwCtx?uwCtx.dealScoresFC:null;
  const {dollar, pct}=recomputeProfit({offer, arv, construction, financingClosing:fc});
  const target=document.getElementById('uwProfit');
  if(!target)return;
  if(dollar==null){
    target.className='uw-value';
    target.style.color='var(--text-4)';
    target.textContent='— pending';
    return;
  }
  target.style.color='';
  target.className='uw-value uw-value-large '+(dollar>=0?'profit-pos':'profit-neg');
  const sign=dollar>=0?'+':'-';
  const dollars=FK(Math.abs(dollar));
  const pctStr=pct!=null?` <span style="font-size:13px;font-weight:600">(${(pct>=0?'+':'')}${pct.toFixed(1)}%)</span>`:'';
  target.innerHTML=`${sign}${dollars}${pctStr}`;
}

function renderHistoryList(){
  if(!phaseHistory.length){

  for(const h of phaseHistory){
    const fromLbl=h.from_phase?phaseLabel(h.from_phase):'(deal opened)';
    const toLbl=h.to_phase?phaseLabel(h.to_phase):'(deal closed)';

      ${h.note?`<div class="note">${escapeHtml(h.note)}</div>`:''}
    </li>`;

  html+='</ul>';
  return html;
}

// ========== PHASE TRANSITION ==========
async function moveStage(){
  if(saving)return;
  const sel=document.getElementById('newStageSelect');
  const noteEl=document.getElementById('moveNote');
  const btn=document.getElementById('moveBtn');
  const msgEl=document.getElementById('moveMsg');
  msgEl.className='move-msg';
  msgEl.textContent='';

  const raw=(sel.value||'').trim();
  if(!raw){
    msgEl.className='move-msg err';
    msgEl.textContent='Pick a phase first.';
    return;
  }
  const toPhase=raw;
  const fromPhase=currentDeal.phase;
  if(toPhase===fromPhase){
    msgEl.className='move-msg err';
    msgEl.textContent='Already in that phase.';
    return;
  }
  const note=(noteEl.value||'').trim()||null;
  const userId=(window.CURRENT_USER&&window.CURRENT_USER.id)||null;

  // Escrow date capture — all three required when transitioning to in_escrow.
  let escrowStart=null, targetClose=null, contingencyRemoval=null;
  if(toPhase==='in_escrow'){
    const startEl=document.getElementById('escrowStartInput');
    const closeEl=document.getElementById('targetCloseInput');
    const crdEl=document.getElementById('contingencyRemovalInput');
    escrowStart=(startEl&&startEl.value)||null;
    targetClose=(closeEl&&closeEl.value)||null;
    contingencyRemoval=(crdEl&&crdEl.value)||null;
    if(!escrowStart||!targetClose||!contingencyRemoval){
      msgEl.className='move-msg err';
      msgEl.textContent='Escrow start, physical contingency removal, and target close dates are all required when moving to In Escrow.';
      return;
    }
    if(contingencyRemoval<escrowStart){
      msgEl.className='move-msg err';
      msgEl.textContent='Physical contingency removal must be on or after escrow start.';
      return;
    }
    if(targetClose<contingencyRemoval){
      msgEl.className='move-msg err';
      msgEl.textContent='Target close must be on or after physical contingency removal.';
      return;
    }
  }

  saving=true;
  btn.disabled=true;
  msgEl.textContent='Saving...';

  // 1. Update the deal row (phase + maybe escrow dates).
  // The Postgres trigger from migration 027 fires server-side on phase
  // transition into in_escrow with all 3 dates set, seeding the
  // deal_milestones rows automatically. UI does NOT call seed_deal_milestones
  // here (moved to saveEscrowDates() for the date-edit path on already-
  // in_escrow deals).
  const updatePayload={phase: toPhase, updated_at: new Date().toISOString()};
  if(toPhase==='in_escrow'){
    updatePayload.escrow_start_date=escrowStart;
    updatePayload.target_close_date=targetClose;
    updatePayload.contingency_removal_date=contingencyRemoval;
  }
  const {error:dErr}=await sb.from('deals')
    .update(updatePayload)
    .eq('id', currentDeal.id);
  if(dErr){
    saving=false; btn.disabled=false;
    msgEl.className='move-msg err';
    msgEl.textContent='Deal update failed: '+dErr.message;
    return;
  }

  // 2. Append phase-history row.
  const {error:hErr}=await sb.from('deals_phase_history').insert({
    deal_id: currentDeal.id,
    from_phase: fromPhase,
    to_phase: toPhase,
    transitioned_by: userId,
    note: note,
  });
  if(hErr){
    saving=false; btn.disabled=false;
    msgEl.className='move-msg err';
    msgEl.textContent='History insert failed (phase update succeeded; reconcile later): '+hErr.message;
    return;
  }

  saving=false;
  btn.disabled=false;
  noteEl.value='';
  msgEl.className='move-msg ok';
  msgEl.textContent='Moved to '+phaseLabel(toPhase)+'.';
  await loadProject();

  // MG — after a successful transition into in_escrow, fire the loan
  // modal IFF zero deal_loans rows exist (D5 — idempotent on re-entry).
  // loadProject() above already refreshed dealLoans for the trigger guard.
  if(toPhase==='in_escrow' && dealLoans.length===0){
    openLoanModal();
  }
}

// ========== ESCROW DATES (date-only edits on already-in_escrow deals) ==========
let _userEditedTargetClose=false;
let _userEditedContingencyRemoval=false;

function onEscrowStartChange(){
  const start=document.getElementById('escrowStartInput').value;
  const closeInput=document.getElementById('targetCloseInput');
  const crdInput=document.getElementById('contingencyRemovalInput');
  if(start&&!_userEditedTargetClose&&closeInput&&!closeInput.value){
    const d=new Date(start+'T00:00:00');
    d.setDate(d.getDate()+30);
    closeInput.value=d.toISOString().slice(0,10);
  }
  if(start&&!_userEditedContingencyRemoval&&crdInput&&!crdInput.value){
    const d=new Date(start+'T00:00:00');
    d.setDate(d.getDate()+17);
    crdInput.value=d.toISOString().slice(0,10);
  }
}
function onTargetCloseChange(){_userEditedTargetClose=true;}
function onContingencyRemovalChange(){_userEditedContingencyRemoval=true;}
window.onEscrowStartChange=onEscrowStartChange;
window.onTargetCloseChange=onTargetCloseChange;
window.onContingencyRemovalChange=onContingencyRemovalChange;

// Show/hide the inline escrow dates row when the phase select changes.
document.addEventListener('change',e=>{
  if(!e.target||e.target.id!=='newStageSelect')return;
  const row=document.getElementById('escrowDatesRow');
  if(!row)return;
  if(e.target.value==='in_escrow'){
    row.style.display='flex';
    // Pre-fill from the deal record if user is just touching up.
    const startInput=document.getElementById('escrowStartInput');
    const closeInput=document.getElementById('targetCloseInput');
    const crdInput=document.getElementById('contingencyRemovalInput');
    if(currentDeal&&currentDeal.escrow_start_date&&!startInput.value){
      startInput.value=currentDeal.escrow_start_date;
    }
    if(currentDeal&&currentDeal.target_close_date&&!closeInput.value){
      closeInput.value=currentDeal.target_close_date;
      _userEditedTargetClose=true;
    }
    if(currentDeal&&currentDeal.contingency_removal_date&&crdInput&&!crdInput.value){
      crdInput.value=currentDeal.contingency_removal_date;
      _userEditedContingencyRemoval=true;
    }
  } else {
    row.style.display='none';
  }
});

             <div><span style="font-size:11px; color:var(--text-4); text-transform:uppercase; letter-spacing:.5px">Target close</span><div style="font-weight:600">${escapeHtml(fmtDate(close))}</div></div>

let _userEditedEsEditCRD=false;
function onEsEditStartChange(){
  const start=document.getElementById('esEditStart').value;
  const crdInput=document.getElementById('esEditCRD');
  if(start&&crdInput&&!_userEditedEsEditCRD&&!crdInput.value){
    const d=new Date(start+'T00:00:00');
    d.setDate(d.getDate()+17);
    crdInput.value=d.toISOString().slice(0,10);
  }
}
function onEsEditCRDChange(){_userEditedEsEditCRD=true;}
window.onEsEditStartChange=onEsEditStartChange;
window.onEsEditCRDChange=onEsEditCRDChange;

function openEscrowDatesEdit(){
  document.getElementById('escrowDates-display').style.display='none';
  document.getElementById('escrowDates-edit').style.display='block';
}
function cancelEscrowDatesEdit(){
  document.getElementById('escrowDates-edit').style.display='none';
  document.getElementById('escrowDates-display').style.display='flex';
  document.getElementById('esEditMsg').textContent='';
}

async function saveEscrowDates(){
  const startEl=document.getElementById('esEditStart');
  const closeEl=document.getElementById('esEditClose');
  const crdEl=document.getElementById('esEditCRD');
  const msgEl=document.getElementById('esEditMsg');
  const start=startEl.value||null;
  const close=closeEl.value||null;
  const crd=crdEl?(crdEl.value||null):null;
  msgEl.className='move-msg';
  msgEl.textContent='';
  if(!start||!close||!crd){
    msgEl.className='move-msg err';
    msgEl.textContent='Escrow start, physical contingency removal, and target close are all required.';
    return;
  }
  if(crd<start){
    msgEl.className='move-msg err';
    msgEl.textContent='Physical contingency removal must be on or after escrow start.';
    return;
  }
  if(close<crd){
    msgEl.className='move-msg err';
    msgEl.textContent='Target close must be on or after physical contingency removal.';
    return;
  }
  msgEl.textContent='Saving...';
  const {error}=await sb.from('deals').update({
    escrow_start_date: start,
    target_close_date: close,
    contingency_removal_date: crd,
    updated_at: new Date().toISOString(),
  }).eq('id', currentDeal.id);
  if(error){
    msgEl.className='move-msg err';
    msgEl.textContent='Save failed: '+error.message;
    return;
  }

  // Brief BK / D5 — keep the explicit RPC call here on the date-edit path.
  // The auto-seed trigger only fires on phase transition into in_escrow,
  // not on date-only updates of an already-in_escrow deal. Idempotent on
  // (deal_id, milestone_key).
  const{error:rpcErr}=await sb.rpc('seed_deal_milestones',{
    p_deal_id: currentDeal.id,
    p_escrow_start_date: start,
    p_target_close_date: close,
    p_contingency_removal_date: crd,
  });
  if(rpcErr)console.warn('[saveEscrowDates] seed_deal_milestones failed:',rpcErr.message);

  msgEl.className='move-msg ok';
  msgEl.textContent='Saved.';
  await loadProject();
}

window.openEscrowDatesEdit=openEscrowDatesEdit;
window.cancelEscrowDatesEdit=cancelEscrowDatesEdit;
window.saveEscrowDates=saveEscrowDates;

// MG — LOAN SECTION + MODAL (project-detail.html)
// ============================================================
//
// Renders one row per deal_loans row + a "+ Add loan" button. Inline-edit
// per BQ pattern (click cell → input swap → save-on-blur / Enter).
// Phase-transition modal fires from moveStage() when a deal lands in
// in_escrow with zero deal_loans rows (D5 — idempotent on bounce).

const LOAN_STATUSES=['pending','funded','extended','paid_off','cancelled'];
function loanStatusLabel(s){
  return ({pending:'pending',funded:'funded',extended:'extended',paid_off:'paid off',cancelled:'cancelled'})[s]||s;
}

// Round to nearest $1K — matches the brief's modal preview formula
// (loan_amount = round(purchase × ltc/100, -3)).
function _roundK(n){return Math.round(n/1000)*1000;}

// Reverse-derive LTC% for display from loan_amount + the deal's purchase
// price (or offer price as fallback for pursuing deals). Returns null if
// no usable purchase basis.
function _displayLtcPct(loanAmount){
  if(!currentDeal)return null;
  const basis=currentDeal.purchase_price||currentDeal.offer_price;
  if(!basis||basis<=0||loanAmount==null)return null;
  return (loanAmount/basis)*100;
}

function _capitalSourceName(id){
  const cs=capitalSources.find(c=>c.id===id);
  return cs?cs.name:'(unknown)';
}

function renderLoanSection(){
  const purchase=currentDeal?(currentDeal.purchase_price||currentDeal.offer_price||0):0;
  let body='';
  if(!dealLoans.length){
    body=`<div class="loan-empty">No loans recorded${purchase?` — purchase basis $${(_roundK(purchase)/1000).toLocaleString()}K available for LTC math.`:''}</div>`;
  } else {
    let rows='';
    for(const dl of dealLoans){
      const ltcPct=_displayLtcPct(dl.loan_amount);
      const ltcStr=ltcPct!=null?ltcPct.toFixed(0)+'%':'—';
      const ratePct=dl.rate_apr!=null?(dl.rate_apr*100).toFixed(2)+'%':'—';
      const termStr=dl.term_months!=null?dl.term_months+'mo':'—';
      const loanStr=dl.loan_amount!=null?FK(dl.loan_amount):'—';
      const statusCls='loan-status-'+(dl.status||'pending');
      rows+=`<tr data-loan-id="${escapeHtml(dl.id)}">
        <td><span class="loan-cell" data-loan-field="capital_source_id" data-loan-id="${escapeHtml(dl.id)}">${escapeHtml(_capitalSourceName(dl.capital_source_id))}</span></td>
        <td><span class="loan-cell" data-loan-field="ltc_pct" data-loan-id="${escapeHtml(dl.id)}">${escapeHtml(ltcStr)}</span></td>
        <td><span class="loan-cell" data-loan-field="loan_amount" data-loan-id="${escapeHtml(dl.id)}">${escapeHtml(loanStr)}</span></td>
        <td><span class="loan-cell" data-loan-field="rate_apr" data-loan-id="${escapeHtml(dl.id)}">${escapeHtml(ratePct)}</span></td>
        <td><span class="loan-cell" data-loan-field="term_months" data-loan-id="${escapeHtml(dl.id)}">${escapeHtml(termStr)}</span></td>
        <td><span class="loan-cell ${statusCls}" data-loan-field="status" data-loan-id="${escapeHtml(dl.id)}">${escapeHtml(loanStatusLabel(dl.status))}</span></td>
        <td><button class="loan-del" onclick="deleteLoan('${escapeHtml(dl.id)}')">Delete</button></td>
      </tr>`;
    }
    body=`<table class="loan-tbl">
      <thead><tr>
        <th>Lender</th><th>LTC%</th><th>Loan</th><th>Rate</th><th>Term</th><th>Status</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  // "+ Add loan" toggles a small inline form (lender + LTC% + rate + term).
  // Form is hidden by default; opens via showLoanAddForm().
  const addFormHtml=`
    <button class="loan-add-btn" id="loanAddBtn" onclick="showLoanAddForm()">+ Add loan</button>
    <div class="loan-add-form" id="loanAddForm" style="display:none">
      <div class="laf-field">
        <label>Lender</label>
        <select id="lafLender" onchange="onLafLenderChange()">
          ${capitalSources.map(c=>`<option value="${escapeHtml(c.id)}">${escapeHtml(c.name)}</option>`).join('')}
        </select>
      </div>
      <div class="laf-field">
        <label>LTC %</label>
        <input type="number" id="lafLtc" min="0" max="100" step="0.1" value="90" />
      </div>
      <div class="laf-field">
        <label>Rate %</label>
        <input type="number" id="lafRate" min="0" max="100" step="0.01" />
      </div>
      <div class="laf-field">
        <label>Term (mo)</label>
        <input type="number" id="lafTerm" min="1" step="1" value="12" />
      </div>
      <div class="laf-actions">
        <button class="lm-btn lm-btn-primary" onclick="saveLoanFromAddForm()">Save</button>
        <button class="lm-btn lm-btn-secondary" onclick="hideLoanAddForm()">Cancel</button>
      </div>
      <div class="laf-msg" id="lafMsg"></div>
    </div>
  `;

  return `
    <div class="section">
      <h2>Loan <span style="color:var(--text-4);font-weight:400;letter-spacing:0;text-transform:none">(owner only)</span></h2>
      ${body}
      ${addFormHtml}
    </div>
  `;
}

// Re-render only the Loan section in place. Avoids a full renderPage()
// round-trip when a single field is edited.
function rerenderLoanSection(){
  if(!currentDeal)return;
  const role=window.CURRENT_USER_ROLE;
  if(role!=='owner')return;
  // Find the existing Loan section by its h2 text and replace its parent
  // .section node. Cheap because there's only one match per page.
  const sections=document.querySelectorAll('.section');
  for(const sec of sections){
    const h2=sec.querySelector('h2');
    if(h2 && h2.textContent.trim().toLowerCase().startsWith('loan')){
      const tmp=document.createElement('div');
      tmp.innerHTML=renderLoanSection();
      sec.replaceWith(tmp.firstElementChild);
      wireLoanEdits();
      return;
    }
  }
}

// ---------- Inline edit ----------
function wireLoanEdits(){
  document.querySelectorAll('.loan-cell[data-loan-field]').forEach(el=>{
    el.addEventListener('click', ()=>_beginLoanEdit(el));
  });
}

function _beginLoanEdit(el){
  if(el.classList.contains('editing'))return;
  const loanId=el.dataset.loanId;
  const field=el.dataset.loanField;
  const dl=dealLoans.find(x=>x.id===loanId);
  if(!dl)return;
  el.classList.add('editing');

  let inputEl;
  if(field==='capital_source_id'){
    inputEl=document.createElement('select');
    for(const c of capitalSources){
      const opt=document.createElement('option');
      opt.value=c.id;
      opt.textContent=c.name;
      if(c.id===dl.capital_source_id)opt.selected=true;
      inputEl.appendChild(opt);
    }
  } else if(field==='status'){
    inputEl=document.createElement('select');
    for(const s of LOAN_STATUSES){
      const opt=document.createElement('option');
      opt.value=s;
      opt.textContent=loanStatusLabel(s);
      if(s===dl.status)opt.selected=true;
      inputEl.appendChild(opt);
    }
  } else {
    inputEl=document.createElement('input');
    inputEl.type='number';
    inputEl.step='0.01';
    inputEl.min='0';
    if(field==='ltc_pct'){
      const cur=_displayLtcPct(dl.loan_amount);
      inputEl.value=cur!=null?cur.toFixed(0):'';
      inputEl.max='100';
    } else if(field==='loan_amount'){
      inputEl.value=dl.loan_amount!=null?String(Math.round(dl.loan_amount)):'';
      inputEl.step='1';
    } else if(field==='rate_apr'){
      inputEl.value=dl.rate_apr!=null?(dl.rate_apr*100).toFixed(2):'';
      inputEl.max='100';
    } else if(field==='term_months'){
      inputEl.value=dl.term_months!=null?String(dl.term_months):'';
      inputEl.step='1';
    }
  }
  el.innerHTML='';
  el.appendChild(inputEl);
  inputEl.focus();
  if(inputEl.select)inputEl.select();

  let committed=false, cancelled=false;
  const commit=async ()=>{
    if(committed||cancelled)return;
    committed=true;
    await _commitLoanEdit(loanId, field, inputEl.value);
  };
  inputEl.addEventListener('keydown', async (e)=>{
    if(e.key==='Enter'){e.preventDefault();await commit();}
    else if(e.key==='Escape'){e.preventDefault();cancelled=true;rerenderLoanSection();}
  });
  inputEl.addEventListener('blur', commit);
  // Selects fire 'change' before 'blur' — let blur handle the commit so
  // the value is captured atomically. (Selects also commit on click-pick
  // because the click pulls focus away → blur fires.)
}

async function _commitLoanEdit(loanId, field, raw){
  const dl=dealLoans.find(x=>x.id===loanId);
  if(!dl){rerenderLoanSection();return;}
  const trimmed=(raw==null?'':String(raw).trim());

  // Empty → silent revert (no NULL writes).
  if(trimmed===''){rerenderLoanSection();return;}

  const updates={updated_at: new Date().toISOString()};
  let needsRecomputeLtcDisplay=false;

  if(field==='capital_source_id'){
    if(trimmed===dl.capital_source_id){rerenderLoanSection();return;}
    updates.capital_source_id=trimmed;
  } else if(field==='ltc_pct'){
    const ltc=Number(trimmed);
    if(!isFinite(ltc)||ltc<0||ltc>200){rerenderLoanSection();return;}
    const basis=currentDeal.purchase_price||currentDeal.offer_price;
    if(!basis||basis<=0){
      alert('Cannot compute loan amount — set Bought at / Offer at first.');
      rerenderLoanSection();
      return;
    }
    updates.loan_amount=_roundK(basis*ltc/100);
    needsRecomputeLtcDisplay=true;
  } else if(field==='loan_amount'){
    const amt=Number(trimmed);
    if(!isFinite(amt)||amt<0||amt>50000000){rerenderLoanSection();return;}
    updates.loan_amount=Math.round(amt);
    needsRecomputeLtcDisplay=true;
  } else if(field==='rate_apr'){
    const ratePct=Number(trimmed);
    if(!isFinite(ratePct)||ratePct<0||ratePct>100){rerenderLoanSection();return;}
    updates.rate_apr=ratePct/100;
  } else if(field==='term_months'){
    const t=Number(trimmed);
    if(!isFinite(t)||t<1||t>240){rerenderLoanSection();return;}
    updates.term_months=Math.round(t);
  } else if(field==='status'){
    if(!LOAN_STATUSES.includes(trimmed)){rerenderLoanSection();return;}
    updates.status=trimmed;
    // Auto-fill date columns on the canonical status flips.
    if(trimmed==='funded' && !dl.funded_date){
      updates.funded_date=todayStr();
    } else if(trimmed==='paid_off' && !dl.payoff_date){
      updates.payoff_date=todayStr();
    }
  } else {
    rerenderLoanSection();
    return;
  }

  const {error}=await sb.from('deal_loans').update(updates).eq('id', loanId);
  if(error){
    console.error('[MG _commitLoanEdit] failed', field, error);
    alert('Save failed: '+error.message);
    rerenderLoanSection();
    return;
  }
  await loadDealLoans();
  rerenderLoanSection();
}

async function saveLoanFromAddForm(){
  const sel=document.getElementById('lafLender');
  const ltcEl=document.getElementById('lafLtc');
  const rateEl=document.getElementById('lafRate');
  const termEl=document.getElementById('lafTerm');
  const msg=document.getElementById('lafMsg');
  msg.textContent='';
  if(!sel||!sel.value){msg.textContent='Pick a lender.';return;}
  const ltc=Number(ltcEl.value);
  if(!isFinite(ltc)||ltc<=0||ltc>200){msg.textContent='LTC must be 0–200.';return;}
  const ratePct=Number(rateEl.value);
  if(!isFinite(ratePct)||ratePct<0||ratePct>100){msg.textContent='Rate must be 0–100.';return;}
  const term=Number(termEl.value);
  if(!isFinite(term)||term<1||term>240){msg.textContent='Term must be 1–240 months.';return;}
  const basis=currentDeal.purchase_price||currentDeal.offer_price;
  if(!basis||basis<=0){msg.textContent='Set Bought at / Offer at first.';return;}

  const userId=(window.CURRENT_USER&&window.CURRENT_USER.id)||null;
  const insertRow={
    deal_id: currentDeal.id,
    capital_source_id: sel.value,
    loan_purpose: 'acquisition',
    status: 'pending',
    loan_amount: _roundK(basis*ltc/100),
    rate_apr: ratePct/100,
    term_months: Math.round(term),
    created_by: userId,
  };
  const {error}=await sb.from('deal_loans').insert(insertRow);
  if(error){msg.textContent='Save failed: '+error.message;return;}
  hideLoanAddForm();
  await loadDealLoans();
  rerenderLoanSection();
}

  const rateEl=document.getElementById('lmRate');

async function saveLoanFromModal(){
  const sel=document.getElementById('lmLender');
  const ltcEl=document.getElementById('lmLtc');
  const rateEl=document.getElementById('lmRate');
  const termEl=document.getElementById('lmTerm');
  const msg=document.getElementById('lmMsg');
  const btn=document.getElementById('lmSaveBtn');
  msg.textContent='';
  if(!sel.value){msg.textContent='Pick a lender.';return;}
  const ltc=Number(ltcEl.value);
  if(!isFinite(ltc)||ltc<=0||ltc>200){msg.textContent='LTC must be 0–200.';return;}
  const ratePct=Number(rateEl.value);
  if(!isFinite(ratePct)||ratePct<0||ratePct>100){msg.textContent='Rate must be 0–100.';return;}
  const term=Number(termEl.value);
  if(!isFinite(term)||term<1||term>240){msg.textContent='Term must be 1–240 months.';return;}
  const basis=currentDeal.purchase_price||currentDeal.offer_price;
  if(!basis||basis<=0){msg.textContent='Set Bought at / Offer at first to compute loan amount.';return;}

  btn.disabled=true;
  const userId=(window.CURRENT_USER&&window.CURRENT_USER.id)||null;
  const insertRow={
    deal_id: currentDeal.id,
    capital_source_id: sel.value,
    loan_purpose: 'acquisition',
    status: 'pending',
    loan_amount: _roundK(basis*ltc/100),
    rate_apr: ratePct/100,
    term_months: Math.round(term),
    created_by: userId,
  };
  const {error}=await sb.from('deal_loans').insert(insertRow);
  btn.disabled=false;
  if(error){msg.textContent='Save failed: '+error.message;return;}
  closeLoanModal();
  await loadDealLoans();
  rerenderLoanSection();
}
window.saveLoanFromModal=saveLoanFromModal;

// ========== INIT ==========
(async()=>{
  await window.authGate();
  if(!window.CURRENT_USER_ROLE)return;
  window.renderSidebar(null);
  await loadProject();
})();
</script>

<head>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBtxBe0q6i46rUomZzVE3BKmJ4EQNYGvvU&libraries=places&loading=async&v=weekly&callback=onMapsReady"></script>

<link rel="stylesheet" href="backstage.css">
<style>
  /* === COMP DB — local layout only === */
  .header { position:sticky;top:0;z-index:200;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:52px;padding:0 24px;display:flex;align-items:center;justify-content:space-between }

  .header h1 span { color: var(--text-3); font-weight: 400; }
  .logo { width: 32px; height: 32px; border-radius: var(--radius); background: var(--accent); display: grid; place-items: center; font-weight: 700; font-size: 14px; color: #fff; }
  .db-stats { display: flex; gap: 18px; font-size: 13px; color: var(--text-3); }
  .db-stats strong { color: var(--accent); font-weight: 600; }
  .ct-icon { width: 36px; height: 36px; border-radius: var(--radius); margin: 0 auto 8px; background: var(--accent); display: grid; place-items: center; font-weight: 700; font-size: 15px; color: #fff; }

  /* Photo lightbox (ported from mls-deals.html) */
  .lb-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:10000;display:none}
  .lb-overlay.open{display:block}
  .lb-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;z-index:10003}
  .lb-addr{position:absolute;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);color:#fff;font-size:14px;font-weight:600;z-index:10002;text-align:center;padding:0 60px}

  .lb-grid{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:repeat(2,1fr);gap:4px}
  .lb-grid img{width:100%;display:block;cursor:pointer;border-radius:2px}

  /* === BACKSTAGE SHELL === */
  html, body { height: 100vh; overflow: hidden; }

  .app-shell { display:flex; height:100vh; }

  .bs-sidebar { width:230px; background:var(--bg); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; transition:width .2s; }
  .bs-sidebar.collapsed { width:56px; }
  .bs-sidebar.collapsed .side-brand span, .bs-sidebar.collapsed .side-section-label, .bs-sidebar.collapsed .side-label, .bs-sidebar.collapsed .side-user-name, .bs-sidebar.collapsed .lock-btn { display:none; }
  .bs-sidebar.collapsed .side-brand { justify-content:center; padding:20px 0 18px; }
  .bs-sidebar.collapsed .side-item { justify-content:center; padding:10px 0; margin:0 8px 1px; }
  .bs-sidebar.collapsed .side-section { padding:12px 0 0; }
  .bs-sidebar.collapsed .side-footer { justify-content:center; padding:16px 0; }
  .bs-sidebar.collapsed .side-user { justify-content:center; }

  .side-brand { padding:20px 20px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .side-mark { width:26px; height:26px; border-radius:7px; background:var(--text); display:grid; place-items:center; font-weight:700; font-size:11px; color:#fff; }
  .side-brand span { font-size:14px; font-weight:600; color:var(--text); }
  .side-section { padding:6px 10px 0; }
  .side-section-label { font-size:9px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--text-4); padding:0 8px; margin-bottom:2px; }
  .side-item { display:flex; align-items:center; gap:8px; padding:3px 8px; border-radius:var(--radius); cursor:pointer; transition:all .12s; margin-bottom:0; text-decoration:none; line-height:1.3; }
  .side-item:hover { background:var(--bg-page); text-decoration:none; }
  .side-item.active { background:var(--bg-alt); }
  .side-item.active .side-icon svg { stroke:var(--text); }
  .side-item.active .side-label { color:var(--text); font-weight:600; }
  .side-icon { width:18px; height:18px; display:grid; place-items:center; }
  .side-icon svg { width:16px; height:16px; stroke:var(--text-4); stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .side-label { font-size:13px; font-weight:500; color:var(--text-3); }

  .side-footer { margin-top:auto; padding:16px 20px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }

  .cdb-rail{width:280px;flex-shrink:0;position:sticky;top:16px}

  .crhead span{font-size:11px;font-weight:700;color:var(--text-4);text-transform:uppercase;letter-spacing:.4px}

  .cr:hover{background:var(--accent-dim)}

  .cr .idx{font-size:12px;font-weight:700;color:var(--accent);text-align:center}
  .cr .addrcell{display:flex;align-items:center;gap:5px;min-width:0}
  .cr .caddr{color:var(--text);font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;border-bottom:1px dashed var(--text-4)}
  .cr .zi{width:11px;height:11px;opacity:.55;flex-shrink:0}
  .cr .d{font-size:12px;color:var(--text-3);text-align:right;white-space:nowrap}
  .cr .pr{font-size:13px;font-weight:600;color:var(--green);text-align:right}
  .cr .schools{display:flex;gap:3px;justify-content:flex-end}
  .cr .act{display:flex;gap:2px;justify-content:flex-end}
  .cr .act button{border:none;background:none;cursor:pointer;font-size:12px;padding:2px 3px;color:var(--text-4);font-family:inherit}

  .sp{display:inline-flex;align-items:center;gap:1px;font-size:11px;font-weight:600;padding:1px 4px;border-radius:4px}
  .sp .lv{font-size:8px;font-weight:700;opacity:.65;font-family:var(--sans,inherit)}
  .sp.sh{background:var(--green-bg);color:var(--green)}.sp.sm{background:var(--amber-bg);color:var(--amber)}.sp.sl{background:var(--red-bg);color:var(--red)}
  /* tier badges — T1 red -> T6 green gradient (matches mls-deals) */
  .tbadge{justify-self:start;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;line-height:1.2;white-space:nowrap}
  .tbadge.t1{background:rgba(192,57,43,.13);color:rgb(192,57,43)}
  .tbadge.t2{background:rgba(163,73,50,.13);color:rgb(163,73,50)}
  .tbadge.t3{background:rgba(133,89,57,.13);color:rgb(133,89,57)}
  .tbadge.t4{background:rgba(104,106,64,.13);color:rgb(104,106,64)}
  .tbadge.t5{background:rgba(74,122,71,.13);color:rgb(74,122,71)}
  .tbadge.t6{background:rgba(45,138,78,.13);color:rgb(45,138,78)}
  .tbadge.tq{background:var(--bg-alt);color:var(--text-4)}
  .tbadge.tdot{background:var(--purple-bg,#F3EFFF);color:var(--purple,#6D28D9)}
  /* editable tier chip (retag) */
  .cr .retag-wrap{justify-self:start}
  .retag-wrap{position:relative;display:inline-block}
  .retag-btn{padding:2px 16px 2px 6px;border:1px solid transparent;border-radius:4px;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;text-transform:uppercase;line-height:1.2;position:relative;white-space:nowrap}
  .retag-btn::after{content:'';position:absolute;right:5px;top:50%;transform:translateY(-30%);width:0;height:0;border-left:3px solid transparent;border-right:3px solid transparent;border-top:3px solid currentColor;opacity:.55}
  .retag-drop{display:none;position:absolute;top:100%;left:0;margin-top:2px;background:var(--bg);border:1px solid var(--border);border-radius:6px;box-shadow:0 6px 16px rgba(0,0,0,.12);z-index:999;min-width:230px;padding:4px 0}
  .retag-drop.open{display:block}
  .retag-drop button{display:block;width:100%;text-align:left;padding:5px 10px;border:none;background:none;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;line-height:1.4}
  .retag-drop button:hover{filter:brightness(0.95)}
</style>

<!-- APP SHELL -->
<div class="app-shell">

<!-- Sidebar (rendered by sidebar.js) -->

<!-- Main content -->

  <button class="tab active" data-panel="search">Search Comps</button>

<!-- SEARCH -->

          </div>
          <div class="cdb-two">
            <div class="field"><label>Radius</label><select id="f-radius"><option value="0.15">0.15 mi</option><option value="0.25" selected>0.25 mi</option><option value="0.5">0.5 mi</option><option value="0.75">0.75 mi</option><option value="1">1 mi</option></select></div>
            <div class="field"><label>Sold Within</label><select id="f-date-after"><option value="">Any</option><option value="1">1 month</option><option value="3">3 months</option><option value="6">6 months</option><option value="9">9 months</option><option value="12" selected>12 months</option><option value="18">18 months</option><option value="24">24 months</option><option value="36">36 months</option></select></div>

    <div class="cdb-main">
      <div id="search-mapband" style="display:none;margin-bottom:14px"><div id="search-map" style="height:300px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)"></div></div>
      <div id="search-comps-bar" class="comps-bar" style="display:none"><div class="ch" id="search-comps-count"></div><div class="cb-right"><span id="search-summary" class="cb-stat"></span><label><input type="checkbox" id="search-selectall" checked onchange="toggleAllComps(this,'search-summary')"> Select all</label></div></div>

<!-- BROWSE ALL -->
<div class="panel" id="panel-browse">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:12px">
    <h3 style="font-size:15px;font-weight:600">All Comps <span id="browseCount" style="color:var(--text-3);font-weight:400"></span></h3>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <input type="text" id="b-search" placeholder="Search address..." oninput="clearTimeout(window._bsTimer);window._bsTimer=setTimeout(loadBrowse,400)" style="padding:8px 12px;font-size:13px;font-family:inherit;background:var(--bg-page);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;width:220px">
      <div class="field" style="margin:0"><select id="b-city" onchange="loadBrowse()" style="padding:8px 12px;font-size:13px;font-family:inherit;background:var(--bg-page);border:1px solid var(--border);border-radius:var(--radius);color:var(--text)"><option value="">All Cities</option></select></div>
      <div class="field" style="margin:0"><select id="b-missing" onchange="loadBrowse()" style="padding:8px 12px;font-size:13px;font-family:inherit;background:var(--bg-page);border:1px solid var(--border);border-radius:var(--radius);color:var(--text)"><option value="">All Data</option><option value="no-school">Missing Schools</option><option value="no-geo">Missing Geocode</option></select></div>

<!-- MISSING SCHOOLS -->





<!-- Photo Lightbox -->
<div class="lb-overlay" id="photoLightbox">
  <div class="lb-addr" id="lbAddr"></div>
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <div class="lb-scroll"><div class="lb-grid" id="lbGrid"></div></div>
</div>

<script>
const SUPABASE_URL='https://pwrnywsojomrygsiezzi.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3cm55d3Nvam9tcnlnc2llenppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzE1OTMsImV4cCI6MjA4OTgwNzU5M30.tGewn18t-6dN_bMXjC-Z820zFYvL1VUu3BDhfW1ZoNk';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
window.sb=sb;  // expose for auth.js

async function init(){await updateStats();await populateDropdowns();setupTabs();/* autocomplete inits via onMapsReady callback */}

// ========== PHOTO LIGHTBOX (ported from mls-deals.html) ==========
const PHOTO_BASE='https://photos.dottyhomes.com';
const photoCountCache={};
let lbMls='';

async function fetchPhotoCount(mls){
  if(photoCountCache[mls]!=null)return photoCountCache[mls];
  const url=`${PHOTO_BASE}/${mls}/`;
  try{
    const res=await fetch(url);
    console.log('[fetchPhotoCount] url=',url,'status=',res.status,'ok=',res.ok);
    if(!res.ok)return null;
    const txt=await res.text();
    const matches=txt.match(new RegExp(`${mls}_\\d+\\.jpg`,'gi'));
    const uniq=matches?new Set(matches.map(s=>s.toLowerCase())):new Set();
    const count=uniq.size;
    console.log('[fetchPhotoCount] matched',count,'unique photos for mls=',mls);
    photoCountCache[mls]=count;
    return count;
  }catch(e){console.warn('[fetchPhotoCount] fetch error for',url,e);return null;}
}

function openLightbox(mls,addr){
  if(!mls){alert('No MLS number on this comp — cannot load photos.');return;}
  lbMls=mls;
  const myMls=mls;
  const addrEl=document.getElementById('lbAddr');
  addrEl.textContent=addr+' (loading…)';
  const grid=document.getElementById('lbGrid');
  grid.innerHTML='';
  document.getElementById('photoLightbox').classList.add('open');
  document.addEventListener('keydown',lbKeyHandler);
  fetchPhotoCount(mls).then(total=>{
    if(lbMls!==myMls)return;
    if(total!=null){
      addrEl.textContent=addr+(total===0?' (no photos)':' ('+total+(total===1?' photo':' photos')+')');
    }
    let i=1;
    function loadNext(){
      if(lbMls!==myMls)return;
      if(total!=null&&i>total)return;
      const num=String(i).padStart(2,'0');
      const url=`${PHOTO_BASE}/${mls}/${mls}_${num}.jpg`;
      const img=new Image();
      img.onload=function(){
        if(lbMls!==myMls)return;
        const el=document.createElement('img');
        el.src=url;
        el.onclick=function(){
          if(this.classList.contains('lb-full')){this.classList.remove('lb-full');}
          else{document.querySelectorAll('.lb-grid img.lb-full').forEach(x=>x.classList.remove('lb-full'));this.classList.add('lb-full');}
        };
        grid.appendChild(el);
        if(total==null)addrEl.textContent=addr+' ('+i+(i===1?' photo':' photos')+')';
        i++;
        loadNext();
      };
      img.onerror=function(){
        if(lbMls!==myMls)return;
        const count=i-1;
        if(total==null){
          photoCountCache[mls]=count;
          if(count===0)addrEl.textContent=addr+' (no photos)';
        }
      };
      img.src=url;
    }
    loadNext();
  });
}
function closeLightbox(){
  lbMls='';
  document.getElementById('photoLightbox').classList.remove('open');
  document.removeEventListener('keydown',lbKeyHandler);
}
function lbKeyHandler(e){
  if(e.key==='Escape'){
    const full=document.querySelector('.lb-grid img.lb-full');
    if(full)full.classList.remove('lb-full');
    else closeLightbox();
  }
}

// Open photo lightbox for a comp by id (looks up MLS from the rendered row data)
async function viewCompPhotos(id){
  const{data:r}=await sb.from('properties').select('mls,address,city,zip').eq('id',id).single();
  if(!r){alert('Comp not found');return;}
  const fullAddr=(r.address||'')+', '+(r.city||'')+(r.zip?' '+r.zip:'');
  console.log('[viewCompPhotos] id=',id,'mls=',JSON.stringify(r.mls),'addr=',fullAddr);
  openLightbox(r.mls,fullAddr);
}

// Called by Google Maps script via callback param. Guaranteed to run after places library is loaded.
window.onMapsReady=function(){try{initAutocomplete();}catch(e){console.error('[onMapsReady] initAutocomplete failed:',e);}};

// Header stats row was removed — no-op kept so existing callers stay valid.
async function updateStats(){}

async function populateDropdowns(){
  try {
    // Get cities - use a separate focused query
    let cityRows=null;try{const r=await sb.rpc('get_distinct_cities');cityRows=r.data;}catch(e){cityRows=null;}
    let uc;
    if(cityRows){
      uc=cityRows.map(r=>r.city).filter(Boolean).sort();
    } else {
      // Fallback: paginate to get all cities
      let allCities=[];
      for(let p=0;p<10;p++){
        const{data}=await sb.from('properties').select('city').eq('change_type','sold').range(p*1000,(p+1)*1000-1);
        if(!data?.length)break;
        allCities=allCities.concat(data.map(r=>r.city));
      }
      uc=[...new Set(allCities)].filter(Boolean).sort();
    }
    console.log('Unique cities:',uc);
    const cs=document.getElementById('f-city');cs.innerHTML='<option value="">All Cities</option>';
    uc.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;cs.appendChild(o);});
    
    // Schools - these are fewer, single query is fine
    const{data:schoolData}=await sb.from('properties').select('elementary_school,elementary_rating,middle_school,middle_rating,high_school,high_rating').eq('change_type','sold').not('elementary_school','is',null).limit(1000);
    const addS=(sid,col,rcol)=>{
      const el=document.getElementById(sid);if(!el)return;const seen=new Set();el.innerHTML='<option value="">All</option>';
      (schoolData||[]).forEach(r=>{if(!r[col]||seen.has(r[col]))return;seen.add(r[col]);const o=document.createElement('option');o.value=r[col];o.textContent=(r[rcol]?`(${r[rcol]}) `:'')+r[col];el.appendChild(o);});
    };
    addS('s-high','high_school','high_rating');
    addS('s-elem','elementary_school','elementary_rating');
    addS('s-mid','middle_school','middle_rating');
  } catch(e){console.error('populateDropdowns error:',e);}
}

function setupTabs(){document.querySelectorAll('.tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));t.classList.add('active');document.getElementById('panel-'+t.dataset.panel).classList.add('active');});});}


// Columns actually read by renderResults + cdbTierEditor/cdbUpdateTier +
// updateSummary + the search map markers, shared by both the search and browse
// queries. Selecting these instead of '*' avoids shipping ~30 unused wide
// columns (remarks, agent contacts, photo metadata, etc.) per row.
const COMP_COLS='id,address,city,beds,baths,sqft,lot_size,sale_price,ppsf,sold_date,latitude,longitude,elementary_rating,middle_rating,high_rating,is_dotty,condition_tier,value_driver_rooms_updated,condition_overridden';
async function runSearch(){
  const v=id=>document.getElementById(id).value;
  const addr=v('f-address').trim(),miles=parseFloat(v('f-radius'));
  let sLat=null,sLng=null;
  const el=document.getElementById('search-results');el.innerHTML='<div class="loading">Searching...</div>';
  const mapDiv=document.getElementById('search-map');
  
  if(addr){
    console.log('[runSearch] geocoding address:',addr);
    // Strategy 0: Use Places Autocomplete coords if user selected from dropdown
    if(autocompleteLat){sLat=autocompleteLat;sLng=autocompleteLng;console.log('[runSearch] using Autocomplete coords:',sLat,sLng);}
    // Strategy 1: Look up in our own database
    if(!sLat){
      try{
        const streetAddr=addr.split(',')[0].trim();
        const{data:dbMatch}=await sb.from('properties').select('latitude,longitude').ilike('address','%'+streetAddr+'%').not('latitude','is',null).limit(1);
        if(dbMatch?.length&&dbMatch[0].latitude){sLat=dbMatch[0].latitude;sLng=dbMatch[0].longitude;console.log('[runSearch] DB lookup matched:',sLat,sLng);}
      }catch(e){}
    }
    // Strategy 2: Google Maps Geocoding API
    if(!sLat){
      try{const r=await fetch('https://maps.googleapis.com/maps/api/geocode/json?address='+encodeURIComponent(addr)+'&key='+GOOGLE_GEO_KEY);
        const d=await r.json();
        if(d.status==='OK'&&d.results?.length){sLat=d.results[0].geometry.location.lat;sLng=d.results[0].geometry.location.lng;}
      }catch(e){}
    }
    // Strategy 3: US Census Geocoder (HTTPS only)
    if(!sLat){
      try{const r=await fetch('https://geocoding.geo.census.gov/geocoder/locations/onelineaddress?address='+encodeURIComponent(addr)+'&benchmark=Public_AR_Current&format=json');
        const d=await r.json();const m=d?.result?.addressMatches;
        if(m?.length){sLat=m[0].coordinates.y;sLng=m[0].coordinates.x;}
      }catch(e){}
    }
    if(!sLat){el.innerHTML='<div class="empty-state"><h3>Address not found</h3><p>Select an address from the autocomplete dropdown, or try a different format.</p></div>';return;}
  }
  
  let q=sb.from('properties').select(COMP_COLS).eq('change_type','sold');
  
  // If we have a subject address, add bounding box to Supabase query
  if(sLat!==null){
    const milesForBox=Math.max(miles*1.5,2);// slightly larger than radius to catch edge cases
    const latDeg=milesForBox/69;
    const lngDeg=milesForBox/(69*Math.cos(sLat*Math.PI/180));
    q=q.gte('latitude',sLat-latDeg).lte('latitude',sLat+latDeg).gte('longitude',sLng-lngDeg).lte('longitude',sLng+lngDeg);
  }
  
  if(v('f-city'))q=q.eq('city',v('f-city'));
  if(v('f-sqft')){const s=parseInt(v('f-sqft'));const tol=parseInt(v('f-sqft-tol'))||150;q=q.gte('sqft',s-tol).lte('sqft',s+tol);}
  if(v('f-date-after')){const months=parseInt(v('f-date-after'));const d=new Date();d.setMonth(d.getMonth()-months);q=q.gte('sold_date',d.toISOString().split('T')[0]);}
  q=q.order('sold_date',{ascending:false}).limit(1000);
  const{data:rows,error}=await q;
  if(error){el.innerHTML=`<div class="empty-state"><p>${error.message}</p>`;return;}
  let filtered=rows||[];const showDist=sLat!==null;
  if(showDist){const toR=d=>d*Math.PI/180;const hav=(a,b,c,d)=>{const dl=toR(c-a),dn=toR(d-b);const x=Math.sin(dl/2)**2+Math.cos(toR(a))*Math.cos(toR(c))*Math.sin(dn/2)**2;return 3959*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));};filtered=filtered.filter(r=>r.latitude).map(r=>{r.distance=hav(sLat,sLng,r.latitude,r.longitude);return r;}).filter(r=>r.distance<=miles);}
  // Sort by newest first
  filtered.sort((a,b)=>(b.sold_date||'').localeCompare(a.sold_date||''));
  
  const mapband=document.getElementById('search-mapband');
  const bar=document.getElementById('search-comps-bar');
  renderResults(filtered,'search-results','search-summary',showDist);
  document.getElementById('search-comps-count').textContent='Comps ('+filtered.length+')'+(showDist?' · within '+miles+' mi':'');
  bar.style.display=filtered.length?'flex':'none';
  const sa=document.getElementById('search-selectall');if(sa)sa.checked=true;

  if(sLat&&filtered.length){
    // Interactive Google Map band above the comp rows
    mapband.style.display='';
    mapDiv.innerHTML='';
    const map=new google.maps.Map(mapDiv,{zoom:14,center:{lat:sLat,lng:sLng},mapTypeControl:false,streetViewControl:false});
    const bounds=new google.maps.LatLngBounds();
    // Subject marker (red)
    new google.maps.Marker({position:{lat:sLat,lng:sLng},map,label:{text:'S',color:'#fff',fontWeight:'bold'},icon:{path:google.maps.SymbolPath.CIRCLE,scale:14,fillColor:'#c44040',fillOpacity:1,strokeColor:'#fff',strokeWeight:2},title:'Subject Property',zIndex:1000});
    bounds.extend({lat:sLat,lng:sLng});
    // Comp markers (blue numbered)
    filtered.slice(0,20).forEach((r,i)=>{if(!r.latitude)return;
      new google.maps.Marker({position:{lat:r.latitude,lng:r.longitude},map,label:{text:String(i+1),color:'#fff',fontWeight:'bold',fontSize:'11px'},icon:{path:google.maps.SymbolPath.CIRCLE,scale:12,fillColor:'#3074a8',fillOpacity:1,strokeColor:'#fff',strokeWeight:2},title:`${i+1}. ${r.address} - $${(r.sale_price||0).toLocaleString()}`});
      bounds.extend({lat:r.latitude,lng:r.longitude});
    });
    map.fitBounds(bounds);
    if(filtered.length<=2)map.setZoom(15);
  } else {
    mapband.style.display='none';
  }
}
function clearSearch(){['f-address','f-city','f-sqft','f-date-after'].forEach(id=>document.getElementById(id).value='');document.getElementById('f-radius').value='0.25';document.getElementById('f-sqft-tol').value='150';document.getElementById('search-results').innerHTML='';document.getElementById('search-summary').style.display='none';document.getElementById('search-mapband').style.display='none';document.getElementById('search-comps-bar').style.display='none';}

// ===== Condition-tier retag (ported from mls-deals.html) =====
// Click the tier chip on a comp row -> dropdown -> writes condition_tier
// (+ value_driver_rooms_updated, is_dotty, condition_overridden) to the
// properties row by id. comp_type is intentionally NOT written (retired).
const TIER_OPTS=[
  [6,'T6','Tier 6 — Full flip (highest sale)'],
  ['5A','T5-A','Tier 5-A — Half-flip, kitchen + bath both updated'],
  ['5B','T5-B','Tier 5-B — Half-flip, one of kitchen/bath updated'],
  ['5C','T5-C','Tier 5-C — Half-flip, both original (flip opportunity)'],
  [4,'T4','Tier 4 — Lived-in flip'],
  [3,'T3','Tier 3 — Modern owner-grade'],
  [2,'T2','Tier 2 — Dated (livable)'],
  [1,'T1','Tier 1 — Distressed (lowest sale)'],
  ['null','NULL','Null — not enough data to judge condition'],
];
const SUBTIER5_LABEL={2:'A',1:'B',0:'C'};
function _keyTier(k){if(k==='5A'||k==='5B'||k==='5C')return 5;if(k==='null'||k==='dotty')return null;return Number(k);}
function _keyToPayload(newKey){
  const map={'5A':2,'5B':1,'5C':0};
  if(newKey==='null')return{condition_tier:null,value_driver_rooms_updated:null,is_dotty:false};
  if(newKey==='dotty')return{condition_tier:6,value_driver_rooms_updated:null,is_dotty:true};
  if(newKey in map)return{condition_tier:5,value_driver_rooms_updated:map[newKey],is_dotty:false};
  return{condition_tier:Number(newKey),value_driver_rooms_updated:null,is_dotty:false};
}
// 3 color buckets (anchored on the old T1/T4/T6 gradient stops):
//   low  (T1 red,   gradient tier 1): T1, T2
//   mid  (T4 olive, gradient tier 4): T3, T5-B, T5-C
//   high (T6 green, gradient tier 6): T4, T5-A, T6
function _tierBucket(tier,vdru){
  if(tier===5)return vdru===2?6:4; // 5A->high, 5B/5C->mid
  if(tier===1||tier===2)return 1;  // low
  if(tier===3)return 4;            // mid
  if(tier===4||tier===6)return 6;  // high
  return tier;
}
function _tierColors(tier,vdru,isDotty){
  if(isDotty)return{bg:'var(--purple-bg)',col:'var(--purple)'};
  if(!tier||tier<1||tier>6)return{bg:'var(--bg-alt)',col:'var(--text-4)'};
  const t=(_tierBucket(tier,vdru)-1)/5,r=Math.round(192+(45-192)*t),g=Math.round(57+(138-57)*t),b=Math.round(43+(78-43)*t);
  return{bg:`rgba(${r},${g},${b},0.13)`,col:`rgb(${r},${g},${b})`};
}
function _tierChipLabel(tier,vdru,isDotty,ov){
  if(isDotty)return'DOTTY';
  if(tier===5){const k=SUBTIER5_LABEL[vdru];return k?('T5-'+k):'T5';}
  if(tier)return'T'+tier;
  return ov?'null':'?';
}
function _tierCurrentKey(tier,vdru,isDotty,ov){
  if(isDotty)return'dotty';
  if(tier===5){const k=SUBTIER5_LABEL[vdru];return k?('5'+k):null;}
  if(tier)return tier;
  return ov?'null':null;
}
function cdbTierEditor(r){
  const isDotty=r.is_dotty===true,tier=r.condition_tier,vdru=r.value_driver_rooms_updated,ov=r.condition_overridden===true;
  const currentKey=_tierCurrentKey(tier,vdru,isDotty,ov);
  const{bg,col}=_tierColors(tier,vdru,isDotty);
  const chip=_tierChipLabel(tier,vdru,isDotty,ov);
  const dropId='cdb-retag-'+r.id;
  const opts=TIER_OPTS.map(([v,_c,full])=>{const oc=_tierColors(_keyTier(v),({'5A':2,'5B':1,'5C':0}[v]??null),v==='dotty');const cur=v===currentKey;return`<button onclick="event.stopPropagation();cdbSetTier(${r.id},'${v}')" style="background:${oc.bg};color:${oc.col};${cur?'font-weight:800;':''}">${full}${cur?' ✓':''}</button>`;}).join('');
  return`<span class="retag-wrap" id="cdb-tier-${r.id}"><button class="retag-btn" title="Set condition tier" style="background:${bg};color:${col}" onclick="event.stopPropagation();toggleCompDrop('${dropId}')">${chip}</button><div id="${dropId}" class="retag-drop">${opts}</div></span>`;
}
function toggleCompDrop(dropId){const d=document.getElementById(dropId);if(!d)return;const open=d.classList.contains('open');document.querySelectorAll('.retag-drop.open').forEach(x=>x.classList.remove('open'));if(!open)d.classList.add('open');}
function cdbSetTier(id,newKey){document.querySelectorAll('.retag-drop.open').forEach(d=>d.classList.remove('open'));cdbUpdateTier(id,newKey);}
async function cdbUpdateTier(id,newKey){
  const cols=_keyToPayload(newKey);
  const payload={...cols,condition_overridden:true,updated_at:new Date().toISOString()};
  const r=_lastRenderedRows.find(x=>x&&x.id===id);
  const prev=r?{t:r.condition_tier,v:r.value_driver_rooms_updated,d:r.is_dotty,o:r.condition_overridden}:null;
  const repaint=()=>{const cell=document.getElementById('cdb-tier-'+id);if(r&&cell)cell.outerHTML=cdbTierEditor(r);};
  if(r){r.condition_tier=cols.condition_tier;r.value_driver_rooms_updated=cols.value_driver_rooms_updated;r.is_dotty=cols.is_dotty;r.condition_overridden=true;repaint();}
  const{error}=await sb.from('properties').update(payload).eq('id',id);
  if(error){alert('Set tier failed: '+error.message);if(r&&prev){r.condition_tier=prev.t;r.value_driver_rooms_updated=prev.v;r.is_dotty=prev.d;r.condition_overridden=prev.o;repaint();}}
}
document.addEventListener('click',e=>{document.querySelectorAll('.retag-drop.open').forEach(d=>{const w=d.closest('.retag-wrap');if(!w||!w.contains(e.target))d.classList.remove('open');});});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.retag-drop.open').forEach(d=>d.classList.remove('open'));});

let _lastRenderedRows=[];
function renderResults(rows,cid,sid,showDist=false){
  const c=document.getElementById(cid),s=document.getElementById(sid);
  if(!rows.length){c.innerHTML='<div class="empty-state"><h3>No comps found</h3></div>';s.style.display='none';return;}
  _lastRenderedRows=rows;
  updateSummary(rows,sid);
  const zUrl=a=>`https://www.zillow.com/homes/${encodeURIComponent(a)}`;
  const rUrl=a=>`https://www.google.com/search?q=${encodeURIComponent('redfin '+a)}&btnI=1`;
  const sp=(rt,lv)=>{if(rt==null||rt==='')return'';const cl=rt>=7?'sh':rt>=5?'sm':'sl';return`<span class="sp ${cl}"><span class="lv">${lv}</span>${rt}</span>`;};
  let h='<div class="cr-wrap"><div class="crhead"><span></span><span></span><span>Tier</span><span>Address</span><span class="r">Dist</span><span class="r">Bd/Ba</span><span class="r">SqFt</span><span class="r">Lot</span><span class="r">Price</span><span class="r">$/SF</span><span class="r">Sold</span><span class="r">E·M·H</span></div>';
  rows.forEach((r,i)=>{const fullAddr=(r.address||'')+', '+(r.city||'')+', CA';
    h+=`<div class="cr" id="row-${r.id}">`
      +`<input type="checkbox" checked class="comp-check" data-idx="${i}" onchange="recalcSummary('${sid}')">`
      +`<span class="idx">${i+1}</span>`
      +cdbTierEditor(r)
      +`<span class="addrcell"><span class="caddr" onclick="viewCompPhotos(${r.id})" title="View photos">${r.address||''}</span><a href="${zUrl(fullAddr)}" target="_blank" title="Zillow" onclick="event.stopPropagation()"><img class="zi" src="https://www.zillow.com/favicon.ico" onerror="this.style.display='none'"></a><a href="${rUrl(fullAddr)}" target="_blank" title="Redfin" onclick="event.stopPropagation()"><img class="zi" src="https://www.redfin.com/favicon.ico" onerror="this.style.display='none'"></a></span>`
      +`<span class="d">${showDist&&r.distance!=null?r.distance.toFixed(2)+'mi':'—'}</span>`
      +`<span class="d">${r.beds||'—'}/${r.baths||'—'}</span>`
      +`<span class="d">${r.sqft?r.sqft.toLocaleString():'—'}</span>`
      +`<span class="d">${r.lot_size?r.lot_size.toLocaleString():'—'}</span>`
      +`<span class="pr">${r.sale_price?'$'+r.sale_price.toLocaleString():'—'}</span>`
      +`<span class="d">${r.ppsf?'$'+r.ppsf.toFixed(0):'—'}</span>`
      +`<span class="d">${r.sold_date||'—'}</span>`
      +`<span class="schools">${sp(r.elementary_rating,'E')}${sp(r.middle_rating,'M')}${sp(r.high_rating,'H')}</span>`
      +`</div>`;});
  c.innerHTML=h+'</div>';
}
function updateSummary(rows,sid){
  const s=document.getElementById(sid);if(!s)return;
  const ppsfs=rows.map(r=>r.ppsf).filter(Boolean);
  const avg=a=>a.length?a.reduce((x,v)=>x+v,0)/a.length:0;
  s.innerHTML=`Avg $/SF <b>$${Math.round(avg(ppsfs))}</b>`;
}
function recalcSummary(sid){
  const checks=document.querySelectorAll('.comp-check');
  const checked=[];checks.forEach(cb=>{if(cb.checked)checked.push(_lastRenderedRows[parseInt(cb.dataset.idx)]);});
  updateSummary(checked.length?checked:_lastRenderedRows,sid);
}
function toggleAllComps(masterCb,sid){
  document.querySelectorAll('.comp-check').forEach(cb=>cb.checked=masterCb.checked);
  recalcSummary(sid);
}

// =========================================================
// BROWSE ALL
// =========================================================
let browsePage = 0;
const BROWSE_LIMIT = 50;
let _browseCount = null, _browseCountKey = null;  // cached browse total + the filter sig it was counted for

async function loadBrowse() {
  browsePage = 0;
  await fetchBrowsePage();
}

async function browsePrev() { if (browsePage > 0) { browsePage--; await fetchBrowsePage(); } }
async function browseNext() { browsePage++; await fetchBrowsePage(); }

async function fetchBrowsePage() {
  const el = document.getElementById('browseResults');
  el.innerHTML = '<div class="loading">Loading...</div>';

  const city = document.getElementById('b-city').value;
  const missing = document.getElementById('b-missing').value;
  const search = document.getElementById('b-search').value.trim();

  // The exact row count only changes when the FILTER changes, not when paging.
  // Run count:'exact' (a full count over ~22k rows) only for a new filter set;
  // reuse the cached total when merely turning pages.
  const filterKey = JSON.stringify({ city, missing, search });
  const needCount = filterKey !== _browseCountKey;

  let query = sb.from('properties').select(COMP_COLS, needCount ? { count: 'exact' } : undefined).eq('change_type','sold');
  if (search) query = query.ilike('address', `%${search}%`);
  if (city) query = query.eq('city', city);
  if (missing === 'no-school') query = query.is('elementary_school', null);
  if (missing === 'no-geo') query = query.is('latitude', null);

  query = query.order('city').order('address').range(browsePage * BROWSE_LIMIT, (browsePage + 1) * BROWSE_LIMIT - 1);
  const { data: rows, count, error } = await query;

  if (error) { el.innerHTML = `<div class="empty-state"><p>${error.message}</p></div>`; return; }
  if (!rows?.length) { el.innerHTML = '<div class="empty-state"><h3>No comps found</h3></div>'; return; }

  if (needCount) { _browseCount = count || 0; _browseCountKey = filterKey; }
  const total = _browseCount || 0;
  const totalPages = Math.ceil(total / BROWSE_LIMIT);
  document.getElementById('browseCount').textContent = `(${total.toLocaleString()} total)`;
  document.getElementById('browsePageInfo').textContent = `Page ${browsePage + 1} of ${totalPages}`;

  // Populate the browse city dropdown once (it never changes after init) rather
  // than re-parsing the full option list on every page turn.
  const bCity = document.getElementById('b-city');
  if (bCity.options.length <= 1) {
    const currentVal = bCity.value;
    bCity.innerHTML = document.getElementById('f-city').innerHTML;
    bCity.value = currentVal;
  }

  renderResults(rows, 'browseResults', 'search-summary', false);
  document.getElementById('search-summary').style.display = 'none';
}

// Auto-load browse when tab is clicked
const origSetupTabs = setupTabs;
setupTabs = function() {
  origSetupTabs();
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      if (tab.dataset.panel === 'browse' && document.getElementById('browseResults').innerHTML === '') {
        loadBrowse();
      }
    });
  });
};

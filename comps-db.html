<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comps DB — Backstage</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBtxBe0q6i46rUomZzVE3BKmJ4EQNYGvvU&libraries=places&loading=async&v=weekly&callback=onMapsReady"></script>
<script src="auth.js"></script>
<script src="sidebar.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="backstage.css">
<style>
  /* === COMP DB — local layout only === */
  .header { position:sticky;top:0;z-index:200;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:52px;padding:0 24px;display:flex;align-items:center;justify-content:space-between }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header h1 { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; color: var(--accent); margin: 0; }
  .header h1 span { color: var(--text-3); font-weight: 400; }
  .logo { width: 32px; height: 32px; border-radius: var(--radius); background: var(--accent); display: grid; place-items: center; font-weight: 700; font-size: 14px; color: #fff; }
  .db-stats { display: flex; gap: 18px; font-size: 13px; color: var(--text-3); }
  .db-stats strong { color: var(--accent); font-weight: 600; }
  .ct-icon { width: 36px; height: 36px; border-radius: var(--radius); margin: 0 auto 8px; background: var(--accent); display: grid; place-items: center; font-weight: 700; font-size: 15px; color: #fff; }
  .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

  /* Fix Google Places autocomplete dropdown z-index */
  .pac-container { z-index: 99999 !important; }

  /* Photo lightbox (ported from mls-deals.html) */
  .lb-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:10000;display:none}
  .lb-overlay.open{display:block}
  .lb-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;z-index:10003}
  .lb-addr{position:absolute;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);color:#fff;font-size:14px;font-weight:600;z-index:10002;text-align:center;padding:0 60px}
  .lb-scroll{position:absolute;top:52px;left:0;right:0;bottom:0;overflow-y:auto;padding:20px 20px 40px}
  .lb-grid{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:repeat(2,1fr);gap:4px}
  .lb-grid img{width:100%;display:block;cursor:pointer;border-radius:2px}
  .lb-grid img.lb-full{position:fixed;inset:0;max-width:95vw;max-height:95vh;margin:auto;z-index:10004;border-radius:6px;object-fit:contain;cursor:zoom-out}

  /* === BACKSTAGE SHELL === */
  html, body { height: 100vh; overflow: hidden; }

  .app-shell { display:flex; height:100vh; }

  .bs-sidebar { width:230px; background:var(--bg); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; transition:width .2s; }
  .bs-sidebar.collapsed { width:56px; }
  .bs-sidebar.collapsed .side-brand span, .bs-sidebar.collapsed .side-section-label, .bs-sidebar.collapsed .side-label, .bs-sidebar.collapsed .side-user-name, .bs-sidebar.collapsed .lock-btn { display:none; }
  .bs-sidebar.collapsed .side-brand { justify-content:center; padding:20px 0 18px; }
  .bs-sidebar.collapsed .side-item { justify-content:center; padding:10px 0; margin:0 8px 1px; }
  .bs-sidebar.collapsed .side-section { padding:12px 0 0; }
  .bs-sidebar.collapsed .side-footer { justify-content:center; padding:16px 0; }
  .bs-sidebar.collapsed .side-user { justify-content:center; }

  .side-brand { padding:20px 20px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .side-mark { width:26px; height:26px; border-radius:7px; background:var(--text); display:grid; place-items:center; font-weight:700; font-size:11px; color:#fff; }
  .side-brand span { font-size:14px; font-weight:600; color:var(--text); }
  .side-section { padding:6px 10px 0; }
  .side-section-label { font-size:9px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--text-4); padding:0 8px; margin-bottom:2px; }
  .side-item { display:flex; align-items:center; gap:8px; padding:3px 8px; border-radius:var(--radius); cursor:pointer; transition:all .12s; margin-bottom:0; text-decoration:none; line-height:1.3; }
  .side-item:hover { background:var(--bg-page); text-decoration:none; }
  .side-item.active { background:var(--bg-alt); }
  .side-item.active .side-icon svg { stroke:var(--text); }
  .side-item.active .side-label { color:var(--text); font-weight:600; }
  .side-icon { width:18px; height:18px; display:grid; place-items:center; }
  .side-icon svg { width:16px; height:16px; stroke:var(--text-4); stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .side-label { font-size:13px; font-weight:500; color:var(--text-3); }
  .side-item.disabled { opacity:.35; pointer-events:none; }
  .side-footer { margin-top:auto; padding:16px 20px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .side-user { display:flex; align-items:center; gap:9px; }
  .side-avatar { width:26px; height:26px; border-radius:50%; background:var(--bg-alt); display:grid; place-items:center; font-size:11px; font-weight:600; color:var(--text-3); }
  .side-user-name { font-size:13px; font-weight:500; color:var(--text-3); }
  .lock-btn { background:none; border:none; cursor:pointer; padding:4px; color:var(--text-4); }
  .lock-btn:hover { color:var(--text); }
  .collapse-btn { background:none; border:none; cursor:pointer; padding:6px 12px; color:var(--text-4); font-size:14px; }
  .collapse-btn:hover { color:var(--text); }

  .main-content { flex:1; overflow-y:auto; min-width:0; }
</style>
</head>
<body>

<!-- APP SHELL -->
<div class="app-shell">

<!-- Sidebar (rendered by sidebar.js) -->
<div class="bs-sidebar" id="bsSidebar"></div>

<!-- Main content -->
<div class="main-content">

<div class="header">
  <div class="header-left">
    <h1>Comps DB</h1>
  </div>
  <div class="db-stats">
    <span><strong id="totalComps">0</strong> comps</span>
    <span><strong id="totalCities">0</strong> cities</span>
    <span><strong id="geocodedCount">0</strong> geocoded</span>
    <span style="color:var(--green)"><strong id="dottyCount">0</strong> dotty</span>
    <span style="color:var(--blue)"><strong id="flipsCount">0</strong> flips</span>
    <span style="color:var(--amber)"><strong id="halfflipsCount">0</strong> half</span>

  </div>
</div>

<div class="tabs">

  <button class="tab" data-panel="map">Map View</button>
</div>

<!-- SEARCH -->
<div class="panel active" id="panel-search">

  <div class="search-grid">
    <div class="field"><label>City</label><select id="f-city"><option value="">All Cities</option></select></div>
    <div class="field"><label>Bedrooms</label><select id="f-beds"><option value="">Any</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5+</option></select></div>
    <div class="field"><label>Min SqFt</label><input type="number" id="f-sqft-min" placeholder="e.g. 1200"></div>
    <div class="field"><label>Max SqFt</label><input type="number" id="f-sqft-max" placeholder="e.g. 2000"></div>
    <div class="field"><label>Min Price</label><input type="number" id="f-price-min" placeholder="e.g. 800000"></div>
    <div class="field"><label>Max Price</label><input type="number" id="f-price-max" placeholder="e.g. 1200000"></div>
    <div class="field"><label>Pool</label><select id="f-pool"><option value="">Any</option><option value="1">Yes</option><option value="0">No</option></select></div>
    <div class="field"><label>Sold Within</label><select id="f-date-after"><option value="">Any</option><option value="1">1 month</option><option value="3">3 months</option><option value="6">6 months</option><option value="9">9 months</option><option value="12" selected>12 months</option><option value="18">18 months</option><option value="24">24 months</option><option value="36">36 months</option></select></div>
    <div class="field"><label>Comp Type</label><select id="f-comp-type"><option value="">All Types</option><option value="general">General</option><option value="dotty">Dotty</option><option value="flips">Flips</option><option value="halfflips">Half-Ass Flips</option></select></div>
  </div>
  <div class="btn-row"><button class="btn btn-primary" onclick="runSearch()">Search</button><button class="btn btn-secondary" onclick="clearSearch()">Clear</button></div>
  <div id="search-summary" class="summary-cards" style="display:none"></div>
  <div id="search-split" style="display:none;margin-top:16px;gap:16px">
    <div id="search-results" style="flex:2;overflow-y:auto;max-height:700px"></div>
    <div id="search-map" style="flex:1;min-width:300px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);position:sticky;top:0;align-self:flex-start;min-height:400px"></div>
  </div>
  <div id="search-results-nomap"></div>
</div>

<!-- BROWSE ALL -->
<div class="panel" id="panel-browse">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:12px">
    <h3 style="font-size:15px;font-weight:600">All Comps <span id="browseCount" style="color:var(--text-3);font-weight:400"></span></h3>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <input type="text" id="b-search" placeholder="Search address..." oninput="clearTimeout(window._bsTimer);window._bsTimer=setTimeout(loadBrowse,400)" style="padding:8px 12px;font-size:13px;font-family:inherit;background:var(--bg-page);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;width:220px">
      <div class="field" style="margin:0"><select id="b-city" onchange="loadBrowse()" style="padding:8px 12px;font-size:13px;font-family:inherit;background:var(--bg-page);border:1px solid var(--border);border-radius:var(--radius);color:var(--text)"><option value="">All Cities</option></select></div>
      <div class="field" style="margin:0"><select id="b-type" onchange="loadBrowse()" style="padding:8px 12px;font-size:13px;font-family:inherit;background:var(--bg-page);border:1px solid var(--border);border-radius:var(--radius);color:var(--text)"><option value="">All Types</option><option value="general">General</option><option value="dotty">Dotty</option><option value="flips">Flips</option><option value="halfflips">Half-Ass Flips</option></select></div>
      <div class="field" style="margin:0"><select id="b-missing" onchange="loadBrowse()" style="padding:8px 12px;font-size:13px;font-family:inherit;background:var(--bg-page);border:1px solid var(--border);border-radius:var(--radius);color:var(--text)"><option value="">All Data</option><option value="no-school">Missing Schools</option><option value="no-geo">Missing Geocode</option></select></div>
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:16px;align-items:center">
    <button class="btn btn-secondary" style="padding:8px 14px;font-size:12px" onclick="browsePrev()">← Prev</button>
    <span id="browsePageInfo" style="font-size:12px;color:var(--text-3);min-width:100px;text-align:center">Page 1</span>
    <button class="btn btn-secondary" style="padding:8px 14px;font-size:12px" onclick="browseNext()">Next →</button>
  </div>
  <div id="browseResults"></div>
</div>

<!-- MAP VIEW -->
<div class="panel" id="panel-map">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:12px">
    <h3 style="font-size:15px;font-weight:600">Map View <span id="mapCount" style="color:var(--text-3);font-weight:400"></span></h3>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <select id="m-city-filter" onchange="renderMapView()" style="padding:8px 12px;font-size:13px;font-family:inherit;background:var(--bg-page);border:1px solid var(--border);border-radius:var(--radius);color:var(--text)"><option value="">All Cities</option></select>
      <select id="m-type-filter" onchange="renderMapView()" style="padding:8px 12px;font-size:13px;font-family:inherit;background:var(--bg-page);border:1px solid var(--border);border-radius:var(--radius);color:var(--text)"><option value="">All Types</option><option value="general">General</option><option value="dotty">Dotty</option><option value="flips">Flips</option><option value="halfflips">Half-Ass Flips</option></select>
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-3);cursor:pointer"><input type="checkbox" id="m-outliers-only" onchange="renderMapView()"> Outliers only</label>

  </div>

    <div id="map-canvas" style="flex:2;height:700px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:var(--bg-alt);display:flex;align-items:center;justify-content:center;color:var(--text-4);font-size:13px">Loading map…</div>
    <div style="flex:1;min-width:280px;max-width:380px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;flex-wrap:wrap"><div style="font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px">⚠ Likely Geocoding Errors <span id="outlierCount" style="color:var(--text-4);font-weight:400;text-transform:none;letter-spacing:0"></span></div><div style="display:flex;gap:6px"><button id="dismissAllBtn" onclick="dismissAllOutliers()" style="background:var(--bg-alt);border:1px solid var(--border);border-radius:6px;color:var(--text-3);cursor:pointer;font-size:11px;padding:5px 10px;font-family:inherit;font-weight:600;display:none" title="Mark all visible as not outliers">Dismiss all</button><button id="clearOutlierBtn" onclick="clearOutlierCoords()" style="background:var(--red);border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:11px;padding:5px 10px;font-family:inherit;font-weight:600;display:none">Clear coords</button></div></div>
      <div id="outlierList" style="max-height:660px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-page)"></div>
    </div>
  </div>
</div>

<!-- MISSING SCHOOLS -->




<div id="editModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px)"></div>

<!-- Photo Lightbox -->
<div class="lb-overlay" id="photoLightbox">
  <div class="lb-addr" id="lbAddr"></div>
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <div class="lb-scroll"><div class="lb-grid" id="lbGrid"></div></div>
</div>

<script>
const SUPABASE_URL='https://pwrnywsojomrygsiezzi.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3cm55d3Nvam9tcnlnc2llenppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzE1OTMsImV4cCI6MjA4OTgwNzU5M30.tGewn18t-6dN_bMXjC-Z820zFYvL1VUu3BDhfW1ZoNk';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
window.sb=sb;  // expose for auth.js
let geocodingActive=false;

async function init(){await updateStats();await populateDropdowns();setupTabs();/* autocomplete inits via onMapsReady callback */}

// ========== PHOTO LIGHTBOX (ported from mls-deals.html) ==========
const PHOTO_BASE='https://photos.dottyhomes.com';
const photoCountCache={};
let lbMls='';

async function fetchPhotoCount(mls){
  if(photoCountCache[mls]!=null)return photoCountCache[mls];
  const url=`${PHOTO_BASE}/${mls}/`;
  try{
    const res=await fetch(url);
    console.log('[fetchPhotoCount] url=',url,'status=',res.status,'ok=',res.ok);
    if(!res.ok)return null;
    const txt=await res.text();
    const matches=txt.match(new RegExp(`${mls}_\\d+\\.jpg`,'gi'));
    const uniq=matches?new Set(matches.map(s=>s.toLowerCase())):new Set();
    const count=uniq.size;
    console.log('[fetchPhotoCount] matched',count,'unique photos for mls=',mls);
    photoCountCache[mls]=count;
    return count;
  }catch(e){console.warn('[fetchPhotoCount] fetch error for',url,e);return null;}
}

function openLightbox(mls,addr){
  if(!mls){alert('No MLS number on this comp — cannot load photos.');return;}
  lbMls=mls;
  const myMls=mls;
  const addrEl=document.getElementById('lbAddr');
  addrEl.textContent=addr+' (loading…)';
  const grid=document.getElementById('lbGrid');
  grid.innerHTML='';
  document.getElementById('photoLightbox').classList.add('open');
  document.addEventListener('keydown',lbKeyHandler);
  fetchPhotoCount(mls).then(total=>{
    if(lbMls!==myMls)return;
    if(total!=null){
      addrEl.textContent=addr+(total===0?' (no photos)':' ('+total+(total===1?' photo':' photos')+')');
    }
    let i=1;
    function loadNext(){
      if(lbMls!==myMls)return;
      if(total!=null&&i>total)return;
      const num=String(i).padStart(2,'0');
      const url=`${PHOTO_BASE}/${mls}/${mls}_${num}.jpg`;
      const img=new Image();
      img.onload=function(){
        if(lbMls!==myMls)return;
        const el=document.createElement('img');
        el.src=url;
        el.onclick=function(){
          if(this.classList.contains('lb-full')){this.classList.remove('lb-full');}
          else{document.querySelectorAll('.lb-grid img.lb-full').forEach(x=>x.classList.remove('lb-full'));this.classList.add('lb-full');}
        };
        grid.appendChild(el);
        if(total==null)addrEl.textContent=addr+' ('+i+(i===1?' photo':' photos')+')';
        i++;
        loadNext();
      };
      img.onerror=function(){
        if(lbMls!==myMls)return;
        const count=i-1;
        if(total==null){
          photoCountCache[mls]=count;
          if(count===0)addrEl.textContent=addr+' (no photos)';
        }
      };
      img.src=url;
    }
    loadNext();
  });
}
function closeLightbox(){
  lbMls='';
  document.getElementById('photoLightbox').classList.remove('open');
  document.removeEventListener('keydown',lbKeyHandler);
}
function lbKeyHandler(e){
  if(e.key==='Escape'){
    const full=document.querySelector('.lb-grid img.lb-full');
    if(full)full.classList.remove('lb-full');
    else closeLightbox();
  }
}

// Open photo lightbox for a comp by id (looks up MLS from the rendered row data)
async function viewCompPhotos(id){
  const{data:r}=await sb.from('properties').select('mls,address,city,zip').eq('id',id).single();
  if(!r){alert('Comp not found');return;}
  const fullAddr=(r.address||'')+', '+(r.city||'')+(r.zip?' '+r.zip:'');
  console.log('[viewCompPhotos] id=',id,'mls=',JSON.stringify(r.mls),'addr=',fullAddr);
  openLightbox(r.mls,fullAddr);
}

// Called by Google Maps script via callback param. Guaranteed to run after places library is loaded.
let _mapsReady=false;
window.onMapsReady=function(){_mapsReady=true;try{initAutocomplete();}catch(e){console.error('[onMapsReady] initAutocomplete failed:',e);}};

async function updateStats(){
  const{count:total}=await sb.from('properties').select('*',{count:'exact',head:true}).eq('change_type','sold');
  const{data:cd}=await sb.from('properties').select('city').eq('change_type','sold');
  const cities=new Set(cd?.map(r=>r.city)).size;
  const{count:geo}=await sb.from('properties').select('*',{count:'exact',head:true}).eq('change_type','sold').not('latitude','is',null);
  const{count:d}=await sb.from('properties').select('*',{count:'exact',head:true}).eq('change_type','sold').eq('comp_type','dotty');
  const{count:f}=await sb.from('properties').select('*',{count:'exact',head:true}).eq('change_type','sold').eq('comp_type','flips');
  const{count:hf}=await sb.from('properties').select('*',{count:'exact',head:true}).eq('change_type','sold').eq('comp_type','halfflips');
  document.getElementById('totalComps').textContent=(total||0).toLocaleString();
  document.getElementById('totalCities').textContent=cities||0;
  document.getElementById('geocodedCount').textContent=(geo||0).toLocaleString();
  document.getElementById('dottyCount').textContent=d||0;
  document.getElementById('flipsCount').textContent=f||0;
  document.getElementById('halfflipsCount').textContent=hf||0;
}

async function populateDropdowns(){
  try {
    // Get cities - use a separate focused query
    let cityRows=null;try{const r=await sb.rpc('get_distinct_cities');cityRows=r.data;}catch(e){cityRows=null;}
    let uc;
    if(cityRows){
      uc=cityRows.map(r=>r.city).filter(Boolean).sort();
    } else {
      // Fallback: paginate to get all cities
      let allCities=[];
      for(let p=0;p<10;p++){
        const{data}=await sb.from('properties').select('city').eq('change_type','sold').range(p*1000,(p+1)*1000-1);
        if(!data?.length)break;
        allCities=allCities.concat(data.map(r=>r.city));
      }
      uc=[...new Set(allCities)].filter(Boolean).sort();
    }

async function runSearch(){
  const v=id=>document.getElementById(id).value;
  const addr=v('f-address').trim(),miles=parseFloat(v('f-radius'));
  let sLat=null,sLng=null;
  const el=document.getElementById('search-results');el.innerHTML='<div class="loading">Searching...</div>';
  const mapDiv=document.getElementById('search-map');
  
  if(addr){
    console.log('[runSearch] geocoding address:',addr);
    // Strategy 0: Use Places Autocomplete coords if user selected from dropdown
    if(autocompleteLat){sLat=autocompleteLat;sLng=autocompleteLng;console.log('[runSearch] using Autocomplete coords:',sLat,sLng);}
    // Strategy 1: Look up in our own database
    if(!sLat){
      try{
        const streetAddr=addr.split(',')[0].trim();
        const{data:dbMatch}=await sb.from('properties').select('latitude,longitude').ilike('address','%'+streetAddr+'%').not('latitude','is',null).limit(1);
        if(dbMatch?.length&&dbMatch[0].latitude){sLat=dbMatch[0].latitude;sLng=dbMatch[0].longitude;console.log('[runSearch] DB lookup matched:',sLat,sLng);}
      }catch(e){}
    }
    // Strategy 2: Google Maps Geocoding API
    if(!sLat){
      try{const r=await fetch('https://maps.googleapis.com/maps/api/geocode/json?address='+encodeURIComponent(addr)+'&key='+GOOGLE_GEO_KEY);
        const d=await r.json();
        if(d.status==='OK'&&d.results?.length){sLat=d.results[0].geometry.location.lat;sLng=d.results[0].geometry.location.lng;}
      }catch(e){}
    }
    // Strategy 3: US Census Geocoder (HTTPS only)
    if(!sLat){
      try{const r=await fetch('https://geocoding.geo.census.gov/geocoder/locations/onelineaddress?address='+encodeURIComponent(addr)+'&benchmark=Public_AR_Current&format=json');
        const d=await r.json();const m=d?.result?.addressMatches;
        if(m?.length){sLat=m[0].coordinates.y;sLng=m[0].coordinates.x;}
      }catch(e){}
    }
    if(!sLat){el.innerHTML='<div class="empty-state"><h3>Address not found</h3><p>Select an address from the autocomplete dropdown, or try a different format.</p></div>';return;}
  }
  
  let q=sb.from('properties').select('*').eq('change_type','sold');
  
  // If we have a subject address, add bounding box to Supabase query
  if(sLat!==null){
    const milesForBox=Math.max(miles*1.5,2);// slightly larger than radius to catch edge cases
    const latDeg=milesForBox/69;
    const lngDeg=milesForBox/(69*Math.cos(sLat*Math.PI/180));
    q=q.gte('latitude',sLat-latDeg).lte('latitude',sLat+latDeg).gte('longitude',sLng-lngDeg).lte('longitude',sLng+lngDeg);
  }
  
  if(v('f-city'))q=q.eq('city',v('f-city'));
  if(v('f-beds')){if(v('f-beds')==='5')q=q.gte('beds',5);else q=q.eq('beds',parseInt(v('f-beds')));}
  if(v('f-sqft')){const s=parseInt(v('f-sqft'));q=q.gte('sqft',s-150).lte('sqft',s+150);}
  if(v('f-sqft-min'))q=q.gte('sqft',parseInt(v('f-sqft-min')));
  if(v('f-sqft-max'))q=q.lte('sqft',parseInt(v('f-sqft-max')));
  if(v('f-price-min'))q=q.gte('sale_price',parseInt(v('f-price-min')));
  if(v('f-price-max'))q=q.lte('sale_price',parseInt(v('f-price-max')));
  if(v('f-pool')!=='')q=q.eq('pool',v('f-pool')==='1'?'Yes':'No');
  if(v('f-date-after')){const months=parseInt(v('f-date-after'));const d=new Date();d.setMonth(d.getMonth()-months);q=q.gte('sold_date',d.toISOString().split('T')[0]);}
  if(v('f-comp-type'))q=q.eq('comp_type',v('f-comp-type'));
  q=q.order('sold_date',{ascending:false}).limit(1000);
  const{data:rows,error}=await q;
  if(error){el.innerHTML=`<div class="empty-state"><p>${error.message}</p>`;return;}
  let filtered=rows||[];const showDist=sLat!==null;
  if(showDist){const toR=d=>d*Math.PI/180;const hav=(a,b,c,d)=>{const dl=toR(c-a),dn=toR(d-b);const x=Math.sin(dl/2)**2+Math.cos(toR(a))*Math.cos(toR(c))*Math.sin(dn/2)**2;return 3959*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));};filtered=filtered.filter(r=>r.latitude).map(r=>{r.distance=hav(sLat,sLng,r.latitude,r.longitude);return r;}).filter(r=>r.distance<=miles);}
  // Sort by newest first
  filtered.sort((a,b)=>(b.sold_date||'').localeCompare(a.sold_date||''));
  
  const splitDiv=document.getElementById('search-split');
  const nomapDiv=document.getElementById('search-results-nomap');
  
  if(sLat&&filtered.length){
    // Split layout: table left, map right
    splitDiv.style.display='flex';
    nomapDiv.innerHTML='';
    renderResults(filtered,'search-results','search-summary',showDist);
    
    // Interactive Google Map
    mapDiv.innerHTML='';mapDiv.style.minHeight='500px';
    const map=new google.maps.Map(mapDiv,{zoom:14,center:{lat:sLat,lng:sLng},mapTypeControl:false,streetViewControl:false});
    const bounds=new google.maps.LatLngBounds();
    // Subject marker (red)
    const sMarker=new google.maps.Marker({position:{lat:sLat,lng:sLng},map,label:{text:'S',color:'#fff',fontWeight:'bold'},icon:{path:google.maps.SymbolPath.CIRCLE,scale:14,fillColor:'#c44040',fillOpacity:1,strokeColor:'#fff',strokeWeight:2},title:'Subject Property',zIndex:1000});
    bounds.extend({lat:sLat,lng:sLng});
    // Comp markers (blue numbered)
    filtered.slice(0,20).forEach((r,i)=>{if(!r.latitude)return;
      new google.maps.Marker({position:{lat:r.latitude,lng:r.longitude},map,label:{text:String(i+1),color:'#fff',fontWeight:'bold',fontSize:'11px'},icon:{path:google.maps.SymbolPath.CIRCLE,scale:12,fillColor:'#3074a8',fillOpacity:1,strokeColor:'#fff',strokeWeight:2},title:`${i+1}. ${r.address} - $${(r.sale_price||0).toLocaleString()}`});
      bounds.extend({lat:r.latitude,lng:r.longitude});
    });
    map.fitBounds(bounds);
    if(filtered.length<=2)map.setZoom(15);
  } else {
    // No map — full width results
    splitDiv.style.display='none';
    renderResults(filtered,'search-results-nomap','search-summary',showDist);
  }
}

async function saveSchool(id){
  const g=k=>document.getElementById(k+'-'+id)?.value?.trim()||null;
  const n=k=>{const v=g(k);return v?parseInt(v):null;};
  const{error}=await sb.from('properties').update({
    elementary_school:g('ms-elem'),elementary_rating:n('ms-elemr'),
    middle_school:g('ms-mid'),middle_rating:n('ms-midr'),
    high_school:g('ms-high'),high_rating:n('ms-highr')
  }).eq('id',id);
  const row=document.getElementById('ms-row-'+id);
  if(error){row.style.borderColor='var(--red)';return;}
  row.style.transition='all 0.3s';row.style.opacity='0.3';row.style.borderColor='var(--green)';
  setTimeout(()=>row.remove(),500);
}

function updateSummary(rows,sid){
  const s=document.getElementById(sid);
  const prices=rows.map(r=>r.sale_price).filter(Boolean),ppsfs=rows.map(r=>r.ppsf).filter(Boolean),sqfts=rows.map(r=>r.sqft).filter(Boolean),doms=rows.map(r=>r.dom).filter(d=>d!=null);
  const avg=a=>a.length?a.reduce((s,v)=>s+v,0)/a.length:0,med=a=>{if(!a.length)return 0;const s=[...a].sort((x,y)=>x-y),m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;};
  s.style.display='grid';s.innerHTML=`<div class="summary-card"><div class="label">Comps</div><div class="value">${rows.length}</div></div><div class="summary-card"><div class="label">Avg Price</div><div class="value">$${Math.round(avg(prices)).toLocaleString()}</div></div><div class="summary-card"><div class="label">Med Price</div><div class="value">$${Math.round(med(prices)).toLocaleString()}</div></div><div class="summary-card"><div class="label">Avg $/SF</div><div class="value">$${Math.round(avg(ppsfs))}</div></div><div class="summary-card"><div class="label">Avg SqFt</div><div class="value">${Math.round(avg(sqfts)).toLocaleString()}</div></div><div class="summary-card"><div class="label">Avg DOM</div><div class="value">${Math.round(avg(doms))}</div><div class="sub">Med: ${Math.round(med(doms))}</div></div>`;
}
function recalcSummary(sid){
  const checks=document.querySelectorAll('.comp-check');
  const checked=[];checks.forEach(cb=>{if(cb.checked)checked.push(_lastRenderedRows[parseInt(cb.dataset.idx)]);});
  updateSummary(checked.length?checked:_lastRenderedRows,sid);
}
function toggleAllComps(masterCb,sid){
  document.querySelectorAll('.comp-check').forEach(cb=>cb.checked=masterCb.checked);
  recalcSummary(sid);
}

async function startGeocoding(){geocodingActive=true;document.getElementById('geoStartBtn').style.display='none';document.getElementById('geoStopBtn').style.display='';const log=document.getElementById('geoLog');log.classList.add('visible');
let allRows=[];for(let p=0;p<20;p++){const{data}=await sb.from('properties').select('id,address,city').eq('change_type','sold').is('latitude',null).range(p*1000,(p+1)*1000-1);if(!data?.length)break;allRows=allRows.concat(data);}
if(!allRows.length){log.innerHTML+='<div class="log-success">All geocoded!</div>';stopGeocoding();return;}
log.innerHTML+=`<div class="log-info">Found ${allRows.length} to geocode (using Google Maps API)...</div>`;
let found=0,failed=0;
for(const r of allRows){if(!geocodingActive)break;
  let success=false;
  // Strategy 1: Google Maps Geocoding API (best coverage)
  try{const addr=encodeURIComponent(r.address+', '+r.city+', CA');
    const resp=await fetch('https://maps.googleapis.com/maps/api/geocode/json?address='+addr+'&key='+GOOGLE_GEO_KEY);
    const d=await resp.json();
    if(d.status==='OK'&&d.results?.length){const loc=d.results[0].geometry.location;
      await sb.from('properties').update({latitude:loc.lat,longitude:loc.lng}).eq('id',r.id);
      log.innerHTML+=`<div class="log-success">✓ ${r.address} → ${loc.lat.toFixed(4)}, ${loc.lng.toFixed(4)}</div>`;
      found++;success=true;}
  }catch(e){}
  // Strategy 2: US Census Geocoder (fallback, free)
  if(!success){try{const addr=encodeURIComponent(r.address+', '+r.city+', CA');
    const resp=await fetch('https://geocoding.geo.census.gov/geocoder/locations/onelineaddress?address='+addr+'&benchmark=Public_AR_Current&format=json');
    const d=await resp.json();const matches=d?.result?.addressMatches;
    if(matches?.length){const lat=matches[0].coordinates.y,lon=matches[0].coordinates.x;
      await sb.from('properties').update({latitude:lat,longitude:lon}).eq('id',r.id);
      log.innerHTML+=`<div class="log-success">✓ ${r.address} → ${lat.toFixed(4)}, ${lon.toFixed(4)} (Census)</div>`;
      found++;success=true;}
  }catch(e){}}
  if(!success){failed++;log.innerHTML+=`<div class="log-error">✗ ${r.address} — not found</div>`;}
  log.scrollTop=log.scrollHeight;await updateGeoStats();
  await new Promise(x=>setTimeout(x,50));// Google allows ~50 req/sec, being conservative
}
log.innerHTML+=`<div class="log-info">Done! ${found} geocoded, ${failed} failed.</div>`;
stopGeocoding();}

let browsePage = 0;
const BROWSE_LIMIT = 50;

async function loadBrowse() {
  browsePage = 0;
  await fetchBrowsePage();
}

async function browsePrev() { if (browsePage > 0) { browsePage--; await fetchBrowsePage(); } }

async function fetchBrowsePage() {
  const el = document.getElementById('browseResults');
  el.innerHTML = '<div class="loading">Loading...</div>';

  const city = document.getElementById('b-city').value;
  const type = document.getElementById('b-type').value;
  const missing = document.getElementById('b-missing').value;
  const search = document.getElementById('b-search').value.trim();

  let query = sb.from('properties').select('*', { count: 'exact' }).eq('change_type','sold');
  if (search) query = query.ilike('address', `%${search}%`);
  if (city) query = query.eq('city', city);
  if (type) query = query.eq('comp_type', type);
  if (missing === 'no-school') query = query.is('elementary_school', null);
  if (missing === 'no-geo') query = query.is('latitude', null);

  query = query.order('city').order('address').range(browsePage * BROWSE_LIMIT, (browsePage + 1) * BROWSE_LIMIT - 1);
  const { data: rows, count, error } = await query;

  if (error) { el.innerHTML = `<div class="empty-state"><p>${error.message}</p></div>`; return; }
  if (!rows?.length) { el.innerHTML = '<div class="empty-state"><h3>No comps found</h3></div>'; return; }

  const totalPages = Math.ceil((count || 0) / BROWSE_LIMIT);
  document.getElementById('browseCount').textContent = `(${(count||0).toLocaleString()} total)`;
  document.getElementById('browsePageInfo').textContent = `Page ${browsePage + 1} of ${totalPages}`;

  // Populate city dropdown from search comps dropdown (already correct)
  const bCity = document.getElementById('b-city');
  const currentVal = bCity.value;
  const fCity = document.getElementById('f-city');
  bCity.innerHTML = fCity.innerHTML;
  bCity.value = currentVal;

  renderResults(rows, 'browseResults', 'search-summary', false);
  document.getElementById('search-summary').style.display = 'none';
}

// === MAP VIEW ===
let mapViewMap=null,mapViewMarkers=[],mapViewData=[],mapViewOutliers=new Set(),mapViewLoaded=false;

async function loadMapView(){
  if(mapViewLoaded)return;
  const canvas=document.getElementById('map-canvas');
  canvas.innerHTML='<div style="text-align:center"><div>Loading all comps…</div><div id="mapLoadProgress" style="font-size:11px;color:var(--text-4);margin-top:6px"></div></div>';
  const prog=()=>document.getElementById('mapLoadProgress');
  let all=[];
  for(let p=0;p<25;p++){
    const{data,error}=await sb.from('properties').select('id,address,city,latitude,longitude,comp_type,sale_price,sold_date,mls,outlier_reviewed').not('latitude','is',null).not('longitude','is',null).range(p*1000,(p+1)*1000-1);
    if(error){
      // Graceful degradation: if outlier_reviewed column doesn't exist yet, fall back to query without it
      if(error.message&&error.message.indexOf('outlier_reviewed')>=0){
        canvas.innerHTML='<div style="color:var(--amber);padding:20px;text-align:center"><b>Setup needed:</b> add the <code>outlier_reviewed</code> column to your <code>properties</code> table:<br><br><code style="display:inline-block;background:var(--bg-alt);padding:8px 12px;border-radius:6px;margin-top:6px">ALTER TABLE properties ADD COLUMN outlier_reviewed boolean DEFAULT false;</code><br><br>Then reload this page.</div>';
        return;
      }
      canvas.innerHTML='<div style="color:var(--red)">Error: '+error.message+'</div>';return;
    }
    if(!data||!data.length)break;
    all=all.concat(data);
    if(prog())prog().textContent='Loaded '+all.length+' comps…';
    if(data.length<1000)break;
  }
  mapViewData=all;
  mapViewLoaded=true;
  // Compute outliers per city using IQR on lat/lng
  const byCity={};
  all.forEach(r=>{const c=(r.city||'').toUpperCase().trim();if(!c)return;(byCity[c]=byCity[c]||[]).push(r);});
  mapViewOutliers=new Set();
  Object.entries(byCity).forEach(([city,rows])=>{
    if(rows.length<4)return;
    const lats=rows.map(r=>r.latitude).sort((a,b)=>a-b);
    const lngs=rows.map(r=>r.longitude).sort((a,b)=>a-b);
    const q=(arr,p)=>arr[Math.floor(arr.length*p)];
    const latQ1=q(lats,0.25),latQ3=q(lats,0.75),latIQR=latQ3-latQ1;
    const lngQ1=q(lngs,0.25),lngQ3=q(lngs,0.75),lngIQR=lngQ3-lngQ1;
    // 1.5x IQR is the textbook strict threshold — for flip comps even a few blocks of geocoding error matter
    const latLo=latQ1-1.5*latIQR,latHi=latQ3+1.5*latIQR;
    const lngLo=lngQ1-1.5*lngIQR,lngHi=lngQ3+1.5*lngIQR;
    rows.forEach(r=>{
      if(r.outlier_reviewed)return; // user already confirmed this is fine
      if(r.latitude<latLo||r.latitude>latHi||r.longitude<lngLo||r.longitude>lngHi)mapViewOutliers.add(r.id);
    });
  });
  // Populate city filter
  const sel=document.getElementById('m-city-filter');
  const cities=Object.keys(byCity).sort();
  sel.innerHTML='<option value="">All Cities ('+all.length+')</option>'+cities.map(c=>'<option value="'+c+'">'+c+' ('+byCity[c].length+')</option>').join('');
  // Initialize map
  canvas.innerHTML='';
  if(!window.google||!window.google.maps){canvas.innerHTML='<div style="color:var(--red)">Google Maps not loaded</div>';return;}
  mapViewMap=new google.maps.Map(canvas,{zoom:10,center:{lat:34.05,lng:-118.0},mapTypeControl:true,streetViewControl:false});
  renderMapView();
}

function renderMapView(){
  if(!mapViewMap)return;
  // Clear existing markers
  mapViewMarkers.forEach(m=>m.setMap(null));
  mapViewMarkers=[];
  const cityFilter=document.getElementById('m-city-filter').value;
  const typeFilter=document.getElementById('m-type-filter').value;
  const outliersOnly=document.getElementById('m-outliers-only').checked;
  const filtered=mapViewData.filter(r=>{
    if(cityFilter&&(r.city||'').toUpperCase().trim()!==cityFilter)return false;
    if(typeFilter&&(r.comp_type||'general')!==typeFilter)return false;
    if(outliersOnly&&!mapViewOutliers.has(r.id))return false;
    return true;
  });
  document.getElementById('mapCount').textContent='('+filtered.length+' shown'+(mapViewOutliers.size?', '+mapViewOutliers.size+' outliers total':'')+')';
  const colorFor=r=>{
    if(mapViewOutliers.has(r.id))return '#dc2626';
    const t=r.comp_type||'general';
    if(t==='dotty')return '#9333ea';
    if(t==='flips')return '#059669';
    if(t==='halfflips')return '#d97706';
    return '#2563eb';
  };
  const bounds=new google.maps.LatLngBounds();
  filtered.forEach(r=>{
    const isOutlier=mapViewOutliers.has(r.id);
    const m=new google.maps.Marker({
      position:{lat:r.latitude,lng:r.longitude},
      map:mapViewMap,
      title:(r.address||'')+', '+(r.city||''),
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:isOutlier?9:5,fillColor:colorFor(r),fillOpacity:isOutlier?1:0.7,strokeColor:'#fff',strokeWeight:isOutlier?2:1},
      zIndex:isOutlier?1000:1
    });
    m.addListener('click',()=>{
      const iw=new google.maps.InfoWindow({content:'<div style="font-size:12px;font-family:system-ui"><b>'+(r.address||'')+'</b><br>'+(r.city||'')+'<br>'+(r.sale_price?'$'+r.sale_price.toLocaleString():'—')+' · '+(r.sold_date||'—')+'<br>'+(r.comp_type||'general')+(isOutlier?' <span style=\"color:#dc2626;font-weight:600\">⚠ outlier</span>':'')+'<br><a href="#" onclick="event.preventDefault();editComp('+r.id+')">edit</a></div>'});
      iw.open(mapViewMap,m);
    });
    mapViewMarkers.push(m);
    bounds.extend({lat:r.latitude,lng:r.longitude});
  });
  if(filtered.length>0&&filtered.length<mapViewData.length)mapViewMap.fitBounds(bounds);
  // Render outlier sidebar list (always shows all outliers, regardless of filter, but city filter narrows it)
  const outlierRows=mapViewData.filter(r=>mapViewOutliers.has(r.id)&&(!cityFilter||(r.city||'').toUpperCase().trim()===cityFilter));
  document.getElementById('outlierCount').textContent='('+outlierRows.length+')';
  document.getElementById('clearOutlierBtn').style.display=outlierRows.length>0?'':'none';
  document.getElementById('dismissAllBtn').style.display=outlierRows.length>0?'':'none';
  const list=document.getElementById('outlierList');
  if(!outlierRows.length){list.innerHTML='<div style="padding:16px;font-size:12px;color:var(--text-4);text-align:center">No outliers detected '+(cityFilter?'in '+cityFilter:'')+'</div>';return;}
  list.innerHTML=outlierRows.slice(0,200).map(r=>'<div id="outlier-row-'+r.id+'" style="padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px;display:flex;align-items:flex-start;gap:8px"><div style="flex:1;cursor:pointer" onclick="mapViewFlyTo('+r.latitude+','+r.longitude+','+r.id+')"><div style="font-weight:600">'+(r.address||'(no address)')+'</div><div style="color:var(--text-3);font-size:11px;margin-top:2px">'+(r.city||'')+' · '+(r.sale_price?'$'+r.sale_price.toLocaleString():'—')+' · '+(r.comp_type||'general')+'</div><div style="color:var(--text-4);font-size:10px;font-family:var(--mono),monospace;margin-top:2px">'+r.latitude.toFixed(5)+', '+r.longitude.toFixed(5)+'</div></div><button onclick="dismissOutlier('+r.id+')" title="Not an outlier" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--green);cursor:pointer;font-size:12px;padding:2px 8px;font-family:inherit;flex-shrink:0">✓</button></div>').join('')+(outlierRows.length>200?'<div style="padding:8px 12px;font-size:11px;color:var(--text-4);text-align:center">+'+(outlierRows.length-200)+' more</div>':'');
}

function mapViewFlyTo(lat,lng,id){
  if(!mapViewMap)return;
  mapViewMap.panTo({lat,lng});
  mapViewMap.setZoom(16);
  // Pop the matching marker's info window
  const marker=mapViewMarkers.find(m=>{const p=m.getPosition();return Math.abs(p.lat()-lat)<1e-6&&Math.abs(p.lng()-lng)<1e-6;});
  if(marker)google.maps.event.trigger(marker,'click');
}

async function clearOutlierCoords(){
  // Use whatever the sidebar is currently showing (respects city filter)
  const cityFilter=document.getElementById('m-city-filter').value;
  const targets=mapViewData.filter(r=>mapViewOutliers.has(r.id)&&(!cityFilter||(r.city||'').toUpperCase().trim()===cityFilter));
  if(!targets.length){alert('No outliers to clear.');return;}
  if(!confirm('Clear lat/lon on '+targets.length+' outlier'+(targets.length===1?'':'s')+(cityFilter?' in '+cityFilter:'')+'?\n\nAfter clearing, run the Geocode tab in import.html to re-geocode them.'))return;
  const btn=document.getElementById('clearOutlierBtn');
  btn.disabled=true;btn.textContent='Clearing…';
  const ids=targets.map(r=>r.id);
  let cleared=0;
  for(let i=0;i<ids.length;i+=100){
    const chunk=ids.slice(i,i+100);
    const{error}=await sb.from('properties').update({latitude:null,longitude:null}).in('id',chunk);
    if(error){alert('Error: '+error.message);btn.disabled=false;btn.textContent='Clear coords';return;}
    cleared+=chunk.length;
    btn.textContent='Clearing… '+cleared+'/'+ids.length;
  }
  // Drop them from local state so the map updates without a reload
  const clearedSet=new Set(ids);
  mapViewData=mapViewData.filter(r=>!clearedSet.has(r.id));
  ids.forEach(id=>mapViewOutliers.delete(id));
  btn.disabled=false;btn.textContent='Clear coords';
  renderMapView();
  alert('Cleared '+cleared+' coords. Now go to import.html → Geocode tab to re-geocode them.');
}

async function dismissOutlier(id){
  const{error}=await sb.from('properties').update({outlier_reviewed:true}).eq('id',id);
  if(error){alert('Error: '+error.message);return;}
  // Update local state and animate the row out
  mapViewOutliers.delete(id);
  const row=mapViewData.find(r=>r.id===id);
  if(row)row.outlier_reviewed=true;
  const el=document.getElementById('outlier-row-'+id);
  if(el){el.style.transition='opacity .3s';el.style.opacity='0';setTimeout(()=>renderMapView(),300);}
  else renderMapView();
}

async function dismissAllOutliers(){
  const cityFilter=document.getElementById('m-city-filter').value;
  const targets=mapViewData.filter(r=>mapViewOutliers.has(r.id)&&(!cityFilter||(r.city||'').toUpperCase().trim()===cityFilter));
  if(!targets.length){alert('Nothing to dismiss.');return;}
  if(!confirm('Mark '+targets.length+' outlier'+(targets.length===1?'':'s')+(cityFilter?' in '+cityFilter:'')+' as reviewed?\n\nThey will be hidden from outlier detection going forward. You can undo this later by clearing the outlier_reviewed column in Supabase.'))return;
  const btn=document.getElementById('dismissAllBtn');
  btn.disabled=true;btn.textContent='Dismissing…';
  const ids=targets.map(r=>r.id);
  let dismissed=0;
  for(let i=0;i<ids.length;i+=100){
    const chunk=ids.slice(i,i+100);
    const{error}=await sb.from('properties').update({outlier_reviewed:true}).in('id',chunk);
    if(error){alert('Error: '+error.message);btn.disabled=false;btn.textContent='Dismiss all';return;}
    dismissed+=chunk.length;
    btn.textContent='Dismissing… '+dismissed+'/'+ids.length;
  }
  // Update local state
  const dismissedSet=new Set(ids);
  mapViewData.forEach(r=>{if(dismissedSet.has(r.id))r.outlier_reviewed=true;});
  ids.forEach(id=>mapViewOutliers.delete(id));
  btn.disabled=false;btn.textContent='Dismiss all';
  renderMapView();
}

// Auto-load browse when tab is clicked
const origSetupTabs = setupTabs;
setupTabs = function() {
  origSetupTabs();
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      if (tab.dataset.panel === 'browse' && document.getElementById('browseResults').innerHTML === '') {
        loadBrowse();
      }
      if (tab.dataset.panel === 'schools') {
        loadMissingSchools();
      }
      if (tab.dataset.panel === 'map') {
        loadMapView();
      }
    });
  });
};

(async()=>{
  await window.authGate();
  if(!window.CURRENT_USER_ROLE)return;  // authGate redirected; abort
  window.renderSidebar('comps');
  init();
})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLS Deals — Backstage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="backstage.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCxTeIuN4tLIrAApAf8t4fIQ3fCvIix0a8"></script>
<style>
/* === DEAL MACHINE — local layout only === */
/* All shared styles (buttons, tags, modals, school pills, toggles, etc.) come from backstage.css */

/* Thumbnail in list rows */
.rw-thumb{width:48px;height:36px;border-radius:4px;object-fit:cover;cursor:pointer;background:var(--bg-alt);flex-shrink:0}
.rw-thumb-empty{width:48px;height:36px;border-radius:4px;background:var(--bg-alt);flex-shrink:0;display:grid;place-items:center;font-size:10px;color:var(--text-4)}

/* Photo lightbox */
.lb-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);overflow-y:auto}
.lb-overlay.open{display:block}
.lb-close{position:fixed;top:16px;right:20px;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:24px;cursor:pointer;z-index:10001;padding:4px 12px;line-height:1;border-radius:6px;backdrop-filter:blur(4px)}
.lb-close:hover{background:rgba(255,255,255,.2)}
.lb-addr{color:#fff;font-size:14px;font-weight:600;text-align:center;padding:16px 60px 12px;position:sticky;top:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);z-index:10000}
.lb-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:4px 4px 40px;max-width:1200px;margin:0 auto}
.lb-grid img{width:100%;display:block;cursor:pointer;border-radius:2px}
.lb-grid img.lb-full{position:fixed;inset:0;max-width:95vw;max-height:95vh;margin:auto;z-index:10002;border-radius:6px;object-fit:contain;cursor:zoom-out}

body{overflow:hidden;height:100vh}
#cf-drop{display:none}
#cf-drop.open{display:block}
#cf-drop label{display:flex;align-items:center;gap:8px;padding:5px 12px;font-size:12px;font-weight:500;color:var(--text);cursor:pointer}
#cf-drop label:hover{background:var(--bg-alt)}
#tf-drop{display:none}
#tf-drop.open{display:block}
#tf-drop label{display:flex;align-items:center;gap:8px;padding:5px 12px;font-size:12px;font-weight:500;color:var(--text);cursor:pointer}
#tf-drop label:hover{background:var(--bg-alt)}
.sp{position:relative}
.sp:hover::after{content:attr(data-school);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#fff;color:var(--text);font-size:11px;font-weight:500;padding:4px 8px;border-radius:4px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.12);white-space:nowrap;z-index:100;pointer-events:none}

/* === BACKSTAGE SHELL === */
.login-wrap { height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg-page); }
.login-box { width:360px; text-align:center; }
.login-brand { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:36px; }
.login-mark { width:32px; height:32px; border-radius:8px; background:var(--text); display:grid; place-items:center; font-weight:700; font-size:14px; color:#fff; }
.login-brand span { font-size:15px; font-weight:600; color:var(--text); }
.login-title { font-size:24px; font-weight:600; color:var(--text); margin-bottom:6px; letter-spacing:-0.5px; }
.login-sub { font-size:14px; color:var(--text-4); margin-bottom:32px; }
.login-input { width:100%; padding:14px 18px; background:var(--bg); border:1.5px solid var(--border); border-radius:var(--radius); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:16px; text-align:center; letter-spacing:4px; outline:none; }
.login-input:focus { border-color:var(--text-3); }
.login-input::placeholder { letter-spacing:1px; color:var(--text-4); font-size:13px; }
.login-btn { width:100%; margin-top:14px; padding:14px; background:var(--text); border:none; border-radius:var(--radius); color:#fff; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; }
.login-btn:hover { opacity:.85; }
.login-error { margin-top:12px; font-size:13px; color:var(--red); height:18px; }

.app-shell { display:none; height:100vh; }
.app-shell.active { display:flex; }

.bs-sidebar { width:230px; background:var(--bg); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; transition:width .2s; }
.bs-sidebar.collapsed { width:56px; }
.bs-sidebar.collapsed .side-brand span, .bs-sidebar.collapsed .side-section-label, .bs-sidebar.collapsed .side-label, .bs-sidebar.collapsed .side-user-name, .bs-sidebar.collapsed .lock-btn { display:none; }
.bs-sidebar.collapsed .side-brand { justify-content:center; padding:20px 0 18px; }
.bs-sidebar.collapsed .side-item { justify-content:center; padding:10px 0; margin:0 8px 1px; }
.bs-sidebar.collapsed .side-section { padding:12px 0 0; }
.bs-sidebar.collapsed .side-footer { justify-content:center; padding:16px 0; }
.bs-sidebar.collapsed .side-user { justify-content:center; }

.side-brand { padding:20px 20px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.side-mark { width:26px; height:26px; border-radius:7px; background:var(--text); display:grid; place-items:center; font-weight:700; font-size:11px; color:#fff; }
.side-brand span { font-size:14px; font-weight:600; color:var(--text); }
.side-section { padding:18px 14px 0; }
.side-section-label { font-size:10px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--text-4); padding:0 10px; margin-bottom:6px; }
.side-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:var(--radius); cursor:pointer; transition:all .12s; margin-bottom:1px; text-decoration:none; }
.side-item:hover { background:var(--bg-page); text-decoration:none; }
.side-item.active { background:var(--bg-alt); }
.side-item.active .side-icon svg { stroke:var(--text); }
.side-item.active .side-label { color:var(--text); font-weight:600; }
.side-icon { width:18px; height:18px; display:grid; place-items:center; }
.side-icon svg { width:16px; height:16px; stroke:var(--text-4); stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.side-label { font-size:13px; font-weight:500; color:var(--text-3); }
.side-item.disabled { opacity:.35; pointer-events:none; }
.side-footer { margin-top:auto; padding:16px 20px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.side-user { display:flex; align-items:center; gap:9px; }
.side-avatar { width:26px; height:26px; border-radius:50%; background:var(--bg-alt); display:grid; place-items:center; font-size:11px; font-weight:600; color:var(--text-3); }
.side-user-name { font-size:13px; font-weight:500; color:var(--text-3); }
.lock-btn { background:none; border:none; cursor:pointer; padding:4px; color:var(--text-4); }
.lock-btn:hover { color:var(--text); }
.collapse-btn { background:none; border:none; cursor:pointer; padding:6px 12px; color:var(--text-4); font-size:14px; }
.collapse-btn:hover { color:var(--text); }

.main-content { flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden; }

/* Header */
.hdr{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:52px;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;color:var(--accent);letter-spacing:-.3px}
.hdr-meta{font-size:12px;font-weight:500;color:var(--text-3);margin-left:12px;border-left:1px solid var(--border);padding-left:10px}
.hdr-meta b{color:var(--amber)}
.hl,.hr{display:flex;align-items:center;gap:6px}

/* Main layout */
.main{display:flex;height:calc(100vh - 52px);flex:1}
.ls{width:100%;overflow-y:auto;min-width:0}
.detail-page{display:none;width:100%;overflow-y:auto;background:var(--bg-alt)}
.main.detail-view .ls{display:none}
.main.detail-view .detail-page{display:block}

/* Detail page */
.det-sticky{position:sticky;top:0;z-index:10;background:var(--bg-alt);border-bottom:1px solid var(--border)}
.det-sticky-inner{max-width:900px;margin:0 auto;padding:12px 24px}
.det-body{max-width:900px;margin:0 auto;padding:20px 24px 40px}
.det-full{grid-column:1/-1}

/* List header + rows */
.th-p{display:grid;grid-template-columns:52px 1fr 85px 100px 220px 70px 110px 100px 70px 70px 70px;align-items:center;padding:8px 10px;background:var(--bg-alt);border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:.4px;gap:4px}
#lh{position:sticky;top:0;z-index:20;background:var(--bg-alt)}
.th-sort{cursor:pointer;user-select:none}
.th-sort:hover{color:var(--text)}
.rw{border-bottom:1px solid var(--border);cursor:pointer;transition:background .08s}
.rw:hover{background:var(--bg-alt)}
.rw.act,.rw.sel{background:var(--accent-dim)}
.rw.archived{display:none}
.rm-p{display:grid;grid-template-columns:52px 1fr 85px 100px 220px 70px 110px 100px 70px 70px 70px;align-items:center;padding:8px 10px;font-size:13px;font-weight:500;gap:4px}

/* Address + subtext */
.at{font-weight:700;color:var(--text);font-size:13px}
.as{font-size:11px;font-weight:500;color:var(--text-3);margin-top:1px}

/* School pills (compact) */
.sp{display:inline-flex;align-items:center;gap:2px;font-size:11px;font-weight:600;padding:2px 5px;border-radius:4px}
.sp .lv{font-size:8px;font-weight:700;opacity:.7}
.sh{background:var(--green-bg);color:var(--green)}
.sm{background:var(--amber-bg);color:var(--amber)}
.sl{background:var(--red-bg);color:var(--red)}
.sc{display:flex;gap:3px;align-items:center;flex-wrap:nowrap}
.hs-name{font-size:11px;font-weight:500;color:var(--text-2);margin-left:3px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Comp rows */
.cr{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border-radius:var(--radius-sm);margin-bottom:2px;font-size:13px;font-weight:500}
.cd{background:var(--purple-bg)}.cf{background:var(--green-bg)}
.cl{font-size:11px;font-weight:700;letter-spacing:.3px;min-width:40px}
.cri{display:flex;gap:8px;align-items:center;flex-shrink:0}
.ab{margin-top:8px;padding:8px 10px;background:var(--accent-dim);border-radius:var(--radius);border:1px solid var(--border);font-size:13px;color:var(--accent);font-weight:700}
.cb{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:8px}

/* Agent + showing info blocks */
.agb{margin-top:12px;font-size:13px;color:var(--text-2);padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);display:grid;grid-template-columns:1fr 1fr;gap:6px}
.agb b{color:var(--text);font-weight:600}
.si{margin-top:8px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.si b{color:var(--text);font-weight:600}

/* Button overrides for this tool */
.btn-on{border-color:var(--amber);background:var(--amber-bg);color:var(--amber)}
.btn-lo{padding:4px 10px;font-size:11px}
.btn-lo-on{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}

/* Archive modal items */
.arch-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg-alt);font-size:13px}
.restore-btn{padding:4px 10px;border-radius:var(--radius-sm);border:1px solid var(--green-bg);background:var(--green-bg);color:var(--green);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.pc{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-4);padding:2px 4px}
.pc:hover{color:var(--text)}

select.btn{appearance:auto}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginScreen">

    <div class="login-brand"><div class="login-mark">D</div><span>Dotty Homes</span></div>

<!-- APP SHELL -->
<div class="app-shell" id="appShell">

<!-- Sidebar -->
<div class="bs-sidebar" id="bsSidebar">

    </a>
    <a class="side-item" href="flip-analyzer.html">
      <div class="side-icon"><svg viewBox="0 0 24 24"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg></div>
      <span class="side-label">FlipAnalyzer</span>
    </a>
  </div>
  <div class="side-section">
    <div class="side-section-label">Data</div>
    <a class="side-item" href="comps-db.html">

      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</div>

<!-- Main content -->
<div class="main-content">

<div class="hdr">
  <div class="hl">
    <div class="logo">MLS Deals</div>
    <div style="position:relative;display:inline-block" id="cf-wrap">
      <button class="btn" id="cf-btn" onclick="document.getElementById('cf-drop').classList.toggle('open')" style="min-width:140px;text-align:left">All Cities ▾</button>
      <div id="cf-drop" style="position:absolute;top:100%;left:0;margin-top:4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:999;min-width:200px;max-height:320px;overflow-y:auto;padding:4px 0">
        <div style="padding:4px 10px;border-bottom:1px solid var(--border);display:flex;gap:6px">

        <label><input type="checkbox" value="First time on market" onchange="toggleTagFilter(this.value)">First time on market</label>
        <label><input type="checkbox" value="Price reduced" onchange="toggleTagFilter(this.value)">Price reduced</label>

    <button class="btn" id="bf-contacted" onclick="setFilter('contacted')">Contacted <span id="cnt-contacted"></span></button>

</div>

<div class="main">
  <div class="ls" id="ls"><div id="lh"></div><div id="lb"></div></div>

</div>

<div class="modal-bg" id="arch-modal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">

<!-- Photo Lightbox -->
<div class="lb-overlay" id="photoLightbox">

  <div class="lb-grid" id="lbGrid"></div>
</div>

<script>
// ========== SUPABASE CLIENT ==========
const SUPABASE_URL='https://pwrnywsojomrygsiezzi.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3cm55d3Nvam9tcnlnc2llenppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzE1OTMsImV4cCI6MjA4OTgwNzU5M30.tGewn18t-6dN_bMXjC-Z820zFYvL1VUu3BDhfW1ZoNk';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// ========== PHOTO SUPPORT ==========
const PHOTO_BASE='https://photos.dottyhomes.com';
const photoCountCache={};

function getThumbUrl(mls){return `${PHOTO_BASE}/${mls}/${mls}_01.jpg`;}

// Lightbox state
let lbMls='';

function openLightbox(mls,addr){
  lbMls=mls;
  document.getElementById('lbAddr').textContent=addr;
  const grid=document.getElementById('lbGrid');
  grid.innerHTML='';
  // Load photos sequentially until one fails
  let i=1;
  function loadNext(){
    const num=String(i).padStart(2,'0');
    const url=`${PHOTO_BASE}/${mls}/${mls}_${num}.jpg`;
    const img=new Image();
    img.onload=function(){
      const el=document.createElement('img');
      el.src=url;
      el.onclick=function(){
        if(this.classList.contains('lb-full')){this.classList.remove('lb-full');}

async function geocodeAddress(address,city,zipcode){
  const full=`${address}, ${city}, CA ${zipcode}`.trim();
  const key=full.toLowerCase();
  if(geocodeCache[key])return geocodeCache[key];
  try{
    const resp=await fetch(`https://geocoding.geo.census.gov/geocoder/locations/onelineaddress?${new URLSearchParams({address:full,benchmark:'Public_AR_Current',format:'json'})}`);
    const data=await resp.json();
    const m=(data?.result?.addressMatches||[])[0];
    if(m?.coordinates?.y&&m?.coordinates?.x){const r=[m.coordinates.y,m.coordinates.x];geocodeCache[key]=r;return r;}
  }catch(e){console.log('[Geocode] Error:',e);}
  const fb=CITY_COORDS[(city||'').toLowerCase().trim()]||[null,null];
  if(fb[0])geocodeCache[key]=fb;
  return fb;
}

// ========== HAVERSINE ==========
function haversine(lat1,lon1,lat2,lon2){
  const R=3959,toRad=x=>x*Math.PI/180,dlat=toRad(lat2-lat1),dlon=toRad(lon2-lon1);
  const a=Math.sin(dlat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dlon/2)**2;
  return R*2*Math.asin(Math.sqrt(a));
}

// ========== COMP MATCHING (ported from Python) ==========
async function findComps(listing){
  const sqft=listing.sqft||0;
  if(!sqft)return{comps:[],hp:0,arv:0,listingLat:null,listingLng:null};
  const sqftRange=listing.sqftRange||200,radius=listing.radius||0.25,months=listing.months||12;
  const sqftMin=sqft-sqftRange,sqftMax=sqft+sqftRange;
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-months*30);
  const cutoffStr=cutoff.toISOString().split('T')[0];

  let lat=parseFloat(listing.latitude)||null,lon=parseFloat(listing.longitude)||null;
  if(!lat||!lon){const c=await geocodeAddress(listing.address||'',listing.city||'',listing.zip||'');lat=c[0];lon=c[1];}

  // Build bounding box if we have coordinates
  let boxFilter=null;
  if(lat&&lon){
    const box=Math.max(radius*1.5,0.5),dpm=1/69.0,latR=box*dpm,lngR=box*dpm/Math.cos(lat*Math.PI/180);
    boxFilter={latMin:lat-latR,latMax:lat+latR,lngMin:lon-lngR,lngMax:lon+lngR};
  }

  // Query 1: Sold comps (matches Comp DB query pattern exactly)
  let q1=sb.from('properties').select('*').eq('change_type','sold').gte('sold_date',cutoffStr).gte('sqft',sqftMin).lte('sqft',sqftMax).order('sold_date',{ascending:false}).limit(500);
  if(boxFilter)q1=q1.gte('latitude',boxFilter.latMin).lte('latitude',boxFilter.latMax).gte('longitude',boxFilter.lngMin).lte('longitude',boxFilter.lngMax);

  // Query 2: Unsold flips (separate query, no date filter)
  let q2=sb.from('properties').select('*').eq('stage','unsold_flip').gte('sqft',sqftMin).lte('sqft',sqftMax).limit(100);
  if(boxFilter)q2=q2.gte('latitude',boxFilter.latMin).lte('latitude',boxFilter.latMax).gte('longitude',boxFilter.lngMin).lte('longitude',boxFilter.lngMax);

  const[r1,r2]=await Promise.all([q1,q2]);
  if(r1.error)console.error('[Supabase sold]',r1.error);
  if(r2.error)console.error('[Supabase flips]',r2.error);
  const allComps=[...(r1.data||[]),...(r2.data||[])];
  console.log(`[findComps] ${listing.address}: sqft=${sqft} range=${sqftMin}-${sqftMax} cutoff=${cutoffStr} lat=${lat} lon=${lon}`);
  console.log(`[findComps] box=${boxFilter?`${boxFilter.latMin.toFixed(4)}-${boxFilter.latMax.toFixed(4)}, ${boxFilter.lngMin.toFixed(4)}-${boxFilter.lngMax.toFixed(4)}`:'none'}`);
  console.log(`[findComps] sold query returned ${r1.data?.length||0} rows, flips query returned ${r2.data?.length||0} rows`);
  if(r1.data?.length)console.log('[findComps] first sold comp:',r1.data[0].address,r1.data[0].city,r1.data[0].sqft,r1.data[0].sold_date,r1.data[0].latitude,r1.data[0].longitude);
  // Debug: check if specific comps are in the raw results
  const debugAddrs=['woodcrest','baker','1425','1501'];
  allComps.forEach(c=>{const a=(c.address||'').toLowerCase();if(debugAddrs.some(d=>a.includes(d)))console.log('[findComps] FOUND IN RAW:',c.address,c.city,'sqft='+c.sqft,'sold='+c.sold_date,'lat='+c.latitude,'change_type='+c.change_type,'comp_type='+c.comp_type);});
  if(!allComps.some(c=>{const a=(c.address||'').toLowerCase();return debugAddrs.some(d=>a.includes(d));}))console.log('[findComps] Woodcrest/Baker NOT in raw query results — check change_type, sqft, sold_date, or lat/lng in Supabase');

  const listingHs=(listing.high?.n||'').toLowerCase().trim(),listingHsR=listing.high?.r||0;
  const results=[];
  for(const comp of(allComps||[])){
    let dist=null;
    if(lat&&lon&&comp.latitude&&comp.longitude){dist=haversine(lat,lon,comp.latitude,comp.longitude);if(dist>radius)continue;}
    else{if((comp.city||'').toLowerCase().trim()!==(listing.city||'').toLowerCase().trim())continue;}
    const cHsR=comp.high_rating||0;
    // School rating filter removed — show all comps regardless of school zone
    const cHs=(comp.high_school||'').toLowerCase().trim();
    const schoolMatch=!!(listingHs&&cHs&&(listingHs.includes(cHs)||cHs.includes(listingHs)));
    const isUnsoldFlip=comp.stage==='unsold_flip'&&!comp.sale_price;
    const compPrice=comp.sale_price||comp.list_price||0;
    const compDate=comp.sold_date||comp.list_date||'';
    const compPsf=(comp.sqft&&compPrice)?Math.round(compPrice/comp.sqft):0;
    const compType=isUnsoldFlip?'unsold_flip':(comp.comp_type||'general');
    results.push({
      type:compType==='general'?'sold':compType,
      addr:((comp.address||'').trim()+', '+(comp.city||'').trim()).replace(/^, |, $/g,''),
      price:compPrice,sqft:comp.sqft||0,
      beds:comp.beds||0,baths:comp.baths||0,
      psf:compPsf,
      date:compDate,dist:dist!==null?Math.round(dist*100)/100:null,
      schoolMatch,highSchool:comp.high_school||'',highRating:comp.high_rating||0,
      elemSchool:comp.elementary_school||'',elemRating:comp.elementary_rating||0,
      midSchool:comp.middle_school||'',midRating:comp.middle_rating||0,
      lat:comp.latitude,lng:comp.longitude,
      isAsking:isUnsoldFlip,
      typePriority:{dotty:0,flips:1,halfflips:1,unsold_flip:1,general:2}[compType]??2,
    });
  }
  results.sort((a,b)=>(a.schoolMatch?0:1)-(b.schoolMatch?0:1)||(a.typePriority-b.typePriority)||((a.dist??999)-(b.dist??999)));
  // Deduplicate by address: keep the most recent (first after sort by date desc) per address
  // Strip street suffixes (ST, AVE, DR, etc.) so "13522 Carnaby" and "13522 Carnaby ST" match
  const normAddr=s=>s.toLowerCase().replace(/\b(st|street|ave|avenue|blvd|boulevard|dr|drive|ln|lane|ct|court|cir|circle|pl|place|way|rd|road|ter|terrace)\b/g,'').replace(/[^a-z0-9]/g,'');
  const seen=new Set();
  const deduped=results.filter(c=>{const key=normAddr(c.addr);if(seen.has(key))return false;seen.add(key);return true;});
  const smPool=deduped.filter(c=>c.schoolMatch);
  const pool=smPool.length?smPool:deduped;
  const hp=pool.length?Math.max(...pool.map(c=>c.psf)):0;
  return{comps:deduped.slice(0,20),hp,arv:hp*sqft,listingLat:lat,listingLng:lon};
}

function compH(c,idx,mls){
  const lbl=c.type==='dotty'?'DOTTY':c.type==='flip'||c.type==='flips'?'FLIP':c.type==='halfflips'?'HALF':'SOLD';

  const tb=(c.type==='dotty'||c.type==='flip'||c.type==='flips'||c.type==='halfflips')?`<span style="font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;background:${c.type==='dotty'?'var(--purple-bg)':c.type==='halfflips'?'var(--amber-bg)':'var(--green-bg)'};color:${col};margin-right:3px">${lbl}</span>`:'';
  return`<div class="cr ${cls}" style="flex-wrap:wrap;padding:4px 6px">
    <div style="display:flex;align-items:center;gap:4px;flex:1;min-width:180px">
      <input type="checkbox" checked onchange="recalcCompSummary('${mid}')" data-comp-idx="${idx}" data-comp-mls="${mid}" style="flex-shrink:0">
      <span style="font-size:10px;font-weight:700;color:var(--accent);min-width:14px">${idx+1}</span>

function recalcCompSummary(mid){
  const cbs=document.querySelectorAll('input[data-comp-mls="'+mid+'"]');
  const activeMls=Object.keys(compCache).find(k=>k.replace(/[^a-zA-Z0-9]/g,'')===mid);
  if(!activeMls||!compCache[activeMls])return;
  const all=compCache[activeMls].comps,checked=[];
  cbs.forEach((cb,i)=>{if(cb.checked&&all[i])checked.push(all[i]);});
  const avg=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;
  const ppsfs=checked.map(c=>c.psf).filter(Boolean);
  const sc=document.getElementById('comp-summary-'+mid);
  if(sc)sc.innerHTML=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:8px">

    <div style="background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:5px 7px"><div style="font-size:9px;font-weight:600;color:var(--text-4);text-transform:uppercase">Avg $/SF</div><div style="font-size:15px;font-weight:700;color:var(--accent)">$${Math.round(avg(ppsfs))}</div></div>
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:5px 7px"><div style="font-size:9px;font-weight:600;color:var(--text-4);text-transform:uppercase">Avg SqFt</div><div style="font-size:15px;font-weight:700;color:var(--accent)">${Math.round(avg(checked.map(c=>c.sqft).filter(Boolean))).toLocaleString()}</div></div></div>`;
  const avgPsf=checked.length?Math.round(avg(ppsfs)):0;

const SELL_PCT=0.05,CONST_PCT=0.16,PURCH_EXP_PCT=0.02,PROFIT_TARGET_PCT=0.10;
let ppIsCustom={},constIsCustom={},listPriceMap={};
function getNumVal(id){return parseInt((document.getElementById(id)||{}).value?.replace(/[^\d]/g,'')||'0')||0;}
function setNumVal(id,n){const el=document.getElementById(id);if(el)el.value=F(n);}
function markPPCustom(id){ppIsCustom[id]=true;const r=document.getElementById('pp-reset-'+id);if(r)r.style.display='inline';}
function markConstCustom(id){constIsCustom[id]=true;}
function resetPP(id,lp,sq){ppIsCustom[id]=false;const r=document.getElementById('pp-reset-'+id);if(r)r.style.display='none';const arv=getNumVal('arv-'+id);const pp=Math.round(arv*(1-SELL_PCT)/(1+CONST_PCT+PURCH_EXP_PCT+PROFIT_TARGET_PCT));setNumVal('pp-'+id,pp);if(!constIsCustom[id])setNumVal('const-'+id,Math.round(pp*CONST_PCT));calcDeal(id,lp,sq);}

function detHTML(l){

function calcDeal(id,listPrice,sqft){
  listPriceMap[id]=listPrice;const arv=getNumVal('arv-'+id),pp=getNumVal('pp-'+id);
  if(!constIsCustom[id]&&!ppIsCustom[id]){const fp=Math.round(arv*(1-SELL_PCT)/(1+CONST_PCT+PURCH_EXP_PCT+PROFIT_TARGET_PCT));setNumVal('pp-'+id,fp);setNumVal('const-'+id,Math.round(fp*CONST_PCT));}
  else if(!constIsCustom[id]&&ppIsCustom[id])setNumVal('const-'+id,Math.round(pp*CONST_PCT));
  const fPP=getNumVal('pp-'+id),fConst=getNumVal('const-'+id),pExp=fPP*PURCH_EXP_PCT;
  const profit=arv*(1-SELL_PCT)-fConst-fPP-pExp,gap=listPrice-fPP,gapPct=listPrice>0?((gap/listPrice)*100).toFixed(1):'0',goTh=PROFIT_TARGET_PCT*fPP;
  const gE=document.getElementById('gap-'+id);
  if(gE){const gc=gap>0?'var(--red)':'var(--green)',gb=gap>0?'var(--red-bg)':'var(--green-bg)',gbd=gap>0?'#FECACA':'#A7F0BE';
    gE.innerHTML=`<div style="padding:10px 12px;border-radius:6px;background:${gb};border:1px solid ${gbd};display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:11px;font-weight:700;color:${gc}">${gap>0?'LISTING IS OVER YOUR TARGET':'LISTING IS UNDER YOUR TARGET'}</div><div style="font-size:10px;color:var(--text-3);margin-top:2px">List ${F(listPrice)} vs Your offer ${F(fPP)}</div></div><div style="text-align:right"><div style="font-size:20px;font-weight:800;color:${gc}">${gap>0?'+':''}${F(gap)}</div><div style="font-size:11px;color:var(--text-3)">${gap>0?'+':''}${gapPct}%</div></div></div>`;}
  const bE=document.getElementById('breakdown-'+id);
  if(bE){const v=profit>=goTh?'GO':profit>=goTh*0.75?'MAYBE':'NO GO',vc=v==='GO'?'var(--green)':v==='MAYBE'?'var(--amber)':'var(--red)',vb=v==='GO'?'var(--green-bg)':v==='MAYBE'?'var(--amber-bg)':'var(--red-bg)';
    let h=`<div style="display:flex;justify-content:space-between;padding:8px 0;margin-top:4px;border-top:2px solid var(--border)"><span style="font-size:13px;font-weight:700">Profit</span><span style="font-size:18px;font-weight:800;color:${profit>=0?'var(--green)':'var(--red)'}">${F(profit)}</span></div>`;
    if(ppIsCustom[id])h+=`<div style="margin-top:6px;padding:10px 14px;border-radius:6px;background:${vb};display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:22px;font-weight:900;color:${vc}">${v}</div><div style="font-size:10px;color:var(--text-3)">${v==='GO'?'Profit meets 10% target':v==='MAYBE'?'Close — negotiate harder':'Below profit target'}</div></div><div style="text-align:right"><div style="font-size:16px;font-weight:700;color:${vc}">${F(profit)}</div><div style="font-size:10px;color:var(--text-3)">Target: ${F(goTh)}</div></div></div>`;
    bE.innerHTML=h;}
}

function getArvVal(l){if(l.lockedArv)return l.lockedArv;const cm=compCache[l.mls];return(cm&&cm.hp)?cm.hp*l.sqft:0;}
function getGapVal(l){const cm=compCache[l.mls];if(!cm||!cm.hp)return 0;const arv=l.lockedArv||(cm.hp*l.sqft);if(!arv)return 0;const target=Math.round(arv*0.95/1.28);return l.price-target;}

function getSorted(){let d=[...listings];if(cityFilters.size)d=d.filter(l=>cityFilters.has(l.city.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase())));if(tagFilters.size)d=d.filter(l=>l.tags.some(t=>tagFilters.has(t)));if(sort_==='priority')d.sort((a,b)=>(b.tags.length>0?1:0)-(a.tags.length>0?1:0));else if(sort_==='price-asc')d.sort((a,b)=>a.price-b.price);else if(sort_==='price-desc')d.sort((a,b)=>b.price-a.price);else if(sort_==='ppsf-asc')d.sort((a,b)=>a.ppsf-b.ppsf);else if(sort_==='ppsf-desc')d.sort((a,b)=>b.ppsf-a.ppsf);else if(sort_==='dom-asc')d.sort((a,b)=>dom(a.listDate)-dom(b.listDate));else if(sort_==='dom-desc')d.sort((a,b)=>dom(b.listDate)-dom(a.listDate));else if(sort_==='arv-asc')d.sort((a,b)=>getArvVal(a)-getArvVal(b));else if(sort_==='arv-desc')d.sort((a,b)=>getArvVal(b)-getArvVal(a));else if(sort_==='gap-asc')d.sort((a,b)=>getGapVal(a)-getGapVal(b));else if(sort_==='gap-desc')d.sort((a,b)=>getGapVal(b)-getGapVal(a));return d;}

      ${l.mid?`<span class="sp ${l.mid.r>=7?'sh':l.mid.r>=5?'sm':'sl'}"><span class="lv">M</span>${l.mid.r}</span><span style="font-size:10px;color:var(--text-3);margin-right:4px">${shortName(l.mid.n)}</span>`:''}
      ${l.high?`<span class="sp ${l.high.r>=7?'sh':l.high.r>=5?'sm':'sl'}"><span class="lv">H</span>${l.high.r}</span><span style="font-size:10px;color:var(--text-3)">${shortName(l.high.n)}</span>`:''}
      ${l.tags.map(tg).join('')}</div></div></div></div>
  <div class="det-body">
    <div style="margin-bottom:14px"><div style="font-size:10px;font-weight:700;color:var(--text-4);letter-spacing:.5px;margin-bottom:4px">NOTES</div>
      <textarea id="notes2-${id}" onblur="updateNotes('${l.mls}')" placeholder="Add notes..." style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:5px;font-size:12px;font-family:inherit;min-height:50px;resize:vertical;background:var(--bg);color:var(--text);box-sizing:border-box">${l.notes||''}</textarea></div>
    <div style="margin-bottom:14px"><div style="font-size:10px;font-weight:700;color:var(--text-4);letter-spacing:.5px;margin-bottom:4px">REMARKS</div>
      <div class="rb"><b>Public:</b> ${l.remarks}</div>
      ${l.showingRemarks?`<div class="rb"><b>Showing:</b> ${l.showingRemarks}</div>`:''}
      ${l.agentRemarks?`<div class="rb" style="max-height:80px"><b>Agent:</b> ${l.agentRemarks}</div>`:''}</div>
    <div id="comp-col" style="margin-bottom:14px"></div>
    <div style="margin-bottom:14px"><div style="font-size:10px;font-weight:700;color:var(--text-4);letter-spacing:.5px;margin-bottom:6px">DEAL ANALYSIS</div>${detHTML(l)}</div>
    <div class="toggle-section" style="margin-bottom:8px"><div class="toggle-hdr" onclick="this.parentElement.classList.toggle('open')">PROPERTY & SHOWING <span>▸</span></div><div class="toggle-body"><div class="si">
      <span><b>Sale Type:</b> ${l.saleType||'—'}</span><span><b>Listed:</b> ${l.listDate||'—'}</span><span><b>Occupancy:</b> ${l.occupancy||'—'}</span><span><b>Occupant:</b> ${l.occupantType||'—'}</span><span><b>Contact:</b> ${l.contactName||'—'} ${l.contactPhone||''}</span><span><b>Lockbox:</b> ${l.lockboxType||'—'} ${l.lockboxLocation?'@ '+l.lockboxLocation:''}</span><span><b>Gate Code:</b> ${l.gateCode||'—'}</span></div></div></div>
    <div class="toggle-section" style="margin-bottom:14px"><div class="toggle-hdr" onclick="this.parentElement.classList.toggle('open')">AGENT & BROKER <span>▸</span></div><div class="toggle-body"><div class="agb">
      <span><b>Agent:</b> ${l.agent||'—'}</span><span><b>DRE#:</b> ${l.agentDre||'—'}</span><span><b>Email:</b> ${l.agentEmail||'—'}</span><span><b>Phone:</b> ${l.agentPhone||'—'}</span><span><b>Office:</b> ${l.agentOfficePhone||'—'}</span><span><b>Broker:</b> ${l.broker||'—'}</span><span><b>Broker DRE#:</b> ${l.brokerDre||'—'}</span><span><b>MLS#:</b> ${l.mls}</span></div></div></div></div>`;
  document.getElementById('detPage').innerHTML=h;
  document.getElementById('comp-col').innerHTML=compsPanel(l);
}

function opn(m){active=m;document.querySelector('.main').classList.add('detail-view');const l=listings.find(x=>x.mls===active);if(l){delete compCache[l.mls];renderDetailPage(l);loadComps(l);const id=l.mls.replace(/[^a-zA-Z0-9]/g,'');let polls=0;const poll=setInterval(()=>{polls++;if(compCache[l.mls]||polls>20){clearInterval(poll);document.getElementById('comp-col').innerHTML=compsPanel(l);const cm=getComps(l);if(l.lockedArv){setNumVal('arv-'+id,l.lockedArv);calcDeal(id,l.price,l.sqft);}else if(cm.hp>0){setNumVal('arv-'+id,cm.hp*l.sqft);calcDeal(id,l.price,l.sqft);}}},300);setTimeout(()=>calcDeal(id,l.price,l.sqft),100);}}
function cls(){active=null;document.querySelector('.main').classList.remove('detail-view');render();}
function setFilter(f){currentFilter=f;cityFilters.clear();tagFilters.clear();updateCityBtn();updateTagBtn();document.querySelectorAll('#tf-drop input[type=checkbox]').forEach(cb=>cb.checked=false);['unread','contacted','potential','unsold_flip','off_market_lead','archived','all'].forEach(k=>{const b=document.getElementById('bf-'+k);if(b)b.className='btn'+(k===f?' btn-on':'');});loadListings(f);}
function toggleCityFilter(city){if(cityFilters.has(city))cityFilters.delete(city);else cityFilters.add(city);updateCityBtn();render();}
function cfSelectAll(){const cbs=document.querySelectorAll('#cf-list input[type=checkbox]');cbs.forEach(cb=>{cb.checked=true;cityFilters.add(cb.value);});updateCityBtn();render();}
function cfSelectNone(){cityFilters.clear();const cbs=document.querySelectorAll('#cf-list input[type=checkbox]');cbs.forEach(cb=>cb.checked=false);updateCityBtn();render();}
function updateCityBtn(){const btn=document.getElementById('cf-btn');if(!cityFilters.size)btn.textContent='All Cities ▾';else if(cityFilters.size===1)btn.textContent=[...cityFilters][0]+' ▾';else btn.textContent=cityFilters.size+' Cities ▾';}
document.addEventListener('click',e=>{const wrap=document.getElementById('cf-wrap');const drop=document.getElementById('cf-drop');if(wrap&&drop&&!wrap.contains(e.target))drop.classList.remove('open');const tw=document.getElementById('tf-wrap');const td=document.getElementById('tf-drop');if(tw&&td&&!tw.contains(e.target))td.classList.remove('open');});
function toggleTagFilter(tag){if(tagFilters.has(tag))tagFilters.delete(tag);else tagFilters.add(tag);updateTagBtn();render();}
function tfSelectAll(){const cbs=document.querySelectorAll('#tf-drop input[type=checkbox]');cbs.forEach(cb=>{cb.checked=true;tagFilters.add(cb.value);});updateTagBtn();render();}
function tfSelectNone(){tagFilters.clear();const cbs=document.querySelectorAll('#tf-drop input[type=checkbox]');cbs.forEach(cb=>cb.checked=false);updateTagBtn();render();}
function updateTagBtn(){const btn=document.getElementById('tf-btn');if(!tagFilters.size)btn.textContent='All Tags ▾';else if(tagFilters.size===1)btn.textContent=[...tagFilters][0]+' ▾';else btn.textContent=tagFilters.size+' Tags ▾';}


async function refetchComps(mls){const l=listings.find(x=>x.mls===mls);if(!l)return;const mid=mls.replace(/[^a-zA-Z0-9]/g,'');
  const radius=parseFloat((document.getElementById('comp-radius-'+mid)||{}).value||'0.25');
  const sqftRange=parseInt((document.getElementById('comp-sqft-'+mid)||{}).value||'150');
  const months=parseInt((document.getElementById('comp-months-'+mid)||{}).value||'6');
  delete compCache[mls];
  try{const data=await findComps({...l,radius,sqftRange,months});compCache[mls]=data;document.getElementById('comp-col').innerHTML=compsPanel(l);
    const re=document.getElementById('comp-radius-'+mid);if(re)re.value=radius;
    const se=document.getElementById('comp-sqft-'+mid);if(se)se.value=sqftRange;
    const me=document.getElementById('comp-months-'+mid);if(me)me.value=months;
    if(data.hp>0){setNumVal('arv-'+mid,data.hp*l.sqft);calcDeal(mid,l.price,l.sqft);}}catch(e){console.error('Refetch error:',e);}}

// ========== SUPABASE CRUD ==========
async function updateListingStatus(mls,s){const d={stage:s,updated_at:new Date().toISOString()};if(s==='archived')d.archived_at=new Date().toISOString();if(s==='unsold_flip')d.comp_type='flips';await sb.from('properties').update(d).eq('mls',mls);cls();await loadListings(currentFilter);updateStageCounts();}
async function updateNotes(mls){const mid=mls.replace(/[^a-zA-Z0-9]/g,'');const el=document.getElementById('notes2-'+mid);if(!el)return;await sb.from('properties').update({notes:el.value,updated_at:new Date().toISOString()}).eq('mls',mls);const r=document.getElementById('rownotes-'+mid);if(r&&r.value!==el.value)r.value=el.value;const li=listings.find(x=>x.mls===mls);if(li)li.notes=el.value;}
const _rowNotesTimers={};
function rowNotesInput(el){const mls=el.dataset.mls;clearTimeout(_rowNotesTimers[mls]);el.style.borderColor='var(--border)';_rowNotesTimers[mls]=setTimeout(()=>saveRowNotes(el),700);}
function rowNotesBlur(el){const mls=el.dataset.mls;clearTimeout(_rowNotesTimers[mls]);saveRowNotes(el);}
async function saveRowNotes(el){const mls=el.dataset.mls;const val=el.value;const li=listings.find(x=>x.mls===mls);if(li&&li.notes===val){el.style.borderColor='var(--border)';return;}el.style.borderColor='var(--accent)';const{error}=await sb.from('properties').update({notes:val,updated_at:new Date().toISOString()}).eq('mls',mls);if(error){el.style.borderColor='var(--red)';return;}if(li)li.notes=val;el.style.borderColor='var(--green)';setTimeout(()=>{el.style.borderColor='var(--border)';},1200);const mid=mls.replace(/[^a-zA-Z0-9]/g,'');const det=document.getElementById('notes2-'+mid);if(det&&det.value!==val)det.value=val;}

async function toggleLockArv(mls,id){
  const l=listings.find(x=>x.mls===mls);if(!l)return;
  if(l.lockedArv){
    // Unlock
    await sb.from('properties').update({locked_arv:null,updated_at:new Date().toISOString()}).eq('mls',mls);
    l.lockedArv=null;
  } else {
    // Lock current ARV value
    const arvVal=getNumVal('arv-'+id);
    if(!arvVal)return;
    await sb.from('properties').update({locked_arv:arvVal,updated_at:new Date().toISOString()}).eq('mls',mls);
    l.lockedArv=arvVal;
  }
  // Re-render detail page to update button state
  renderDetailPage(l);
  const cm=getComps(l);
  document.getElementById('comp-col').innerHTML=compsPanel(l);
  if(cm.hp>0){setNumVal('arv-'+id,l.lockedArv||(cm.hp*l.sqft));calcDeal(id,l.price,l.sqft);}
  render();
}
async function openArchive(){document.getElementById('arch-modal').classList.add('open');const{data}=await sb.from('properties').select('*').eq('stage','archived').order('updated_at',{ascending:false});const al=document.getElementById('arch-list');if(!data?.length){al.innerHTML='<p style="color:var(--text-4);font-size:12px">No archived deals.</p>';return;}al.innerHTML=data.map(r=>`<div class="arch-item"><span>${r.address}, ${r.city} — ${FK(r.list_price||0)}</span><button class="restore-btn" onclick="restoreDeal('${r.mls}')">Restore</button></div>`).join('');}
function closeArchive(){document.getElementById('arch-modal').classList.remove('open');}
async function restoreDeal(m){await sb.from('properties').update({stage:'unread',updated_at:new Date().toISOString()}).eq('mls',m);openArchive();loadListings(currentFilter);}

// ========== LOAD LISTINGS ==========
async function loadListings(status){
  let query=sb.from('properties').select('*').not('mls','is',null).neq('change_type','sold').order('imported_at',{ascending:false}).limit(500);
  if(status==='unread')query=query.eq('stage','unread');
  else if(status==='archived')query=query.eq('stage','archived');
  else if(status==='off_market_lead')query=query.eq('stage','off_market_lead');
  else if(status&&status!=='all')query=query.eq('stage',status);
  else query=query.not('stage','in','("archived","off_market_lead")');
  try{
    const{data,error}=await query;if(error)throw error;
    listings=(data||[]).map(r=>{
      const rmk=((r.remarks||'')+' '+(r.sale_type||'')).toLowerCase();const tags=[];
      if(/first time on the market|first time on market|first time in \d+ year/.test(rmk))tags.push('First time on market');
      if(/\btlc\b|\bfixer\b|\bhandyman\b|\bhandy.?man special\b/.test(rmk))tags.push('TLC / Fixer');
      if(/\btrust sale\b|\bprobate\b|\bestate sale\b|, trust\b/.test(rmk)||/trust/i.test(r.sale_type||''))tags.push('Estate / Trust');
      if(/\binvestor special\b|\bgreat for investors\b|\bflip\b|\bwholesale\b/.test(rmk))tags.push('Investor / Flip');
      if(/\bprice reduced\b|\breduced price\b|\bmotivated seller\b/.test(rmk))tags.push('Price reduced');
      if(/\bfully remodeled\b|\bcompletely remodeled\b|\btotally remodeled\b|\bnewly remodeled\b|\bfully renovated\b|\bcompletely renovated\b|\bnewly renovated\b/.test(rmk))tags.push('Already flipped');
      return{address:r.address||'',city:r.city||'',zip:r.zip||'',price:r.list_price||0,sqft:r.sqft||0,ppsf:r.ppsf||0,beds:r.beds||0,baths:parseFloat(r.baths)||0,lot:r.lot_size||'',built:r.year_built||'',mls:r.mls||'',listDate:r.list_date||'',pool:r.pool||'',saleType:r.sale_type||'',remarks:r.remarks||'',agentRemarks:r.agent_remarks||'',showingRemarks:r.showing_remarks||'',occupancy:r.occupancy||'',contactName:r.contact_name||'',contactPhone:r.contact_phone||'',occupantType:r.occupant_type||'',lockboxLocation:r.lockbox_location||'',lockboxType:r.lockbox_type||'',gateCode:r.gate_code||'',agent:r.agent_name||'',agentEmail:r.agent_email||'',agentPhone:r.agent_phone||'',agentOfficePhone:r.agent_office_phone||'',broker:r.agent_broker||'',brokerDre:r.broker_dre||'',agentDre:r.agent_dre||'',
        elem:r.elementary_rating||r.elementary_school?{r:r.elementary_rating||0,n:r.elementary_school||''}:null,
        mid:r.middle_rating||r.middle_school?{r:r.middle_rating||0,n:r.middle_school||''}:null,
        high:r.high_rating||r.high_school?{r:r.high_rating||0,n:r.high_school||''}:null,
        tags,status:r.stage||'unread',changeType:r.change_type||'',notes:r.notes||'',latitude:r.latitude,longitude:r.longitude,lockedArv:r.locked_arv||null};});
    active=null;sel.clear();render();
    const toTitle=s=>s.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());
    const cities=[...new Set(listings.map(l=>toTitle((l.city||'').trim())).filter(Boolean))].sort();
    const cfList=document.getElementById('cf-list');
    cfList.innerHTML=cities.map(c=>`<label><input type="checkbox" value="${c}" ${cityFilters.has(c)?'checked':''} onchange="toggleCityFilter('${c.replace(/'/g,"\\'")}')">${c}</label>`).join('');
    updateCityBtn();
    batchFetchComps();
  }catch(e){console.error('Failed to load:',e);}}

async function batchFetchComps(){
  const BATCH=10;
  let todo=listings.filter(l=>!compCache[l.mls]&&l.sqft>0);
  if(!todo.length)return;
  while(todo.length>0){
    const batch=todo.slice(0,BATCH);
    await Promise.all(batch.map(async l=>{try{compCache[l.mls]=await findComps({mls:l.mls,sqft:l.sqft,address:l.address,city:l.city,zip:l.zip,high:l.high,elem:l.elem,mid:l.mid,latitude:l.latitude,longitude:l.longitude});}catch(e){}}));
    render();console.log(`[Comps] Batch loaded for ${batch.length} listings (${todo.length-batch.length} remaining)`);
    todo=listings.filter(l=>!compCache[l.mls]&&l.sqft>0);
  }
}

render();

// === BACKSTAGE AUTH ===
const BS_HASH='c6f13722e2ec174320e4936445dbd16dbaced57f8df8794b83429293cf64e00d';
async function bsSha(s){try{const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}catch(e){return null;}}
async function bsLogin(){const pw=document.getElementById('pwInput').value;const h=await bsSha(pw);const ok=h?(h===BS_HASH):(pw==='103191');if(ok){sessionStorage.setItem('backstage_auth','1');bsShow();}else{document.getElementById('pwError').textContent='Incorrect passcode';document.getElementById('pwInput').value='';setTimeout(()=>document.getElementById('pwError').textContent='',2000);}}
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')bsLogin();});
function bsShow(){document.getElementById('loginScreen').style.display='none';document.getElementById('appShell').classList.add('active');}
if(sessionStorage.getItem('backstage_auth')==='1')bsShow();
</script>

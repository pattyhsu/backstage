<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLS Deals — Backstage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="backstage.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBtxBe0q6i46rUomZzVE3BKmJ4EQNYGvvU"></script>
<script src="auth.js"></script>
<script src="sidebar.js"></script>
<style>
/* === DEAL MACHINE — local layout only === */
/* All shared styles (buttons, tags, modals, school pills, toggles, etc.) come from backstage.css */

/* Thumbnail in list rows */
.rw-thumb{width:48px;height:36px;border-radius:4px;object-fit:cover;cursor:pointer;background:var(--bg-alt);flex-shrink:0}
.rw-thumb-empty{width:48px;height:36px;border-radius:4px;background:var(--bg-alt);flex-shrink:0;display:grid;place-items:center;font-size:10px;color:var(--text-4)}

/* Photo lightbox */
.lb-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);overflow-y:auto}
.lb-overlay.open{display:block}
.lb-close{position:fixed;top:16px;right:20px;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:24px;cursor:pointer;z-index:10001;padding:4px 12px;line-height:1;border-radius:6px;backdrop-filter:blur(4px)}
.lb-close:hover{background:rgba(255,255,255,.2)}
.lb-addr{color:#fff;font-size:14px;font-weight:600;text-align:center;padding:16px 60px 12px;position:sticky;top:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);z-index:10000}
.lb-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:4px 4px 40px;max-width:1200px;margin:0 auto}
.lb-grid img{width:100%;display:block;cursor:pointer;border-radius:2px}
.lb-grid img.lb-full{position:fixed;inset:0;max-width:95vw;max-height:95vh;margin:auto;z-index:10002;border-radius:6px;object-fit:contain;cursor:zoom-out}

body{overflow:hidden;height:100vh}
#cf-drop{display:none}
#cf-drop.open{display:block}
#cf-drop label{display:flex;align-items:center;gap:8px;padding:5px 12px;font-size:12px;font-weight:500;color:var(--text);cursor:pointer}
#cf-drop label:hover{background:var(--bg-alt)}
#tf-drop{display:none}
#tf-drop.open{display:block}
#tf-drop label{display:flex;align-items:center;gap:8px;padding:5px 12px;font-size:12px;font-weight:500;color:var(--text);cursor:pointer}
#tf-drop label:hover{background:var(--bg-alt)}
#gf-drop{display:none}
#gf-drop.open{display:block}
#gf-drop button:hover{background:var(--bg-alt)}
#more-filters-drop{display:none}
#more-filters-drop.open{display:block}

/* === Tesla-friendly custom dropdowns for the comp panel ===
   Native <select> popups don't render on Tesla's browser, so the three
   tolerance selects (radius/sqft/months) and the per-comp retag select are
   replaced with button + floating div pairs styled to match the same size
   as the originals. CSS triangle (::after) is used for the chevron because
   Tesla doesn't render unicode arrows. */
.cmp-wrap{position:relative;display:inline-block}
.cmp-drop-btn{padding:3px 16px 3px 6px;border:1px solid var(--border);border-radius:4px;font-size:10px;font-family:inherit;background:var(--bg);color:var(--text);cursor:pointer;line-height:1.4;position:relative}
.cmp-drop-btn::after{content:'';position:absolute;right:5px;top:50%;transform:translateY(-25%);width:0;height:0;border-left:3px solid transparent;border-right:3px solid transparent;border-top:4px solid currentColor;opacity:.55}
.cmp-drop{display:none;position:absolute;top:100%;left:0;margin-top:2px;background:var(--bg);border:1px solid var(--border);border-radius:4px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:999;min-width:70px;padding:2px 0}
.cmp-drop.open{display:block}
.cmp-drop button{display:block;width:100%;text-align:left;padding:4px 8px;border:none;background:none;font-family:inherit;font-size:10px;color:var(--text);cursor:pointer}
.cmp-drop button:hover{background:var(--bg-alt)}
.cmp-drop button.selected{background:var(--bg-alt);color:var(--accent);font-weight:600}

.retag-wrap{position:relative;display:inline-block;margin-right:3px}
.retag-btn{padding:1px 12px 1px 3px;border:1px solid transparent;border-radius:3px;font-family:inherit;font-size:8px;font-weight:700;cursor:pointer;text-transform:uppercase;line-height:1.3;position:relative}
.retag-btn::after{content:'';position:absolute;right:3px;top:50%;transform:translateY(-25%);width:0;height:0;border-left:2.5px solid transparent;border-right:2.5px solid transparent;border-top:3px solid currentColor;opacity:.6}
.retag-drop{display:none;position:absolute;top:100%;left:0;margin-top:2px;background:var(--bg);border:1px solid var(--border);border-radius:4px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:999;min-width:60px;padding:2px 0}
.retag-drop.open{display:block}
.retag-drop button{display:block;width:100%;text-align:left;padding:3px 7px;border:none;background:none;font-family:inherit;font-size:8px;font-weight:700;cursor:pointer;text-transform:uppercase}
.retag-drop button:hover{background:var(--bg-alt)}

.sp{position:relative}
.sp:hover::after{content:attr(data-school);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#fff;color:var(--text);font-size:11px;font-weight:500;padding:4px 8px;border-radius:4px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.12);white-space:nowrap;z-index:100;pointer-events:none}

/* === BACKSTAGE SHELL === */

.app-shell { display:flex; height:100vh; }

.bs-sidebar { width:230px; background:var(--bg); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; transition:width .2s; }
.bs-sidebar.collapsed { width:56px; }
.bs-sidebar.collapsed .side-brand span, .bs-sidebar.collapsed .side-section-label, .bs-sidebar.collapsed .side-label, .bs-sidebar.collapsed .side-user-name, .bs-sidebar.collapsed .lock-btn { display:none; }
.bs-sidebar.collapsed .side-brand { justify-content:center; padding:20px 0 18px; }
.bs-sidebar.collapsed .side-item { justify-content:center; padding:10px 0; margin:0 8px 1px; }
.bs-sidebar.collapsed .side-section { padding:12px 0 0; }
.bs-sidebar.collapsed .side-footer { justify-content:center; padding:16px 0; }
.bs-sidebar.collapsed .side-user { justify-content:center; }

.side-brand { padding:20px 20px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.side-mark { width:26px; height:26px; border-radius:7px; background:var(--text); display:grid; place-items:center; font-weight:700; font-size:11px; color:#fff; }
.side-brand span { font-size:14px; font-weight:600; color:var(--text); }
.side-section { padding:6px 10px 0; }
.side-section-label { font-size:9px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--text-4); padding:0 8px; margin-bottom:2px; }
.side-item { display:flex; align-items:center; gap:8px; padding:3px 8px; border-radius:var(--radius); cursor:pointer; transition:all .12s; margin-bottom:0; text-decoration:none; line-height:1.3; }
.side-item:hover { background:var(--bg-page); text-decoration:none; }
.side-item.active { background:var(--bg-alt); }
.side-item.active .side-icon svg { stroke:var(--text); }
.side-item.active .side-label { color:var(--text); font-weight:600; }
.side-icon { width:18px; height:18px; display:grid; place-items:center; }
.side-icon svg { width:16px; height:16px; stroke:var(--text-4); stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.side-label { font-size:13px; font-weight:500; color:var(--text-3); }
.side-item.disabled { opacity:.35; pointer-events:none; }
.side-footer { margin-top:auto; padding:16px 20px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.side-user { display:flex; align-items:center; gap:9px; }
.side-avatar { width:26px; height:26px; border-radius:50%; background:var(--bg-alt); display:grid; place-items:center; font-size:11px; font-weight:600; color:var(--text-3); }
.side-user-name { font-size:13px; font-weight:500; color:var(--text-3); }
.lock-btn { background:none; border:none; cursor:pointer; padding:4px; color:var(--text-4); }
.lock-btn:hover { color:var(--text); }
.collapse-btn { background:none; border:none; cursor:pointer; padding:6px 12px; color:var(--text-4); font-size:14px; }
.collapse-btn:hover { color:var(--text); }

.main-content { flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden; }

/* Header */
.hdr{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:52px;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;color:var(--accent);letter-spacing:-.3px}
.hdr-meta{font-size:12px;font-weight:500;color:var(--text-3);margin-left:12px;border-left:1px solid var(--border);padding-left:10px}
.hdr-meta b{color:var(--amber)}
.hl,.hr{display:flex;align-items:center;gap:6px}

/* Main layout */
.main{display:flex;height:calc(100vh - 52px);flex:1}
.ls{width:100%;overflow:auto;min-width:0}
.detail-page{display:none;width:100%;overflow-y:auto;background:var(--bg-alt)}
.main.detail-view .ls{display:none}
.main.detail-view .detail-page{display:block}

/* Detail page */
.det-sticky{position:sticky;top:0;z-index:10;background:var(--bg-alt);border-bottom:1px solid var(--border)}
.det-sticky-inner{max-width:900px;margin:0 auto;padding:12px 24px}
.det-body{max-width:900px;margin:0 auto;padding:20px 24px 40px}
.det-full{grid-column:1/-1}

/* List header + rows */
.th-p{display:grid;grid-template-columns:32px 56px 52px minmax(160px,1fr) 85px 100px 220px 70px 110px 100px 70px 70px;min-width:1190px;align-items:center;padding:8px 10px;background:var(--bg-alt);border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:.4px;gap:4px}
#lh{position:sticky;top:0;z-index:20;background:var(--bg-alt)}
.th-sort{cursor:pointer;user-select:none}
.th-sort:hover{color:var(--text)}
.rw{border-bottom:1px solid var(--border);cursor:pointer;transition:background .08s}
.rw:hover{background:var(--bg-alt)}
.rw.act,.rw.sel{background:var(--accent-dim)}
.rw.archived{display:none}
.rm-p{display:grid;grid-template-columns:32px 56px 52px minmax(160px,1fr) 85px 100px 220px 70px 110px 100px 70px 70px;min-width:1190px;align-items:center;padding:8px 10px;font-size:13px;font-weight:500;gap:4px}

/* Address + subtext */
.at{font-weight:700;color:var(--text);font-size:13px}
.as{font-size:11px;font-weight:500;color:var(--text-3);margin-top:1px}

/* School pills (compact) */
.sp{display:inline-flex;align-items:center;gap:2px;font-size:11px;font-weight:600;padding:2px 5px;border-radius:4px}
.sp .lv{font-size:8px;font-weight:700;opacity:.7}
.sh{background:var(--green-bg);color:var(--green)}
.sm{background:var(--amber-bg);color:var(--amber)}
.sl{background:var(--red-bg);color:var(--red)}
.sc{display:flex;gap:3px;align-items:center;flex-wrap:nowrap}
.hs-name{font-size:11px;font-weight:500;color:var(--text-2);margin-left:3px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Comp rows */
.cr{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border-radius:var(--radius-sm);margin-bottom:2px;font-size:13px;font-weight:500}
.cd{background:var(--purple-bg)}.cf{background:var(--green-bg)}
.cl{font-size:11px;font-weight:700;letter-spacing:.3px;min-width:40px}
.cri{display:flex;gap:8px;align-items:center;flex-shrink:0}
.ab{margin-top:8px;padding:8px 10px;background:var(--accent-dim);border-radius:var(--radius);border:1px solid var(--border);font-size:13px;color:var(--accent);font-weight:700}
.cb{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:8px}

/* Agent + showing info blocks */
.agb{margin-top:12px;font-size:13px;color:var(--text-2);padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);display:grid;grid-template-columns:1fr 1fr;gap:6px}
.agb b{color:var(--text);font-weight:600}
.si{margin-top:8px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.si b{color:var(--text);font-weight:600}

/* Button overrides for this tool */
.btn-on{border-color:var(--amber);background:var(--amber-bg);color:var(--amber)}
.btn-lo{padding:4px 10px;font-size:11px}
.btn-lo-on{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}

/* Archive modal items */
.arch-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg-alt);font-size:13px}
.restore-btn{padding:4px 10px;border-radius:var(--radius-sm);border:1px solid var(--green-bg);background:var(--green-bg);color:var(--green);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.pc{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-4);padding:2px 4px}
.pc:hover{color:var(--text)}
</style>
</head>
<body>

<!-- APP SHELL -->
<div class="app-shell">

<!-- Sidebar -->
<!-- Sidebar (rendered by sidebar.js) -->
<div class="bs-sidebar" id="bsSidebar"></div>

<!-- Main content -->
<div class="main-content">

<div class="hdr">
  <div class="hl">
    <div class="logo">MLS Deals</div>
    <div style="position:relative;display:inline-block" id="cf-wrap">
      <button class="btn" id="cf-btn" onclick="document.getElementById('cf-drop').classList.toggle('open')" style="min-width:140px;text-align:left">All Cities ▾</button>
      <div id="cf-drop" style="position:absolute;top:100%;left:0;margin-top:4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:999;min-width:200px;max-height:320px;overflow-y:auto;padding:4px 0">
        <div style="padding:4px 10px;border-bottom:1px solid var(--border);display:flex;gap:6px">
          <button onclick="cfSelectAll()" style="font-size:10px;font-weight:600;font-family:inherit;background:none;border:none;color:var(--accent);cursor:pointer;padding:2px 4px">All</button>
          <button onclick="cfSelectNone()" style="font-size:10px;font-weight:600;font-family:inherit;background:none;border:none;color:var(--accent);cursor:pointer;padding:2px 4px">None</button>
        </div>
        <div id="cf-list"></div>
      </div>
    </div>
    <div style="position:relative;display:inline-block" id="tf-wrap">
      <button class="btn" id="tf-btn" onclick="document.getElementById('tf-drop').classList.toggle('open')" style="min-width:120px;text-align:left">All Tags ▾</button>
      <div id="tf-drop" style="position:absolute;top:100%;left:0;margin-top:4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:999;min-width:220px;padding:4px 0">
        <div style="padding:4px 10px;border-bottom:1px solid var(--border);display:flex;gap:6px">
          <button onclick="tfSelectAll()" style="font-size:10px;font-weight:600;font-family:inherit;background:none;border:none;color:var(--accent);cursor:pointer;padding:2px 4px">All</button>
          <button onclick="tfSelectNone()" style="font-size:10px;font-weight:600;font-family:inherit;background:none;border:none;color:var(--accent);cursor:pointer;padding:2px 4px">None</button>
        </div>
        <label><input type="checkbox" value="Fixer" onchange="toggleTagFilter(this.value)">Fixer</label>
        <label><input type="checkbox" value="Dated" onchange="toggleTagFilter(this.value)">Dated</label>
        <label><input type="checkbox" value="Estate / Trust" onchange="toggleTagFilter(this.value)">Estate / Trust</label>
        <label><input type="checkbox" value="Price reduced" onchange="toggleTagFilter(this.value)">Price reduced</label>
        <label><input type="checkbox" value="Already flipped" onchange="toggleTagFilter(this.value)">Already flipped</label>
      </div>
    </div>
    <div style="position:relative;display:inline-block" id="addr-search-wrap">
      <input type="text" id="addr-search" placeholder="Search address…"
             oninput="onAddrSearch(this.value)"
             onfocus="onAddrSearch(this.value)"
             autocomplete="off"
             style="padding:4px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;min-width:200px;font-family:inherit;background:var(--bg);color:var(--text-1)" />
      <div id="addr-search-drop" style="display:none;position:absolute;top:100%;left:0;margin-top:4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:999;min-width:280px;max-height:300px;overflow-y:auto;padding:4px 0"></div>
    </div>
    <div class="hdr-meta"><span id="tc">0</span> listings</div>
  </div>
  <div class="hr">
    <button class="btn btn-on" id="bf-unread" onclick="setFilter('unread')">Unread <span id="cnt-unread"></span></button>
    <button class="btn" id="bf-potential" onclick="setFilter('potential')">Potential <span id="cnt-potential"></span></button>
    <div style="position:relative;display:inline-block" id="more-filters-wrap">
      <button class="btn" id="more-filters-btn" onclick="document.getElementById('more-filters-drop').classList.toggle('open')" title="More views" style="padding:4px 10px">⋮</button>
      <div id="more-filters-drop" style="position:absolute;top:100%;right:0;margin-top:4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:999;min-width:160px;padding:4px 0">
        <button class="btn" id="bf-off_market_lead" onclick="setFilter('off_market_lead');document.getElementById('more-filters-drop').classList.remove('open')" style="display:block;width:100%;text-align:left;border:none;background:none;padding:6px 12px">Off-Market</button>
        <button class="btn" id="bf-unsold_flip" onclick="setFilter('unsold_flip');document.getElementById('more-filters-drop').classList.remove('open')" style="display:block;width:100%;text-align:left;border:none;background:none;padding:6px 12px">Unsold Flips</button>
        <button class="btn" id="bf-archived" onclick="setFilter('archived');document.getElementById('more-filters-drop').classList.remove('open')" style="display:block;width:100%;text-align:left;border:none;background:none;padding:6px 12px">Archive</button>
        <button class="btn" id="bf-all" onclick="setFilter('all');document.getElementById('more-filters-drop').classList.remove('open')" style="display:block;width:100%;text-align:left;border:none;background:none;padding:6px 12px">All</button>
      </div>
    </div>
    <div style="position:relative;display:inline-block;margin-left:6px" id="gf-wrap">
      <button class="btn" id="gf-btn" onclick="document.getElementById('gf-drop').classList.toggle('open')" style="padding:4px 10px;min-width:110px;text-align:left">All Grades ▾</button>
      <div id="gf-drop" style="position:absolute;top:100%;right:0;margin-top:4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:999;min-width:150px;padding:4px 0">
        <button class="btn btn-on" id="gf-all" onclick="setGradeFilter(null)" style="display:block;width:100%;text-align:left;border:none;background:none;padding:6px 12px">All <span id="gcnt-all"></span></button>
        <button class="btn" id="gf-A" onclick="setGradeFilter('A')" style="display:block;width:100%;text-align:left;border:none;background:none;padding:6px 12px">A <span id="gcnt-A"></span></button>
        <button class="btn" id="gf-B" onclick="setGradeFilter('B')" style="display:block;width:100%;text-align:left;border:none;background:none;padding:6px 12px">B <span id="gcnt-B"></span></button>
        <button class="btn" id="gf-C" onclick="setGradeFilter('C')" style="display:block;width:100%;text-align:left;border:none;background:none;padding:6px 12px">C <span id="gcnt-C"></span></button>
        <button class="btn" id="gf-D" onclick="setGradeFilter('D')" style="display:block;width:100%;text-align:left;border:none;background:none;padding:6px 12px">D <span id="gcnt-D"></span></button>
        <button class="btn" id="gf-ungraded" onclick="setGradeFilter('ungraded')" style="display:block;width:100%;text-align:left;border:none;background:none;padding:6px 12px">Ungraded <span id="gcnt-ungraded"></span></button>
      </div>
    </div>
    <span id="db-status" style="font-size:10px;color:var(--text-4)"></span>
  </div>
</div>

<div class="main">
  <div class="ls" id="ls"><div id="bulk-action-bar" style="display:none;position:sticky;top:0;z-index:50;background:var(--accent-bg,#fef3c7);border:1px solid var(--accent);border-radius:var(--radius);padding:8px 14px;margin:0 0 10px 0;gap:10px;align-items:center;font-size:13px;font-weight:600"><span id="bulk-count">0 selected</span><button class="btn" onclick="bulkArchive()" style="background:var(--red);color:#fff;border-color:var(--red)">Archive selected</button><button class="btn" onclick="bulkClear()">Cancel</button></div><div id="lh"></div><div id="lb"></div></div>
  <div class="detail-page" id="detPage"></div>
</div>

<div class="modal-bg" id="arch-modal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3>Archived Deals</h3><button class="pc" onclick="closeArchive()">✕</button>
    </div>
    <div id="arch-list"></div>
  </div>
</div>

<div class="modal-bg" id="const-editor">
  <div class="modal" style="max-width:560px;padding:0">

// Browser-side fallback only — fires when properties.latitude/longitude are NULL.
// Production geocoding is Google-primary in daily_pipeline (Brief AS); this is a last-resort lookup.
async function geocodeAddress(address,city,zipcode){
  const full=`${address}, ${city}, CA ${zipcode}`.trim();
  const key=full.toLowerCase();
  if(geocodeCache[key])return geocodeCache[key];
  try{
    const resp=await fetch(`https://geocoding.geo.census.gov/geocoder/locations/onelineaddress?${new URLSearchParams({address:full,benchmark:'Public_AR_Current',format:'json'})}`);
    const data=await resp.json();
    const m=(data?.result?.addressMatches||[])[0];
    if(m?.coordinates?.y&&m?.coordinates?.x){const r=[m.coordinates.y,m.coordinates.x];geocodeCache[key]=r;return r;}
  }catch(e){console.log('[Geocode] Error:',e);}
  const fb=CITY_COORDS[(city||'').toLowerCase().trim()]||[null,null];
  if(fb[0])geocodeCache[key]=fb;
  return fb;
}

// ========== HAVERSINE ==========
function haversine(lat1,lon1,lat2,lon2){
  const R=3959,toRad=x=>x*Math.PI/180,dlat=toRad(lat2-lat1),dlon=toRad(lon2-lon1);
  const a=Math.sin(dlat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dlon/2)**2;
  return R*2*Math.asin(Math.sqrt(a));
}

// ========== COMP MATCHING (ported from Python) ==========
async function findComps(listing){
  const sqft=listing.sqft||0;
  if(!sqft)return{comps:[],hp:0,arv:0,listingLat:null,listingLng:null};
  const sqftRange=listing.sqftRange||200,radius=listing.radius||0.25,months=listing.months||12;
  const sqftMin=sqft-sqftRange,sqftMax=sqft+sqftRange;
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-months*30);
  const cutoffStr=cutoff.toISOString().split('T')[0];

  let lat=parseFloat(listing.latitude)||null,lon=parseFloat(listing.longitude)||null;
  if(!lat||!lon){const c=await geocodeAddress(listing.address||'',listing.city||'',listing.zip||'');lat=c[0];lon=c[1];}

  // Build bounding box if we have coordinates
  let boxFilter=null;
  if(lat&&lon){
    const box=Math.max(radius*1.5,0.5),dpm=1/69.0,latR=box*dpm,lngR=box*dpm/Math.cos(lat*Math.PI/180);
    boxFilter={latMin:lat-latR,latMax:lat+latR,lngMin:lon-lngR,lngMax:lon+lngR};
  }

  // Query 1: Sold comps (matches Comp DB query pattern exactly)
  let q1=sb.from('properties').select('*').eq('change_type','sold').gte('sold_date',cutoffStr).gte('sqft',sqftMin).lte('sqft',sqftMax).order('sold_date',{ascending:false}).limit(500);
  if(boxFilter)q1=q1.gte('latitude',boxFilter.latMin).lte('latitude',boxFilter.latMax).gte('longitude',boxFilter.lngMin).lte('longitude',boxFilter.lngMax);

  // Query 2: Unsold flips (separate query, no date filter)
  let q2=sb.from('properties').select('*').eq('stage','unsold_flip').gte('sqft',sqftMin).lte('sqft',sqftMax).limit(100);
  if(boxFilter)q2=q2.gte('latitude',boxFilter.latMin).lte('latitude',boxFilter.latMax).gte('longitude',boxFilter.lngMin).lte('longitude',boxFilter.lngMax);

  const[r1,r2]=await Promise.all([q1,q2]);
  if(r1.error)console.error('[Supabase sold]',r1.error);
  if(r2.error)console.error('[Supabase flips]',r2.error);
  const allComps=[...(r1.data||[]),...(r2.data||[])];
  // Fix #6: surface silent SQL-level exclusion when subject has no geocoded coords.
  // SQL bbox filter (q1/q2) is skipped above (boxFilter null), so the JS-side falls
  // back to city-name match — but comps with missing coords + non-matching city are
  // still excluded by the JS loop below. This warns when the subject itself has no
  // coords; comps without coords are silently excluded by SQL bbox in the normal path.
  if(!lat||!lon)console.warn(`[findComps] subject ${listing.mls} has no geocoded coords; box filter skipped, comps without coords may be excluded by SQL bbox filter`);

  const listingHs=(listing.high?.n||'').toLowerCase().trim();
  const results=[];
  for(const comp of(allComps||[])){
    let dist=null;
    if(lat&&lon&&comp.latitude&&comp.longitude){dist=haversine(lat,lon,comp.latitude,comp.longitude);if(dist>radius)continue;}
    else{if((comp.city||'').toLowerCase().trim()!==(listing.city||'').toLowerCase().trim())continue;}
    // School rating filter removed — show all comps regardless of school zone
    const cHs=(comp.high_school||'').toLowerCase().trim();
    const schoolMatch=!!(listingHs&&cHs&&(listingHs.includes(cHs)||cHs.includes(listingHs)));
    const isUnsoldFlip=comp.stage==='unsold_flip'&&!comp.sale_price;
    const compPrice=comp.sale_price||comp.list_price||0;
    const compDate=comp.sold_date||comp.list_date||'';
    const compPsf=(comp.sqft&&compPrice)?Math.round(compPrice/comp.sqft):0;
    const compType=isUnsoldFlip?'unsold_flip':(comp.comp_type||'general');
    results.push({
      type:compType==='general'?'sold':compType,
      mls:comp.mls||'',
      addr:((comp.address||'').trim()+', '+(comp.city||'').trim()).replace(/^, |, $/g,''),
      price:compPrice,sqft:comp.sqft||0,lot:comp.lot_size||'',
      beds:comp.beds||0,baths:comp.baths||0,
      psf:compPsf,
      date:compDate,dist:dist!==null?Math.round(dist*100)/100:null,
      schoolMatch,highSchool:comp.high_school||'',highRating:comp.high_rating||0,
      elemSchool:comp.elementary_school||'',elemRating:comp.elementary_rating||0,
      midSchool:comp.middle_school||'',midRating:comp.middle_rating||0,
      lat:comp.latitude,lng:comp.longitude,
      isAsking:isUnsoldFlip,
      typePriority:{dotty:0,flips:1,halfflips:1,unsold_flip:1,general:2}[compType]??2,
      doubleEnded:comp.double_ended===true,
      photoCount:comp.photo_count||0,
      conditionTier:comp.condition_tier||null,
      isDotty:comp.is_dotty===true,
    });
  }
  results.sort((a,b)=>(a.schoolMatch?0:1)-(b.schoolMatch?0:1)||(a.typePriority-b.typePriority)||((a.dist??999)-(b.dist??999)));
  // Deduplicate by address: keep the first occurrence after the sort above
  // (school match → type priority → distance asc), so the kept row is the
  // strongest comp for that address, not the most recent.
  // Strip street suffixes (ST, AVE, DR, etc.) so "13522 Carnaby" and "13522 Carnaby ST" match
  const normAddr=s=>s.toLowerCase().replace(/\b(st|street|ave|avenue|blvd|boulevard|dr|drive|ln|lane|ct|court|cir|circle|pl|place|way|rd|road|ter|terrace)\b/g,'').replace(/[^a-z0-9]/g,'');
  const seen=new Set();
  const deduped=results.filter(c=>{const key=normAddr(c.addr);if(seen.has(key))return false;seen.add(key);return true;});
  const smPool=deduped.filter(c=>c.schoolMatch);
  const pool=smPool.length?smPool:deduped;
  const hp=pool.length?Math.max(...pool.map(c=>c.psf)):0;
  return{comps:deduped.slice(0,20),hp,arv:hp*sqft,listingLat:lat,listingLng:lon};
}

const dom=d=>{
  if(!d)return 0;
  try{
    // Normalize separators: "2026/04/29" → "2026-04-29".
    const s=d.replace(/\//g,'-');
    const p=s.split('-');
    if(p.length!==3)return 0;
    // Branch on which segment is the 4-digit year:
    //   YYYY-MM-DD (ISO)         → parse as-is
    //   MM-DD-YYYY (US display)  → reorder to YYYY-MM-DD before parsing
    //   anything else (fallback) → let Date try the raw string
    const dt=p[0].length===4
      ?new Date(s)
      :p[2].length===4
        ?new Date(p[2]+'-'+p[0]+'-'+p[1])
        :new Date(s);
    if(isNaN(dt))return 0;
    return Math.max(1,Math.round((td_-dt)/864e5));
  }catch(e){return 0;}
};

// ARV source resolution shared by the ARV column (getArvLabel) and the
// GAP column (getArvVal) so they never disagree. Priority:
//   locked -> Comp ARV (smart_comps_arv) -> Baseline ARV (per_city_arv).
// Listings with neither resolve to 0 and render as "-" (no comp fallback).
// smart-comps / per-city ARVs come from arvEstimateCache, batch-prefetched
// for every listing by loadArvEstimates() at load (not just on row expand),
// so the list columns can prefer them.
function arvSourceVal(l){
  if(l.lockedArv)return{arv:l.lockedArv,src:'locked'};
  const c=arvEstimateCache[l.mls];
  const r=(c&&c.state==='ok')?c.row:null;
  if(r&&r.smart_comps_arv)return{arv:+r.smart_comps_arv,src:'Comp ARV'};
  if(r&&r.per_city_arv)return{arv:+r.per_city_arv,src:'Baseline ARV'};
  // No comp-avg fallback: listings with neither Comp ARV nor Baseline ARV
  // resolve to 0, so the ARV/GAP columns render as "-".
  return{arv:0,src:''};
}
function getArvLabel(l){
  const{arv,src}=arvSourceVal(l);
  if(!arv)return'<span style="color:var(--text-4)">\u2014</span>';
  if(src==='locked')return`<span title="Locked">\u{1F512} ${FK(arv)}</span>`;
  return`<span title="${src}">${FK(arv)}</span>`;
}

const COMP_TOL_LABELS={radius:v=>`${v}mi`,sqft:v=>`±${v}sf`,months:v=>`${v}mo`};

  const mid=mls.replace(/[^a-zA-Z0-9]/g,'');
  const btn=document.getElementById(`comp-${kind}-${mid}`);
  if(btn){btn.dataset.value=value;btn.textContent=COMP_TOL_LABELS[kind](value);}
  const drop=document.getElementById(`comp-${kind}-drop-${mid}`);
  if(drop){drop.classList.remove('open');drop.querySelectorAll('button').forEach(b=>b.classList.remove('selected'));
    drop.querySelectorAll('button').forEach(b=>{const oc=b.getAttribute('onclick')||'';if(oc.indexOf(`'${value}'`)>=0)b.classList.add('selected');});}
  refetchComps(mls);
}

function compsPanel(l){
  const cm=getComps(l),mid=l.mls.replace(/[^a-zA-Z0-9]/g,'');
  // When the listing has no geocoded coords, findComps falls back to a city
  // centroid (or all-null) and matches comps by city name only — so the
  // results may be wildly off the actual property location.
  const usedFallback=!l.latitude||!l.longitude;
  const fallbackWarning=usedFallback?`<div style="font-size:10px;color:var(--amber);background:var(--amber-bg);border:1px solid var(--amber);border-radius:4px;padding:3px 6px;margin-bottom:4px">⚠ No geocoded coords — comps matched by city only</div>`:'';
  let h=fallbackWarning+`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;align-items:center">
    ${compToleranceHtml(l.mls,mid,'radius','0.25',['0.15','0.25','0.5','0.75','1'])}
    ${compToleranceHtml(l.mls,mid,'sqft','200',['150','200','250','300','400','500'])}
    ${compToleranceHtml(l.mls,mid,'months','12',['1','3','6','9','12','24','36'])}</div>`;
  h+=`<div id="comp-summary-${mid}">`;
  if(!cm.comps.length&&!cm.loading){h+=`<div style="padding:8px;color:var(--text-4);font-size:11px;font-style:italic">No comps found within current tolerances. Adjust radius/sqft/months above to widen the search.</div>`;}
  h+=`</div>`;
  h+=`<div id="comp-map-${mid}" style="width:100%;height:250px;border-radius:6px;border:1px solid var(--border);margin-bottom:8px;background:var(--bg-alt)"></div>`;
  h+=`<div style="font-size:10px;font-weight:700;color:var(--text-4);letter-spacing:.5px;margin-bottom:4px">COMPS (${cm.comps.length})</div>`;
  if(cm.loading)h+=`<div style="padding:12px;text-align:center;color:var(--text-4);font-size:11px">Loading comps...</div>`;
  else if(!cm.comps.length)h+=`<div style="padding:12px;text-align:center;color:var(--text-4);font-size:11px">No comps found</div>`;
  else h+=cm.comps.map((c,i)=>compH(c,i,l.mls)).join('');
  // Cards row (Comp avg + per-city ARV cards + Deal Score) lives in a
  // single wrapper so async re-renderers can replace it atomically. The
  // old stacked .ab strips (the per-city ARV/smart-comps/deal-score
  // blocks, plus the now-removed v7.4.1 estimate strip) are folded into
  // renderArvScoreRow — same data, horizontal cards + detail strip with
  // collapsible expanders.
  h+=renderArvScoreRow(l,mid);
  setTimeout(()=>ensureArvEstimate(l.mls,mid),50);
  setTimeout(()=>ensureDealScore(l.mls,mid),50);
  setTimeout(()=>renderCompMap(l,cm,mid),200);
  return h;
}

// Cities that have BOTH a per-city regression and smart comps. The
// deal-analyzer ARV prefills from smart comps → per-city regression →
// comps avg via preferredArvFor(). Non-per-city cities use manual
// comp-avg only (the retired v7.4.1 estimate is no longer shown).
const HAS_PER_CITY_REGRESSION=new Set(['CERRITOS','LA PALMA','CYPRESS','DIAMOND BAR','LONG BEACH','ANAHEIM','ANAHEIM HILLS','FULLERTON','TEMPLE CITY','SAN GABRIEL','ORANGE','YORBA LINDA','MONTEREY PARK','ARCADIA','ALHAMBRA','WEST COVINA','BUENA PARK','HACIENDA HEIGHTS','WALNUT','BREA','ROWLAND HEIGHTS']);

// ========== ARV SOURCES — per-city regression + smart-comps ==========
// Reads the latest row from `arv_estimates` (written by
// `python -m arv_estimator.batch`). One row per subject; we fetch on
// first expand and cache per-MLS so re-renders don't refetch.
const arvEstimateCache={};

// Best-available ARV for the deal analyzer. The default priority is
//   smart_comps_arv → per_city_arv → comps-avg (per-city cities)
//   smart_comps_arv → comps-avg (non-per-city; v7.4.1 headline retired)
// — but the user can override per-listing by clicking a different card
// in the ARV cards row (see setArvSource + arvSourceMap below).
// arvEstimateCache may be empty on first render; ensureArvEstimate()
// re-seeds the input once the row resolves.
const arvSourceMap={};           // mls -> 'comp-avg' | 'per-city' | 'smart-comps'
const compAvgOverride={};        // mid -> {psf, count} (set by recalcCompSummary when user trims comps)

// Snapshot of which ARV sources have a usable value for this listing
// right now. Used by activeArvSource (default priority + validity check)
// and by renderArvScoreRow (which cards to render + which to disable for
// click-to-switch).
function cardAvailability(l,cm){
  const c=arvEstimateCache[l.mls];
  const r=(c&&c.state==='ok')?c.row:null;
  // Comp avg uses the user-trimmed override when present (recalcCompSummary
  // mutates compAvgOverride[mid] when the user toggles comp checkboxes).
  const mid=l.mls.replace(/[^a-zA-Z0-9]/g,'');
  const ov=compAvgOverride[mid];
  let compPsf,compCount;
  if(ov){compPsf=ov.psf;compCount=ov.count;}
  else{
    const ppsfs=cm.comps.map(c=>c.psf).filter(Boolean);
    compPsf=ppsfs.length?Math.round(ppsfs.reduce((a,b)=>a+b,0)/ppsfs.length):0;
    compCount=ppsfs.length;
  }
  const compArv=compPsf*l.sqft;
  const isPerCity=HAS_PER_CITY_REGRESSION.has(l.city);
  const perCityArv=(r&&r.per_city_arv)||null;
  const smartConf=r?String(r.smart_comps_confidence||'').toLowerCase():'';
  const smartArv=(r&&r.smart_comps_arv)||null;
  const smartDeclined=(smartConf==='none');
  return {r,isPerCity,compPsf,compCount,compArv,perCityArv,smartArv,smartConf,smartDeclined};
}

// Source feeding the ARV input. Locked → 'locked' (no active marker).
// User pick takes precedence if still valid; otherwise default priority.
function activeArvSource(l,cm){
  if(l.lockedArv)return'locked';
  const av=cardAvailability(l,cm);
  const valid=(src)=>{
    if(src==='comp-avg')return av.compArv>0;
    if(src==='per-city')return av.perCityArv!=null;
    if(src==='smart-comps')return av.smartArv!=null;
    return false;
  };
  const picked=arvSourceMap[l.mls];
  if(picked&&valid(picked))return picked;
  // Default priority
  if(valid('smart-comps'))return'smart-comps';
  if(av.isPerCity&&valid('per-city'))return'per-city';
  return'comp-avg';
}

function preferredArvFor(l,cm){
  const av=cardAvailability(l,cm);
  const src=activeArvSource(l,cm);
  if(src==='smart-comps')return{arv:av.smartArv,source:'smart-comps'};
  if(src==='per-city')return{arv:av.perCityArv,source:'per-city'};
  // 'locked' or 'comp-avg' fall through to comp-avg arv (locked uses
  // l.lockedArv at the call site; the arv we return here is just the
  // fallback the input would otherwise show).
  return{arv:av.compArv,source:src==='locked'?'locked':'comp-avg'};
}
function arvSourceLabel(l,source,arv){
  if(l.lockedArv||source==='locked')return`Locked: ${F(arv)}`;
  if(source==='smart-comps')return`Comp ARV: ${F(arv)}`;
  if(source==='per-city')return`Baseline ARV: ${F(arv)}`;
  return`Manual comp avg: ${F(arv)}`;
}

// ========== ARV/SCORE CARDS ROW ======================================
// Replaces the old stacked .ab strips (comp-arv, per-city ARV, smart
// comps, deal score) with a single horizontal cards row + a
// full-width detail strip below for the collapsible expanders. Click an
// ARV card to make it the source feeding the deal analyzer's ARV input.
// The active card gets a colored top border + "◀ used" badge; Deal Score
// is never "active" (it's a verdict).
function renderArvScoreRow(l,mid){
  const cm=getComps(l);
  const av=cardAvailability(l,cm);
  const active=activeArvSource(l,cm);
  const isPerCity=av.isPerCity;
  // Per-city: 4 cards (comp-avg, per-city, smart-comps, deal-score).
  // Non-per-city: 2 cards (comp-avg, deal-score).
  const slots=isPerCity?['comp-avg','per-city','smart-comps','deal-score']:['comp-avg','deal-score'];
  const cardsHtml=slots.map(src=>renderArvScoreCard(l,mid,src,av,active)).join('');
  const detail=renderArvScoreDetail(l,mid,av);
  return `<div id="arv-score-row-${mid}" style="margin-top:8px">
    <div style="display:grid;grid-template-columns:repeat(${slots.length},1fr);gap:6px">${cardsHtml}</div>
    ${detail}
  </div>`;
}

function renderArvScoreCard(l,mid,src,av,active){
  const c=arvEstimateCache[l.mls];
  const cachePending=!c||c.state==='pending';
  const cacheMissing=c&&c.state==='missing';
  const cacheErr=c&&c.state==='error';
  const dc=dealScoreCache[l.mls];
  const dsPending=!dc||dc.state==='pending';
  const dsMissing=dc&&dc.state==='missing';
  const dsErr=dc&&dc.state==='error';

  const isActive=(src===active);
  const isArvSrc=(src!=='deal-score');
  // Active marker: top border + "◀ used" badge in the corner. Only on
  // ARV cards (Deal Score is never active).
  const topBorder=isActive&&isArvSrc?`border-top:3px solid var(--accent)`:`border-top:1px solid var(--border)`;
  const baseBox=`background:var(--bg);border:1px solid var(--border);${topBorder};border-radius:5px;padding:6px 8px;position:relative;min-height:64px`;
  const usedBadge=isActive&&isArvSrc?`<span style="position:absolute;top:3px;right:5px;font-size:9px;font-weight:700;color:var(--accent);letter-spacing:.3px">◀ USED</span>`:'';

  // Click behavior: ARV cards become source-pickers (unless already active
  // or unavailable). Deal score is never clickable for source-switching.
  const canClick=isArvSrc&&!isActive&&cardHasValue(src,av);
  const cursor=canClick?'cursor:pointer':'';
  const onclick=canClick?`onclick="event.stopPropagation();setArvSource('${l.mls}','${mid}','${src}')"`:'';
  const title=canClick?`title="Use this ARV in the deal analyzer"`:'';

  // Title row (uppercase, muted) — same for every card.
  const titleText=({'comp-avg':'Manual comp avg','per-city':'Baseline ARV','smart-comps':'Comp ARV','deal-score':'Deal score'})[src];
  const titleHtml=`<div style="font-size:9px;font-weight:700;color:var(--text-4);letter-spacing:.5px;text-transform:uppercase">${titleText}</div>`;

  // Per-source body.
  let body='';
  if(src==='comp-avg'){
    const psf=av.compPsf,cnt=av.compCount,arv=av.compArv;
    if(!cnt){
      body=`<div style="font-size:14px;font-weight:700;color:var(--text-4);margin-top:2px">—</div>
        <div style="font-size:10px;color:var(--text-4);margin-top:2px">no comps</div>`;
    }else{
      body=`<div style="font-size:14px;font-weight:800;color:var(--accent);margin-top:2px">${F(arv)}</div>
        <div style="font-size:10px;color:var(--text-4);margin-top:2px">${l.sqft.toLocaleString()}sf × $${psf}</div>`;
    }
  }
  else if(src==='per-city'){
    if(cachePending)body=cardSubText('14px','pending');
    else if(cacheMissing||cacheErr||av.perCityArv==null)body=cardSubText('14px','—');
    else{
      body=`<div style="font-size:14px;font-weight:800;color:var(--accent);margin-top:2px">${F(av.perCityArv)}</div>
        <div style="font-size:10px;color:var(--text-4);margin-top:2px">OLS regression</div>`;
    }
  }
  else if(src==='smart-comps'){
    if(cachePending)body=cardSubText('14px','pending');
    else if(cacheMissing||cacheErr)body=cardSubText('14px','—');
    else if(av.smartDeclined){
      const data2=av.r&&av.r.smart_comps_data||{};
      const flags2Raw=Array.isArray(data2.flags)?data2.flags:[];
      // Strip globally-fired DG/DB flag from the per-listing summary —
      // matches the legacy per-city renderers' suppression.
      const flags2=flags2Raw.filter(f=>f!=='drift_disagrees_with_v1');
      const flagsLine=flags2.length?` <span style="color:var(--text-4)">(${flags2.map(f=>escapeHtml(String(f))).join(', ')})</span>`:'';
      body=`<div style="font-size:13px;font-weight:700;color:var(--text-3);margin-top:2px">declined</div>
        <div style="font-size:10px;color:var(--text-4);margin-top:2px">no good local comps${flagsLine}</div>`;
    }
    else if(av.smartArv==null)body=cardSubText('14px','—');
    else{
      const data=av.r&&av.r.smart_comps_data||{};
      const n=data.n_anchors!=null?data.n_anchors:'?';
      body=`<div style="font-size:14px;font-weight:800;color:var(--accent);margin-top:2px">${F(av.smartArv)}</div>
        <div style="font-size:10px;color:var(--text-4);margin-top:2px">${n} anchors · see below</div>`;
    }
  }
  else if(src==='deal-score'){
    if(dsPending)body=cardSubText('14px','pending');
    else if(dsErr){
      // Ungraded buckets (expected, not real errors): listings outside the
      // 8 per-city ARV markets, or ARV-pipeline lag. Show a neutral grey
      // "ungraded" pill + a short subtext. Any other message = real problem.
      const em=(dc.row&&dc.row.error_message)||'';
      if(em.indexOf('outside per-city coverage')===0||em.indexOf('no ARV available')===0){
        const sub=em.indexOf('outside per-city coverage')===0?'outside per-city coverage':'ARV pending';
        const upill=`<span style="${dsGradeStyle('?')};font-size:13px;font-weight:800;padding:2px 10px;border-radius:10px;letter-spacing:.5px">ungraded</span>`;
        body=`<div style="margin-top:4px">${upill}</div>
          <div style="font-size:10px;color:var(--text-4);margin-top:4px">${escapeHtml(sub)}</div>`;
      }else{
        body=`<div style="font-size:14px;font-weight:700;color:var(--text-4);margin-top:2px">error</div>
          <div style="font-size:10px;color:var(--text-4);margin-top:2px">${escapeHtml(em||'unknown error')}</div>`;
      }
    }
    else if(dsMissing||!dc.row||!dc.row.grade)body=cardSubText('14px','—');
    else{
      const r=dc.row,g=r.grade||'?';
      const bd=r.breakdown_json||{};
      const pill=`<span style="${dsGradeStyle(g)};font-size:13px;font-weight:800;padding:2px 10px;border-radius:10px;letter-spacing:.5px">${g}</span>`;
      let detailLines;
      if(bd.shave_required_pct!=null&&bd.max_offer!=null){
        // Negotiation-shave grade driver: % off list needed + the strict
        // fully-loaded max offer. shave<=0 means it pencils at list.
        const shaveLine=Number(bd.shave_required_pct)<=0?'works at list':'needs '+Number(bd.shave_required_pct).toFixed(1)+'% off';
        detailLines=`<div style="font-size:10px;color:var(--text-4);margin-top:4px">${shaveLine}</div>
          <div style="font-size:10px;color:var(--text-4)">max ${F(bd.max_offer)}</div>`;
      }else{
        // Legacy row lacking the new fields → fall back to spread display.
        const spread=r.spread!=null?F(r.spread):'—';
        const pct=r.spread_pct!=null?(r.spread_pct>=0?'+':'')+Number(r.spread_pct).toFixed(2)+'%':'—';
        detailLines=`<div style="font-size:10px;color:var(--text-4);margin-top:4px">spread ${spread}</div>
          <div style="font-size:10px;color:var(--text-4)">${pct}</div>`;
      }
      body=`<div style="margin-top:4px">${pill}</div>${detailLines}`;
    }
  }

  return `<div ${title} ${onclick} style="${baseBox};${cursor}">${usedBadge}${titleHtml}${body}</div>`;
}

function cardHasValue(src,av){
  if(src==='comp-avg')return av.compArv>0;
  if(src==='per-city')return av.perCityArv!=null;
  if(src==='smart-comps')return av.smartArv!=null;
  return false;
}
function cardSubText(size,txt){return `<div style="font-size:${size};font-weight:700;color:var(--text-4);margin-top:2px">${txt}</div>`;}
function confPill(lvl){
  if(!lvl||lvl==='?')return'';
  const style=lvl==='high'?'background:var(--green-bg);color:var(--green)':lvl==='low'?'background:var(--red-bg);color:var(--red)':'background:var(--amber-bg);color:var(--amber)';
  return `<span style="${style};font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;letter-spacing:.3px;margin-left:5px;vertical-align:middle">${lvl.toUpperCase()}</span>`;
}

// Full-width detail strip below the cards row. Hosts collapsible
// expanders for whichever cards have detail (smart comps anchors, deal
// score breakdown). Each <details> is collapsed
// by default. Renders nothing when nothing to show.
function renderArvScoreDetail(l,mid,av){
  const c=arvEstimateCache[l.mls];
  const cacheOk=c&&c.state==='ok';
  const dc=dealScoreCache[l.mls];
  const dsOk=dc&&dc.state==='ok'&&dc.row&&dc.row.grade;
  const parts=[];
  if(cacheOk&&av.isPerCity&&av.smartArv!=null)parts.push(renderSmartCompsDetail(l,av));
  if(dsOk)parts.push(renderDealScoreDetail(dc.row));
  if(!parts.length)return'';
  return `<div style="margin-top:6px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:5px">${parts.join('<div style=\"height:6px\"></div>')}</div>`;
}

// Anchors table — reused for all per-city smart-comps cities. Optional
// HS-adj column appears when any comp has a non-zero adjustment (matches
// la_palma + diamond_bar pattern). Cypress + Cerritos pass no HS adj
// → column auto-hides.
function renderSmartCompsDetail(l,av){
  const r=av.r,data=r.smart_comps_data||{};
  const radius=data.anchor_radius_miles!=null?data.anchor_radius_miles:'?';
  const monthsBack=data.anchor_months_back!=null?data.anchor_months_back:'?';
  const n=data.n_anchors!=null?data.n_anchors:'?';
  const ppsf=data.ppsf_today_t6!=null?Math.round(data.ppsf_today_t6):'—';
  // Suppress globally-fired flag per Brief DG / diamond_bar_phase2_writeback.
  const flagsRaw=Array.isArray(data.flags)?data.flags:[];
  const flags=flagsRaw.filter(f=>f!=='drift_disagrees_with_v1');
  const flagsHtml=flags.length?`<div style="font-size:10px;color:var(--text-4);margin-top:2px">flags: ${flags.map(f=>escapeHtml(String(f))).join(', ')}</div>`:'';
  const comps=Array.isArray(data.comps)?data.comps:[];
  const hasHsAdj=comps.some(co=>co.comp_hs_adjustment_pct!=null&&Math.abs(co.comp_hs_adjustment_pct)>0.01);
  // Arcadia smart-comps emits per-comp comp_elem_adjustment_pct — the HS-adj
  // analog at the ELEMENTARY grain (the first city to normalize at elementary,
  // arcadia_smart_comps). Spans ~±4% core↔core up to ~±26-36% across the
  // out-of-district pocket (Longden/Plymouth/Rio Hondo). Column auto-hides for
  // cities that pass no elementary adjustment.
  const hasElemAdj=comps.some(co=>co.comp_elem_adjustment_pct!=null&&Math.abs(co.comp_elem_adjustment_pct)>0.01);
  // Fullerton smart-comps emits per-comp pool_adjustment_pct (the HS-adj
  // analog, swapped HS→pool). Column auto-hides for cities that pass no
  // pool adjustment (Cerritos/Cypress/Diamond Bar/etc).
  const hasPoolAdj=comps.some(co=>co.pool_adjustment_pct!=null&&Math.abs(co.pool_adjustment_pct)>0.01);
  // Temple City smart-comps emits per-comp comp_total_adjustment_pct (the
  // cumulative normalization that drives the adjustment-trust down-weight,
  // temple_city_smart_comps Decision #11) + a top-level count of comps
  // hard-skipped past the 40% cliff. Both columns/notes auto-hide for cities
  // that don't emit the field.
  const hasTotalAdj=comps.some(co=>co.comp_total_adjustment_pct!=null);
  const nSkipped=data.n_skipped_high_adjustment||0;
  const skipNote=nSkipped>0?`<div style="font-size:10px;color:var(--text-4);margin-top:2px">${nSkipped} comp${nSkipped===1?'':'s'} excluded (&gt;40% total adjustment)</div>`:'';
  let compsRows='';
  if(comps.length){
    const head=`<thead><tr style="font-size:9px;font-weight:700;color:var(--text-4);text-transform:uppercase">
      <th style="text-align:left;padding:3px 4px">Mi</th>
      <th style="text-align:left;padding:3px 4px">Tier</th>
      <th style="text-align:left;padding:3px 4px">Sold</th>
      <th style="text-align:right;padding:3px 4px">Sale</th>
      <th style="text-align:right;padding:3px 4px">$/sf</th>
      <th style="text-align:right;padding:3px 4px">$/sf today</th>
      <th style="text-align:right;padding:3px 4px">$/sf T6</th>
      ${hasHsAdj?`<th style="text-align:right;padding:3px 4px">HS adj</th>`:''}
      ${hasElemAdj?`<th style="text-align:right;padding:3px 4px">Elem adj</th>`:''}
      ${hasPoolAdj?`<th style="text-align:right;padding:3px 4px">Pool adj</th>`:''}
      ${hasTotalAdj?`<th style="text-align:right;padding:3px 4px">Total adj</th>`:''}
      <th style="text-align:right;padding:3px 4px">w</th></tr></thead>`;
    const body=comps.map(co=>{
      const t=co.condition_tier;
      const tierStr=t===6?'T6':t===5?'T5*':t===4?'T4*':`T${t}`;
      const tCol=t===6?'var(--green)':t===5?'var(--amber)':'var(--text-3)';
      const hsPct=co.comp_hs_adjustment_pct;
      const hsStr=(hsPct==null||Math.abs(hsPct)<0.01)?'—':(hsPct>0?'+':'')+hsPct.toFixed(2)+'%';
      const hsCol=(hsPct==null||Math.abs(hsPct)<0.01)?'var(--text-4)':(hsPct>0?'var(--green)':'var(--red)');
      const hsCell=hasHsAdj?`<td style="padding:3px 4px;text-align:right;color:${hsCol}">${hsStr}</td>`:'';
      const elemPct=co.comp_elem_adjustment_pct;
      const elemStr=(elemPct==null||Math.abs(elemPct)<0.01)?'—':(elemPct>0?'+':'')+elemPct.toFixed(2)+'%';
      const elemCol=(elemPct==null||Math.abs(elemPct)<0.01)?'var(--text-4)':(elemPct>0?'var(--green)':'var(--red)');
      const elemCell=hasElemAdj?`<td style="padding:3px 4px;text-align:right;color:${elemCol}">${elemStr}</td>`:'';
      const poolPct=co.pool_adjustment_pct;
      const poolStr=(poolPct==null||Math.abs(poolPct)<0.01)?'—':(poolPct>0?'+':'')+poolPct.toFixed(2)+'%';

      // Higher cumulative adjustment = lower trust (down-weighted). Amber past 25%.

      const totalCell=hasTotalAdj?`<td style="padding:3px 4px;text-align:right;color:${totCol}">${totStr}</td>`:'';
      return `<tr style="font-size:11px;border-top:1px solid var(--border)">
        <td style="padding:3px 4px">${(co.distance_miles||0).toFixed(2)}</td>
        <td style="padding:3px 4px;color:${tCol};font-weight:600">${tierStr}</td>

        <td style="padding:3px 4px;text-align:right">${co.sale_price?'$'+Math.round(co.sale_price/1000)+'K':'—'}</td>

        <td style="padding:3px 4px;text-align:right;font-weight:600">$${Math.round(co.ppsf_t6_today||0)}</td>
        ${hsCell}

        ${totalCell}
        <td style="padding:3px 4px;text-align:right;color:var(--text-4)">${((co.weight||0)*100).toFixed(0)}%</td></tr>`;
    }).join('');
    compsRows=`<table style="width:100%;border-collapse:collapse;margin-top:6px">${head}<tbody>${body}</tbody></table>`;
  }else{
    compsRows=`<div style="padding:6px;color:var(--text-4);font-size:11px;font-style:italic">No anchor comps</div>`;
  }
  return `<details><summary style="cursor:pointer;font-size:11px;font-weight:600;color:var(--text-3)">Smart comps anchors (${n} within ${radius}mi · ${monthsBack}mo · $${ppsf}/sf median T6-eq)</summary>${flagsHtml}${skipNote}${compsRows}</details>`;
}

// Batch-fetch the latest ARV estimate (smart-comps + per-city) for every
// loaded listing so the list ARV/GAP columns can prefer Comp ARV ->
// Baseline ARV over the live comp value. Mirrors ensureArvEstimate's
// shape (select * ordered by computed_at, status->state); chunks the IN()
// filter and keeps the newest row per mls. ensureArvEstimate() reuses
// these cached rows on expand (it skips any non-pending entry), so no
// refetch. Re-renders when done to repaint the columns.
async function loadArvEstimates(){
  const mlsList=listings.map(l=>l.mls).filter(Boolean);
  if(!mlsList.length)return;
  const CHUNK=200;
  try{
    for(let i=0;i<mlsList.length;i+=CHUNK){
      const chunk=mlsList.slice(i,i+CHUNK);
      const{data,error}=await sb.from('arv_estimates').select('*').in('mls',chunk).order('computed_at',{ascending:false});
      if(error){console.error('loadArvEstimates',error);continue;}
      (data||[]).forEach(row=>{
        // Rows arrive newest-first; first occurrence per mls is the latest.
        // Don't clobber an entry already cached (e.g. from an expand).
        if(arvEstimateCache[row.mls])return;
        arvEstimateCache[row.mls]={state:(row.status==='error'?'error':'ok'),row};
      });
    }
  }catch(e){console.error('loadArvEstimates',e);}
  render();
}
async function ensureArvEstimate(mls,mid){
  if(arvEstimateCache[mls]&&arvEstimateCache[mls].state!=='pending')return;
  arvEstimateCache[mls]={state:'pending'};
  try{
    const {data,error}=await sb.from('arv_estimates').select('*').eq('mls',mls).order('computed_at',{ascending:false}).limit(1).maybeSingle();
    if(error){arvEstimateCache[mls]={state:'missing'};}
    else if(!data){arvEstimateCache[mls]={state:'missing'};}
    else{arvEstimateCache[mls]={state:(data.status==='error'?'error':'ok'),row:data};}
  }catch(e){arvEstimateCache[mls]={state:'missing'};}
  // Re-render the cards row in place — replaces what was previously a
  // handful of per-block re-renders (arv-est-, v4-arv-, smart-comps-,
  // la-palma-arv-, la-palma-smart-comps-, cypress-arv-, cypress-smart-comps-,
  // diamond-bar-arv-, diamond-bar-smart-comps-).
  const listing=listings.find(x=>x.mls===mls);
  const rowEl=document.getElementById('arv-score-row-'+mid);
  if(rowEl&&listing)rowEl.outerHTML=renderArvScoreRow(listing,mid);
  // Re-seed the deal analyzer's ARV input now that smart_comps_arv /
  // per_city_arv have loaded. Skip if user locked ARV.
  const arvInputEl=document.getElementById('arv-'+mid);
  if(arvInputEl&&listing&&!listing.lockedArv){
    const cmL=getComps(listing);
    const pref=preferredArvFor(listing,cmL);
    setNumVal('arv-'+mid,pref.arv);
    const srcEl=document.getElementById('arv-source-'+mid);
    if(srcEl)srcEl.textContent=arvSourceLabel(listing,pref.source,pref.arv);
    calcDeal(mid,listing.price,listing.sqft);
  }
}

// ========== DEAL SCORER — grade pill + score breakdown =============
// Reads the latest row from `deal_scores` (written by
// `python -m underwriter.batch`). Cache mirrors arvEstimateCache:
// module-local, per-MLS, sticky for the session. No polling, no
// refetch-on-refresh — a missing cache entry just means we haven't
// looked yet.
const dealScoreCache={};
function dsGradeStyle(g){
  if(g==='A')return'background:var(--green-bg);color:var(--green)';
  if(g==='B')return'background:var(--blue-bg,var(--accent-dim2));color:var(--blue,var(--accent))';

function renderDealGradePill(mls){
  const c=dealScoreCache[mls];
  // Per-row bucket marker for listings outside the 8 per-city ARV markets:
  // a neutral grey middot, visually distinct from A-D and from the blank

  if(c&&c.state==='error'&&c.row&&typeof c.row.error_message==='string'&&c.row.error_message.indexOf('outside per-city coverage')===0)
    return`<span class="ds-card-pill" data-ds-mls="${mls}" title="ungraded — outside per-city coverage" style="${dsGradeStyle('?')};font-size:10px;font-weight:800;padding:1px 6px;border-radius:8px;margin-left:6px;letter-spacing:.4px;vertical-align:middle">·</span>`;
  if(!c||c.state!=='ok'||!c.row||!c.row.grade)
    return`<span class="ds-card-pill" data-ds-mls="${mls}"></span>`;
  const g=c.row.grade;

  const bd=c.row.breakdown_json||{};

function refreshDealCardPill(mls){

  // listing appears across filter views; update them all in place.

// Maps an MLS to its grade bucket for the client-side filter/counts.
// 'A'|'B'|'C'|'D' for graded OK rows, 'ungraded' for error/missing cache
// states (outside coverage, no ARV, or genuinely no row), null for
// pending/unknown (not counted, not filtered).
function dealGradeOf(mls){
  const c=dealScoreCache[mls];
  if(!c)return null;
  if(c.state==='ok'&&c.row&&c.row.grade)return c.row.grade;
  if(c.state==='error'||c.state==='missing')return 'ungraded';
  return null;
}
function setGradeFilter(g){

function updateGradeCounts(){
  const counts={A:0,B:0,C:0,D:0,ungraded:0};
  let total=0;
  (listings||[]).forEach(l=>{
    const g=dealGradeOf(l.mls);
    if(g==null)return; // pending/unknown — don't count
    if(counts[g]!=null)counts[g]++;
    total++;
  });
  const set=(id,n)=>{const el=document.getElementById(id);if(el)el.textContent=n?'('+n+')':'';};
  set('gcnt-all',total);
  set('gcnt-A',counts.A);set('gcnt-B',counts.B);set('gcnt-C',counts.C);set('gcnt-D',counts.D);
  set('gcnt-ungraded',counts.ungraded);
}

async function ensureDealScore(mls,mid){
  if(!dealScoreCache[mls]||dealScoreCache[mls].state==='pending'){
    if(!dealScoreCache[mls])dealScoreCache[mls]={state:'pending'};
    try{
      const{data,error}=await sb.from('deal_scores').select('*').eq('mls',mls).order('computed_at',{ascending:false}).limit(1).maybeSingle();
      if(error){dealScoreCache[mls]={state:'missing'};}
      else if(!data){dealScoreCache[mls]={state:'missing'};}
      else{dealScoreCache[mls]={state:(data.status==='error'?'error':'ok'),row:data};}
    }catch(e){dealScoreCache[mls]={state:'missing'};}
  }
  if(mid){
    // Re-render the cards row (Deal Score card is the rightmost slot).
    const listing=listings.find(x=>x.mls===mls);
    const rowEl=document.getElementById('arv-score-row-'+mid);
    if(rowEl&&listing)rowEl.outerHTML=renderArvScoreRow(listing,mid);

async function bulkLoadDealScores(mlses){
  // Single bulk fetch for every uncached MLS currently on screen. Same
  // cache shape as ensureDealScore's per-MLS path; 'missing' sticks.
  const need=Array.from(new Set(mlses)).filter(m=>m&&!dealScoreCache[m]);
  if(!need.length)return;
  need.forEach(m=>{dealScoreCache[m]={state:'pending'};});
  try{
    const{data,error}=await sb.from('deal_scores').select('mls,status,grade,spread,spread_pct,breakdown_json,error_message,computed_at').in('mls',need).order('computed_at',{ascending:false});
    if(error){need.forEach(m=>{dealScoreCache[m]={state:'missing'};});}
    else{
      const seen={};
      (data||[]).forEach(r=>{if(!seen[r.mls])seen[r.mls]=r;});
      need.forEach(m=>{
        if(seen[m])dealScoreCache[m]={state:(seen[m].status==='error'?'error':'ok'),row:seen[m]};
        else dealScoreCache[m]={state:'missing'};
      });
    }
  }catch(e){
    need.forEach(m=>{if(dealScoreCache[m]&&dealScoreCache[m].state==='pending')dealScoreCache[m]={state:'missing'};});
  }
  need.forEach(m=>refreshDealCardPill(m));
  // Scores just finished loading: repopulate the bucket counts and, if a
  // grade filter is active, re-apply it now that the cache is complete.
  updateGradeCounts();
  if(gradeFilter)render();
}

// Brief BS — Inline tier selector replaces the legacy SOLD/HALF/FLIP/DOTTY
// retag dropdown. Patty can correct a comp's condition_tier (1-6) or flag
// it as DOTTY directly from the detail view's comp list, instead of having
// to bounce to condition-review.html. Skip on unsold_flip (active listings
// matched as comps) and on comps without an MLS — those aren't retaggable.
// See updateCompTier() for the write path.
//
// Menu shows full labels (option b from BS spec); chip on the row shows
// just the tier number (option a). Order: T6 at top → T1 at bottom →
// DOTTY at the end, with the parenthetical hints clarifying the
// non-monotonicity to sale price.
const TIER_OPTS=[
  [6,'T6','Tier 6 — Full flip (highest sale)'],
  [5,'T5','Tier 5 — Half-flip'],
  [4,'T4','Tier 4 — Lived-in flip'],
  [3,'T3','Tier 3 — Modern owner-grade'],
  [2,'T2','Tier 2 — Dated (livable)'],
  [1,'T1','Tier 1 — Distressed (lowest sale)'],
  ['dotty','DOTTY','DOTTY — Our property'],
];
// Gradient red→green across tiers 1-6. DOTTY gets purple.
function _tierColors(tier,isDotty){
  if(isDotty)return{bg:'var(--purple-bg)',col:'var(--purple)'};
  if(!tier||tier<1||tier>6)return{bg:'var(--bg-alt)',col:'var(--text-4)'};
  // Lerp red(192,57,43) → green(45,138,78) across t∈[0,1]
  const t=(tier-1)/5;
  const r=Math.round(192+(45-192)*t);
  const g=Math.round(57+(138-57)*t);
  const b=Math.round(43+(78-43)*t);
  return{bg:`rgba(${r},${g},${b},0.13)`,col:`rgb(${r},${g},${b})`};
}
// Read-only condition-tier chip for the current-listing rows. Mirrors the
// comp retag chip's color/label (T1-T6 gradient, DOTTY purple) but without
// the retag dropdown. Renders nothing when the listing has no tier yet.
const TIER_LABELS={1:'Distressed',2:'Dated (livable)',3:'Modern owner-grade',4:'Lived-in flip',5:'Half-flip',6:'Full flip'};
function condTierBadge(l){
  const tier=l.conditionTier,isDotty=l.isDotty===true;
  if(!tier&&!isDotty)return'';
  const{bg,col}=_tierColors(tier,isDotty);
  const lbl=isDotty?'DOTTY':'T'+tier;
  const title=isDotty?'Condition tier — DOTTY (our property)':`Condition tier ${tier} — ${TIER_LABELS[tier]||''}`;
  return`<span class="tag" style="background:${bg};color:${col};border:none" title="${title}">${lbl}</span>`;
}
function compTypeSelectHtml(c,subjectMid){
  if(!c.mls||c.type==='unsold_flip'){
    const lbl=c.type==='unsold_flip'?'ASKING':'SOLD';
    return`<span style="font-size:8px;font-weight:700;color:var(--text-4);margin-right:3px">${lbl}</span>`;
  }
  const isDotty=c.isDotty===true;
  const tier=c.conditionTier;
  const currentKey=isDotty?'dotty':(tier||null);
  const{bg,col}=_tierColors(tier,isDotty);
  const currentChipLbl=isDotty?'DOTTY':(tier?'T'+tier:'?');
  const compIdSafe=String(c.mls).replace(/[^a-zA-Z0-9]/g,'');
  const dropId=`retag-drop-${subjectMid}-${compIdSafe}`;
  const optsHtml=TIER_OPTS.map(([v,_chip,full])=>{
    const oc=_tierColors(v==='dotty'?null:v, v==='dotty');
    const isCur=v===currentKey;
    return`<button onclick="event.stopPropagation();setTierFromDrop('${c.mls}','${subjectMid}','${v}')" style="background:${oc.bg};color:${oc.col};${isCur?'font-weight:800;':''}padding:5px 10px;font-size:10px;text-transform:none;letter-spacing:0">${full}${isCur?' ✓':''}</button>`;
  }).join('');
  return`<div class="retag-wrap"><button title="Retag comp condition tier" class="retag-btn" data-value="${currentKey||''}" style="background:${bg};color:${col}" onclick="event.stopPropagation();toggleCompDrop('${dropId}')">${currentChipLbl}</button><div id="${dropId}" class="retag-drop" style="min-width:230px">${optsHtml}</div></div>`;
}
// Wrapper so the option-button onclick can close the popup before kicking
// off the async DB write + re-render that updateCompTier performs.
function setTierFromDrop(compMls,subjectMid,newKey){
  document.querySelectorAll('.retag-drop.open,.cmp-drop.open').forEach(d=>d.classList.remove('open'));
  updateCompTier(compMls,subjectMid,newKey);

async function updateCompTier(compMls,subjectMid,newKey){

function recalcCompSummary(mid){
  const cbs=document.querySelectorAll('input[data-comp-mls="'+mid+'"]');
  const activeMls=Object.keys(compCache).find(k=>k.replace(/[^a-zA-Z0-9]/g,'')===mid);
  if(!activeMls||!compCache[activeMls])return;
  const all=compCache[activeMls].comps,checked=[];
  cbs.forEach(cb=>{const idx=parseInt(cb.dataset.compIdx,10);if(cb.checked&&!isNaN(idx)&&all[idx])checked.push(all[idx]);});
  const avg=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;
  const ppsfs=checked.map(c=>c.psf).filter(Boolean);
  // Old 4-card summary (Selected / Avg Price / Avg $/SF / Avg SqFt)
  // removed — the Manual comp avg card in the ARV/score row already
  // shows the trimmed value via compAvgOverride[mid].
  const avgPsf=checked.length?Math.round(avg(ppsfs)):0;
  const l=listings.find(x=>x.mls===activeMls);
  // Note: this updates the detail-panel ARV input only — compCache[activeMls].hp
  // is intentionally NOT mutated, so getArvLabel() in the list view keeps showing
  // the system's all-comps ARV. Detail = user-trimmed; list = system best-guess.
  // Stash the user-trimmed comp avg so renderArvScoreRow picks it up on
  // the next re-render (cards row replaces the old single comp-arv strip).
  if(l){
    compAvgOverride[mid]={psf:avgPsf,count:checked.length};
    const rowEl=document.getElementById('arv-score-row-'+mid);
    if(rowEl)rowEl.outerHTML=renderArvScoreRow(l,mid);
    // If the active source is 'comp-avg' (and not locked), push the new
    // trimmed value into the deal-analyzer input.
    if(avgPsf&&!l.lockedArv&&activeArvSource(l,getComps(l))==='comp-avg'){
      const newArv=avgPsf*l.sqft;
      setNumVal('arv-'+mid,newArv);
      calcDeal(mid,l.price,l.sqft);
    }
  }
}

  try{
    const{data,error}=await sb.from('config').select('value').eq('key','rehab_categories').limit(1).maybeSingle();
    if(error||!data||!data.value||!Array.isArray(data.value.categories)){console.warn('rehab_categories not loaded',error);return false;}

// Per-MLS selected items. When an MLS has no entry, every item is assumed checked.
let constChecked={};

let constOverrides={};
// Declarative cost rule evaluator. Mirrors underwriter/rehab.py:eval_cost_rule.
// Rule shapes: flat | sqft_band | sqft_linear | sqft_multiplier.
function evalCostRule(rule,sqft){
  if(!rule)return 0;
  const s=sqft;
  if(rule.type==='flat')return Number(rule.amount)||0;
  if(rule.type==='sqft_band'){
    for(const band of rule.bands){
      if(band.max==null||s<band.max)return Number(band.amount)||0;
    }
    return 0;
  }
  if(rule.type==='sqft_linear'){
    const lo=rule.min_sqft,hi=rule.max_sqft;
    const clamped=Math.max(lo,Math.min(hi,s));
    const frac=(clamped-lo)/(hi-lo);
    const raw=rule.min_amount+frac*(rule.max_amount-rule.min_amount);
    const rt=rule.round_to||1;
    return Math.round(raw/rt)*rt;
  }
  if(rule.type==='sqft_multiplier'){
    const raw=s*rule.per_sqft;
    const rt=rule.round_to||1;
    return Math.round(raw/rt)*rt;
  }
  return 0;
}
// Applicability evaluator. Mirrors underwriter/rehab.py:evaluate_applicability
// and the bath/pool logic that used to live inline in getConstChecked.
function evalApplicability(rule,l){
  if(!rule||rule.always_on)return true;
  if(rule.min_full_baths!=null){
    const b=parseFloat(l&&l.baths)||0;
    return Math.floor(b)>=rule.min_full_baths;
  }
  if(rule.requires_half_bath){
    const b=parseFloat(l&&l.baths)||0;
    return b>Math.floor(b);
  }
  if(rule.requires_pool){
    // JS-legacy default: ON unless the pool string is literally 'no'.
    return ((l&&l.pool)||'').toLowerCase()!=='no';
  }
  return true;
}
// Note resolver for the construction editor. Preserves the two inline
// behaviours from the old JS: kitchen picks the matching sqft_band's
// note; foundation renders "min · $3k" / "max · $10k" / "linear · N sf"
// from the sqft_linear rule's notes block.
function evalItemNote(item,sqft){
  const rule=item.cost;
  if(!rule)return'';
  if(rule.type==='sqft_band'){
    for(const band of rule.bands){
      if(band.max==null||sqft<band.max)return band.note||'';
    }
    return '';
  }
  if(rule.type==='sqft_linear'&&rule.notes){
    if(sqft<=rule.min_sqft)return rule.notes.min_label||'';
    if(sqft>=rule.max_sqft)return rule.notes.max_label||'';
    return(rule.notes.linear_label||'').replace('{sqft_comma}',Number(sqft).toLocaleString());
  }
  return '';
}
function getConstChecked(mls){
  if(!constChecked[mls]){

    const d={};
    for(const cat of CONST_CATEGORIES)for(const item of cat.items){
      d[item.id]=l?evalApplicability(item.applicability,l):true;
    }

}
function getConstOverrides(mls){if(!constOverrides[mls])constOverrides[mls]={};return constOverrides[mls];}
function costOf(item,sqft,mls){

function calcDeal(id,listPrice,sqft){
  listPriceMap[id]=listPrice;const arv=getNumVal('arv-'+id);
  const lObj=listings.find(x=>x.mls.replace(/[^a-zA-Z0-9]/g,'')===id);
  const constLocked=!!(lObj&&lObj.lockedConstruction);
  // Effective construction cost: locked > user-custom > sqft-based estimator
  let effConst;
  if(constLocked){effConst=lObj.lockedConstruction;setNumVal('const-'+id,effConst);}
  else if(constIsCustom[id])effConst=getNumVal('const-'+id);
  else{effConst=estimateConstruction(sqft,lObj&&lObj.mls);setNumVal('const-'+id,effConst);}
  if(!ppIsCustom[id]){const fp=Math.round((arv*(1-SELL_PCT)-effConst)/(1+PURCH_EXP_PCT+PROFIT_TARGET_PCT));setNumVal('pp-'+id,fp);}
  const fPP=getNumVal('pp-'+id),fConst=getNumVal('const-'+id),pExp=fPP*PURCH_EXP_PCT;
  const profit=arv*(1-SELL_PCT)-fConst-fPP-pExp,gap=listPrice-fPP,gapPct=listPrice>0?((gap/listPrice)*100).toFixed(1):'0',goTh=PROFIT_TARGET_PCT*fPP;
  const gE=document.getElementById('gap-'+id);
  if(gE){const gc=gap>0?'var(--red)':'var(--green)',gb=gap>0?'var(--red-bg)':'var(--green-bg)',gbd=gap>0?'#FECACA':'#A7F0BE';
    gE.innerHTML=`<div style="padding:10px 12px;border-radius:6px;background:${gb};border:1px solid ${gbd};display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:11px;font-weight:700;color:${gc}">${gap>0?'LISTING IS OVER YOUR TARGET':'LISTING IS UNDER YOUR TARGET'}</div><div style="font-size:10px;color:var(--text-3);margin-top:2px">List ${F(listPrice)} vs Your offer ${F(fPP)}</div></div><div style="text-align:right"><div style="font-size:20px;font-weight:800;color:${gc}">${gap>0?'+':''}${F(gap)}</div><div style="font-size:11px;color:var(--text-3)">${gap>0?'+':''}${gapPct}%</div></div></div>`;}
  const bE=document.getElementById('breakdown-'+id);
  if(bE){const v=profit>=goTh?'GO':profit>=goTh*0.75?'MAYBE':'NO GO',vc=v==='GO'?'var(--green)':v==='MAYBE'?'var(--amber)':'var(--red)',vb=v==='GO'?'var(--green-bg)':v==='MAYBE'?'var(--amber-bg)':'var(--red-bg)';
    let h=`<div style="display:flex;justify-content:space-between;padding:8px 0;margin-top:4px;border-top:2px solid var(--border)"><span style="font-size:13px;font-weight:700">Profit</span><span style="font-size:18px;font-weight:800;color:${profit>=0?'var(--green)':'var(--red)'}">${F(profit)}</span></div>`;
    if(ppIsCustom[id])h+=`<div style="margin-top:6px;padding:10px 14px;border-radius:6px;background:${vb};display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:22px;font-weight:900;color:${vc}">${v}</div><div style="font-size:10px;color:var(--text-3)">${v==='GO'?'Profit meets 10% target':v==='MAYBE'?'Close — negotiate harder':'Below profit target'}</div></div><div style="text-align:right"><div style="font-size:16px;font-weight:700;color:${vc}">${F(profit)}</div><div style="font-size:10px;color:var(--text-3)">Target: ${F(goTh)}</div></div></div>`;
    bE.innerHTML=h;}
}

function getArvVal(l){return arvSourceVal(l).arv;}
function toggleSort(col){if(sort_===col+'-asc')sort_=col+'-desc';else if(sort_===col+'-desc')sort_='priority';else sort_=col+'-asc';render();}
// Dispatch table for getSorted(). Each entry returns a (a,b)=>number comparator
// for ascending order; descending is handled by sign-flip in getSorted(). The
// 'priority' key is special-cased (no -asc/-desc suffix) and ignores direction.
const _sStr=s=>(s||'').toString().toLowerCase();
const SORTERS={
  price:   (a,b)=>a.price-b.price,
  ppsf:    (a,b)=>a.ppsf-b.ppsf,
  dom:     (a,b)=>dom(a.listDate)-dom(b.listDate),
  arv:     (a,b)=>getArvVal(a)-getArvVal(b),
  address: (a,b)=>_sStr(a.address).localeCompare(_sStr(b.address)),
  city:    (a,b)=>_sStr(a.city).localeCompare(_sStr(b.city)),
  status:  (a,b)=>_sStr(a.changeType).localeCompare(_sStr(b.changeType)),
};
function getSorted(){
  let d=[...listings];
  if(cityFilters.size)d=d.filter(l=>cityFilters.has(l.city.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase())));
  if(tagFilters.size)d=d.filter(l=>l.tags.some(t=>tagFilters.has(t)));
  if(gradeFilter)d=d.filter(l=>dealGradeOf(l.mls)===gradeFilter);
  if(sort_==='priority'){d.sort((a,b)=>(b.tags.length>0?1:0)-(a.tags.length>0?1:0));return d;}
  const idx=sort_.lastIndexOf('-');
  if(idx<0)return d;
  const key=sort_.slice(0,idx),dir=sort_.slice(idx+1);
  const cmp=SORTERS[key];
  if(!cmp)return d;
  const sign=dir==='desc'?-1:1;
  d.sort((a,b)=>sign*cmp(a,b));
  return d;
}

let openCompPoll=null;
function opn(m,prefetched){
  // Cancel any in-flight poll from a previous opn() before starting fresh.
  if(openCompPoll){clearInterval(openCompPoll);openCompPoll=null;}
  active=m;
  document.querySelector('.main').classList.add('detail-view');
  const l=prefetched||listings.find(x=>x.mls===active);
  if(l){
    renderDetailPage(l);
    loadComps(l);
    const id=l.mls.replace(/[^a-zA-Z0-9]/g,'');
    let polls=0;
    // Poll every 300ms (max ~6s) until comps land in compCache, then re-render
    // the comp-col with the loaded comps and seed the ARV input. The active!==m
    // guard inside the interval handles the case where the user navigates to a
    // different listing before this poll finishes.
    openCompPoll=setInterval(()=>{
      if(active!==m){clearInterval(openCompPoll);openCompPoll=null;return;}
      polls++;
      if(compCache[l.mls]||polls>20){
        clearInterval(openCompPoll);openCompPoll=null;
        document.getElementById('comp-col').innerHTML=compsPanel(l);
        const cm=getComps(l);
        if(l.lockedArv){setNumVal('arv-'+id,l.lockedArv);calcDeal(id,l.price,l.sqft);}

    // calcDeal needs the DOM nodes from renderDetailPage to exist before reading
    // input values; rAF defers until after the current paint.
    requestAnimationFrame(()=>calcDeal(id,l.price,l.sqft));
  }
}

// Server-side address search across all non-sold listings (regardless of
// current filter scope). Hits Supabase on every debounced keystroke;
// 120ms debounce keeps the round-trip count reasonable. Click handler
// fetches the full row + maps to the listing shape so opn() can render
// the detail pane even when the listing isn't in the current visible
// view (e.g. searching for a Hold listing while viewing Unread).
let _addrSearchTimer=null;
let _addrSearchSeq=0;
function onAddrSearch(q){clearTimeout(_addrSearchTimer);_addrSearchTimer=setTimeout(()=>doAddrSearch(q),120);}
async function doAddrSearch(q){
  const drop=document.getElementById('addr-search-drop');if(!drop)return;
  const query=(q||'').trim();
  if(!query){drop.style.display='none';drop.innerHTML='';return;}
  // Sequence guard: stale responses (slower keystroke fires) shouldn't
  // overwrite the most recent result.
  const mySeq=++_addrSearchSeq;
  // ilike does case-insensitive substring match. We need to escape any
  // % or _ in the user's query so they're treated literally.
  const escaped=query.replace(/[%_]/g,c=>`\\${c}`);
  // Brief BO: filter OFFMKT- rows (off-market acquisitions belong in
  // off-market.html when BM ships, not in mls-deals search).
  let{data,error}=await sb.from('properties')
    .select('mls,address,city,list_price,change_type,stage')
    .not('mls','like','OFFMKT-%')
    .ilike('address',`%${escaped}%`)
    .not('change_type','eq','sold')
    .limit(10);
  if(mySeq!==_addrSearchSeq)return; // stale
  if(error){
    drop.style.display='block';
    drop.innerHTML=`<div style="padding:8px 12px;font-size:12px;color:var(--red)">Search error: ${escapeHtml(error.message)}</div>`;
    return;
  }
  // Brief BO: also filter out listings linked to deals past pursuing/lost
  // (mirrors the loadListings filter for consistency). Listings tied to
  // an in-flight deal are tracked on pipeline.html / project-detail.html.
  if(data&&data.length){
    const list=data.map(r=>'"'+String(r.mls).replace(/"/g,'\\"')+'"').join(',');
    const{data:blockers}=await sb.from('deals')
      .select('buy_side_mls,relist_mls,phase')
      .or('buy_side_mls.in.('+list+'),relist_mls.in.('+list+')');
    if(mySeq!==_addrSearchSeq)return; // stale
    if(blockers&&blockers.length){
      const blocked=new Set();
      for(const d of blockers){
        if(d.phase==='pursuing'||d.phase==='lost')continue;
        if(d.buy_side_mls)blocked.add(d.buy_side_mls);
        if(d.relist_mls)blocked.add(d.relist_mls);
      }
      data=data.filter(r=>!blocked.has(r.mls));
    }
  }
  if(!data||data.length===0){
    drop.style.display='block';
    drop.innerHTML=`<div style="padding:8px 12px;font-size:12px;color:var(--text-4)">No matches.</div>`;
    return;
  }
  drop.style.display='block';
  drop.innerHTML=data.map(r=>{
    const status=r.change_type?escapeHtml(r.change_type):'';
    return `<div onclick="onAddrSearchPick('${r.mls}')" style="padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--border)" onmouseover="this.style.background='var(--row-hover,rgba(0,0,0,0.03))'" onmouseout="this.style.background=''"><div style="font-weight:600">${escapeHtml(r.address||'(no address)')}</div><div style="font-size:11px;color:var(--text-4)">${escapeHtml(r.city||'')} · ${r.mls} · ${FK(r.list_price||0)}${status?` · <span style="color:var(--accent)">${status}</span>`:''}</div></div>`;
  }).join('');
}
async function onAddrSearchPick(mls){
  const drop=document.getElementById('addr-search-drop');if(drop)drop.style.display='none';

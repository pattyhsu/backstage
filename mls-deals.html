// Per-MLS generation counter — guards against rapid double-clicks of a tolerance
// dropdown causing two parallel findComps() calls where the slower (older) one
// arrives last and overwrites the cache with stale data.
const refetchGenerations={};
async function refetchComps(mls){const l=listings.find(x=>x.mls===mls);if(!l)return;const mid=mls.replace(/[^a-zA-Z0-9]/g,'');
  // Tolerance state lives in dataset.value on the chip-btn (the old <select>
  // was replaced with a custom dropdown for Tesla browser compatibility).
  const radius=parseFloat(((document.getElementById('comp-radius-'+mid)||{}).dataset||{}).value||'0.25');
  const sqftRange=parseInt(((document.getElementById('comp-sqft-'+mid)||{}).dataset||{}).value||'150');
  const months=parseInt(((document.getElementById('comp-months-'+mid)||{}).dataset||{}).value||'6');
  const gen=(refetchGenerations[mls]||0)+1;
  refetchGenerations[mls]=gen;
  delete compCache[mls];
  try{const data=await findComps({...l,radius,sqftRange,months});
    // A newer refetch was started while we were awaiting; discard our stale result.
    if(refetchGenerations[mls]!==gen)return;
    compCache[mls]=data;document.getElementById('comp-col').innerHTML=compsPanel(l);
    // Re-render replaces the buttons; sync each new button's dataset.value
    // and visible label so the picker reflects the actually-used tolerance.
    const re=document.getElementById('comp-radius-'+mid);if(re){re.dataset.value=String(radius);re.textContent=COMP_TOL_LABELS.radius(String(radius));}
    const se=document.getElementById('comp-sqft-'+mid);if(se){se.dataset.value=String(sqftRange);se.textContent=COMP_TOL_LABELS.sqft(String(sqftRange));}
    const me=document.getElementById('comp-months-'+mid);if(me){me.dataset.value=String(months);me.textContent=COMP_TOL_LABELS.months(String(months));}
    if(data.hp>0){setNumVal('arv-'+mid,data.hp*l.sqft);calcDeal(mid,l.price,l.sqft);}}catch(e){console.error('Refetch error:',e);}}

// Brief BK: batch-fetch deal rows that reference any visible MLS# (either
// buy_side_mls or relist_mls). Decorate each listing with l.dealId +
// l.dealPhase so the "🏗 In project" pill renders the deal phase, and the
// "Open offer" / "Mark as listing" buttons disappear when a deal exists.
async function decorateListingsWithDeals(){
  if(!listings.length)return;
  const listingMls=new Set(listings.map(l=>l.mls).filter(Boolean));
  if(!listingMls.size)return;
  // Fetch all deals unfiltered (<50 in production). Avoids the URL
  // length cap that bit large filter tabs like Unread (~645 listings)
  // where buy_side_mls.in.(...) + relist_mls.in.(...) exceeded the
  // edge proxy's ~8KB filter cap → 400 → silent decoration failure.
  let deals=[];
  try{
    const{data,error}=await sb.from('deals')
      .select('id, phase, buy_side_mls, relist_mls, offer_price, purchase_price, notes');
    if(error){console.warn('[decorateListingsWithDeals] failed',error);return;}
    // Keep only deals that touch a currently-visible listing.
    deals=(data||[]).filter(d=>listingMls.has(d.buy_side_mls)||listingMls.has(d.relist_mls));
  }catch(e){
    console.warn('[decorateListingsWithDeals] failed',e);
    return;
  }
  // Build mls -> {dealId, dealPhase, undoableDealRow}. If the same MLS appears
  // as both buy_side and relist on different deals (uncommon — typically would
  // be the SAME deal), prefer the most-active phase: prefer non-archived
  // > non-sold > anything.
  const byMls={};
  const dealById={};
  const phaseRank=p=>{
    if(p==='archived')return 0;
    if(p==='sold')return 1;
    return 2;
  };
  const consider=(mls,deal)=>{
    if(!mls)return;
    const ex=byMls[mls];
    if(!ex || phaseRank(deal.phase) > phaseRank(ex.dealPhase)){
      byMls[mls]={dealId: deal.id, dealPhase: deal.phase};
    }
  };
  for(const d of deals){
    dealById[d.id]=d;
    consider(d.buy_side_mls, d);
    consider(d.relist_mls, d);
  }

  // Brief BX: freshness gate. For each pursuing deal, fetch six signals in
  // parallel; mark l.undoable=true iff ALL hold: history rows==1, zero
  // completed milestones, zero completed checklist items, zero loans, zero
  // expenses, zero documents, AND offer_price/purchase_price/notes all NULL
  // on the deal row itself. Non-pursuing deals get l.undoable=false with
  // no DB roundtrip. Entire gate is fail-soft: if any query errors, all
  // pursuing deals get undoable=false but dealId/dealPhase decoration
  // continues — gate failure must never block the deal-pill from rendering.
  const pursuingIds=deals.filter(d=>d.phase==='pursuing').map(d=>d.id);
  const undoable=new Set();
  if(pursuingIds.length){
    try{
      // deal_documents table ships in Migration 066 (Brief BW). Until then
      // the query errors (PostgREST returns 404 + "JSON could not be
      // generated", not Postgres 42P01) — swallow any error to 0 rows.
      const docsQuery=sb.from('deal_documents').select('deal_id').in('deal_id',pursuingIds)
        .then(r=>(r&&!r.error&&r.data)?r.data:[],()=>[]);
      const[histRes,msRes,ckRes,lnRes,exRes,dcRes]=await Promise.all([
        sb.from('deals_phase_history').select('deal_id').in('deal_id',pursuingIds),
        sb.from('deal_milestones').select('deal_id').in('deal_id',pursuingIds).eq('completed',true),
        sb.from('deal_phase_checklist_items').select('deal_id').in('deal_id',pursuingIds).eq('completed',true),
        sb.from('deal_loans').select('deal_id').in('deal_id',pursuingIds),
        sb.from('deal_expenses').select('deal_id').in('deal_id',pursuingIds),
        docsQuery,
      ]);
      for(const r of [histRes,msRes,ckRes,lnRes,exRes]){
        if(r&&r.error)throw r.error;
      }
      const histCount={};for(const r of (histRes.data||[]))histCount[r.deal_id]=(histCount[r.deal_id]||0)+1;
      const blocked=new Set();
      for(const r of (msRes.data||[]))blocked.add(r.deal_id);
      for(const r of (ckRes.data||[]))blocked.add(r.deal_id);
      for(const r of (lnRes.data||[]))blocked.add(r.deal_id);
      for(const r of (exRes.data||[]))blocked.add(r.deal_id);
      for(const r of (dcRes||[]))blocked.add(r.deal_id);
      for(const id of pursuingIds){
        const d=dealById[id];
        if(blocked.has(id))continue;
        if((histCount[id]||0)!==1)continue;
        if(d.offer_price!=null||d.purchase_price!=null||d.notes!=null)continue;
        undoable.add(id);
      }
    }catch(e){
      console.warn('[decorateListingsWithDeals] freshness gate failed; all pursuing deals will be non-undoable',e);
    }
  }

  // Decorate + refresh per-row pill.
  for(const l of listings){
    const m=byMls[l.mls];
    if(m){
      l.dealId=m.dealId;
      l.dealPhase=m.dealPhase;
      l.undoable=undoable.has(m.dealId);
    } else {
      l.dealId=null;
      l.dealPhase=null;
      l.undoable=false;
    }
    refreshRowDealPill(l.mls);
  }
  // Brief BO: filter out listings linked to deals past pursuing/lost.
  // Those are tracked on pipeline.html / project-detail.html — not
  // browsed here. Pursuing + lost stay visible (in the Potential group
  // per the sync trigger setting stage='potential') so Patty can keep
  // eyes on them. in_escrow / under_construction / listed / sold /
  // archived disappear entirely from mls-deals.
  const before=listings.length;
  listings=listings.filter(l=>!l.dealPhase||l.dealPhase==='pursuing'||l.dealPhase==='lost');
  if(listings.length!==before)render();
  // Re-render detail page if open — the "🏗 In project" pill / Open offer
  // button visibility may have changed.
  if(active){const l=listings.find(x=>x.mls===active);if(l)renderDetailPage(l);}
}

// Brief BK / D2: address-match an MLS-listed property against the existing
// under_construction deals to detect the relist-of-our-flip case. On a
// single match: confirm + link (relist_mls=mls, phase='selling'). On zero
// or multiple matches: open a picker modal so the user chooses (or creates
// an orphan listing with buy_side_mls=NULL). Brief BV / D2: phase value
// renamed from 'listed' → 'selling'.
async function markAsListing(mls){
  const l=listings.find(x=>x.mls===mls);if(!l)return;
  if(l.dealId){alert('This listing is already linked to a deal.');return;}

  // 1. Fetch under_construction candidates.
  const {data:cands, error:cErr}=await sb.from('deals')
    .select('id, buy_side_mls, relist_mls, created_at')
    .eq('phase','under_construction');
  if(cErr){alert('Failed to load candidates: '+cErr.message);return;}
  const candidates=cands||[];

  // 2. Resolve each candidate's address via properties (batch fetch).
  const candMls=candidates.map(c=>c.buy_side_mls).filter(Boolean);
  const addrByMls={};
  if(candMls.length){
    const {data:props}=await sb.from('properties')
      .select('mls, address, city')
      .in('mls', candMls);
    for(const p of (props||[])){addrByMls[p.mls]=p;}
  }

  // 3. Address-match: case-insensitive substring match on the street
  // component. Pull the leading numeric+street tokens (strip unit/suite).
  const streetOf=raw=>{
    if(!raw)return '';
    // Strip apt/unit suffix; keep the leading "<#> <street>" chunk.
    const cleaned=String(raw).replace(/\s*(?:apt|unit|ste|suite|#)\.?\s*[\w\-]+/i,'').trim();
    return cleaned.toLowerCase();
  };
  const myStreet=streetOf(l.address);
  const matches=[];
  for(const c of candidates){
    const candProp=c.buy_side_mls?addrByMls[c.buy_side_mls]:null;
    const candAddr=candProp?candProp.address:'';
    const candStreet=streetOf(candAddr);
    if(myStreet && candStreet && (candStreet.includes(myStreet) || myStreet.includes(candStreet))){
      matches.push({deal:c, addr:candAddr, city:candProp?candProp.city:''});
    }
  }

  // 4. Single match → confirm + link.
  if(matches.length===1){
    const m=matches[0];
    const d=m.deal;
    const sinceStr=d.created_at?new Date(d.created_at).toISOString().slice(0,10):'?';
    const ok=confirm('This looks like the relist of '+m.addr+(m.city?', '+m.city:'')+' (under_construction since '+sinceStr+'). Link?');
    if(!ok)return;
    await applyMarkAsListing(d.id, mls, l, 'under_construction');
    return;
  }

  // 5. Zero or multiple → modal picker.
  openMarkAsListingPicker(matches, mls, l);
}

// Modal picker for markAsListing. Shows candidates + "Create new orphan
// listing" option. On pick: link relist_mls + flip phase to 'selling'.
function openMarkAsListingPicker(matches, mls, l){
  // Build a lightweight modal inline. Reuses the same overlay pattern as
  // openConstEditor / openArchive.
  const overlayId='mal-modal';
  const existing=document.getElementById(overlayId);
  if(existing)existing.remove();

  const matchHtml=matches.length
    ? matches.map((m,i)=>{
        const d=m.deal;
        const sinceStr=d.created_at?new Date(d.created_at).toISOString().slice(0,10):'?';
        return `<div class="mal-row" data-idx="${i}" style="padding:10px 14px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;cursor:pointer;background:var(--bg)" onmouseover="this.style.background='var(--bg-alt)'" onmouseout="this.style.background='var(--bg)'">
          <div style="font-weight:600;font-size:13px">${escapeHtml(m.addr||'(no address)')}${m.city?', '+escapeHtml(m.city):''}</div>
          <div style="font-size:11px;color:var(--text-3);margin-top:2px;font-family:var(--mono)">Buy MLS# ${escapeHtml(d.buy_side_mls||'(none)')} · Under construction since ${escapeHtml(sinceStr)}</div>
        </div>`;
      }).join('')
    : `<div style="padding:10px 14px;color:var(--text-4);font-size:12px;font-style:italic">No address-matched candidates among under_construction deals.</div>`;

  const html=`<div id="${overlayId}" style="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center" onclick="if(event.target.id==='${overlayId}')document.getElementById('${overlayId}').remove()">
    <div style="background:var(--bg);max-width:560px;width:90%;max-height:80vh;overflow-y:auto;border-radius:8px;padding:18px 20px 16px;box-shadow:0 8px 32px rgba(0,0,0,.18)">
      <div style="font-size:14px;font-weight:700;margin-bottom:6px">Mark as our listing — pick the source deal</div>
      <div style="font-size:12px;color:var(--text-3);margin-bottom:12px">Listing: <b>${escapeHtml(l.address||'')}${l.city?', '+escapeHtml(l.city):''}</b> · MLS# ${escapeHtml(mls)}</div>
      <div style="font-size:11px;color:var(--text-4);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;font-weight:700">${matches.length===0?'No address matches found' : matches.length+' candidate'+(matches.length===1?'':'s')}</div>
      <div id="mal-list">${matchHtml}</div>
      <div style="border-top:1px solid var(--border);margin:12px 0 8px"></div>
      <div class="mal-row" data-idx="orphan" style="padding:10px 14px;border:1px dashed var(--border);border-radius:6px;cursor:pointer;background:var(--bg)" onmouseover="this.style.background='var(--bg-alt)'" onmouseout="this.style.background='var(--bg)'">
        <div style="font-weight:600;font-size:13px">＋ Create new orphan listing</div>
        <div style="font-size:11px;color:var(--text-3);margin-top:2px">Insert a deal with relist_mls only (buy_side_mls=NULL). Use when the under_construction source isn't tracked here.</div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:14px">
        <button onclick="document.getElementById('${overlayId}').remove()" style="padding:5px 14px;border:1px solid var(--border);background:var(--bg);border-radius:5px;font-family:inherit;font-size:12px;cursor:pointer">Cancel</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  // Wire up the row clicks.
  document.querySelectorAll('#'+overlayId+' .mal-row').forEach(row=>{
    row.addEventListener('click', async ()=>{
      const idx=row.dataset.idx;
      document.getElementById(overlayId).remove();
      if(idx==='orphan'){
        await applyMarkAsListing(null, mls, l, null);
      } else {
        const m=matches[Number(idx)];
        if(m)await applyMarkAsListing(m.deal.id, mls, l, 'under_construction');
      }
    });
  });
}

// Apply the mark-as-listing operation. If dealId is set: update existing
// deal (relist_mls=mls, phase='selling'). If dealId is null: create a new
// orphan deal with buy_side_mls=NULL, relist_mls=mls.
// Brief BV / D2: phase value renamed from 'listed' → 'selling'.
async function applyMarkAsListing(dealId, mls, l, fromPhase){
  const today=new Date().toISOString().slice(0,10);
  const listPrice=l.price||null;
  try{
    let resolvedDealId=dealId;
    if(dealId){
      // Link existing under_construction deal as relist.
      const {error:uErr}=await sb.from('deals').update({
        relist_mls: mls,
        phase: 'selling',
        list_price: listPrice,
        list_date: today,
        updated_at: new Date().toISOString(),
      }).eq('id', dealId);
      if(uErr)throw uErr;
    } else {
      // Insert new orphan deal — relist only.
      const {data:newDeal, error:iErr}=await sb.from('deals').insert({
        buy_side_mls: null,
        relist_mls: mls,
        phase: 'selling',
        list_price: listPrice,
        list_date: today,
      }).select('id').single();
      if(iErr)throw iErr;
      resolvedDealId=newDeal.id;
    }
    // History row.
    const {error:hErr}=await sb.from('deals_phase_history').insert({
      deal_id: resolvedDealId,
      from_phase: fromPhase,  // 'under_construction' for the link path; null for orphan
      to_phase: 'selling',
      note: dealId
        ? 'Linked relist via Mark as our listing (MLS Deals)'
        : 'Orphan listing via Mark as our listing (MLS Deals)',
    });
    if(hErr)throw hErr;
    // Decorate listing in-place + re-render.
    l.dealId=resolvedDealId;
    l.dealPhase='selling';
    renderDetailPage(l);
    refreshRowDealPill(mls);
  }catch(e){
    console.warn('applyMarkAsListing failed',e);
    alert('Mark as listing failed: '+(e&&e.message?e.message:String(e)));
  }
}
window.markAsListing=markAsListing;

async function toggleLockArv(mls,id){
  const l=listings.find(x=>x.mls===mls);if(!l)return;
  if(l.lockedArv){
    // Unlock
    const{error}=await sb.from('properties').update({locked_arv:null,updated_at:new Date().toISOString()}).eq('mls',mls);
    if(error){console.error('unlock ARV failed',error);alert('Unlock ARV failed: '+error.message);return;}
    l.lockedArv=null;
  } else {
    // Lock current ARV value
    const arvVal=getNumVal('arv-'+id);
    if(!arvVal)return;
    const{error}=await sb.from('properties').update({locked_arv:arvVal,updated_at:new Date().toISOString()}).eq('mls',mls);
    if(error){console.error('lock ARV failed',error);alert('Lock ARV failed: '+error.message);return;}
    l.lockedArv=arvVal;
  }
  // Re-render detail page to update button state
  renderDetailPage(l);
  const cm=getComps(l);
  document.getElementById('comp-col').innerHTML=compsPanel(l);
  // Always seed the ARV input + recompute. Pre-cards-row this gate was
  // cm.hp>0 (no comps → no ARV → no point in calcDeal), but smart-comps
  // / per-city can populate ARV even with zero user comps loaded.
  if(l.lockedArv){
    setNumVal('arv-'+id,l.lockedArv);
  }else{
    const pref=preferredArvFor(l,cm);
    if(pref.arv>0)setNumVal('arv-'+id,pref.arv);
  }
  calcDeal(id,l.price,l.sqft);
  render();
}
async function toggleLockConstruction(mls,id){
  const l=listings.find(x=>x.mls===mls);if(!l)return;
  if(l.lockedConstruction){
    // Unlock — snap back to sqft-based construction estimate
    const{error}=await sb.from('properties').update({locked_construction:null,updated_at:new Date().toISOString()}).eq('mls',mls);
    if(error){console.error('unlock construction failed',error);alert('Unlock construction failed: '+error.message);return;}
    l.lockedConstruction=null;
    constIsCustom[id]=false;
    setNumVal('const-'+id,estimateConstruction(l.sqft,l.mls));
  } else {
    // Lock current construction value
    const cVal=getNumVal('const-'+id);
    if(!cVal)return;
    const{error}=await sb.from('properties').update({locked_construction:cVal,updated_at:new Date().toISOString()}).eq('mls',mls);
    if(error){console.error('lock construction failed',error);alert('Lock construction failed: '+error.message);return;}
    l.lockedConstruction=cVal;
  }
  // Re-render detail page to update button state
  renderDetailPage(l);
  const cm=getComps(l);
  document.getElementById('comp-col').innerHTML=compsPanel(l);
  if(cm.hp>0){setNumVal('arv-'+id,l.lockedArv||(cm.hp*l.sqft));calcDeal(id,l.price,l.sqft);}
}

// Map a raw properties row to the in-memory listing shape used throughout
// this page. Extracted so the address-search click handler can hydrate a
// listing that's outside the current filter scope (e.g. searching for a
// listing on Hold while viewing Unread).
function mapRowToListing(r){
  const rmk=((r.remarks||'')+' '+(r.sale_type||'')).toLowerCase();let tags=[];
  if(r.custom_tags!==null&&r.custom_tags!==undefined){tags=r.custom_tags||[];}else{
  const isRenovated=/\bfully remodeled\b|\bcompletely remodeled\b|\btotally remodeled\b|\bnewly remodeled\b|\bfully renovated\b|\bcompletely renovated\b|\bnewly renovated\b|\brecently remodeled\b|\brecently renovated\b|\bbrand new kitchen\b|\bbrand new bath/.test(rmk);
  if(!isRenovated&&/\bdated\b|\boutdated\b|\boriginal condition\b|\boriginal kitchen\b|\boriginal bath(?:room)?s?\b|\bneeds updating\b|\bneeds update\b|\bneeds updates\b|\bneeds updated\b|\bneeds cosmetic\b|\bneeds modernizing\b|\bneeds remodel\b|\bneeds a remodel\b|\bneeds remodeling\b|\bneeds renovation\b|\bneeds renovating\b|\bbring your (?:contractor|designer|imagination|vision)\b|\bcosmetic (?:work|updates?|fixer)\b|\bupdate to (?:your|taste)\b|\bmake it your own\b|\bgood bones\b|\bwith some (?:tlc|updating|updates|love)\b|\bready for your (?:updates?|touches?|vision)\b|\bopportunity to update\b|\badd your personal touch\b/.test(rmk))tags.push('Dated');
  if(/\btlc\b|\bfixer\b|\bhandyman\b|\bhandy.?man special\b|\binvestor special\b|\bgreat for investors\b|\bflip\b|\bwholesale\b/.test(rmk))tags.push('Fixer');
  if(/\btrust sale\b|\bprobate\b|\bestate sale\b|, trust\b/.test(rmk)||/trust/i.test(r.sale_type||''))tags.push('Estate / Trust');
  if(/\bprice reduced\b|\breduced price\b|\bmotivated seller\b/.test(rmk))tags.push('Price reduced');
  if(/\bfully remodeled\b|\bcompletely remodeled\b|\btotally remodeled\b|\bnewly remodeled\b|\bfully renovated\b|\bcompletely renovated\b|\bnewly renovated\b/.test(rmk))tags.push('Already flipped');}
  return{address:r.address||'',city:r.city||'',zip:r.zip||'',price:r.list_price||0,sqft:r.sqft||0,ppsf:r.ppsf||0,beds:r.beds||0,baths:parseFloat(r.baths)||0,lot:r.lot_size||'',built:r.year_built||'',mls:r.mls||'',mlsArea:r.mls_area||'',mlsAreaName:r.mls_area_name||'',listDate:r.list_date||'',pool:r.pool||'',saleType:r.sale_type||'',remarks:r.remarks||'',agentRemarks:r.agent_remarks||'',showingRemarks:r.showing_remarks||'',occupancy:r.occupancy||'',contactName:r.contact_name||'',contactPhone:r.contact_phone||'',occupantType:r.occupant_type||'',lockboxLocation:r.lockbox_location||'',lockboxType:r.lockbox_type||'',gateCode:r.gate_code||'',agent:r.agent_name||'',agentEmail:r.agent_email||'',agentPhone:r.agent_phone||'',agentOfficePhone:r.agent_office_phone||'',broker:r.agent_broker||'',brokerDre:r.broker_dre||'',agentDre:r.agent_dre||'',
    elem:r.elementary_rating||r.elementary_school?{r:r.elementary_rating||0,n:r.elementary_school||''}:null,
    mid:(r.middle_rating||r.middle_school)&&(r.middle_school!==r.elementary_school)?{r:r.middle_rating||0,n:r.middle_school||''}:null,
    high:r.high_rating||r.high_school?{r:r.high_rating||0,n:r.high_school||''}:null,
    tags,customTags:r.custom_tags,status:r.stage||'unread',changeType:r.change_type||'',notes:r.notes||'',latitude:r.latitude,longitude:r.longitude,lockedArv:r.locked_arv||null,lockedConstruction:r.locked_construction||null,photoCount:r.photo_count||0,conditionTier:r.condition_tier||null,isDotty:r.is_dotty===true,
    // Brief BK: deal linkage now lives on the deals table (decorated in
    // decorateListingsWithDeals after loadListings()). Drop the legacy
    // properties.pipeline_stage column.
    dealId:null,dealPhase:null};
}

async function loadListings(status){
  let query=sb.from('properties').select('*').not('mls','is',null).not('mls','like','OFFMKT-%').neq('change_type','sold').order('imported_at',{ascending:false}).limit(2000);
  if(status==='unread')query=query.eq('stage','unread').or(`list_price.is.null,list_price.lte.${MAX_LIST_PRICE}`);
  else if(status==='archived')query=query.or(`stage.eq.archived,list_price.gt.${MAX_LIST_PRICE}`);
  else if(status==='off_market_lead')query=query.eq('stage','off_market_lead');
  else if(status&&status!=='all')query=query.eq('stage',status);
  else query=query.not('stage','in','("archived","off_market_lead")').or(`list_price.is.null,list_price.lte.${MAX_LIST_PRICE}`);
  try{
    let{data,error}=await query;if(error)throw error;
    // Address-relist filter: if viewing off-market, hide rows whose address has
    // a newer listing (any non-cancelled/expired/withdrawn status) under a different MLS#.
    if(status==='off_market_lead'&&data&&data.length){
      const OFF_LOCK=['cancelled','canceled','expired','withdrawn'];
      const norm=r=>((r.address||'').replace(/\s+/g,' ').trim().toUpperCase()+'|'+(r.city||'').trim().toUpperCase());
      const offByAddr=new Map();
      data.forEach(r=>{const k=norm(r);if(!offByAddr.has(k)||new Date(r.change_date||0)>new Date(offByAddr.get(k).change_date||0))offByAddr.set(k,r);});
      const addrs=[...new Set(data.map(r=>r.address).filter(Boolean))];
      const relisted=new Set();
      // Chunk address lookups to avoid huge IN clauses
      for(let i=0;i<addrs.length;i+=100){
        const chunk=addrs.slice(i,i+100);
        const{data:other}=await sb.from('properties').select('mls,address,city,change_date,change_type').in('address',chunk);
        (other||[]).forEach(o=>{
          const k=norm(o);
          const offRow=offByAddr.get(k);
          if(!offRow||o.mls===offRow.mls)return;
          const oct=(o.change_type||'').toLowerCase().trim();
          if(OFF_LOCK.indexOf(oct)>=0)return; // another off-market row doesn't count as a relist
          if(new Date(o.change_date||0)>new Date(offRow.change_date||0))relisted.add(k);
        });
      }
      if(relisted.size)data=data.filter(r=>!relisted.has(norm(r)));
    }
    listings=(data||[]).map(mapRowToListing);
    active=null;render();
    const toTitle=s=>s.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());
    const cities=[...new Set(listings.map(l=>toTitle((l.city||'').trim())).filter(Boolean))].sort();
    const cfList=document.getElementById('cf-list');
    // Only rebuild the city checkbox list when the city set actually changes —
    // otherwise we lose scroll position on every loadListings() call.
    const newCitiesKey=cities.join('|');
    if(newCitiesKey!==window._cfListCities){
      window._cfListCities=newCitiesKey;
      cfList.innerHTML=cities.map(c=>`<label><input type="checkbox" value="${c}" ${cityFilters.has(c)?'checked':''} onchange="toggleCityFilter('${c.replace(/'/g,"\\'")}')">${c}</label>`).join('');
    }
    updateCityBtn();
    // Bulk-load deal scores once per listings load. Cache-checked, so safe
    // to call alongside the per-MLS path in ensureDealScore (e.g. detail view).
    bulkLoadDealScores(listings.map(l=>l.mls));
    loadArvEstimates();
    // Brief BK: decorate each listing with its deal id+phase (if any). One
    // batch query against deals; updates the "🏗 In project" pill per row.
    decorateListingsWithDeals();
    batchFetchComps();
    fetchAgentDeCounts();
  }catch(e){console.error('Failed to load:',e);}}

// Fetch seller-side DE counts for the current listings pool. Email-primary,
// name-fallback over DISJOINT listing populations: listings with a non-empty
// agentEmail contribute to the email-keyed query; listings without an email
// fall back to the name-keyed query. No row can be counted twice because
// each listing's lookup only reads one of the two maps.
async function fetchAgentDeCounts(){
  const emailSet=new Set(),nameSet=new Set();
  for(const l of listings){
    const em=(l.agentEmail||'').trim().toLowerCase();
    const nm=(l.agent||'').trim().toLowerCase();
    if(em)emailSet.add(em);
    else if(nm)nameSet.add(nm);
  }
  const emails=[...emailSet],names=[...nameSet];
  try{
    const[er,nr]=await Promise.all([
      emails.length
        ?sb.from('properties').select('agent_email').eq('double_ended',true).gte('sold_date','2023-01-01').in('agent_email',emails)
        :Promise.resolve({data:[]}),
      names.length
        ?sb.from('properties').select('agent_name').eq('double_ended',true).gte('sold_date','2023-01-01').in('agent_name',names)
        :Promise.resolve({data:[]}),
    ]);
    if(er.error)console.error('[fetchAgentDeCounts email]',er.error);
    if(nr.error)console.error('[fetchAgentDeCounts name]',nr.error);
    for(const row of(er.data||[])){
      const k=(row.agent_email||'').trim().toLowerCase();
      if(k)deCountByEmail.set(k,(deCountByEmail.get(k)||0)+1);
    }
    for(const row of(nr.data||[])){
      const k=(row.agent_name||'').trim().toLowerCase();
      if(k)deCountByName.set(k,(deCountByName.get(k)||0)+1);
    }
    deCacheReady=true;
    console.log(`[fetchAgentDeCounts] ${deCountByEmail.size} email-keyed agents, ${deCountByName.size} name-keyed agents flagged as DE since 2023-01-01`);
    // Re-render DE pills in place (no full render() — avoids load-flash).
    listings.forEach(l=>refreshRowDePill(l.mls));
    if(active){const l=listings.find(x=>x.mls===active);if(l)renderDetailPage(l);}
  }catch(e){console.error('[fetchAgentDeCounts]',e);}
}
function agentDeCountFor(l){
  if(!deCacheReady)return 0;
  const em=(l.agentEmail||'').trim().toLowerCase();
  if(em)return deCountByEmail.get(em)||0;
  const nm=(l.agent||'').trim().toLowerCase();
  if(nm)return deCountByName.get(nm)||0;
  return 0;
}

}

async function batchFetchComps(){
  const BATCH=10;
  let todo=listings.filter(l=>!compCache[l.mls]&&l.sqft>0);
  if(!todo.length)return;
  while(todo.length>0){
    const batch=todo.slice(0,BATCH);
    await Promise.all(batch.map(async l=>{try{compCache[l.mls]=await findComps({mls:l.mls,sqft:l.sqft,address:l.address,city:l.city,zip:l.zip,high:l.high,elem:l.elem,mid:l.mid,latitude:l.latitude,longitude:l.longitude});}catch(e){console.error('[batchFetchComps] findComps failed for',l.mls,e);compCache[l.mls]={comps:[],hp:0,error:true};}}));
    batch.forEach(l=>refreshRowComps(l.mls));
    console.log(`[Comps] Batch loaded for ${batch.length} listings (${todo.length-batch.length} remaining)`);
    todo=listings.filter(l=>!compCache[l.mls]&&l.sqft>0);
  }
}

// ========== INIT ==========
// Brief BP: ?mls=<X> deep-link support. After loadListings() resolves the
// unread pool, if the URL carries ?mls=<X> we open that listing's detail
// pane — even if BO's deal-phase filter has hidden it from the visible
// list (in which case we fetch the row separately and add it to `listings`,
// mirroring the slow path in onAddrSearchPick).
async function handleDeepLink(){
  const params=new URLSearchParams(window.location.search);
  const targetMls=params.get('mls');
  if(!targetMls)return;
  let target=listings.find(l=>l.mls===targetMls);
  if(!target){
    // BO filter hid it (e.g. listing tied to in_escrow / under_construction
    // / listed deal, or off-market OFFMKT-... row). Fetch and hydrate so
    // opn() has the full listing shape to render against.
    const{data,error}=await sb.from('properties').select('*').eq('mls',targetMls).single();
    if(error||!data){
      console.warn('[deep-link] could not load listing',targetMls,error);
      return;
    }
    target=mapRowToListing(data);
    listings.push(target);
  }
  if(target)opn(targetMls,target);
}

(async()=>{
  await window.authGate();
  if(!window.CURRENT_USER_ROLE)return;  // authGate redirected; abort
  window.renderSidebar('deals');
  try{const{error}=await sb.from('properties').select('id').limit(1);document.getElementById('db-status').innerHTML=error?'<span style="color:var(--red)">●</span>':'<span style="color:var(--green)">●</span>';}
  catch(e){document.getElementById('db-status').innerHTML='<span style="color:var(--red)">●</span>';}
  await loadRehabConfig();
  await loadListings('unread');
  render();
  // Deep-link runs once, after the initial listings + render are in place.
  handleDeepLink();
})();
</script>

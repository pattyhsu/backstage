function recalcCompSummary(mid){
  const cbs=document.querySelectorAll('input[data-comp-mls="'+mid+'"]');
  const activeMls=Object.keys(compCache).find(k=>k.replace(/[^a-zA-Z0-9]/g,'')===mid);
  if(!activeMls||!compCache[activeMls])return;
  const all=compCache[activeMls].comps,checked=[];
  cbs.forEach(cb=>{const idx=parseInt(cb.dataset.compIdx,10);if(cb.checked&&!isNaN(idx)&&all[idx])checked.push(all[idx]);});
  const avg=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;
  const ppsfs=checked.map(c=>c.psf).filter(Boolean);
  // Old 4-card summary (Selected / Avg Price / Avg $/SF / Avg SqFt)
  // removed — the Manual comp avg card in the ARV/score row already
  // shows the trimmed value via compAvgOverride[mid].
  const avgPsf=checked.length?Math.round(avg(ppsfs)):0;
  const l=listings.find(x=>x.mls===activeMls);
  // Note: this updates the detail-panel ARV input only — compCache[activeMls].hp
  // is intentionally NOT mutated, so getArvLabel() in the list view keeps showing
  // the system's all-comps ARV. Detail = user-trimmed; list = system best-guess.
  // Stash the user-trimmed comp avg so renderArvScoreRow picks it up on
  // the next re-render (cards row replaces the old single comp-arv strip).
  if(l){
    compAvgOverride[mid]={psf:avgPsf,count:checked.length};
    const rowEl=document.getElementById('arv-score-row-'+mid);
    if(rowEl)rowEl.outerHTML=renderArvScoreRow(l,mid);
    // If the active source is 'comp-avg' (and not locked), push the new
    // trimmed value into the deal-analyzer input.
    if(avgPsf&&!l.lockedArv&&activeArvSource(l,getComps(l))==='comp-avg'){
      const newArv=avgPsf*l.sqft;
      setNumVal('arv-'+mid,newArv);
      calcDeal(mid,l.price,l.sqft);
    }
  }
}

// ========== DEAL ANALYZER ==========
// Keep these in sync with underwriter/ Python config — drift causes deal_score row's target_buy to disagree with the in-page TARGET BUY.
// Unified 6-bucket waterfall economics (see breakdown-mockup Surface 2):
//   purchase expenses = 1% of purchase, holding = 0.3% of ARV, disposition = 4% of ARV,
//   financing = (LTV%·purchase) × rate × months/12. Target margin = net profit / purchase.
const PURCH_EXP_PCT=0.01,HOLD_PCT=0.003,DISP_PCT=0.04,PROFIT_TARGET_PCT=0.10;
const FIN_DEFAULTS={months:3,rate:9,ltv:90};
// Money formatters that put the sign before the $ (mockup style): -$3,058 / +$110,205.
const FMoney=n=>(n<0?'-$':'$')+Math.abs(Math.round(n)).toLocaleString();
const FSigned=n=>(n>=0?'+$':'-$')+Math.abs(Math.round(n)).toLocaleString();
let ppIsCustom={},constIsCustom={},listPriceMap={};
// Session-only per-deal inputs for the breakdown (seeded from defaults; not persisted).
let marginMap={},finMap={};
// Rehab ladder loaded from Supabase config table (key=rehab_categories).
// See underwriter/seed_config.py for the seed; underwriter/rehab.py is the Python twin.
// Data-driven so the Edit modal can render checkboxes from the same source.
let CONST_CATEGORIES=null;
async function loadRehabConfig(){
  try{
    const{data,error}=await sb.from('config').select('value').eq('key','rehab_categories').limit(1).maybeSingle();
    if(error||!data||!data.value||!Array.isArray(data.value.categories)){console.warn('rehab_categories not loaded',error);return false;}
    CONST_CATEGORIES=data.value.categories;
    return true;
  }catch(e){console.warn('rehab_categories fetch failed',e);return false;}
}
// Per-MLS selected items. When an MLS has no entry, every item is assumed checked.
let constChecked={};
// Per-MLS per-item cost overrides (user-typed dollar amounts). Missing → use default.
let constOverrides={};
// Declarative cost rule evaluator. Mirrors underwriter/rehab.py:eval_cost_rule.
// Rule shapes: flat | sqft_band | sqft_linear | sqft_multiplier.
function evalCostRule(rule,sqft){
  if(!rule)return 0;
  const s=sqft;
  if(rule.type==='flat')return Number(rule.amount)||0;
  if(rule.type==='sqft_band'){
    for(const band of rule.bands){
      if(band.max==null||s<band.max)return Number(band.amount)||0;
    }
    return 0;
  }
  if(rule.type==='sqft_linear'){
    const lo=rule.min_sqft,hi=rule.max_sqft;
    const clamped=Math.max(lo,Math.min(hi,s));
    const frac=(clamped-lo)/(hi-lo);
    const raw=rule.min_amount+frac*(rule.max_amount-rule.min_amount);
    const rt=rule.round_to||1;
    return Math.round(raw/rt)*rt;
  }
  if(rule.type==='sqft_multiplier'){
    const raw=s*rule.per_sqft;
    const rt=rule.round_to||1;
    return Math.round(raw/rt)*rt;
  }
  return 0;
}
// Applicability evaluator. Mirrors underwriter/rehab.py:evaluate_applicability
// and the bath/pool logic that used to live inline in getConstChecked.
function evalApplicability(rule,l){
  if(!rule||rule.always_on)return true;
  if(rule.min_full_baths!=null){
    const b=parseFloat(l&&l.baths)||0;
    return Math.floor(b)>=rule.min_full_baths;
  }
  if(rule.requires_half_bath){
    const b=parseFloat(l&&l.baths)||0;
    return b>Math.floor(b);
  }
  if(rule.requires_pool){
    // JS-legacy default: ON unless the pool string is literally 'no'.
    return ((l&&l.pool)||'').toLowerCase()!=='no';
  }
  return true;
}
// Note resolver for the construction editor. Preserves the two inline
// behaviours from the old JS: kitchen picks the matching sqft_band's
// note; foundation renders "min · $3k" / "max · $10k" / "linear · N sf"
// from the sqft_linear rule's notes block.
function evalItemNote(item,sqft){
  const rule=item.cost;
  if(!rule)return'';
  if(rule.type==='sqft_band'){
    for(const band of rule.bands){
      if(band.max==null||sqft<band.max)return band.note||'';
    }
    return '';
  }
  if(rule.type==='sqft_linear'&&rule.notes){
    if(sqft<=rule.min_sqft)return rule.notes.min_label||'';
    if(sqft>=rule.max_sqft)return rule.notes.max_label||'';
    return(rule.notes.linear_label||'').replace('{sqft_comma}',Number(sqft).toLocaleString());
  }
  return '';
}
function getConstChecked(mls){
  if(!constChecked[mls]){
    if(!CONST_CATEGORIES)return {};
    const l=(typeof listings!=='undefined')?listings.find(x=>x.mls===mls):null;
    const d={};
    for(const cat of CONST_CATEGORIES)for(const item of cat.items){
      d[item.id]=l?evalApplicability(item.applicability,l):true;
    }
    constChecked[mls]=d;
  }
  return constChecked[mls];
}
function getConstOverrides(mls){if(!constOverrides[mls])constOverrides[mls]={};return constOverrides[mls];}
function costOf(item,sqft,mls){
  const s=parseFloat(sqft)||0;
  const ov=mls&&constOverrides[mls]?constOverrides[mls][item.id]:undefined;
  return ov!=null?ov:evalCostRule(item.cost,s);
}
function estimateConstruction(sqft,mls){
  const s=parseFloat(sqft)||0;if(!s||!CONST_CATEGORIES)return 0;
  const checked=mls?getConstChecked(mls):null;
  let t=0;
  for(const cat of CONST_CATEGORIES)for(const item of cat.items){
    const on=checked?checked[item.id]!==false:true;
    if(on)t+=costOf(item,s,mls);
  }
  return Math.round(t);
}

    for(const item of cat.items){

      h+=`<div style="display:flex;align-items:center;gap:10px;padding:6px 4px;font-size:12px;color:${isOn?'var(--text)':'var(--text-4)'};opacity:${s?1:0.5}">
        <input type="checkbox" ${isOn?'checked':''} ${s?'':'disabled'} onchange="toggleConstItem('${mls}','${item.id}',${s})" style="cursor:${s?'pointer':'not-allowed'};flex-shrink:0">

        <input type="text" value="${F(effCost)}" ${s?'':'disabled'} oninput="setConstCostLive('${mls}','${item.id}',this.value,${s})" onfocus="this.select()" onblur="blurConstCost(this,${defaultCost},'${mls}','${item.id}')" style="width:90px;text-align:right;font-family:inherit;font-size:12px;font-weight:600;color:${isOverridden?'var(--accent)':isOn?'var(--text)':'var(--text-4)'};background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:3px 6px;outline:none">
      </div>`;
    }
  }
  if(body)body.innerHTML=h;
  if(tot)tot.textContent=F(estimateConstruction(s,mls));

// Back-solve the purchase price that hits a target margin (net profit / purchase):
//   net/P = s  ⟺  arv − (construction+holding+disposition) = P(1 + purch_exp + k_fin + s),
//   where k_fin = (ltv/100)·(rate/100)·(months/12) is financing as a fraction of purchase.
function suggestedBuy(arv,construction,kFin,sTargetPct){
  const fixed=construction+arv*HOLD_PCT+arv*DISP_PCT;
  return Math.max(0,Math.round((arv-fixed)/(1+PURCH_EXP_PCT+kFin+sTargetPct/100)));
}
// The unified 6-bucket waterfall. purchase = effective acquisition cost.
function computeDeal({arv,purchase,construction,months,rate,ltv}){
  const loan=purchase*(ltv/100);
  const cashDown=Math.max(0,purchase-loan);
  const financing=loan*(rate/100)*(months/12);
  const purchexp=purchase*PURCH_EXP_PCT;
  const holding=arv*HOLD_PCT;
  const disposition=arv*DISP_PCT;
  const rows=[
    {key:'purchase',    name:'Purchase price',      det:'',                                amt:purchase},
    {key:'purchexp',    name:'Purchase expenses',   det:'1% of purchase',                  amt:purchexp},
    {key:'rehab',       name:'Construction / rehab',det:'',                                amt:construction},
    {key:'financing',   name:'Financing',           det:rate+'% · '+ltv+'% LTV · '+months+'mo', amt:financing},
    {key:'holding',     name:'Holding',             det:'0.3% of ARV',                     amt:holding},
    {key:'disposition', name:'Disposition',         det:'4% sell',                         amt:disposition},
  ];
  const allIn=rows.reduce((s,r)=>s+r.amt,0);
  return {rows,allIn,net:arv-allIn,arv,loan,cashDown};
}

function calcDeal(id,listPrice,sqft){
  listPriceMap[id]=listPrice;const arv=getNumVal('arv-'+id);
  const lObj=listings.find(x=>x.mls.replace(/[^a-zA-Z0-9]/g,'')===id);
  const constLocked=!!(lObj&&lObj.lockedConstruction);
  // Effective construction cost: locked > user-custom > sqft-based estimator
  let effConst;
  if(constLocked){effConst=lObj.lockedConstruction;setNumVal('const-'+id,effConst);}
  else if(constIsCustom[id])effConst=getNumVal('const-'+id);
  else{effConst=estimateConstruction(sqft,lObj&&lObj.mls);setNumVal('const-'+id,effConst);}
  // Session-only inputs: target margin % + financing assumptions (parseFloat → allow decimals).
  const fnum=elId=>{const el=document.getElementById(elId);return el?parseFloat((el.value||'').replace(/[^\d.]/g,'')):NaN;};
  const margin=isNaN(fnum('margin-'+id))?PROFIT_TARGET_PCT*100:fnum('margin-'+id);
  const months=fnum('months-'+id)||FIN_DEFAULTS.months;
  const rate=isNaN(fnum('rate-'+id))?FIN_DEFAULTS.rate:fnum('rate-'+id);
  const ltv=isNaN(fnum('ltv-'+id))?FIN_DEFAULTS.ltv:fnum('ltv-'+id);
  marginMap[id]=margin;finMap[id]={months,rate,ltv};
  const kFin=(ltv/100)*(rate/100)*(months/12);
  // Target buy is back-solved from the target margin unless the user pinned it.
  // The pp field has its own "$" prefix span, so write the bare number (no F()).
  if(!ppIsCustom[id]){const el=document.getElementById('pp-'+id);if(el)el.value=suggestedBuy(arv,effConst,kFin,margin).toLocaleString();}
  const purchase=getNumVal('pp-'+id);
  const c=computeDeal({arv,purchase,construction:effConst,months,rate,ltv});
  renderBreakdown('breakdown-'+id,c);
  // Financing help line under the assumptions box.
  const fh=document.getElementById('finhelp-'+id);
  if(fh)fh.innerHTML=`Loan <b>${F(c.loan)}</b> (${ltv}% of ${F(purchase)}) · cash down <b>${F(c.cashDown)}</b> · interest <b>${F(c.rows[3].amt)}</b> over ${months}mo`;
  // Cash-needed footer.
  const ft=document.getElementById('foot-'+id);
  if(ft)ft.innerHTML=`<span><b>Cash needed</b> ${F(c.cashDown+effConst+c.rows[3].amt)} <span class="dim">· ${F(c.cashDown)} down + ${F(effConst)} rehab + ${F(c.rows[3].amt)} carry</span></span>`;
  // Target-buy verdict banner (over = list price exceeds your target buy → red).
  const gap=listPrice-purchase,gapPct=listPrice>0?((gap/listPrice)*100).toFixed(1):'0',over=gap>0;
  const vd=document.getElementById('verdict-'+id);
  if(vd){vd.classList.toggle('over',over);vd.classList.toggle('under',!over);}
  const set=(elId,txt)=>{const el=document.getElementById(elId);if(el)el.textContent=txt;};
  set('buynote-'+id,`at ${margin}% margin`);
  set('vtxt-'+id,over?'LISTING IS OVER YOUR TARGET':'LISTING IS UNDER YOUR TARGET');
  set('vamt-'+id,`${over?'+':''}${FMoney(gap)}`);
  set('vsub-'+id,`${over?'+':''}${gapPct}% vs list ${F(listPrice)}`);
}

function getArvVal(l){return arvSourceVal(l).arv;}
function toggleSort(col){if(sort_===col+'-asc')sort_=col+'-desc';else if(sort_===col+'-desc')sort_='priority';else sort_=col+'-asc';render();}
// Dispatch table for getSorted(). Each entry returns a (a,b)=>number comparator
// for ascending order; descending is handled by sign-flip in getSorted(). The
// 'priority' key is special-cased (no -asc/-desc suffix) and ignores direction.
const _sStr=s=>(s||'').toString().toLowerCase();
// Untiered rows sort after T1–T6 in ascending order (and lead in descending).
const _tierVal=l=>l.conditionTier!=null?l.conditionTier:Infinity;
const SORTERS={
  price:   (a,b)=>a.price-b.price,
  ppsf:    (a,b)=>a.ppsf-b.ppsf,
  dom:     (a,b)=>dom(a.listDate)-dom(b.listDate),
  arv:     (a,b)=>getArvVal(a)-getArvVal(b),
  tier:    (a,b)=>_tierVal(a)-_tierVal(b),
  address: (a,b)=>_sStr(a.address).localeCompare(_sStr(b.address)),
  city:    (a,b)=>_sStr(a.city).localeCompare(_sStr(b.city)),
  status:  (a,b)=>_sStr(a.changeType).localeCompare(_sStr(b.changeType)),
};
function getSorted(){
  let d=[...listings];
  if(cityFilters.size)d=d.filter(l=>cityFilters.has(l.city.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase())));
  if(gradeFilters.size)d=d.filter(l=>gradeFilters.has(dealGradeOf(l.mls)));
  if(tierFilters.size)d=d.filter(l=>tierFilters.has(tierKeyOf(l)));
  if(subtierFilters.size)d=d.filter(l=>{const k=subTier5KeyOf(l);return k!=null&&subtierFilters.has(k);});
  if(sort_==='priority')return d;
  const idx=sort_.lastIndexOf('-');
  if(idx<0)return d;
  const key=sort_.slice(0,idx),dir=sort_.slice(idx+1);
  const cmp=SORTERS[key];
  if(!cmp)return d;
  const sign=dir==='desc'?-1:1;
  d.sort((a,b)=>sign*cmp(a,b));
  return d;
}

async function updateStageCounts(){
  try{
    // Keep the unread count query in sync with loadListings('unread') (L1406):
    // same .not('mls','is',null) + .neq('change_type','sold') + .eq('stage','unread')
    // + .or(list_price.is.null,list_price.lte.${MAX_LIST_PRICE}) chain so the badge
    // count never disagrees with the rendered listing count.
    // Shared base predicate, mirrors loadListings() L2472.
    const base=()=>sb.from('properties').select('*',{count:'exact',head:true}).not('mls','is',null).not('mls','like','OFFMKT-%').neq('change_type','sold');
    const[ur,pt,om,uf,ar,al]=await Promise.all([
      base().eq('stage','unread').or(`list_price.is.null,list_price.lte.${MAX_LIST_PRICE}`),
      base().eq('stage','potential'),
      base().eq('stage','off_market_lead'),
      base().eq('stage','unsold_flip'),
      base().or(`stage.eq.archived,list_price.gt.${MAX_LIST_PRICE}`),
      base().not('stage','in','("archived","off_market_lead")').or(`list_price.is.null,list_price.lte.${MAX_LIST_PRICE}`),
    ]);
    // off_market_lead count is pre-relist-dedup (loadListings filters relists client-side), so it may read slightly high.
    const setCnt=(id,n)=>{const e=document.getElementById(id);if(e)e.textContent=n?'('+n+')':'';};
    setCnt('cnt-unread',ur.count);setCnt('cnt-potential',pt.count);
    setCnt('cnt-off_market_lead',om.count);setCnt('cnt-unsold_flip',uf.count);
    setCnt('cnt-archived',ar.count);setCnt('cnt-all',al.count);
  }catch(e){
    console.warn('[updateStageCounts] count fetch failed:',e);
    ['cnt-unread','cnt-potential','cnt-off_market_lead','cnt-unsold_flip','cnt-archived','cnt-all'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent='(?)';});
  }
}

// Address search across all listings regardless of status or current
// filter scope. MLS Deals is the canonical place to look up any listing's
// details, so search spans every status — sold, in escrow, hold, etc.
//
// Perf: ilike '%q%' over 22k+ rows can't use an index, so each keystroke
// used to cost a Supabase round-trip + full seq scan (sluggish). Instead
// we preload a compact in-memory index once (mls/address/city/price/
// change_type), then filter synchronously per keystroke — instant, zero
// per-keystroke network. The server query stays as a fallback until the
// index is warm. Click handler fetches the full row + maps to the listing
// shape so opn() can render the detail pane even when the listing isn't in
// the current visible view.
//
// Staleness: the index is captured once per page load; listings added
// mid-session won't appear in search until reload. Acceptable here.
let _addrSearchTimer=null;
let _addrSearchSeq=0;
let _addrIndex=null;        // [{mls,address,city,list_price,change_type,_lc}]
let _addrIndexPromise=null; // in-flight loader (dedup across callers)
let _addrWatermark=null;    // newest updated_at captured in the current index
let _addrFreshTimer=null;   // periodic staleness poller (started once)
// Paginate the full non-OFFMKT property set (server caps at 1000 rows/req)
// in parallel and cache it. Resolves to the index array; rejects on error.
function loadAddrIndex(){
  if(_addrIndex)return Promise.resolve(_addrIndex);
  if(_addrIndexPromise)return _addrIndexPromise;
  _addrIndexPromise=(async()=>{
    const PAGE=1000;
    // updated_at is carried only to compute the freshness watermark below.
    const cols='mls,address,city,list_price,change_type,updated_at';
    // First page also yields the exact total so we know how many more to fetch.
    // Order by mls (unique) for stable, non-overlapping pagination.
    const first=await sb.from('properties').select(cols,{count:'exact'})
      .not('mls','like','OFFMKT-%').order('mls',{ascending:true}).range(0,PAGE-1);
    if(first.error)throw first.error;
    const total=first.count||first.data.length;
    const rows=first.data.slice();
    const reqs=[];
    for(let off=PAGE;off<total;off+=PAGE){
      reqs.push(sb.from('properties').select(cols)
        .not('mls','like','OFFMKT-%').order('mls',{ascending:true}).range(off,off+PAGE-1));
    }
    for(const p of await Promise.all(reqs)){if(p.data)rows.push(...p.data);}
    // ISO-8601 UTC strings sort lexically, so a string max == the latest time.
    let wm=null;
    for(const r of rows){if(r.updated_at&&(!wm||r.updated_at>wm))wm=r.updated_at;r._lc=(r.address||'').toLowerCase();}
    _addrWatermark=wm;
    _addrIndex=rows;
    startAddrFreshPoll();
    return rows;
  })();
  // Let a failed load retry on the next keystroke rather than poisoning forever.
  _addrIndexPromise.catch(()=>{_addrIndexPromise=null;});
  return _addrIndexPromise;
}
// Discard the cached index and rebuild it (used when a data pull lands).
function reloadAddrIndex(){_addrIndex=null;_addrIndexPromise=null;return loadAddrIndex();}
// Data is pulled ~6x/day in batch, so rather than re-download the whole
// table on a blind timer we just poll a tiny watermark — max(updated_at),
// ~30 bytes — and only rebuild when it advances past what we loaded with.
// Every 3h is ample for that cadence; tab re-focus (below) covers the gap
// — it catches a pull the moment you return, so the interval only bounds
// staleness while the tab stays continuously focused.
async function checkAddrIndexFresh(){
  if(!_addrIndex)return; // nothing cached yet (or a rebuild is already in flight)
  const{data,error}=await sb.from('properties').select('updated_at')
    .not('mls','like','OFFMKT-%')
    .order('updated_at',{ascending:false,nullsFirst:false}).limit(1);
  if(error||!data||!data.length)return;
  const latest=data[0].updated_at;
  if(latest&&_addrWatermark&&latest>_addrWatermark)reloadAddrIndex();
}
// Start the poller once: every 3h while open, plus on tab re-focus so a
// pull that landed while you were away is picked up the moment you return.
function startAddrFreshPoll(){
  if(_addrFreshTimer)return;
  _addrFreshTimer=setInterval(checkAddrIndexFresh,10800000);
  document.addEventListener('visibilitychange',()=>{if(!document.hidden)checkAddrIndexFresh();});
}
// Substring match over the in-memory index, prefix (address-start) matches
// ranked first so house-number searches surface the obvious hit. Top 10.
function searchAddrIndex(lc){
  const starts=[],contains=[];
  for(const r of _addrIndex){
    const i=r._lc.indexOf(lc);
    if(i<0)continue;
    (i===0?starts:contains).push(r);
  }
  return starts.concat(contains).slice(0,10);
}
function renderAddrResults(drop,rows){

async function doAddrSearch(q){
  const drop=document.getElementById('addr-search-drop');if(!drop)return;
  const query=(q||'').trim();
  if(!query){drop.style.display='none';drop.innerHTML='';return;}
  // Sequence guard: stale responses (slower keystroke fires) shouldn't
  // overwrite the most recent result.
  const mySeq=++_addrSearchSeq;
  const lc=query.toLowerCase();
  // Fast path: filter the in-memory index synchronously.
  if(_addrIndex){renderAddrResults(drop,searchAddrIndex(lc));return;}
  // Cold path (index still loading): one-off server query so the first
  // search before warmup still returns results. ilike does case-insensitive
  // substring match; escape % and _ so they're treated literally.
  const escaped=query.replace(/[%_]/g,c=>`\\${c}`);
  const{data,error}=await sb.from('properties')
    .select('mls,address,city,list_price,change_type')
    .not('mls','like','OFFMKT-%')
    .ilike('address',`%${escaped}%`)
    .limit(10);
  if(mySeq!==_addrSearchSeq)return; // stale
  if(error){
    drop.style.display='block';
    drop.innerHTML=`<div style="padding:8px 12px;font-size:12px;color:var(--red)">Search error: ${escapeHtml(error.message)}</div>`;
    return;
  }
  renderAddrResults(drop,data||[]);
}

// Mirrors the per-filter query in loadListings() for a single in-memory row,
// so we can decide client-side whether a status change should drop it from view.
function listingMatchesFilter(l,f){
  const overCap=l.price>MAX_LIST_PRICE;
  if(f==='unread')return l.status==='unread'&&!overCap;
  if(f==='archived')return l.status==='archived'||overCap;
  if(f==='off_market_lead')return l.status==='off_market_lead';
  if(f==='potential')return l.status==='potential';
  if(f==='unsold_flip')return l.status==='unsold_flip';
  if(!f||f==='all')return l.status!=='archived'&&l.status!=='off_market_lead'&&!overCap;
  return l.status===f;
}

      .select('id, phase').eq('buy_side_mls', mls).limit(1);

    alert('Open offer failed: '+(e&&e.message?e.message:String(e)));
    if(btn){btn.disabled=false;btn.style.opacity='';btn.style.cursor='pointer';btn.textContent='📤 Open offer';}
  }finally{
    _openOfferInFlight.delete(mls);
  }
}

// Brief BX: undo an accidental Open Offer click. Only invokable when the
// freshness gate in decorateListingsWithDeals set l.undoable=true (deal is
// pursuing + zero downstream work). Hard-deletes the deals row; cascading
// FKs drop deals_phase_history / deal_milestones / deal_phase_checklist_items
// / deal_loans / deal_expenses / deal_documents. No history row written —
// per D8 the misclick is treated as if it never happened.
async function undoOpenOffer(dealId, mls){
  const l=listings.find(x=>x.mls===mls);
  if(!l||!l.dealId||!l.undoable)return;
  if(!confirm('Undo opening the offer? This deletes the pipeline tracking record for this deal. The MLS listing stays visible. Cannot be undone.'))return;
  try{
    const{error}=await sb.from('deals').delete().eq('id',dealId);
    if(error)throw error;
    l.dealId=null;
    l.dealPhase=null;
    l.undoable=false;
    renderDetailPage(l);
    refreshRowDealPill(mls);
  }catch(e){
    console.warn('undoOpenOffer failed',e);
    alert('Undo failed: '+(e&&e.message?e.message:String(e)));
  }
}

// Brief BK: batch-fetch deal rows that reference any visible MLS# (either
// buy_side_mls or relist_mls). Decorate each listing with l.dealId +
// l.dealPhase so the "🏗 In project" pill renders the deal phase, and the
// "Open offer" / "Mark as listing" buttons disappear when a deal exists.
async function decorateListingsWithDeals(){
  if(!listings.length)return;
  const listingMls=new Set(listings.map(l=>l.mls).filter(Boolean));
  if(!listingMls.size)return;
  // Fetch all deals unfiltered (<50 in production). Avoids the URL
  // length cap that bit large filter tabs like Unread (~645 listings)
  // where buy_side_mls.in.(...) + relist_mls.in.(...) exceeded the
  // edge proxy's ~8KB filter cap → 400 → silent decoration failure.
  let deals=[];
  try{
    const{data,error}=await sb.from('deals')
      .select('id, phase, buy_side_mls, relist_mls, offer_price, purchase_price, notes');
    if(error){console.warn('[decorateListingsWithDeals] failed',error);return;}
    // Keep only deals that touch a currently-visible listing.
    deals=(data||[]).filter(d=>listingMls.has(d.buy_side_mls)||listingMls.has(d.relist_mls));
  }catch(e){
    console.warn('[decorateListingsWithDeals] failed',e);
    return;
  }
  // Build mls -> {dealId, dealPhase, undoableDealRow}. If the same MLS appears
  // as both buy_side and relist on different deals (uncommon — typically would
  // be the SAME deal), prefer the most-active phase: prefer non-archived
  // > non-sold > anything.
  const byMls={};
  const dealById={};
  const phaseRank=p=>{
    if(p==='archived')return 0;
    if(p==='sold')return 1;
    return 2;
  };
  const consider=(mls,deal)=>{
    if(!mls)return;
    const ex=byMls[mls];
    if(!ex || phaseRank(deal.phase) > phaseRank(ex.dealPhase)){
      byMls[mls]={dealId: deal.id, dealPhase: deal.phase};
    }
  };
  for(const d of deals){
    dealById[d.id]=d;
    consider(d.buy_side_mls, d);
    consider(d.relist_mls, d);
  }

  // Brief BX: freshness gate. For each pursuing deal, fetch six signals in
  // parallel; mark l.undoable=true iff ALL hold: history rows==1, zero
  // completed milestones, zero completed checklist items, zero loans, zero
  // expenses, zero documents, AND offer_price/purchase_price/notes all NULL
  // on the deal row itself. Non-pursuing deals get l.undoable=false with
  // no DB roundtrip. Entire gate is fail-soft: if any query errors, all
  // pursuing deals get undoable=false but dealId/dealPhase decoration
  // continues — gate failure must never block the deal-pill from rendering.
  const pursuingIds=deals.filter(d=>d.phase==='pursuing').map(d=>d.id);
  const undoable=new Set();
  if(pursuingIds.length){
    try{
      // deal_documents table ships in Migration 066 (Brief BW). Until then
      // the query errors (PostgREST returns 404 + "JSON could not be
      // generated", not Postgres 42P01) — swallow any error to 0 rows.
      const docsQuery=sb.from('deal_documents').select('deal_id').in('deal_id',pursuingIds)
        .then(r=>(r&&!r.error&&r.data)?r.data:[],()=>[]);
      const[histRes,msRes,ckRes,lnRes,exRes,dcRes]=await Promise.all([
        sb.from('deals_phase_history').select('deal_id').in('deal_id',pursuingIds),
        sb.from('deal_milestones').select('deal_id').in('deal_id',pursuingIds).eq('completed',true),
        sb.from('deal_phase_checklist_items').select('deal_id').in('deal_id',pursuingIds).eq('completed',true),
        sb.from('deal_loans').select('deal_id').in('deal_id',pursuingIds),
        sb.from('deal_expenses').select('deal_id').in('deal_id',pursuingIds),
        docsQuery,
      ]);
      for(const r of [histRes,msRes,ckRes,lnRes,exRes]){
        if(r&&r.error)throw r.error;
      }
      const histCount={};for(const r of (histRes.data||[]))histCount[r.deal_id]=(histCount[r.deal_id]||0)+1;
      const blocked=new Set();
      for(const r of (msRes.data||[]))blocked.add(r.deal_id);
      for(const r of (ckRes.data||[]))blocked.add(r.deal_id);
      for(const r of (lnRes.data||[]))blocked.add(r.deal_id);
      for(const r of (exRes.data||[]))blocked.add(r.deal_id);
      for(const r of (dcRes||[]))blocked.add(r.deal_id);
      for(const id of pursuingIds){
        const d=dealById[id];
        if(blocked.has(id))continue;
        if((histCount[id]||0)!==1)continue;
        if(d.offer_price!=null||d.purchase_price!=null||d.notes!=null)continue;
        undoable.add(id);
      }
    }catch(e){
      console.warn('[decorateListingsWithDeals] freshness gate failed; all pursuing deals will be non-undoable',e);
    }
  }

  // Decorate + refresh per-row pill.
  for(const l of listings){
    const m=byMls[l.mls];
    if(m){
      l.dealId=m.dealId;
      l.dealPhase=m.dealPhase;
      l.undoable=undoable.has(m.dealId);
    } else {
      l.dealId=null;
      l.dealPhase=null;
      l.undoable=false;
    }
    refreshRowDealPill(l.mls);
  }
  // Brief BO: filter out listings linked to deals past pursuing/lost.
  // Those are tracked on pipeline.html / project-detail.html — not
  // browsed here. Pursuing + lost stay visible (in the Potential group
  // per the sync trigger setting stage='potential') so Patty can keep
  // eyes on them. in_escrow / under_construction / listed / sold /
  // archived disappear entirely from mls-deals.
  const before=listings.length;
  listings=listings.filter(l=>!l.dealPhase||l.dealPhase==='pursuing'||l.dealPhase==='lost');
  if(listings.length!==before)render();
  // Re-render detail page if open — the "🏗 In project" pill / Open offer
  // button visibility may have changed.
  if(active){const l=listings.find(x=>x.mls===active);if(l)renderDetailPage(l);}
}

  // Agent & Broker section). The list-card has no deal pill; if/when one

// Brief BK / D2: address-match an MLS-listed property against the existing
// under_construction deals to detect the relist-of-our-flip case. On a
// single match: confirm + link (relist_mls=mls, phase='selling'). On zero
// or multiple matches: open a picker modal so the user chooses (or creates
// an orphan listing with buy_side_mls=NULL). Brief BV / D2: phase value
// renamed from 'listed' → 'selling'.
async function markAsListing(mls){
  const l=listings.find(x=>x.mls===mls);if(!l)return;
  if(l.dealId){alert('This listing is already linked to a deal.');return;}

  // 1. Fetch under_construction candidates.
  const {data:cands, error:cErr}=await sb.from('deals')
    .select('id, buy_side_mls, relist_mls, created_at')
    .eq('phase','under_construction');
  if(cErr){alert('Failed to load candidates: '+cErr.message);return;}
  const candidates=cands||[];

  // 2. Resolve each candidate's address via properties (batch fetch).
  const candMls=candidates.map(c=>c.buy_side_mls).filter(Boolean);
  const addrByMls={};
  if(candMls.length){
    const {data:props}=await sb.from('properties')
      .select('mls, address, city')
      .in('mls', candMls);
    for(const p of (props||[])){addrByMls[p.mls]=p;}
  }

  // 3. Address-match: case-insensitive substring match on the street
  // component. Pull the leading numeric+street tokens (strip unit/suite).
  const streetOf=raw=>{
    if(!raw)return '';
    // Strip apt/unit suffix; keep the leading "<#> <street>" chunk.
    const cleaned=String(raw).replace(/\s*(?:apt|unit|ste|suite|#)\.?\s*[\w\-]+/i,'').trim();
    return cleaned.toLowerCase();
  };
  const myStreet=streetOf(l.address);
  const matches=[];
  for(const c of candidates){
    const candProp=c.buy_side_mls?addrByMls[c.buy_side_mls]:null;
    const candAddr=candProp?candProp.address:'';
    const candStreet=streetOf(candAddr);
    if(myStreet && candStreet && (candStreet.includes(myStreet) || myStreet.includes(candStreet))){
      matches.push({deal:c, addr:candAddr, city:candProp?candProp.city:''});
    }
  }

  // 4. Single match → confirm + link.
  if(matches.length===1){
    const m=matches[0];
    const d=m.deal;
    const sinceStr=d.created_at?new Date(d.created_at).toISOString().slice(0,10):'?';
    const ok=confirm('This looks like the relist of '+m.addr+(m.city?', '+m.city:'')+' (under_construction since '+sinceStr+'). Link?');
    if(!ok)return;
    await applyMarkAsListing(d.id, mls, l, 'under_construction');
    return;
  }

  // 5. Zero or multiple → modal picker.
  openMarkAsListingPicker(matches, mls, l);
}

// Modal picker for markAsListing. Shows candidates + "Create new orphan
// listing" option. On pick: link relist_mls + flip phase to 'selling'.
function openMarkAsListingPicker(matches, mls, l){
  // Build a lightweight modal inline. Reuses the same overlay pattern as

  const overlayId='mal-modal';

  const matchHtml=matches.length
    ? matches.map((m,i)=>{
        const d=m.deal;
        const sinceStr=d.created_at?new Date(d.created_at).toISOString().slice(0,10):'?';
        return `<div class="mal-row" data-idx="${i}" style="padding:10px 14px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;cursor:pointer;background:var(--bg)" onmouseover="this.style.background='var(--bg-alt)'" onmouseout="this.style.background='var(--bg)'">
          <div style="font-weight:600;font-size:13px">${escapeHtml(m.addr||'(no address)')}${m.city?', '+escapeHtml(m.city):''}</div>
          <div style="font-size:11px;color:var(--text-3);margin-top:2px;font-family:var(--mono)">Buy MLS# ${escapeHtml(d.buy_side_mls||'(none)')} · Under construction since ${escapeHtml(sinceStr)}</div>
        </div>`;
      }).join('')
    : `<div style="padding:10px 14px;color:var(--text-4);font-size:12px;font-style:italic">No address-matched candidates among under_construction deals.</div>`;

  const html=`<div id="${overlayId}" style="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center" onclick="if(event.target.id==='${overlayId}')document.getElementById('${overlayId}').remove()">
    <div style="background:var(--bg);max-width:560px;width:90%;max-height:80vh;overflow-y:auto;border-radius:8px;padding:18px 20px 16px;box-shadow:0 8px 32px rgba(0,0,0,.18)">
      <div style="font-size:14px;font-weight:700;margin-bottom:6px">Mark as our listing — pick the source deal</div>
      <div style="font-size:12px;color:var(--text-3);margin-bottom:12px">Listing: <b>${escapeHtml(l.address||'')}${l.city?', '+escapeHtml(l.city):''}</b> · MLS# ${escapeHtml(mls)}</div>
      <div style="font-size:11px;color:var(--text-4);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;font-weight:700">${matches.length===0?'No address matches found' : matches.length+' candidate'+(matches.length===1?'':'s')}</div>
      <div id="mal-list">${matchHtml}</div>
      <div style="border-top:1px solid var(--border);margin:12px 0 8px"></div>
      <div class="mal-row" data-idx="orphan" style="padding:10px 14px;border:1px dashed var(--border);border-radius:6px;cursor:pointer;background:var(--bg)" onmouseover="this.style.background='var(--bg-alt)'" onmouseout="this.style.background='var(--bg)'">
        <div style="font-weight:600;font-size:13px">＋ Create new orphan listing</div>
        <div style="font-size:11px;color:var(--text-3);margin-top:2px">Insert a deal with relist_mls only (buy_side_mls=NULL). Use when the under_construction source isn't tracked here.</div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:14px">
        <button onclick="document.getElementById('${overlayId}').remove()" style="padding:5px 14px;border:1px solid var(--border);background:var(--bg);border-radius:5px;font-family:inherit;font-size:12px;cursor:pointer">Cancel</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  // Wire up the row clicks.
  document.querySelectorAll('#'+overlayId+' .mal-row').forEach(row=>{
    row.addEventListener('click', async ()=>{
      const idx=row.dataset.idx;
      document.getElementById(overlayId).remove();
      if(idx==='orphan'){
        await applyMarkAsListing(null, mls, l, null);
      } else {
        const m=matches[Number(idx)];
        if(m)await applyMarkAsListing(m.deal.id, mls, l, 'under_construction');
      }
    });
  });
}

// Apply the mark-as-listing operation. If dealId is set: update existing
// deal (relist_mls=mls, phase='selling'). If dealId is null: create a new
// orphan deal with buy_side_mls=NULL, relist_mls=mls.
// Brief BV / D2: phase value renamed from 'listed' → 'selling'.
async function applyMarkAsListing(dealId, mls, l, fromPhase){
  const today=new Date().toISOString().slice(0,10);
  const listPrice=l.price||null;
  try{
    let resolvedDealId=dealId;
    if(dealId){
      // Link existing under_construction deal as relist.
      const {error:uErr}=await sb.from('deals').update({
        relist_mls: mls,
        phase: 'selling',
        list_price: listPrice,
        list_date: today,
        updated_at: new Date().toISOString(),
      }).eq('id', dealId);
      if(uErr)throw uErr;
    } else {
      // Insert new orphan deal — relist only.
      const {data:newDeal, error:iErr}=await sb.from('deals').insert({
        buy_side_mls: null,
        relist_mls: mls,
        phase: 'selling',
        list_price: listPrice,
        list_date: today,
      }).select('id').single();
      if(iErr)throw iErr;
      resolvedDealId=newDeal.id;
    }
    // History row.
    const {error:hErr}=await sb.from('deals_phase_history').insert({
      deal_id: resolvedDealId,
      from_phase: fromPhase,  // 'under_construction' for the link path; null for orphan
      to_phase: 'selling',
      note: dealId
        ? 'Linked relist via Mark as our listing (MLS Deals)'
        : 'Orphan listing via Mark as our listing (MLS Deals)',
    });
    if(hErr)throw hErr;
    // Decorate listing in-place + re-render.
    l.dealId=resolvedDealId;
    l.dealPhase='selling';
    renderDetailPage(l);
    refreshRowDealPill(mls);
  }catch(e){
    console.warn('applyMarkAsListing failed',e);
    alert('Mark as listing failed: '+(e&&e.message?e.message:String(e)));
  }
}
window.markAsListing=markAsListing;

  renderDetailPage(l);
  const cm=getComps(l);
  document.getElementById('comp-col').innerHTML=compsPanel(l);

}

// Explicit column list for the list view — everything mapRowToListing reads
// EXCEPT the two big free-text blobs (agent_remarks, showing_remarks), which
// are ~half the payload and only shown in the detail view. They're lazy-loaded

const LIST_COLS='address,agent_broker,agent_dre,agent_email,agent_name,agent_office_phone,agent_phone,baths,beds,broker_dre,change_date,change_type,city,condition_tier,value_driver_rooms_updated,condition_overridden,contact_name,contact_phone,elementary_rating,elementary_school,gate_code,high_rating,high_school,is_dotty,latitude,list_date,list_price,lockbox_location,lockbox_type,locked_arv,locked_construction,longitude,lot_size,middle_rating,middle_school,mls,mls_area,mls_area_name,notes,occupancy,occupant_type,photo_count,pool,ppsf,remarks,sale_type,sqft,stage,year_built,zip,imported_at';
async function loadListings(status){
  let query=sb.from('properties').select(LIST_COLS).not('mls','is',null).not('mls','like','OFFMKT-%').neq('change_type','sold').order('imported_at',{ascending:false}).limit(2000);
  if(status==='unread')query=query.eq('stage','unread').or(`list_price.is.null,list_price.lte.${MAX_LIST_PRICE}`);
  else if(status==='archived')query=query.or(`stage.eq.archived,list_price.gt.${MAX_LIST_PRICE}`);
  else if(status==='off_market_lead')query=query.eq('stage','off_market_lead');
  else if(status&&status!=='all')query=query.eq('stage',status);
  else query=query.not('stage','in','("archived","off_market_lead")').or(`list_price.is.null,list_price.lte.${MAX_LIST_PRICE}`);
  try{
    let{data,error}=await query;if(error)throw error;
    // Address-relist filter: if viewing off-market, hide rows whose address has
    // a newer listing (any non-cancelled/expired/withdrawn status) under a different MLS#.
    if(status==='off_market_lead'&&data&&data.length){
      const OFF_LOCK=['cancelled','canceled','expired','withdrawn'];
      const norm=r=>((r.address||'').replace(/\s+/g,' ').trim().toUpperCase()+'|'+(r.city||'').trim().toUpperCase());
      const offByAddr=new Map();
      data.forEach(r=>{const k=norm(r);if(!offByAddr.has(k)||new Date(r.change_date||0)>new Date(offByAddr.get(k).change_date||0))offByAddr.set(k,r);});
      const addrs=[...new Set(data.map(r=>r.address).filter(Boolean))];
      const relisted=new Set();
      // Chunk address lookups to avoid huge IN clauses, but run the chunks
      // concurrently — the off-market tab shouldn't be gated on ceil(N/100)
      // back-to-back round-trips.
      const chunks=[];
      for(let i=0;i<addrs.length;i+=100)chunks.push(addrs.slice(i,i+100));
      const results=await Promise.all(chunks.map(chunk=>
        sb.from('properties').select('mls,address,city,change_date,change_type').in('address',chunk)));
      results.forEach(({data:other})=>{
        (other||[]).forEach(o=>{
          const k=norm(o);
          const offRow=offByAddr.get(k);
          if(!offRow||o.mls===offRow.mls)return;
          const oct=(o.change_type||'').toLowerCase().trim();
          if(OFF_LOCK.indexOf(oct)>=0)return; // another off-market row doesn't count as a relist
          if(new Date(o.change_date||0)>new Date(offRow.change_date||0))relisted.add(k);
        });
      });
      if(relisted.size)data=data.filter(r=>!relisted.has(norm(r)));
    }
    listings=(data||[]).map(mapRowToListing);
    active=null;render();
    updateStageCounts();  // refresh tab counts once per data load (moved out of render())
    const toTitle=s=>s.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());
    const cities=[...new Set(listings.map(l=>toTitle((l.city||'').trim())).filter(Boolean))].sort();
    const cfList=document.getElementById('cf-list');
    // Only rebuild the city checkbox list when the city set actually changes —
    // otherwise we lose scroll position on every loadListings() call.
    const newCitiesKey=cities.join('|');
    if(newCitiesKey!==window._cfListCities){
      window._cfListCities=newCitiesKey;
      cfList.innerHTML=cities.map(c=>`<label><input type="checkbox" value="${c}" ${cityFilters.has(c)?'checked':''} onchange="toggleCityFilter('${c.replace(/'/g,"\\'")}')">${c}</label>`).join('');
    }
    updateCityBtn();
    // Bulk-load deal scores once per listings load. Cache-checked, so safe
    // to call alongside the per-MLS path in ensureDealScore (e.g. detail view).
    bulkLoadDealScores(listings.map(l=>l.mls));
    loadArvEstimates();
    // Brief BK: decorate each listing with its deal id+phase (if any). One
    // batch query against deals; updates the "🏗 In project" pill per row.
    decorateListingsWithDeals();
    // NOTE: batchFetchComps() intentionally NOT called here. It fired ~2 comp
    // queries PER listing (~1,600+/load) to warm compCache, but the list view's
    // ARV column reads arvEstimateCache (loadArvEstimates), not compCache — so
    // the pre-warm was pure Disk-IO cost. Comps load on demand when a detail
    // opens (opn() -> loadComps()). This was the dominant IO consumer.
    fetchAgentDeCounts();
  }catch(e){console.error('Failed to load:',e);}}

// Fetch seller-side DE counts for the current listings pool. Email-primary,
// name-fallback over DISJOINT listing populations: listings with a non-empty
// agentEmail contribute to the email-keyed query; listings without an email
// fall back to the name-keyed query. No row can be counted twice because
// each listing's lookup only reads one of the two maps.
async function fetchAgentDeCounts(){
  const emailSet=new Set(),nameSet=new Set();
  for(const l of listings){
    const em=(l.agentEmail||'').trim().toLowerCase();
    const nm=(l.agent||'').trim().toLowerCase();
    // Only collect agents we haven't already resolved this session.
    if(em){if(!deQueriedEmail.has(em))emailSet.add(em);}
    else if(nm){if(!deQueriedName.has(nm))nameSet.add(nm);}
  }
  const emails=[...emailSet],names=[...nameSet];
  // Nothing new to resolve — just repaint pills from the cached counts.
  if(!emails.length&&!names.length){
    if(deCacheReady){listings.forEach(l=>refreshRowDePill(l.mls));if(active){const l=listings.find(x=>x.mls===active);if(l)renderDetailPage(l);}}
    return;
  }
  try{
    const[er,nr]=await Promise.all([
      emails.length
        ?sb.from('properties').select('agent_email').eq('double_ended',true).gte('sold_date','2023-01-01').in('agent_email',emails)
        :Promise.resolve({data:[]}),
      names.length
        ?sb.from('properties').select('agent_name').eq('double_ended',true).gte('sold_date','2023-01-01').in('agent_name',names)
        :Promise.resolve({data:[]}),
    ]);
    if(er.error)console.error('[fetchAgentDeCounts email]',er.error);
    if(nr.error)console.error('[fetchAgentDeCounts name]',nr.error);
    for(const row of(er.data||[])){
      const k=(row.agent_email||'').trim().toLowerCase();
      if(k)deCountByEmail.set(k,(deCountByEmail.get(k)||0)+1);
    }
    for(const row of(nr.data||[])){
      const k=(row.agent_name||'').trim().toLowerCase();
      if(k)deCountByName.set(k,(deCountByName.get(k)||0)+1);
    }
    // Record every agent we just queried (including zero-DE agents, whose count
    // stays absent → agentDeCountFor returns 0) so we never re-query/re-count them.
    emails.forEach(e=>deQueriedEmail.add(e));
    names.forEach(n=>deQueriedName.add(n));
    deCacheReady=true;
    console.log(`[fetchAgentDeCounts] ${deCountByEmail.size} email-keyed agents, ${deCountByName.size} name-keyed agents flagged as DE since 2023-01-01`);
    // Re-render DE pills in place (no full render() — avoids load-flash).
    listings.forEach(l=>refreshRowDePill(l.mls));
    if(active){const l=listings.find(x=>x.mls===active);if(l)renderDetailPage(l);}
  }catch(e){console.error('[fetchAgentDeCounts]',e);}
}
function agentDeCountFor(l){
  if(!deCacheReady)return 0;
  const em=(l.agentEmail||'').trim().toLowerCase();
  if(em)return deCountByEmail.get(em)||0;
  const nm=(l.agent||'').trim().toLowerCase();
  if(nm)return deCountByName.get(nm)||0;
  return 0;
}
function renderAgentDeBadge(l){
  const n=agentDeCountFor(l);
  if(!n)return '';
  const noun=n===1?'past deal':'past deals';
  return `<span style="background:var(--amber-bg);color:var(--amber);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:8px;letter-spacing:.3px" title="Listing agent has ${n} double-end ${n===1?'deal':'deals'} since 2023">🔁 double-end agent — ${n} ${noun}</span>`;
}
// Brief AD: compact list-card variant. Emoji-only payload; count lives in the tooltip.
// Reuses the same deCountByEmail / deCountByName caches populated by fetchAgentDeCounts().
function renderAgentDeCardPill(l){
  const n=agentDeCountFor(l);
  if(!n)return '';
  return `<span style="background:var(--amber-bg);color:var(--amber);font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:4px;letter-spacing:.3px;vertical-align:middle" title="Listing agent has ${n} double-end deal${n===1?'':'s'} since 2023">🔁</span>`;
}
async function batchFetchComps(){
  const BATCH=10;
  let todo=listings.filter(l=>!compCache[l.mls]&&l.sqft>0);
  if(!todo.length)return;
  while(todo.length>0){
    const batch=todo.slice(0,BATCH);
    await Promise.all(batch.map(async l=>{try{compCache[l.mls]=await findComps({mls:l.mls,sqft:l.sqft,address:l.address,city:l.city,zip:l.zip,high:l.high,elem:l.elem,mid:l.mid,latitude:l.latitude,longitude:l.longitude});}catch(e){console.error('[batchFetchComps] findComps failed for',l.mls,e);compCache[l.mls]={comps:[],hp:0,error:true};}}));
    batch.forEach(l=>refreshRowComps(l.mls));
    console.log(`[Comps] Batch loaded for ${batch.length} listings (${todo.length-batch.length} remaining)`);
    todo=listings.filter(l=>!compCache[l.mls]&&l.sqft>0);
  }
}

// ========== INIT ==========
// Brief BP: ?mls=<X> deep-link support. After loadListings() resolves the
// unread pool, if the URL carries ?mls=<X> we open that listing's detail
// pane — even if BO's deal-phase filter has hidden it from the visible
// list (in which case we fetch the row separately and add it to `listings`,
// mirroring the slow path in onAddrSearchPick).
async function handleDeepLink(){
  const params=new URLSearchParams(window.location.search);
  const targetMls=params.get('mls');
  if(!targetMls)return;
  let target=listings.find(l=>l.mls===targetMls);
  if(!target){
    // BO filter hid it (e.g. listing tied to in_escrow / under_construction
    // / listed deal, or off-market OFFMKT-... row). Fetch and hydrate so
    // opn() has the full listing shape to render against.
    const{data,error}=await sb.from('properties').select('*').eq('mls',targetMls).single();
    if(error||!data){
      console.warn('[deep-link] could not load listing',targetMls,error);
      return;
    }
    target=mapRowToListing(data);
    listings.push(target);
  }
  if(target)opn(targetMls,target);
}

(async()=>{
  await window.authGate();
  if(!window.CURRENT_USER_ROLE)return;  // authGate redirected; abort
  window.renderSidebar('deals');
  await loadRehabConfig();
  await loadListings('unread');
  render();
  // Deep-link runs once, after the initial listings + render are in place.
  handleDeepLink();
})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLS Map — Backstage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="backstage.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBtxBe0q6i46rUomZzVE3BKmJ4EQNYGvvU"></script>
<script src="auth.js"></script>
<script src="sidebar.js"></script>
<style>
body{overflow:hidden;height:100vh}

/* Dropdowns */
#cf-drop{display:none}
#cf-drop.open{display:block}
#cf-drop label,#tf-drop label{display:flex;align-items:center;gap:8px;padding:5px 12px;font-size:12px;font-weight:500;color:var(--text);cursor:pointer}
#cf-drop label:hover,#tf-drop label:hover{background:var(--bg-alt)}
#tf-drop{display:none}
#tf-drop.open{display:block}
#sf-drop{display:none}
#sf-drop.open{display:block}
#sf-drop label{display:flex;align-items:center;gap:8px;padding:5px 12px;font-size:12px;font-weight:500;color:var(--text);cursor:pointer}
#sf-drop label:hover{background:var(--bg-alt)}

/* === BACKSTAGE SHELL === */
.app-shell{display:flex;height:100vh}

.bs-sidebar{width:230px;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:width .2s}
.bs-sidebar.collapsed{width:56px}
.bs-sidebar.collapsed .side-brand span,.bs-sidebar.collapsed .side-section-label,.bs-sidebar.collapsed .side-label,.bs-sidebar.collapsed .side-user-name,.bs-sidebar.collapsed .lock-btn{display:none}
.bs-sidebar.collapsed .side-brand{justify-content:center;padding:20px 0 18px}
.bs-sidebar.collapsed .side-item{justify-content:center;padding:10px 0;margin:0 8px 1px}
.bs-sidebar.collapsed .side-section{padding:12px 0 0}
.bs-sidebar.collapsed .side-footer{justify-content:center;padding:16px 0}
.bs-sidebar.collapsed .side-user{justify-content:center}

.side-brand{padding:20px 20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.side-mark{width:26px;height:26px;border-radius:7px;background:var(--text);display:grid;place-items:center;font-weight:700;font-size:11px;color:#fff}
.side-brand span{font-size:14px;font-weight:600;color:var(--text)}
.side-section{padding:6px 10px 0}
.side-section-label{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text-4);padding:0 8px;margin-bottom:2px}
.side-item{display:flex;align-items:center;gap:8px;padding:3px 8px;border-radius:var(--radius);cursor:pointer;transition:all .12s;margin-bottom:0;text-decoration:none;line-height:1.3}
.side-item:hover{background:var(--bg-page);text-decoration:none}
.side-item.active{background:var(--bg-alt)}
.side-item.active .side-icon svg{stroke:var(--text)}
.side-item.active .side-label{color:var(--text);font-weight:600}
.side-icon{width:18px;height:18px;display:grid;place-items:center}
.side-icon svg{width:16px;height:16px;stroke:var(--text-4);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.side-label{font-size:13px;font-weight:500;color:var(--text-3)}
.side-item.disabled{opacity:.35;pointer-events:none}
.side-footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.side-user{display:flex;align-items:center;gap:9px}
.side-avatar{width:26px;height:26px;border-radius:50%;background:var(--bg-alt);display:grid;place-items:center;font-size:11px;font-weight:600;color:var(--text-3)}
.side-user-name{font-size:13px;font-weight:500;color:var(--text-3)}
.lock-btn{background:none;border:none;cursor:pointer;padding:4px;color:var(--text-4)}
.lock-btn:hover{color:var(--text)}
.collapse-btn{background:none;border:none;cursor:pointer;padding:6px 12px;color:var(--text-4);font-size:14px}
.collapse-btn:hover{color:var(--text)}

.main-content{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* Header */
.hdr{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:52px;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;color:var(--accent);letter-spacing:-.3px}
.hdr-meta{font-size:12px;font-weight:500;color:var(--text-3);margin-left:12px;border-left:1px solid var(--border);padding-left:10px}
.hl,.hr{display:flex;align-items:center;gap:6px}

/* Map */
#map{flex:1;width:100%}
</style>
</head>
<body>

<!-- APP SHELL -->
<div class="app-shell">

<!-- Sidebar -->
<!-- Sidebar (rendered by sidebar.js) -->
<div class="bs-sidebar" id="bsSidebar"></div>

<!-- Main content -->
<div class="main-content">

<div class="hdr">
  <div class="hl">
    <div class="logo">MLS Map</div>
    <div style="position:relative;display:inline-block" id="cf-wrap">
      <button class="btn" id="cf-btn" onclick="document.getElementById('cf-drop').classList.toggle('open')" style="min-width:140px;text-align:left">All Cities ▾</button>
      <div id="cf-drop" style="position:absolute;top:100%;left:0;margin-top:4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:999;min-width:200px;max-height:320px;overflow-y:auto;padding:4px 0">
        <div style="padding:4px 10px;border-bottom:1px solid var(--border);display:flex;gap:6px">
          <button onclick="cfSelectAll()" style="font-size:10px;font-weight:600;font-family:inherit;background:none;border:none;color:var(--accent);cursor:pointer;padding:2px 4px">All</button>
          <button onclick="cfSelectNone()" style="font-size:10px;font-weight:600;font-family:inherit;background:none;border:none;color:var(--accent);cursor:pointer;padding:2px 4px">None</button>
        </div>
        <div id="cf-list"></div>
      </div>
    </div>
    <div style="position:relative;display:inline-block" id="tf-wrap">
      <button class="btn" id="tf-btn" onclick="document.getElementById('tf-drop').classList.toggle('open')" style="min-width:120px;text-align:left">All Tags ▾</button>
      <div id="tf-drop" style="position:absolute;top:100%;left:0;margin-top:4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:999;min-width:220px;padding:4px 0">
        <div style="padding:4px 10px;border-bottom:1px solid var(--border);display:flex;gap:6px">
          <button onclick="tfSelectAll()" style="font-size:10px;font-weight:600;font-family:inherit;background:none;border:none;color:var(--accent);cursor:pointer;padding:2px 4px">All</button>
          <button onclick="tfSelectNone()" style="font-size:10px;font-weight:600;font-family:inherit;background:none;border:none;color:var(--accent);cursor:pointer;padding:2px 4px">None</button>
        </div>
        <label><input type="checkbox" value="TLC / Fixer" onchange="toggleTagFilter(this.value)">TLC / Fixer</label>
        <label><input type="checkbox" value="Estate / Trust" onchange="toggleTagFilter(this.value)">Estate / Trust</label>
        <label><input type="checkbox" value="Investor / Flip" onchange="toggleTagFilter(this.value)">Investor / Flip</label>
        <label><input type="checkbox" value="First time on market" onchange="toggleTagFilter(this.value)">First time on market</label>
        <label><input type="checkbox" value="Price reduced" onchange="toggleTagFilter(this.value)">Price reduced</label>
        <label><input type="checkbox" value="Already flipped" onchange="toggleTagFilter(this.value)">Already flipped</label>
      </div>
    </div>
    <div style="position:relative;display:inline-block" id="sf-wrap">
      <button class="btn" id="sf-btn" onclick="document.getElementById('sf-drop').classList.toggle('open')" style="min-width:120px;text-align:left">All Stages ▾</button>
      <div id="sf-drop" style="position:absolute;top:100%;left:0;margin-top:4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:999;min-width:200px;padding:4px 0">
        <div style="padding:4px 10px;border-bottom:1px solid var(--border);display:flex;gap:6px">
          <button onclick="sfSelectAll()" style="font-size:10px;font-weight:600;font-family:inherit;background:none;border:none;color:var(--accent);cursor:pointer;padding:2px 4px">All</button>
          <button onclick="sfSelectNone()" style="font-size:10px;font-weight:600;font-family:inherit;background:none;border:none;color:var(--accent);cursor:pointer;padding:2px 4px">None</button>
        </div>
        <label><input type="checkbox" value="unread" onchange="toggleStageFilter(this.value)" checked>Unread</label>
        <label><input type="checkbox" value="contacted" onchange="toggleStageFilter(this.value)">Contacted</label>
        <label><input type="checkbox" value="potential" onchange="toggleStageFilter(this.value)">Potential</label>
        <label><input type="checkbox" value="unsold_flip" onchange="toggleStageFilter(this.value)">Unsold Flips</label>
        <label><input type="checkbox" value="off_market_lead" onchange="toggleStageFilter(this.value)">Off-Market</label>
      </div>
    </div>
    <div class="hdr-meta"><span id="tc">0</span> on map</div>
  </div>
  <div class="hr">
    <span id="db-status" style="font-size:10px;color:var(--text-4)"></span>
  </div>
</div>

<div id="map"></div>

</div><!-- /main-content -->

<script>
// ========== SUPABASE ==========
const SUPABASE_URL='https://pwrnywsojomrygsiezzi.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3cm55d3Nvam9tcnlnc2llenppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzE1OTMsImV4cCI6MjA4OTgwNzU5M30.tGewn18t-6dN_bMXjC-Z820zFYvL1VUu3BDhfW1ZoNk';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
window.sb=sb;  // expose for auth.js

// ========== STATE ==========
let listings=[], map=null, markers=[], infoWindow=null;
let cityFilters=new Set(), tagFilters=new Set(), stageFilters=new Set(['unread']);

const FK=n=>n>=1e6?'$'+(n/1e6).toFixed(2)+'M':'$'+Math.round(n/1e3)+'K';
const toTitle=s=>s.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());

// ========== TAG COLORS ==========
const TAG_COLORS={
  'TLC / Fixer':'#D97706',
  'Estate / Trust':'#7C3AED',
  'Investor / Flip':'#2563EB',
  'First time on market':'#059669',
  'Price reduced':'#DC2626',
  'Already flipped':'#92400E'
};

function getMarkerColor(l){
  if(l.tags.length===0)return '#3074a8';
  return TAG_COLORS[l.tags[0]]||'#3074a8';
}

// ========== CITY FILTER ==========
function toggleCityFilter(city){if(cityFilters.has(city))cityFilters.delete(city);else cityFilters.add(city);updateCityBtn();renderMarkers();}
function cfSelectAll(){document.querySelectorAll('#cf-list input[type=checkbox]').forEach(cb=>{cb.checked=true;cityFilters.add(cb.value);});updateCityBtn();renderMarkers();}
function cfSelectNone(){cityFilters.clear();document.querySelectorAll('#cf-list input[type=checkbox]').forEach(cb=>cb.checked=false);updateCityBtn();renderMarkers();}
function updateCityBtn(){const btn=document.getElementById('cf-btn');if(!cityFilters.size)btn.textContent='All Cities ▾';else if(cityFilters.size===1)btn.textContent=[...cityFilters][0]+' ▾';else btn.textContent=cityFilters.size+' Cities ▾';}

// ========== TAG FILTER ==========
function toggleTagFilter(tag){if(tagFilters.has(tag))tagFilters.delete(tag);else tagFilters.add(tag);updateTagBtn();renderMarkers();}
function tfSelectAll(){document.querySelectorAll('#tf-drop input[type=checkbox]').forEach(cb=>{cb.checked=true;tagFilters.add(cb.value);});updateTagBtn();renderMarkers();}
function tfSelectNone(){tagFilters.clear();document.querySelectorAll('#tf-drop input[type=checkbox]').forEach(cb=>cb.checked=false);updateTagBtn();renderMarkers();}
function updateTagBtn(){const btn=document.getElementById('tf-btn');if(!tagFilters.size)btn.textContent='All Tags ▾';else if(tagFilters.size===1)btn.textContent=[...tagFilters][0]+' ▾';else btn.textContent=tagFilters.size+' Tags ▾';}

// ========== STAGE FILTER ==========
function toggleStageFilter(stage){if(stageFilters.has(stage))stageFilters.delete(stage);else stageFilters.add(stage);updateStageBtn();loadListings();}
function sfSelectAll(){document.querySelectorAll('#sf-drop input[type=checkbox]').forEach(cb=>{cb.checked=true;stageFilters.add(cb.value);});updateStageBtn();loadListings();}
function sfSelectNone(){stageFilters.clear();document.querySelectorAll('#sf-drop input[type=checkbox]').forEach(cb=>cb.checked=false);updateStageBtn();loadListings();}
function updateStageBtn(){const btn=document.getElementById('sf-btn');if(!stageFilters.size)btn.textContent='All Stages ▾';else if(stageFilters.size===1){const m={'unread':'Unread','contacted':'Contacted','potential':'Potential','unsold_flip':'Unsold Flips','off_market_lead':'Off-Market'};btn.textContent=(m[[...stageFilters][0]]||[...stageFilters][0])+' ▾';}else btn.textContent=stageFilters.size+' Stages ▾';}

// ========== CLOSE DROPDOWNS ==========
document.addEventListener('click',e=>{
  ['cf','tf','sf'].forEach(p=>{const w=document.getElementById(p+'-wrap'),d=document.getElementById(p+'-drop');if(w&&d&&!w.contains(e.target))d.classList.remove('open');});
});

// ========== FILTER LISTINGS ==========
function getFiltered(){
  let d=[...listings];
  if(cityFilters.size)d=d.filter(l=>cityFilters.has(toTitle((l.city||'').trim())));
  if(tagFilters.size)d=d.filter(l=>l.tags.some(t=>tagFilters.has(t)));
  return d.filter(l=>l.latitude&&l.longitude);
}

// ========== MAP ==========
function initMap(){
  map=new google.maps.Map(document.getElementById('map'),{
    zoom:10,
    center:{lat:33.92,lng:-118.05},
    mapTypeControl:true,
    streetViewControl:false,
    fullscreenControl:true,
    styles:[{featureType:'poi',stylers:[{visibility:'off'}]}]
  });
  infoWindow=new google.maps.InfoWindow();
}

function renderMarkers(){
  // Clear existing
  markers.forEach(m=>m.setMap(null));
  markers=[];

  const filtered=getFiltered();
  document.getElementById('tc').textContent=filtered.length;

  const bounds=new google.maps.LatLngBounds();

  filtered.forEach(l=>{
    const color=getMarkerColor(l);
    const marker=new google.maps.Marker({
      position:{lat:l.latitude,lng:l.longitude},
      map,
      icon:{
        path:google.maps.SymbolPath.CIRCLE,
        scale:8,
        fillColor:color,
        fillOpacity:0.9,
        strokeColor:'#fff',
        strokeWeight:1.5
      },
      title:l.address+', '+l.city
    });

    marker.addListener('click',()=>{
      const tags=l.tags.length?'<div style="margin-top:4px">'+l.tags.map(t=>{
        const c=TAG_COLORS[t]||'#888';
        return '<span style="display:inline-block;font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;background:'+c+'22;color:'+c+';margin-right:3px">★ '+t+'</span>';
      }).join('')+'</div>':'';

      const schools=[];
      if(l.elem)schools.push('E'+l.elem.r+' '+l.elem.n);
      if(l.mid)schools.push('M'+l.mid.r+' '+l.mid.n);
      if(l.high)schools.push('H'+l.high.r+' '+l.high.n);
      const schoolHtml=schools.length?'<div style="font-size:10px;color:#666;margin-top:4px">'+schools.join(' · ')+'</div>':'';

      infoWindow.setContent(
        '<div style="font-family:DM Sans,sans-serif;min-width:220px;padding:2px">'+
        '<div style="font-weight:700;font-size:13px">'+l.address+'</div>'+
        '<div style="font-size:11px;color:#666;margin-top:2px">'+l.city+', CA '+l.zip+'</div>'+
        '<div style="font-size:15px;font-weight:800;color:#1a1a1a;margin-top:6px">'+FK(l.price)+'<span style="font-size:11px;font-weight:500;color:#888;margin-left:6px">$'+Math.round(l.ppsf)+'/sf</span></div>'+
        '<div style="font-size:11px;color:#666;margin-top:2px">'+l.beds+'bd/'+l.baths+'ba · '+l.sqft.toLocaleString()+' sf · Lot '+(l.lot||'—')+'</div>'+
        '<div style="font-size:11px;color:#666">Status: '+(l.changeType||'—').replace(/\b\w/g,c=>c.toUpperCase())+' · DOM: '+l.dom+'</div>'+
        schoolHtml+tags+
        '<div style="margin-top:8px;display:flex;gap:6px">'+
        '<a href="mls-deals.html" style="font-size:11px;color:#c0784a;font-weight:600;text-decoration:none">Open in Deals →</a>'+
        '<a href="https://www.redfin.com/search#q='+encodeURIComponent(l.address+' '+l.city+' CA')+'" target="_blank" style="font-size:11px;color:#888;text-decoration:none">Redfin</a>'+
        '<a href="https://www.zillow.com/homes/'+encodeURIComponent(l.address+', '+l.city+', CA')+'_rb/" target="_blank" style="font-size:11px;color:#888;text-decoration:none">Zillow</a>'+
        '</div></div>'
      );
      infoWindow.open(map,marker);
    });

    bounds.extend({lat:l.latitude,lng:l.longitude});
    markers.push(marker);
  });

  if(filtered.length>1)map.fitBounds(bounds,50);
  else if(filtered.length===1)map.setCenter({lat:filtered[0].latitude,lng:filtered[0].longitude});
}

// ========== LOAD LISTINGS ==========
async function loadListings(){
  let query=sb.from('properties').select('address,city,zip,list_price,ppsf,sqft,beds,baths,lot_size,year_built,mls,list_date,pool,sale_type,remarks,stage,change_type,latitude,longitude,elementary_school,elementary_rating,middle_school,middle_rating,high_school,high_rating,notes')
    .not('mls','is',null).neq('change_type','sold').not('latitude','is',null).limit(1000);

  if(stageFilters.size){
    const stages=[...stageFilters];
    if(stages.length===1)query=query.eq('stage',stages[0]);
    else query=query.in('stage',stages);
  }

  try{
    const{data,error}=await query;
    if(error)throw error;
    listings=(data||[]).map(r=>{
      const rmk=((r.remarks||'')+' '+(r.sale_type||'')).toLowerCase();const tags=[];
      if(/first time on the market|first time on market|first time in \d+ year/.test(rmk))tags.push('First time on market');
      if(/\btlc\b|\bfixer\b|\bhandyman\b|\bhandy.?man special\b/.test(rmk))tags.push('TLC / Fixer');
      if(/\btrust sale\b|\bprobate\b|\bestate sale\b|, trust\b/.test(rmk)||/trust/i.test(r.sale_type||''))tags.push('Estate / Trust');
      if(/\binvestor special\b|\bgreat for investors\b|\bflip\b|\bwholesale\b/.test(rmk))tags.push('Investor / Flip');
      if(/\bprice reduced\b|\breduced price\b|\bmotivated seller\b/.test(rmk))tags.push('Price reduced');
      if(/\bfully remodeled\b|\bcompletely remodeled\b|\btotally remodeled\b|\bnewly remodeled\b|\bfully renovated\b|\bcompletely renovated\b|\bnewly renovated\b/.test(rmk))tags.push('Already flipped');
      const dom_val=(()=>{if(!r.list_date)return 0;try{const s=r.list_date.replace(/\//g,'-');const p=s.split('-');if(p.length===3){const dt=p[0].length===4?new Date(s):p[2].length===4?new Date(p[2]+'-'+p[0]+'-'+p[1]):new Date(s);if(isNaN(dt))return 0;return Math.max(1,Math.round((new Date()-dt)/864e5));}return 0;}catch(e){return 0;}})();
      return{
        address:r.address||'',city:r.city||'',zip:r.zip||'',price:r.list_price||0,ppsf:r.ppsf||0,
        sqft:r.sqft||0,beds:r.beds||0,baths:parseFloat(r.baths)||0,lot:r.lot_size||'',
        built:r.year_built||'',mls:r.mls||'',pool:r.pool||'',
        changeType:r.change_type||'',tags,status:r.stage||'unread',
        latitude:r.latitude,longitude:r.longitude,dom:dom_val,
        elem:r.elementary_rating||r.elementary_school?{r:r.elementary_rating||0,n:r.elementary_school||''}:null,
        mid:r.middle_rating||r.middle_school?{r:r.middle_rating||0,n:r.middle_school||''}:null,
        high:r.high_rating||r.high_school?{r:r.high_rating||0,n:r.high_school||''}:null
      };
    });

    // Populate city filter
    const cities=[...new Set(listings.map(l=>toTitle((l.city||'').trim())).filter(Boolean))].sort();
    document.getElementById('cf-list').innerHTML=cities.map(c=>
      `<label><input type="checkbox" value="${c}" ${cityFilters.has(c)?'checked':''} onchange="toggleCityFilter('${c.replace(/'/g,"\\'")}')">${c}</label>`
    ).join('');
    updateCityBtn();

    renderMarkers();
  }catch(e){console.error('Failed to load:',e);}
}

// ========== INIT ==========
(async()=>{
  await window.authGate();
  if(!window.CURRENT_USER_ROLE)return;  // authGate redirected; abort
  window.renderSidebar('map');
  try{const{error}=await sb.from('properties').select('id').limit(1);document.getElementById('db-status').innerHTML=error?'<span style="color:var(--red)">●</span>':'<span style="color:var(--green)">●</span>';}
  catch(e){document.getElementById('db-status').innerHTML='<span style="color:var(--red)">●</span>';}
  initMap();
  loadListings();
})();
</script>
</div><!-- /main-content -->
</div><!-- /app-shell -->
</body>
</html>
